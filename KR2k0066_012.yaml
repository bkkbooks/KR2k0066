body:
  text: 河防一覽卷十二明潘季馴撰甄别司道疏臣潘季馴謹題為欽遵明旨甄别司道官員以重河漕事案照萬厯十六年十一月内准工部咨該臣題為恭誦綸音不勝感奮敬陳治河鄙見伏候宸斷事覆奉聖㫖是近年河道官員不行遵守修防事宜因循廢弛致有疎虞却又紛紛建議意見雜出何裨實事今後務遵明㫖加謹防禦每年終總河官將所屬河道部司等官甄别具奏欽此除欽遵外臣竊惟南北運道不啻三千餘里總河之臣以一身彈壓于其間豈能家喻而户曉日省而月視哉所賴于承宣者司道諸臣也司道不得其人則河情難于上達法禁苦于下壅鮮不誤矣我皇上留心國計軫念民生特降明綸諭以得人為要仍頒嚴㫖假以甄别之權此實地方之福河臣之幸也敢不仰承徳意悉心諮訪以圖報稱哉臣查得自北直𨽻以至浙江專管河道者部臣五道臣二兼管河道者部臣三道臣十一今當萬厯十七年已終相應奉㫖甄别内除莅任方新伏秋修防未經委任及浙江水利道係臣原籍恐違近例不敢槩舉外以部臣言之如中河分司郎中沈修虚中雅能受善廣益出自和衷不假聲色而推赤心以鼓羣工罔炫新竒而順水道以收羣策北河分司郎中吳之龍直諒固是本真敷施尤多諳練勿喜更張而因革自有條理無為苛刻而章程具見整嚴南河分司郎中黄曰謹勤恪足應糾紛老成不事粉飾始任即值横流而疏濬獨苦施工必勤荒度而防禦有方臨清板閘分司員外何應奇性不徇人政能剔蠧司甎司閘而遇事皆有規條任怨任勞而一心惟知法紀南旺分司主事王元命卓有古雅之風絶無脂韋之態言若不出而泉閘庶務聿興體若不勝而官夫奉行惟謹夏鎮分司主事余繼善通敏可當一面才諝克濟時艱濁流四溢而兩月悉就安全諸作並興而一身不遺餘力以道臣言之如徐州道山東按察使陳瑛胼胝已及十年忠勞真如一日胷抱全河而區裁有同指掌志專報主而注厝不異承蜩分守東兖道管泉參政郝維喬涵養定而吐茹不形器識髙而張弛自裕導泉防河之曲當澤民利國以咸宜分守濟南道管泉參政楊芳秉長駕逺馭之才有憂勤惕厲之意釐析河泉之源委而擘畫甚當稽查額課之逋負而工費允資河南管河道副使陳九仞精勤率屬而事在先勞縝宻分猷而言可厎績禦狂瀾一身如棄躬畚鍤萬苦不辭濟寧管河道副使曹時聘心事如青天白日才華若流水行雲昔守鳳郡而防淮之譽已彰兹擢東藩而治河之功尤茂蘇松兵備道副使李淶才可斷犀智能先物當庶務㫄午之日而疏鑿必親值天時旱魃之秋而閭閻允附大名兵備道副使于文熈卓犖不事詭隨誠確雅能肩仔疏瀹衞水而王舟無阻滯之患議建隄防而魏民有保障之功霸州兵備道副使蔣科才猷不尚揮霍趣向自是髙明流沙之通澀不常運渠之疏築知謹以上諸臣職任雖有不同要之公亷勤恪皆為一時之選所當薦揚者也内如郎中黄曰謹涖事雖僅九月修防已畢一年按察使陳瑛副使陳九仞近報陞任尚未交代參政楊芳副使曹時聘見任雖未及期前官具兼河務皆臣所轄之地似應并薦者也如䝉敕下該部再加查議如果臣言不謬将諸臣次第轉擢而中間相應久任者查照原題施行庶幾防禦得人而地方永賴矣謹題請㫖奉聖㫖該部知道工部覆前疏題為欽遵明㫖甄别司道官員以重河漕事該總理河道右都御史潘季馴題前事奉聖㫖該部知道欽此該部看得總理河道右都御史潘季馴題稱自北直𨽻以至浙江專管及兼管河道部司諸臣除浙江係河臣原籍恐違近例不敢槩舉乞将中河郎中等官沈修等徐州道按察使等官陳瑛等次第轉擢中間相應久任者查照原題施行一節為照漕河事規分理防守固在郡縣承宣督率尤賴部司乃往嵗薦奨獨及郡縣而部司不與甚非所以重綜覈昭勸懲也近該河臣題奉明㫖通行甄别兹當十七年嵗終照例具題前来相應如議題請恭候命下咨行吏部将部臣沈修吳之龍黄曰謹何應奇王元命余繼善道臣陳瑛郝維喬楊芳陳九仞曹時聘李淶于文熈蒋科通行紀録次第轉擢内郎中沈修查照原題久任候九年考滿另議優擢及照蘇松兵備係暫管河務彼江南水利既設有專官今後年終仍查水利官舉劾其浙江水利據河臣稱係原籍遵例不敢槩叙但查近例原籍迴避特為南道御史㸃差而設若都御史統轄地方廣逺原不在此例如各邊及漕運總督有所舉刺雖原籍亦所不遺總理河道與總督體統相同則事權不宜獨異況全河形勢南自兩浙歴江河淮濟以達京師凡數千里若一身之脈絡然倘偏而不舉則脈絡不得貫通事權不得歸一合無今後每年終查覈各司道府州縣如南北兩直𨽻浙江河南山東凡與河道相干涉者無論原籍與否一體舉劾併乞聖裁移咨總理河道及南北直𨽻浙江河南山東各巡撫都御史及咨都察院轉行各巡按御史遵照施行奉聖㫖是各該司道等官但與河道相干的著總理官一體甄别申飭鮮船疏臣潘季馴謹題為乞恩查復舊規以利漕渠事據管理南河郎中黄曰謹呈前事卷查舊例淮安通濟閘外每年伏水未發之前築攔河土壩以遏黄流内灌所有進貢鰣魚鮮船限在五月初發行伏前過淮其楊梅等船聴将馬快空船預撥壩外停泊盤剥節經遵行已久及照上年前船俱不預先出口以致築壩過期黄水暴漲倒灌裏河淤墊挑濬甚為不便近來黄河漲發多在未入伏二十日之前勢猛難禦則口壩之築須為早圖合無移文南京兵部并守備衙門速将鮮貢船隻催儧發行幷撥馬快船隻依期於五月中旬俱令出口本司預備物料定於六月初一日築壩合口庶壩工早竣河道無虞等因到臣案照萬厯八年先該臣總理河漕㑹同漕撫前任都御史江一麟題該工部覆議查得正徳嘉靖年間五月已有鰣魚到京且既稱鮮品尤宜早進既係薦廟尤該及時但近年以來進鮮每於採鮮既完之後方行措辦装具附載貨物勾當稽留動踰旬日沿途淹頓又致愆期比至京師則色味俱變不惟有礙築壩且於薦鮮之義亦甚無當也即據守臣回稱鰣魚例在五月初旬採完葢四月二十日前後已行採矣若隨船器用如氷鹽之類預備停當一經採完即便發行不過半月即可過淮正是伏前自於築壩無礙至於楊梅等物又與鰣魚不同即至壩成不妨盤剥以後年分鰣魚鮮船定限五月初頭發行伏前過淮楊梅等船從便聴将南京馬快空船於未築壩之先預撥過淮停泊壩外以俟盤剥則上供既無後時之虞國計亦得先事之備所闗于築壩治漕者寔非小補等因題奉聖㫖是欽此備咨通行欽遵外今據該司所呈近來黄河水發太早即如去嵗五月二十日水汛陡漲其流愈濁馬船到遲致誤築壩裏河受淤挑濬工鉅乞要預催鮮船早放出口一節委屬喫𦂳臣又查得徐北鎮口閘外清黄交接黄河暴漲内灌成淤已經題奉欽依黄漲之時下板閉閘以防内淤若貢艘稍遲南誤出口北誤入閘兩相妨礙況鰣魚出在四月自應及時採取若船隻氷鹽預先備辦採完即發則半月之内准可過淮出口非惟壩工不誤而恭進品物較常必更鮮美今據該司擬于六月初一日築壩似為長便伏望皇上軫念河漕薦新均屬重務勅下該部如果臣言不謬咨行南京兵部及内守備衙門預将鰣魚鮮船合用器具氷鹽先時料理完備一經採完隨即督發嚴諭在途不許遷延期在五月十五左右兩運盡數過淮趂赶伏水未發早進鎮口閘河其餘貢船預撥馬快空船照限出口停泊外河以俟盤剥仍聴臣預行該司辦完壩料将通濟閘外輭壩凖在六月初一日合口庶幾貢期不爽河防有裨矣謹題請㫖奉聖㫖該部知道工部覆前疏題為乞恩查復舊規以利漕渠事該總理河漕兼提督軍務都察院右都御史潘季馴題前事奉聖㫖該部知道欽此欽遵抄出到部送司案呈到部看得淮安通濟閘徐州鎮口閘當黄河南北之衝故每年五月間黄水未發将鮮貢船隻催儧過盡南則築輭壩以遏横流北則閉閘口以禦淤墊屢經題奉明㫖禁例森嚴遵行已久乃近年鮮船未行之前則器具氷鹽失于先治既發之後則附載貨物沿途遷延如上年黄水陡發太早鮮船出口太遲遂致築壩不前幾成大患是以河臣潘季馴先事預防申明舊制要在四月採鮮五月過淮六月初一日築壩較之往年稍加督速而貢品愈致鮮美閘壩俱得蚤圖深為長便相應如議覆請但進鮮船與官民船不同法禁難行事多阻撓自非天語丁寧未免遷延若故伏望皇上俯念軍國大計将鮮貢限期特降嚴㫖容臣等咨行兵部轉咨南京兵部及守備衙門務要依期採辦作速啟行限在五月十五日前後兩運盡數過淮入口但有稽遲至六月内者許河臣㕘奏重處仍咨總河都御史轉行管理南河郎中夏鎮主事預辦物料候鮮船過淮即便築壩過徐即便下閘其輭壩定限每年六月初一日合口如有遲悞一體查㕘施行奉聖㫖是進鮮船隻著該衙門依期採辦發行限五月中過淮六月初築壩不許延緩過期致碍河防如有故違聴總河官及該科㕘治申明職掌疏臣潘季馴謹題為明職掌一事權以便責成以裨河漕事臣於二月十二日准工部咨該臣題為欽遵明㫖甄别司道官員以重河漕事本部覆議内開蘇松兵備係暫管河務彼江南水利既設有專官今後年終仍查水利官舉劾其浙江水利河臣稱係原籍不敢槩叙但查各邊及漕運總督有所舉刺雖原籍亦所不遺總理河道與總督體統相同則事權不宜獨異年終查覈司道府州縣如南北兩直𨽻浙江河南山東凡與河道相干涉者無論原籍與否一體舉劾等因題奉聖㫖是各該司道等官但與河道相干的著總理官一體甄别欽此除欽遵外臣謹以今嵗甄别之疏不及蘇松水利道之故與兵水二道事體應否歸一之由敬為皇上陳之臣於萬厯十六年六月初二日入境適值添設蘇松水利一道副使許應逵隨亦赴任臣以事體度之漕渠必屬之水利道矣隨於本年閏六月初八日為查取官員賢否事牌行該道查造文武官員考語冊又為專責成嚴修守等事案行該道申飭河防初九日為欽奉勅諭查勘河道等事牌行該道查議濬淺築隄錢糧人夫作何區處七月初一日准工部咨為民饑已極西成尚逺等事案行該道将南京户部發銀十萬兩如遇修舉水利呈允支銷年終将支過實存數目報院覆查咨部初二日為闗防詐偽事票行該道将發去告示轉行所屬曉諭十八日為查濬江南河道以便早運事案行該道查勘運河某處淺阻作何疏濬并額徴河工脚米銀完欠數目二十九日為查理嵗報河道工程事牌行該道查取萬厯十六年修過工程用過錢糧年終冊送院類造該道俱無一字回報而水利道事務亦無一字闗白臣者隨該臣咨行應天巡撫周繼查詢管河該道縁由准有回咨内開先據蘇松兵備道呈稱河道事宜先年并水利俱係兵備道兼理今既設有水利專道則河道一事應否歸於水利道專管或仍聽本道兼攝呈䝉本院詳批河道水利原係二事仰照舊行去後今准前因相應咨覆等因臣遂以河道事務一意責成蘇松兵備道而水利道之事絶無干涉矣此非許應逵之有心抗臣亦以河道原屬兵備道而謂臣職專河道水利非所司耳故臣於年終甄别司道之疏止及李淶而不及許應逵也即今奉有明㫖無容别議但於職掌尚未申明事權亦未歸一且水利道原無管河之責而臣乃舉刺非所管轄之官若於事體未妥者臣查得江南水利河道委屬兩端而副使許應逵才猷敏練智識通明先任南河郎中河事固所素習河道事宜應否併屬本官兼理其水利事務自有撫按專司應否亦屬河道衙門兼攝臣不敢擅擬再照浙江司道府縣掌印水利等官工部覆奉明㫖令臣照各邊及漕運總督事例無論原籍與否一體舉劾行間續准吏部咨該本部覆臣年終舉劾有司官員内開浙江司道有司玩愒不職失誤河防者許令臣據實開報彼處撫按㕘奏等因兩咨事體未一有望遵行伏望敕下該部通行查議其蘇松水利惟復轉行彼處撫按衙門再加詳酌覆請明㫖著為成例以便永永遵行庶職掌明而舉刺自當事體定而責成亦易矣臣愚幸甚河道幸甚謹題請㫖奉聖㫖工部知道工部覆前疏題為明職掌一事權以便責成以裨河漕事該總理河道右都御史潘季馴題前事奉聖㫖工部知道欽此欽遵抄出到部送司案查本年二月内該總理河道右都御史潘季馴題為欽遵明㫖甄别司道官員以重河漕事内題議北直以至浙江專管及兼管河道部司諸臣除浙江係河臣原籍恐違近例不敢槩舉乞将中河郎中等官沈修等徐州道按察使等官陳瑛次第轉擢等因其題前來已該本部查得蘇松兵備道副使李淶暫管河務彼江南水利既設有專官今後年終仍查水利官舉劾其各司道府州縣官如南北兩直𨽻河南山東凡與河道相干涉者無論原籍與否一體舉劾縁由覆奉聖㫖是各該司道等官但與河道相干的著總理官一體甄别欽此已經咨行吏部及備行順天保定鳳陽應天浙江河南山東各撫按衙門一體欽遵訖今該前因似應覆請案呈到部看得河道都御史潘季馴所題大約謂漕河應屬水利屢經移文蘇松水利道查議漕河事宜不報續准應天巡撫咨稱河道水利原係兩事河道係兵備李淶兼攝水利係許應逵管理故年終叙録止及兵道而不及水道即今漕河水利應否歸一要行彼處撫按詳酌覆請著為定例其浙江水利等官該工部覆奉明㫖許總理河臣一體舉劾又准吏部咨開浙江司道有司失誤河防者河臣開報彼處撫按衙門㕘奏兩咨事體有礙乞要通行查議各一節為照蘇松添設水利副使一應江南水利皆其職掌而況漕河上裨國儲下切農事尤水利之重且要者乎十六年水道初設尚未履任該撫臣以江南旱荒亟欲借水利以濟饑民諸凡修濬事宜暫令兵備副使李淶兼攝一面舉行一面候新官至日交代誠得救荒權宜之䇿及水道既至業有專責則漕河事務自應接管若復歸之兵道恐非朝廷設官分職之意況水利近兼督糧每年押運水次則漕尤其𦂳闗疏濬豈宜别委此後河道年終仍當查水利道舉刺至於各省直水利官凡與河道相干涉者既奉明㫖許總河一體甄别則浙江雖係河臣原籍其司道有司茍誤河防自當論刺似不必開報彼處撫按叅奏此兩事者一闗職掌一闗事權職掌不明何以盡官守事權不一何以昭勸懲河臣詳具本末特為申明委應如議覆請恭候命下備咨總理河道應天巡撫都御史及咨都察院轉行蘇松巡按御史督行蘇松水利道將漕河即便管理以後興修水利做過工程用過錢糧凡闗係農務者照舊開呈彼處撫按衙門奏報闗係漕河者呈報總河衙門以憑甄别仍呈彼處撫按知㑹至于浙江司道府縣掌印水利等官既奉有明㫖詐河臣一體甄别仍應欽遵施行無容别議奉聖㫖是水利道有闗漕河的著遵照近㫖通行甄别縣官輕忽河務疏臣潘季馴謹題為縣官輕忽河務重累小民乞恩俯賜究治仍乞申飭成例以安地方以裨河防事據管理中河郎中沈修徐州兵備副使陳文燧㑹呈䝉臣憲牌内開各屬領銀買辦蘆柳樁檾等料除邳州遵行差官收買將完與民無干外該司道即查睢寧縣因何不差職官買運派令鄉民致生騷擾究明呈詳其徐靈宿三州縣見今作何收買曽否累民併查議報依䝉行據淮安府管河同知唐民敏呈稱本職親詣睢寧縣查得該縣先領銀一千五百兩分派各社殷實薛檠等前去產料地方收買已完見今運厰交收續領銀一千兩又分派各社殷實劉仲弼等轉派花户職已出示曉諭原買人役各將原領銀兩查照原派各料已買完者仍令交厰其未領銀兩俱委佐貳職官買解不許累民及查徐州領過銀兩已發所屬四縣差委沛縣典史朱大積等宿遷縣已委典史陳一揚等各前去安東等處買運惟靈璧縣盡派該縣小民該職親詣查理行至雙溝地方據各買料人役執稱買到料物俱被收料委官凌錫刁難使費守候日久隨拘本犯審實搜得索受人户蔣連等贓銀共六兩一錢九分票發縣丞楊田收貯本犯行縣監候外叅看得睢寧縣原估埽料派及殷實義民買解而殷實轉派花户動衆滋怨至於靈璧縣違背原行盡派花户民已不勝其苦及買到交納又被委官百計刁難索騙不貲誤工病民莫有甚于此者法難輕貸合無請乞裁奪縁由到職該職等勘得河工辦料責成掌印官原係節年題准事例今嵗工料已經估計呈請本院并漕撫部院詳允備行州縣著落掌印官領銀選委亷幹職官查照上𦂳買辦交厰除邳徐宿遷遵照外惟睢寧縣派之里甲殷實而殷實轉派之花户靈璧縣則徑派里甲騷擾小民且縱容義官索騙不惟墮工抑且累民似應呈請定奪等因到臣卷查先該臣題為申明修守事宜以圖永賴事款開預定工料以便工作每嵗十一月中旬司道踏勘沿河險夷分為三等類報總理衙門批允分撥應辦物料即行各掌印官領銀如數買辦定限正月半以前報完隨即興工四月初旬告竣著為成規違誤㕘究已經工部覆奉欽依通行欽遵在卷續于去年十一月二十一日據司道呈為㑹計預備十八年嵗修工料事議得徐邳靈睢宿五州縣遙縷二隄迎溜掃灣捲埽幫䕶合用樁草蘆柳繩檾等料該銀一萬三千六百四十七兩二錢一分動支淮庫嵗修銀轉發各州縣掌印官選委亷幹職官查照原估趂時置買交厰驗足聴於正月初旬興工支用已經批允通行訖臣又恐缺料誤工派民生事又於正月初二日牌行各州縣將支過銀兩責差的當員役四散收買解厰交納向未回報臣隨于正月十九日親詣徐邳一帶查理止據邳州揭報收買將完其餘州縣屢經催促並無解到該臣往來河濱詢知小民始知睢寧縣故違原行並無差官買運及至興工方纔派及殷實攀連里遞其徐州靈璧宿遷等三處恐亦類此即牌行司道查究去後今據前因臣竊惟治河之法莫要於嵗修而嵗修之工必資於草料草料不預則工作必遲而伏秋之間難保無虞矣臣是以題請十一月中旬勘估買料正月半以前報完興工四月初旬告竣三令五申極為詳勉而又恐其派累小民躭延時日復與司道叮嚀告戒不曰責差的當員役四散收買則曰選委廉幹職官上𦂳買辦可謂至諄懇矣而靈睢二縣不恤民隠惟便已私揆厥所由葢因積胥㸃吏意在侵扣差官收買便難染指以至義官凌錫大肆誅求即搜出者如此而其花費者可知矣即義民官如此而吏書可知矣等而上之又安知掌印官之無所私乎今時及三月諸料未備嵗修之工必難早竣不惟小民負累而於河防之事墮誤多矣既經司道勘覈前来相應㕘治㕘照睢寧縣知縣馮紹京靈璧縣署印縣丞董本才既昏庸志多怠肆視貧民如秦越全無已溺已饑之懷視河務若贅疣寧有急公趨事之義聴羣小之撥置而上官禁令若罔聞知任積棍之憑陵而小民咨怨了無動念徇私之弊難保不無而違玩之愆已屬難逭我皇上洞悉民艱特垂蠲賑留神國計宵旰勤惓而紹京等乃敢玩愒如此非惟有乖人臣之義而亦大失民牧之職矣伏望敕下該部再加查議將馮紹京董本併一干吏書及贓犯凌錫等行臣提問依律議擬官吏如有贓私從重究治庶人心知警而河工自肅矣再照嵗修之工每嵗必不可已者若不再加申飭著為定例日久官更未免弛惰併望特降嚴㫖每嵗十一月中旬各掌印官赴司道官處闗支銀兩將應辦物料責差的當員役於出産地方分投收買定限正月以裏報完並不許派及小民致滋騷擾如有仍前抗違許總理衙門指名㕘究則地方既得安堵而修防亦可預辦矣謹題請㫖奉聖㫖馮紹京等著河道衙門提了問工部知道旱久泉微禱雨疏臣潘季馴謹題為旱久泉微河道艱澀乞恩俯允䖍禱以回天變以濟糧運事據管理北河郎中李民質管泉兼理南旺濟寧閘座主事王元命濟寧管河兵備副使曹時聘㑹呈據兖州府管河運司同知陳昌言報稱自去冬至今天道亢暘汶泗泉流微細以致南旺等處河道日澁即今重運盛行恐有阻滯預呈到職該職等看得南旺濟寧一帶漕河地勢髙亢不通江河所賴以濟運者惟藉諸泉之水而諸泉之水必得天雨及時源流充溢斯可盈漕利涉詎自去冬至今雨澤未霑天道亢旱時已入夏地脈益乾泉流愈涸以涓滴有限之水充南北二河之用勢必不能今濬河則河身不淺導泉則泉穴俱闢多方疏引水涸如故人力至此無可奈何所仰望者惟有雨耳乃雲作風隨須臾如掃日復一日膏澤竟屯雖今嵗糧艘不多積有諸湖之水儘可接濟但目下過濟者止有江北運船江南重運及進貢船隻尚多未到兹值狂風捲蕩烈日薰蒸湖水雖盈亦漸消耗倘自今猶然不雨接濟不前殊為可慮查得萬厯十六年久旱河淺該查勘河工都給事中常居敬山東巡撫李戴㑹題請禱奉有明㫖隨即霖雨滂沱運艘利涉即今旱魃為虐不異往嵗河水漸涸後事可虞除行管河泉閘等官加謹啟閉極力疏濬職等日夜驚皇痛自修省外合無比照前例俯賜題請恭行祈禱于泰山諸神庶幾天意可回甘霖早澍國儲幸甚河道幸甚等因到臣臣竊惟漕河之深淺係于泉源之盛衰而泉源之盛衰係于雨澤之多寡葢天時地利本自相資而人力天工不可偏廢者也矧漕渠自鎮口閘以至臨清七百餘里皆賴莱蕪諸泉南北分濟道里既逺水力自微其所藉于霖雨者尤不小也臣於去年夏秋之間目擊山東地方苦旱良久已經撫按衙門題請蠲賑入冬雨尚愆期雪不盈寸臣逆慮漕河淺澁即嚴行司道及管河諸臣疏導泉穴挑濬漕渠及將汶河諸水挽入湖陂貯蓄以待不時之需凡可為漕計者似無遺力該司道所云濬河則河身不淺導泉則泉穴俱闢誠有然者第因山東久苦乾旱入春雨澤全無亢暘愈甚隂雲稍合旋被風散此皆臣等奉職無狀之所致也泉流日微漕水日涸閉閘積水兩日方可盈漕所幸今嵗漕糧不多徐北業已過濟頭幇已出臨清板閘矣獨上江運艘共計一百八十七隻尚未過濟而鮮貢之船亦多陸續前進臣嚴行管河各官將南旺蜀山馬塲馬踏等湖封閉蓄水取有甘結在卷候運船至日放水送舟諒亦無誤但慮狂風簸蕩烈日薰蒸湖水不免漸消臣與司道諸臣晝夜徬徨寢食為廢日望天降時雨以濟燃眉之急而竟未可得也考之春秋三月不雨即以示警今不雨者自冬歴春由春入夏矣寧能保其不涸乎臣查得萬厯十六年四月間山東巡撫都御史李戴亦以久旱不雨漕渠淺澁㑹同勘工都給事中常居敬題請躬詣泰山祈禱奉聖㫖便著該巡撫官䖍誠祈禱禮部知道欽此諸臣遵行未幾而大雨如注葢聖徳隆盛素格天心意念所及百靈効順宜其響應如此伏望我皇上容臣比照前例率同司道等官齋食素衣躬詣泰畤建壇祈懇仰冀旱魃濳消甘霖速降則非惟運道可免淺澁而民生亦可望其有年矣奉聖㫖著河道官竭誠祈禱該部知道添募夫役以裕河工疏臣潘季馴謹題為添募夫役以裕河工以安民生事據中河分司工部郎中沈修徐州道管河副使陳文燧呈稱照得國家定鼎燕都嵗運東南粳粟四百萬石涉江淮經邳徐入閘必資黄淮二河濟之嘉隆以来河決崔鎮淮決髙堰髙寳興鹽山清桃宿等處田廬蕩溺正河淺涸轉運艱辛東修西潰數十年無寧宇至萬厯六年䝉本院剏築遙隄重門禦暴盡塞諸決束水歸漕田地始獲耕種民居亦將安堵迄今已逾十年而隄長夫少修守乏人以致車馬踐踏風雨剝蝕日見卑薄近䝉本院調撥山東徭夫三千九百餘名倩派徐邳靈睢宿鄉夫一萬二千餘名大加修築工已告竣而各夫犒賞動經數千嵗修銀兩僅供物料不免稱貸于漕庫民固稱勞官亦告匱甚非久安長治之䇿也為今之計必須添夫一千二百餘名分撥險要去處專令亷幹官一員管理修守庶㡬不至墮誤但添夫不難而増餉難每夫工食八兩該銀九千六百兩當此民窮財盡之時豈宜派及里甲查得萬厯十六年本院㑹同漕撫衙門奏留二升米銀内相應動支召募等因到臣該臣看得治河之法平時有修築之工伏秋有防守之苦一有不周禍患立至夫役減少固難責以全功起派鄉夫又不免於騷擾隨查中河所管地方北自鎮口閘南至清河縣兩岸共一千餘里而豐沛蕭碭四縣隄岸又約二百餘里原設夫役頗多祇因工食缺乏日漸減削僅存五千五百餘名計里分派每里不及五名中間又多逃曠以至嵗修之時不免派及鄉夫而犒賞之費動經數千貧夫所得不多官司設處甚苦且與其勞費于既壞之後孰若預辦于未壞之先乎所據司道之請誠有不可已者伏望敕下該部再加查議如果臣言不謬容臣劄行司道轉行淮安府每嵗于臣等奏留輕齎二升米銀内動支九千六百兩分發沿河各州縣募有身家之人共一千二百名責令亷幹官員專管分布要害處所平時加上幫築伏秋晝夜防禦庶幾河防有人閭閻無擾未必非永賴之筞也再照前項米銀以全漕計之約有二萬七千餘兩但每嵗俱有折兊即如萬厯十七年止有一萬九千七百二十五兩十八年止有六百二十六兩六錢以致原借漕庫欽修銀兩尚未補足以後此等年分難保不無仍乞特賜允行漕撫衙門如遇二升米銀不足容臣暫于漕庫借支别項銀兩給散各夫候下年解到之日如數補還則餉不病于告匱而隄可恃以長固民可藉以少安矣謹題請㫖奉聖㫖工部知道該工部覆奉施行官旗挾帶私貨疏臣潘季馴謹題為官旗挾帶私貨十倍明例壅阻漕渠乞恩申飭成規以釐夙弊以裕轉輸事據管理漕務㕘政吳同春呈蒙臣憲牌查得江西南饒二衞所糧船私帶木筏甚多塞滿河路仰道㑹同濟寧道速令江西運糧把總公同管河同知將木起放在岸要見某衞所某船見帶板木若干共秤重若干斤具數呈報催船星夜前行木植留人看守等因又䝉漕撫部院牌仰本道即查前船如果因帶板木變賣故行遲延每船除例帶土宜六十石如係板木每一百斤准算一石此外但有夾帶過多者查明入官將船催赶前進等因依䝉㑹同濟寧道行委兖州府管河運司同知陳昌言江西把總賁秤盤過木數到道為照今嵗糧船為數甚少運納宜速詎意南饒二衞所多帶木筏擠塞河路殊屬違玩既經管河同知查勘前来即應照議没官但板木就水秤盤低昻恐未盡確合無備行陳同知將前堆寄濟寧板木一百三十六萬五千一百九斤内量除二十八萬五千一百二十九斤入官變價作正支銷仍將一百七萬九千九百八十斤照依原盤各船數目撥給軍人收領任其發賣及又揭稱漕運議單内開運軍土宜每船許帶六十石沿途遇淺盤剥責令旗軍自備脚價例外多帶者照數入官乃今法久人玩違禁攜帶十有八九各船每到馬頭輒延緩數日雖曰挨幇實為脫貨而把總運官亦或因公濟私帶貨覔利總分于衞衞分于所所又分帶于旗軍遂致旗軍乗機夾帶有至數萬斤者淹滯運艘稽悞程途莫甚于此葢因盤驗姑息參罰之例未定人情狃于因循相應議處以後開兊司道嚴諭各船止帶别項土宜限定六千斤其竹木板片沈重貨物不許稍帶違者搜獲勿論多寡即發水次衙門入官每年南船抵𤓰儀則委𤓰洲江防同知抵淮則委淮安驗單推官抵徐入閘則委管河同知逐一嚴搜果無夾帶回報漕司案候稽考如前途驗過後官查有夾帶即係前官容縱一體㕘治永為遵守庶例嚴而實效可臻源清而流弊自絶等因呈詳到臣案查先據兖州府管河運司同知陳昌言揭稱饒州所糧船止三十七隻稍帶木筏八十三弔濟寧天井閘河擠塞盈滿每船載木既多不得不缷為筏況以重船而尾復曳以重筏連綿之勢撑駕又難閘板既啟待久水洩又以河淺為名延挨貨賣及查南昌衞較之該所更甚縁由前來臣即牌行兩道委官盤卸隨據濟寧管河副使曹時聘呈將秤盤過多帶板木數目令人看守各船催赶前進呈詳到臣已經詳批各官旗故違明例稍帶私貨不啻十倍矣今既停留在岸姑候各運船抵灣遲速再奪間今據前因臣看得嵗漕四百餘萬自𤓰儀至淮安則資諸湖與二河之水自鎮口閘至臨清板閘則資汶泗之水每年四五月間雨少泉微正當漕渠淺澀之際適值糧運盛行之時臣督管河官員開湖閉閘多方蓄水以求速濟良亦苦矣迺今各船私帶重貨公行無忌而南饒兩處運船見卸板木重一百三十六萬五千一百餘斤而未盤之先沿途開厰發賣已多該道所報僅及其半船内磁鐵等器又不知其幾何矣何怪乎舟行遲滯抵灣之愆期也究其來由運軍一貧如洗烏得有此鉅貨盡係運官通同把總販賣營利勢壓旗軍分派裝載今嵗運艘不多南饒僅八十五隻稍帶木筏所至充塞若遇全運之年萬艘鱗集寸步難前矣其貽漕河之害甚非眇小所據把總賁㨗及領運指揮朱維祺千户張士維等通同派買之弊難保不無而容情阿縱之愆已屬難逭但沿襲日久向未申明禁例姑免㕘治隨批該道將給軍并入官之數通呈漕司稽考去後其該道所議以後開兊各道嚴諭官旗止帶别項土宜不許仍攜竹木板片及要委官盤驗一節似應依擬除聴漕撫及巡漕衙門設法稽查外竊惟漕米之盈虧係于漕司而運艘之遲速係于河道合無許令總河衙門分行各管河分司各照地方分段盤驗如運船入𤓰儀至淮安通濟閘責之南河郎中由黄河至鎮口閘責之中河郎中自鎮口至珠梅閘責之夏鎮主事自南陽至安山閘責之南旺主事自張秋至臨清板閘責之北河郎中但遇糧船入境把總官投逓官旗及部運船隻名數到司就便抽盤遵照議單除應帶土宜六十石外如有多餘或違禁仍帶竹木板片及沿途躭延收買貨物者將貨物盡數入官領運把總及指揮千百户指名㕘呈總河衙門具奏提問葢各分司俱有河道之責貨重難行愆期悞事各司自難諉咎痛癢切身又何敢徇情避怨哉至於開兊起行之時則在該省糧儲道加意檢查嚴行戒諭指顧之間不勞餘力而自可省沿途之擾擾矣如蒙敕下該部再加查議覆奉明㫖行臣欽遵施行仍著為定例永永遵守庶積弊可釐而轉輸自速矣謹題請㫖奉聖㫖户部知道户部覆前疏題為官旗挾帶私貨十倍明例壅阻漕渠乞恩申飭成規以釐夙弊以裕轉輸事該總理河道右都御史潘季馴題前事奉聖㫖户部知道欽此欽遵抄出到部送司查得議單内一款凡運軍土宜毎船許帶六十石沿途遇淺盤剥責令旗軍自備脚價例外多帶者照數入官監兊糧儲等官水次先行搜檢督押司道及府佐官員沿途稽查經過儀真聴儧運御史盤詰淮安天津聴理刑主事兵備道盤詰六十石之外俱行入官經盤官員徇情賣法一併㕘治遵行在卷今該前因案呈到部看得河道都御史潘季馴題稱江西把總賁捷總下指揮朱維祺千户張士維等各官旗挾帶竹木私貨沿途發賣致遲轉運欲要將應帶土宜六十石外其餘堆寄板木私貨盡行入官所據把總領運等官法應㕘治縁相沿日久向未申明今次姑免行究以後開兊之時各要管河分司照依地方如法盤驗有違禁多帶者盡數入官將領運把總及指揮千百户指名㕘呈仍著為定例一節為照漕運每船附帶土宜六十石載在議單實國家恩恤旗軍之典而不才運官通同挾帶數多以致排擠滿河大阻運艘則非許令附帶初意若不亟行申飭將來稽遲糧運其弊實由于此既經河道都御史題議前來相應依擬覆請恭候命下本部移咨河道衙門轉行各管河分司此後凡遇糧船到時即照依各管地方分段盤驗如運船土宜除六十石外若有多餘或違禁仍載竹木沈重等物及沿途收買貨物者將貨物盡數入官仍將違犯運官指名㕘治如經管地方盤驗官員徇情賣法亦遵照議單事例聴河道衙門一併㕘處至于開兊之時則尤責成該省粮儲道加意檢查違者亦同㕘治併著為定例永逺遵守併咨漕運衙門知㑹及應天浙江江西湖廣山東河南各巡撫一體遵照施行奉聖㫖是恭報三省直隄防告成疏臣潘季馴謹題為恭報三省直隄防告成乞恩申飭修守之法以圖永賴事伏念臣犬馬餘生甘心草莽謬蒙我皇上天髙地厚之恩拔之廢棄之中授以總河之任靦顔受事忽復三秋兩河工程業已曲為之制而周為之防矣才識固有未融而心力不敢不竭隄防雖已稍備而修守不可不嚴謹將做過工程開列陳請除南河邵伯髙寳范口禮壩中河張福王家二隄夏鎮塔山鎮口北河閘壩湖隄各欽修土石等工該臣於萬厯十七年五月二十四日將完過縁由具疏奏報不敢贅瀆外節據中河郎中沈修徐州兵河按察使陳瑛見任副使陳文燧呈稱節奉本院劄案為申明修守事宜以圖永賴等事行職等將先後題准應修隄工勒限興築上𦂳報竣職等遵依督率分委府州縣等官親詣工所如法率作至萬厯十八年五六等月各日期不等通完訖一應料物犒賞等銀俱於嵗修銀内動支並無請有别項錢糧為照徐淮一帶河道自昔萬厯八年本院剏築遥隄髙厚堅實水循故道經今十年運艘利涉居民安堵凡司河道者俱享平成之利近年以来風雨損壞夫役停減修補失時加以連嵗異常洪水縷隄逼臨河身掃灣衝刷易於塌陷若非遙隄保障難免無虞今䝉督促大加幫修悉如舊式及議築格隄以防決水横流自夏徂秋暴漲數次河南水髙一丈五尺而隄壩無恙以後嵗加修守即為久安長治之䇿并將加幫剏築徐州靈璧睢寧邳州宿遷桃源清河沛縣豐縣碭山共十州縣遙隄縷隄格隄月隄大行隄土壩等項共長一十萬四千三十九丈一尺各髙厚如式數目開呈前來又據夏鎮主事余繼善㑹同徐州道呈同前因及備開加幫剏築完沛縣徐州支廟及縷隄長隄縴路土壩等項共長二萬一千九百六十六丈八尺各高闊數目又據河南管河原任副使陳九仞見任副使李三才各先後呈報幫築剏築接補完滎澤原武中牟鄭州陽武封丘祥符陳留蘭陽儀封睢州考城商丘虞城河内武陟共一十六州縣遙月縷横等隄新舊大壩共長一十四萬四百九十四丈七尺九寸俱覔真淤杵實並非昔日雜沙虚鬆可比委堪捍禦縁由并各工程細數開列前来及據濟寧兵河陞任按察使曹子朝見任副使曹時聘節次呈報修築完曹縣單縣新舊堤壩并加幫完太行隄共長二萬六千四百四十七丈七尺七寸挑改過梁靖口河渠長一百八十丈見今武王二壩逼水南徙黄河安流等因各開報到臣據此案照萬厯十六年十月十四日准工部咨該臣題為申明修守事宜以圖永賴事欵開一立法増築遙隄以固隄防徐淮之民十年以來所以得免魚鼈之患而運道不致梗阻者恃有遙隄也向無稽考未補分寸剥蝕過半合行司道官將各隄坍損卑薄者以原隄丈尺為凖先行加幫取平後自十八年為始每嵗加幫五寸等因工部覆奉聖㫖河道每嵗修防先年題有定規乃各該官員不行著實遵守曠職悞事這所議俱依擬行如有仍前怠玩的總河官指名㕘奏重治欽此備咨前来又於本年十二月十九日准工部咨該臣題為申明河南修守事宜以固河防事欵開一查得黄河北岸逼鄰漕河闗係甚重𢎞治年間先臣劉大夏築有長隄一道起自曹縣至武陟縣詹家店止南岸逼近省㑹藩封重地最為要害亦有長隄一道起自虞城縣至滎澤縣止兩隄延亘千有餘里實為該省屏翰但地鮮老土隄皆浮沙而河流遷改靡常多有濱河難守者矣今據該道逐一查覈分為緩急二工容臣嚴行刻期幫築加意驗探如有墮誤或夾雜浮沙或夯杵不實茍且塞責者容將管河官㕘拿究治等因工部覆奉聖㫖依議行欽此備咨前来又於萬厯十七年十月二十四日准工部咨該臣題為三省直修防告竣河流近已歸漕據實恭報仰慰聖衷事本部覆議趙皮寨至李景髙口議築遙隄支將軍廟至塔山議築長隄羊山至土山議築横隄皆區畫周悉於河道有裨相應依擬等因題奉聖㫖是河道事宜著總理等官照舊用心經理欽此備咨前来俱經通行司道勒限興工去後查得加幫遙隄適值去嵗黄水暴漲修防不暇止將象山一帶二十餘里加幫髙厚其餘尚未施工已經嚴督中河司道大加幫築間續據中河司道議得單家口一帶河身獨窄隄臨河濱原題棄縷守遙惟恐黄水横肆順隄東洩合照原題邳州横隄之制再於房村單口雙溝成舖辛安等處各増築格隄一道又據河南管河道副使李三才勘得判官村荆隆口陶家店馬坊營三家莊陳隆莊大寨等處最為險要將幫舊剏新隄壩等工續議呈詳俱經臣覆勘允當批行興舉刻期完報去後今據前因覆覈相同臣竊惟防河如防寇自古記之矣防寇則曰邊防防河則曰隄防邊防者防寇之内入也隄防者防水之外出也欲水之無出而不戒於隄是猶欲寇之無入而忘備於邊者矣且自古稱治水者莫過於禹而考之禹貢曰九澤既陂四海會同先臣蔡沈釋之曰九州之澤已有陂障而無決潰四海之水無不㑹同而各有所歸陂障即隄也神聖如禹而猶不免致力於隄則舍隄之外别無所以防河者矣臣於萬厯六年奉命治河即請築遙隄以防其潰築縷隄以束其流八九年間河流順軌故道宴然業有成效矣而嵗久官更弊滋法弛以河防為末務視隄工為贅疣一簣莫加萬夫閒曠而車馬之蹂躪風雨之剥蝕河流之汕刷髙者日卑厚者日薄又何恠其東潰西決哉荷䝉我皇上授臣以總理之權責臣以修復之事臣襪線微才固不能别為新竒之䇿而管窺小見尤不敢為僥倖之圖惓惓以隄防陳乞謬承俞命畢力仰成督率南直𨽻河南山東司道等官将濱河一帶地方躬親荒度周爰諮諏舊有而今圯者則議加幫舊無而宜有者則議剏築遙隄約攔水勢取其易守也而遙隄之内復築格堤葢慮決水順遙而下亦可成河故欲其遇格即止也縷隄拘束河流取其衝刷也而縷隄之内復築月隄葢恐縷逼河流難免衝決故欲其遇月即止也防禦之法頗稱周備較之己卯告成之功更為詳密而夏鎮河南山東往嵗原未經理者皆一體増建矣倘能嵗守不失則河流自無衝決之患河不衝決則故道晏然翕由順軌而運艘自無阻滯之虞矣但畚土成隄原非鐵石稍不修葺便至傾頽嵗嵗修之嵗嵗此河也世世守之世世此河也故嵗修錢糧之設徭編雇募額夫凡以為河也而可置之虚糜閒曠之地哉臣是以諄諄為申明修守之請也伏望天語叮嚀嚴諭地方司道等官查照臣愚節次題奉欽依事理每嵗務將各隄頂加髙五寸兩傍汕刷及卑薄處所一體幫厚五寸年終管河官呈報各該司道要見本隄原髙濶若干今加幫共髙濶若干司道官躬親驗覈開報總河衙門覆覈年終造册奏繳不如式者指名㕘究庶河防永固而國計民生俱有賴矣臣又查得連年司道等官肩仔河工頗竭心力除府佐州縣掌印管河官候秋防報竣另行題請奬戒原任河南管河道副使陳九仞已經論劾難以另議外如中河分司郎中沈修夏鎮分司主事余繼善徐州兵河道陞任按察使陳瑛見任副使陳文燧河南管河道副使李三才山東濟寧兵河道陞任按察使曹子朝見任副使曹時聘謀謨已竭其心思黽勉不辭於夙夜祁寒溽暑逐逐於畚鍤之内而寢食靡寧鳩工聚材齗齗於會計之時而錙銖不爽大興千里之築如垣如墉皆其心膂所致共圖久逺之計必誠必慎不為茍且之謀況工料取辦於嵗修絶無虚糜之弊而胼胝侵尋於嵗月未聞倦勤之時固皆分義當然不敢别有希冀相應咨部紀録庶幾稍勸羣工再照三省直之道途頗逺臣一身委有難周河南兩岸隄工皆都御史周世選一身肩承羣䇿畢舉當饑饉之日而鼔舞有方貧民樂為之用當暴漲之時而提撕不懈地方賴以無虞實多保障之功全無矜伐之意本官已蒙簡拔似難瀆請然臣不敢掠其功以為己功蔽其賢而不以告之君父者也伏望敕下該部再加查議覆奉明㫖容臣遵奉施行臣愚幸甚河防幸甚謹將完過工程數目具本開坐謹題請㫖計開南直𨽻工程總管官中河郎中沈修徐州兵河道陞任按察使陳瑛見任副使陳文燧督同淮安府陞任同知徐伸丁憂同知申安見任同知唐民敏分委都事胡傅指揮文棟等徐州迤南幫築完南北兩岸遙隄共長六千三百七十四丈二尺剏築完谷山隄頭長六十丈加築完谷山子隄長八十丈剏築完房村格隄長四百九十六丈單家口格隄長三百一十八丈本口幫築完南北兩岸縷隄共長五千八百三十八丈加幫完該州迤北黄河上源縷隄長三千六百二十三丈靈璧縣南岸幫築完遙隄長三千七百二十七丈剏築完雙溝格隄長四百一十五丈填完河身底長四丈口長六丈深七尺幫築完南岸縷隄共長二千二十七丈五尺加築完子隄長一千六百二十丈築塞單家口私開涵洞缺口長八十丈睢寧縣南北兩岸幫築完遙隄長八千九十五丈剏築完成字舖格隄長四百三十二丈七尺河口三道俱有廂邊埽土牛幫䕶辛安格隄長三百五十六丈加幫完兩岸縷隄共長一萬五千七百八十一丈補築完成字舖隄長一百四十九丈