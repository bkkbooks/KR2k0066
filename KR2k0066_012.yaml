該總河侍郎萬恭行司道疏濬通行萬厯元年八月茶城淤塞該工部題行總河衙門設法挑濬萬厯二年黄水倒灌淤漕三十餘里該總河都御史傅希摯集夫挑濬前給事中吳文佳題將翁都御史原議馬家橋出子房山開河一道行傅都御史勘得子房山前蝦蟆山西俱有伏石馬家橋一帶俱係水占難以議開前議遂止萬厯三年十一月内黄水大發茶城淤塞十里調夫挑通萬厯四年茶城淤淺糧運艱阻復開張孤山東以冀此塞彼通至萬厯五年二河俱淤復開茶城正河通運萬厯六年茶城淤淺徐州道參政游季勲築過順水丁頭壩一十六道束水衝刷萬厯七八九十等年淤塞尤甚至十一年間該中河郎中陳瑛議呈漕撫尚書凌雲翼改漕河於古洪出口即今之鎮口閘河也剏建内華古洪二閘逓互啟閉淤難深入而去黄河口僅一里挑濬甚易人頗便之萬厯十五年秋黄水大發河與隄平而棍徒段守金私受民船重賄將牛角灣私開黄水迸入淤塞其逺議者欲復歸徳府丁家道口故道使黄水盡出小浮橋以免濁河倒灌該勘工都給事中常居敬看得閘河出口無往而不㑹黄則無往而不受淤豈從濁河則淤而出小浮橋則否邪具疏題寢請於古洪閘外添設鎮口一閘去河僅八十丈縱有沙淤挑濬猶易葢深知清黄交接之處難免淤灌故不得已而為易濬之計良有以也今之議者不察水勢不鑒往昔偶見淤墊議論風生如臣昏庸無足論矣向來總河諸臣豈無一人髙才朗識者乎而卒無如之何也大小溜溝淤矣改而為梁山北淤亦如之梁山北淤矣改而為茶城淤亦如之茶城淤矣改而為張孤山東淤亦如之張孤山東淤矣復改而為茶城淤亦如之茶城復淤矣改而為古洪淤亦如之勞民傷財畢竟無益所幸郎中陳瑛都給事中常居敬先後剏築三閘遞互啟閉而挑濬始易計無出於此矣臣又查得萬厯十六年閏六月内該臣題為清黄交接處所濁流倒灌易淤懇乞特降綸音以嚴閘禁事要將古洪等閘每遇黄水暴發即下板以遏濁流之横黄水消落則啟板以縱泉水之出比照清江浦三閘啟閉之法刻石金書豎立各閘俾知畏忌等因題奉聖㫖是各閘啟閉嚴約俱依擬有勢豪人等阻撓的照淮安閘壩事例即便挐問枷號干礙職官指名㕘奏欽此倘如所題何至淤澱而王程難稽客心難挽閘上官牌力難阻遏每照常居敬原題三閘遞互啟閉之法通放船隻縱有淤淺不過八十丈旋濬旋放亦無難者至於運艘入口大約俱在孟夏以前水未大發淤亦不久或少加撈濬之工必無阻滯舎此之外别無他策如謂鎮口逼近濁河故易灌塞要得别尋一道則邳州之直河離濁河二百里矣而何其淤也宿遷縣之小河口去濁河三百餘里矣而何其淤也清河縣之清口去濁河五百餘里矣而全淮之力十倍於漕何以黄發即澀而每嵗初伏通濟閘外捲築輭壩以防其倒灌也要之黄強清弱隨處相接則隨處倒灌隨處淤塞總之不出科臣常居敬所云無往而不會黄則無往而不受淤兩言盡之矣似不必過為紛更也但人情不見其形未信其影必須勘議以杜後言此其一矣臣又查得濱河州縣河髙於地者在南直𨽻則有徐邳泗三州宿遷桃源清河三縣在山東則有曹單金鄉城武四縣在河南則有虞城夏邑永城三縣而河南省城則河髙於地丈餘矣惟宿遷一縣已於萬厯七年改遷山麓其餘州縣則全恃䕶城一隄以為保障各處久已相安並無他説惟徐州則議論稍多其故有二一以山陜久旱之後連嵗雨水頗多伏秋不免加漲觀者不考其源而惟歸罪於河固無恠其然矣一以前嵗十一月間知州張世美初任未諳為義民官盧泰所愚開隄放水遂忘築塞消凌水發黄水灌入内濠侵及街衢地方官民不歸罪于知州張世美與義官盧泰而惟歸罪于河至有謂䕶隄與城平者有謂泉從地湧者夫䕶城石隄自昔有之非一二年間所築者則河之原髙於地可知矣且隄髙不過丈餘遂謂與城相平城何若是其卑邪徐州為邳睢上游徐州而水平隄隄平城也則迤南一帶州縣皆陸沈矣有是理哉且黄河入伏始漲秋杪漸消冬春則涸隄外露有沙灘非經年渰浸者近該徐州於去年十一月間揭稱河水已消再過數日内水可放臣近又令人視水將及址矣今稱入冬黄水尚與隄平則伏秋又將何如邪至於隄内之水葢因盧泰灌放頗多兼之去嵗雨雪甚頻徐民不善車戽一時難於消涸若謂泉從地湧則城中之水宜向與外河相平即䕶隄無所用之矣何待盧泰放灌之後方有水邪非臣所能解也然臣有治河之責凡可圖維即宜曲處不必問其人言之有無也臣已行徐州道將城中窪地用土墊髙仍一面撥夫車戽復查最低之處開洩自去年九月以來向在料理不敢弛墮但為今之計惟有戽城濠之水使内水可洩固護城之隄使外水不入正盧泰之罪以警將來或加髙徐城數尺以防不虞此則事理之所當為而人力之所可為者也舎此惟有比照宿遷縣事例遷城而已葢所患者惟徐城之積水於運道原無阻礙若必欲卑黄河伏秋之水以就徐城之地則天地氣候之自然恐非人力所能強遏者勞民傷財之事或從此起矣人情厭舊喜新臣言終不盡信臣在自當力諍必不依違第今衰病已劇死有日矣獨念臣從事此河已歴三朝犬馬戀主之情豈肯以將去而遂置此河於度外邪伏望敕下該部轉行該地方巡撫及各差御史㑹同總河衙門督行徐州道副使陳文燧或添委海潁二道中河夏鎮二分司逐一勘議如有别䇿使漕黄交接之處可免淤灌之患徐州城外之水可免暴漲之虞不妨從長計議如必不可當仍舊貫毋徇人情毋拘成説務求經久可行之道不為勞費無益之工則事體畫一而浮言可息矣再照徐城被水灌浸以貽百姓之憂者盧泰實始禍之人死有餘辜者也臣據該州申文行道提究未報此而貸之何以警後仍容總河衙門嚴究以正法紀庶幾將來知䕶隄之為重而無輕犯者矣謹題請㫖奉聖㫖是司道畫地巡守疏臣潘季馴謹題為入伏行河將屆病痼步履不前乞敕司道畫地巡守容臣力疾稽查以保萬全事臣竊惟河防喫𦂳伏秋為嚴而伏秋隄防巡視為急此臣與司道官之責也但該道政務頗繁勢固不能專理司官事權不重勢亦有所難行故臣受事以來春初即出秋深方歸凡所以代該道之所不暇而助司官之所不及者一切以身任之東奔西馳周諮荒度曽無息肩駐足之時也今臣年七十有一去冬暴病阽危氣血兩枯形神盡槁腰疾成痼舉足輒仆三疏乞休未奉俞㫖即使旦晚褫黜候代尚未可期文移催督之事猶自勉強支吾而奔走跋涉之勞實非傴僂蹇澁者所能任也今嵗五月入伏初夏即當發水晝夜惶懼計無所施反覆思維惟有司道官畫地巡行臣時加督察庶可責成除河南山東各有専道副使一員心無他技事有成矩每嵗查照舊規用工修守無容分任外查得中河地方原有郎中一員與徐州道共理南河地方原有郎中一員與徐州海防二道共理夏鎮地方原有主事一員與徐州道共理道里頗逺閱視難周一人則有所不逮兩官則易於推諉合將邳州并睢寧桃源清河三縣坐派郎中沈修専管修滿去任代者接管徐州并豐沛碭山靈璧宿遷五縣坐派副使陳文燧専管山陽縣南地界起至清河口止又有清江浦起至戴百户營止文華寺起至髙家堰越城南止一帶河防坐派郎中黄曰謹専管髙郵寶應江都𤓰儀一帶河防坐派按察使張允濟専管自珠梅閘起至鎮口止并支將軍廟塔山一帶徐州道所轄地方頗多相應専派主事余繼善管理如有疎虞照地指名㕘究肩仔在身智慮自畢分委已定規避自無合拳獨擊勝於十羊九牧者多矣矧今諸隄俱完兩河循軌惟欲於掃灣迎溜之處督促埽䕶以免汕刷洪水暴漲之日躬親閱視以防懈弛此司道之力所裕如者該道一切往來姑暫停止其部臣所轄州縣有不奉該司約束者容臣提問具奏臣職任在河䝉恩以河一日未死何敢忘河病劇計窮萬不得已而溷干天聴如此倘䝉我皇上以河防重務衰病非宜將臣即賜罷黜使臣得以全河付之代者則死亦瞑目矣伏望敕下該部再加查議如果臣言可採覆奉明㫖咨臣轉行各該司道查照應管地方欽遵施行庶幾地有専司人有専轄利害切心經理必慎而河防允有賴矣奉聖㫖這河道畫地巡守事宜俱依擬著實行潘季馴著不妨在任調理用心經理督察該部知道申明修守泗隄工完疏臣潘季馴謹題為申明修守事宜以圖永賴事據潁州兵備副使王之猷呈稱節奉總理河道并撫按衙門劄案行職將原題准泗州應修䕶城土石隄工勒限興舉上𦂳報竣遵依轉行鳳陽府督率該州知州汪一右分委同知等官馬尚絅等親詣工所如法率作將原估石隄内應换老土自北門迤西月隄由西門香花門南門至東門迤北新橋廟止共長一千四百五十六丈貼近石隄内挖深七尺闊三尺仍於隄裏幫闊五尺髙七尺中心挖去五尺闊一丈一尺計土論方共築過老土三萬一千三百六十九方自新橋口起北至西門牌坊止應加修石隄長九百三十二丈加髙二尺用石二層共砌大石一千八百六十四丈石隄内加老土九千五百三十九方自八蜡廟起由西門至香花門外止添建子隄長一千六百八十丈用碎石砌髙二尺五寸闊二尺五寸自西門牌坊起迤南至東門迤北新橋口止隄長一千一百六十五丈裂縫裏外俱用石灰兠抿又於原議䕶隄之外應添修新橋迤南大隄用石長六十一丈窰西石隄三處共用石長二十五丈攔水壩長二十五丈攔馬牆一處以上工程自萬厯十七年七月二十五日興舉至十八年九月二十九日通完訖已蒙本院委官親詣各工覆加閱視丈量明白俱各修理堅固及查採取土石遵照禁例老土在盱眙縣西五十里馬過觜縣東二十五里龜山挖取大石在舊縣迤南澗溪青平山離城一百二十里碎石在清河縣地名老子等山離城四十五里俱由水路裝運悉係禁山之外並無違碍其原發工料銀四千九百三十兩零五分七釐二毫九微九纎五沙内支土石灰料樁木并匠作夫船工食共用過銀三千八百九十九兩三錢六分五釐實省剰銀一千零三十兩六錢九分二釐二毫九微九纎五沙貯庫除用過錢糧細數已委鳳陽府推官葢國士查盤明的造册送覈外所據完過工程丈尺日期并經管官員職名分别勤惰奬戒等第理合呈報等因又據鳳陽府推官葢國士呈䝉總理河道并漕撫衙門憲牌仰職前去泗州將䕶城隄工逐一覈實依䝉親歴該州沿隄逐工細加查閱完過工隄俱係真正老土夯杵堅實取驗土色相同並無夾雜浮沙石隄亦皆如法修砌堅固可垂久逺等因各呈報到臣據此案照萬厯十六年八月内該臣具題前事欵開一加幫真土以保䕶隄查得泗州䕶隄當水一面甃石可恃但石内土隄霖雨坍損石將安附等因該工部覆議築土固石委宜亟舉題奉欽依備咨前來已經備行該道估勘得前隄換土加石工料等項通共該銀四千九百二十九兩三錢六分五釐通詳各院隨該前任漕撫侍郎舒應龍看得修築泗隄禦淮保城宜在冬春水落之候先行儹築如候催齊工費完足方行興工不無稽延時日批行該道節次查發鳳陽府并潁州庫貯無礙銀共一千七百三十二兩四錢七分零運司醃切銀八百一十五兩零鳳陽府紙贖等銀六百三十四兩二錢二分三毫廬州府屬并滁州全椒來安二縣積剰銀共三百四十八兩一錢七分一釐五毫本道自理紙贖銀三百兩潁州庫貯支剰民壯工食銀六百五十三兩五分六釐零以上共銀四千四百八十二兩九錢一分二釐八毫委官支領分投興工尚少銀四百四十六兩四錢四分七釐二毫呈要查處給發縁由通詳到臣會同撫按衙門查有淮安府庫貯停濬草灣銀六千一百四十四兩六錢相應於内動支銀四百四十六兩四錢四分七釐二毫解發泗州補足原估之數作速儧工勒限本年告完聴臣等委官覈驗工程的確錢糧明白造册奏繳其餘存停濬草灣銀兩仍令收貯淮庫聴候原議防守清浦河工支用等因具題本部覆奉欽依備咨前來已行該道督理動發銀兩支用間臣等又於隄工未舉之先嚴行該道申飭禁例泗州諸山密邇祖陵山前山後不許取土取石敢有夤縁縱夫在於就近山場挖取者即便挐究取有該州掌印管工官重甘結狀在卷續據該道呈報工完惟恐丈尺短少築砌不堅又經復委鳳陽府推官葢國士查覈去後今據前因該臣會同總督漕撫右侍郎周寀巡按直𨽻監察御史龔雲致看得淮水發自河南之桐栢山挾七十二溪之水東㑹于黄以入于海其性最暴而泗州居淮河之下流卑于祖陵之地二丈三尺一寸而龜山横截河中約攔水勢伏秋之時不免加漲此于祖陵形勢最為佳勝而泗州之民不免有沮洳之患矣臣等查得宋臣歐陽修先春亭記有云景祐三年泗州張守問民之所素病而治其尤暴者曰暴莫大于淮越明年春作城之外隄髙三十三尺則泗城之藉于䕶隄者久矣隄髙三十三尺則水之髙可知矣而嵗久浸廢前功盡毁萬厯四五年間巡按御史見任刑部侍郎邵陛築隄為䕶甃石為堅泗民恃以為安者十五年矣至今名其隄為邵公隄而風雨淋漓車馬蹂躙内土不免傾圯臣于受事之初躬往視之誠慮其土去而石無所附也遂以為請隨該工部覆奉欽依漕撫侍郎舒應龍多方搜括鳩工庀材始克有濟然該地方大小諸臣拮据鞅掌畚鍤間者嵗有二月而後告成其勤勞亦有不可泯者然係人臣分内之事何敢過為干請除佐幕義民等官勞勩未多臣等量行奬賞舊縣巡檢張謨酣飲廢事徑行戒飭不敢瀆陳外如潁州兵備道副使王之猷風猷峻潔功令嚴明勘覈務極其精詳而工作無虚飾之弊稽查不遺于絲粟而錢糧無冒破之奸已經臣于年終例薦仍應咨部紀録者也如鳳陽府知府李驥千推官葢國士泗州知州汪一右以上三員志存捍患念切急公綜理密而縮費大裒原額調派均而撫循尤所留心允宜優奨仍咨吏部紀録者也泗州同知馬尚絅泗州衞指揮王畿泗州吏目李元嗣泗州衞鎮撫王有功千户陶承祖路由正盱眙縣典史曹自髙以上七員殫力驅馳勞瘁不辭于寒暑悉心催督勤劬無間于始終所當量奨併行紀録者也餘剰銀一千三十兩六錢九分二釐零内將草灣銀四百四十六兩四錢四分七釐二毫仍歸淮庫聴候修河支用其餘無礙銀五百八十四兩二錢四分零聴候漕撫衙門作正支銷除將支用過工料項欵銀數造册奏繳外伏望敇下該部再加查議如果臣等所言非謬覆請明㫖行臣等遵奉施行應奨官員容行該道動支該府州無礙銀兩分别等第給散謹題請㫖奉聖㫖工部知道該工部覆奉聖㫖是這各官紀録奨戒等項俱依擬議創石隄疏臣潘季馴謹題為議創石隄以垂永賴事據夏鎮分司工部都水司主事余繼善呈稱本職奉本院劄付内開准工部咨該本院題奉欽依自珠梅閘起至鎮口閘止併支廟塔山一帶一應修守工程專責本職管理隨查得先䝉本院為酌議漕隄以圖經久事仰職照牌事理即便查議近修漕河一帶縴道橋梁運艘過日委果可恃就便一意修整堅固以垂永久如悉用土隄為便要見前被衝損今作何法能禦衝汕之患取土作何裝運物料錢糧作何出辦逐一虚心酌議務求確當呈詳施行如該司别有良筞不妨從長計議以憑酌議具題毋得含糊兩可以致後艱䝉此本職俯思職掌既已分土從此一有失誤皆職之責也豈容他諉即將所轄上下河道與今酌議事宜細加檢㸃看得本管河渠鎮口當清黄交接之處常有倒灌淤塞之虞本職請加鎮口古洪閘石以峻隄防仍建河口木閘一座以便挑濬東築戴家山横隄使外水不得漫入西築支廟隄令濁河不得越過牛角灣門户關鎖甚密兩翼相抱如環明效亦可睹已惟運舟入漕之後必由隄岸縴挽少有殘缺便成阻隔查得溜溝至姜家橋一帶皆係一線之隄外濱微山吕孟諸湖内通西湖風掀浪湧内外加攻質非金石欲保常固難矣每嵗東修西補僅可支吾一時今春風雨更甚損壞尤多該職將全缺處所採取木料搭置橋梁既可縴挽而水勢通融又可内洩以増漕水之盛其餘殘缺隄岸亦皆修葺完固但木橋易損客土難堅終非一勞永逸之計查得微赤諸山多産石塊道里甚近如多置船隻載取山石砌成兩面石隄毎三里留一水口丈餘上面鋪橋通行下縱水勢入運既成金隄之固又有濟漕之益葢隄而橋者也永賴之計無出於此隨又查估得應用物料自溜溝起至姜家橋止計七千二百丈兩面俱用石砌髙一丈一二尺不等毎丈用石一十二三層不等内用底石襯䕶大小闊狹不等難計丈數俱令本管夫匠於微赤等山採運合用石匠二百名在於本管夫内選用抹縫石灰撥夫採柴燒用隄心用土填築議令回空糧船并空載民船上於戚城下於境山髙阜處所稍帶差委職官督令逺近各隄交卸俱未議錢糧外惟有擎石杉樁每丈用短樁六十根共四十三萬二千根每五根折長樁一根共折八萬六千四百根毎根價銀一錢共該銀八千六百四十兩運石下樁須用船隻今議買民船八十隻毎隻價銀十兩共該銀八百兩二項共該銀九千四百四十兩其餘零星小費本職另行議處今值錢糧匱乏之時不敢别請乞於原留餘剰二升米銀併嵗修銀内支用雖所費僅將萬金而以數年幫修之費權之亦畧相當如蒙允行職當矢竭犬馬力督管河同知趙坰并各州縣掌印管河官措辦興舉此工告成則本職所轄河道一百四十餘里登之覆盂之固無復有不舉之工遺後日之慮者矣等因到臣卷查先該臣牌行該司㑹查近修内漕一帶橋梁縴道是否可久又該臣題奉欽依分任司道畫地巡守劄行本官去後今據前因為照主事余繼善所轄地方實係漕黄濱鄰交會之所而二三年間本官既竭心力築隄設閘防䕶頗周似無慮矣所據溜溝姜家橋一帶縴路較之河防雖有不同而揆之利涉亦當周備今以一線之隄居諸湖之中風浪衝刷勢所不免故隨修隨圮旋壞旋築葢自設隄以來即有然者本官議將本隄兩邊用石鑲砌毎三里留一橋門使内外之水通融縈會並流出閘則既免阻遏之虞又無衝潰之患且工費不過萬金錢糧取之嵗額計無善於此矣伏望敕下該部再加查議如果臣言可採覆奉明㫖容臣督行主事余繼善率同各掌印管河官將各項料物器具分投措辦設法甃砌其應動銀兩派撥官夫及買船帶土一切事宜悉照本官所議施行未盡事宜臨期再行斟酌但道里頗逺工作亦煩矧非洗鍋待爨之工無妨次第興舉惟在堅久可恃不必刻立限程工完之日聽總理衙門覆覈明實如果工程堅好足垂永久優敘奏請以勵羣工若虚應故事定行㕘究用過錢糧造册奏繳漕渠幸甚臣愚幸甚謹題請㫖奉聖㫖工部知道該工部覆奉聖㫖是會勘徐城鎮口疏臣潘季馴謹題為垂亡之人憂思轉切謹摘河上一二易惑浮言乞恩俯賜勘議以定久計以免勞費事據管理中河郎中沈修夏鎮主事余繼善淮揚海防兵備按察使張允濟潁州兵備副使王之猷徐州兵備副使陳文燧㑹呈䝉臣并漕運巡撫右侍郎周寀劄付俱准工部咨為前事并工科都給事中楊其休等題為臨河要地水漲可虞乞敕勘議以慰人心事及䝉巡漕御史賈名儒案驗奉都察院剳付同前事備行職等會同詳勘要見各疏内所稱加隄加城以後黄水暴發有無可以捍禦遷城避患士民意見有無翕然相同開隄分水是否可免衝決通湖洩水是否可免停漲此外有何長便之策足為河防久逺之利務要虚心計處毋得漫為兩可之言致誤大計其鎮口閘座若果别有善地可以改建亦不妨從實勘報如以清黄交㑹之處無往不淤見在閘座去口尚近易於疏濬仍應照舊亦要明白聲說以杜後議各司道務須體勘詳確會議妥當具由通詳以憑覆勘會題施行等因奉此該職等闗會勘議并行淮安府管河同知趙坰督同徐州掌印管河官逐一勘議去後近據呈稱查得徐城坐臨河濱嵗受黄河之害其來逺矣隆慶年間黄水暴漲幾潰西門先任同知馮鐶解衣囊土為士民倡力堵其門萬厯初年議築䕶城隄以為捍禦舊嵗黄漲異常兼以隂雨過多以致徐城積水無路洩出城内軍民房舎拆卸過半州墀學宫盡皆沮洳近蒙本道徧歴各處相度形勢勘得自䕶城隄涵洞起斜向東南歴魁山至蘓伯湖西勘至史家村陳家林晁夏二湖楊二莊闞疃直抵宿州符離集東小河止計長一百六十二里堪以開渠洩水分布官夫挑成支河一道隨開涵洞放水勢若建瓴而徐城積水數日之間日見消落今驗城濠水已洩四尺九寸三分城水已洩三尺七寸九分見今滔滔南流居址街衢盡成亢爽徐城已危再安士民既徙復還但此河新開善後事宜所當計處者有三一築隄防以固保障一議閘座以嚴啟閉一加常夫以固防守又勘得鎮口閘内係清水外係黄流平時清水外出閘口自無淤阻若黄水漲則清弱黄髙濁流内灌不免停淤顧今閘口去河止八十丈疏濬易於為力今若别從改遷求以免淤則先年溜溝淤而改梁山復改茶城改張孤山改古洪又何以屢遷屢塞也相應仍從鎮口為便但閘座既已照舊而善後應議之事亦有三一復常夫以便挑濬一嚴啟閉以防出入一設專官以便彈壓再照魁山支河既通徐城積水已洩不惟目前可救沮洳即千萬禩永恃此河以為奠安之計較比改河子房山下省費數萬金遷城丘墟之上省費又數倍前者遷城改河之説似可免議等因呈詳司道該職等會議得救民者變則必通而治水者行所無事葢天下之事無全利亦無全害而怠之則為豫蠱擾之則為拂經權利害之大小而不怠不擾則安民利國自無難事而衆見之公獨見之明均有不必泥者國家定鼎燕冀嵗漕東南粳粟四百萬石由徐入鎮口達清濟實京師徐州固稱扼控衝襟而轉運漕艘必資黄河之水黄水奔騰剽悍排山襄陵自昔患之徐城初建隔逺黄河宋熈寧十年河決澶淵經遶城下遂苦水患元時移城廣運倉基未幾水復衝齧城不能保我明復還舊地萬厯初年創築䕶隄設減水閘以洩伏水始得安堵邇因關陜久旱之餘仍之積潦内水難洩兼之十七年閘吏放水灌入十八年雨雪異常積水增漲四隅軍民房舎幾于沈竈産蛙士民紛紛異議或謂河水冬春未消地泉湧出請從碭山縣戎家口建石壩分黄河上流為保城計又欲改黄河子房山下出徐洪後逺避城根是謂河病則徐亦病治河即所以治徐也而城内積水自昔已然即改漕河未必能救遷城時乆費巨無救眉急該徐州道陳副使遵奉河撫二院明文勘議魁山以南歴瑤家村蕭縣楊二莊宿州闞疃地方以達小河綿亘一百六十二里可挑支河以洩城水鳩集夫匠一萬餘名疏鑿土石工程至閏三月初三日各工告竣初四日開放勢若建瓴浹旬之間消洩殆盡濠水洩出城根城水洩出舊址官舎民居盡獲安堵轉徙之民復還故處還定安集今昔殊觀不惟遷城改河之説無容別議而有此攴河則有此州治將為永賴之利矣但此河初開尚覺草創則善後長策誠有如本官所議者至於鎮口閘為漕艘入閘咽喉初從溜溝溜溝淤改之為梁山梁山淤改之為茶城茶城淤改之為張孤山張孤山淤改之為古洪萬厯十五年古洪復淤回空阻誤䝉皇上特遣工科常都給事中勘議増設鎮口一閘亦知黄強清弱理勢之常清黄相會無處不淤無論溜溝梁山茶城張孤山古洪為濁河初會勢不免於淤墊而邳州之直河宿遷之小河乃黄河下流亦且灌阻則舎古洪而他徙猶之古洪也且鎮口去河八十丈近而易濬轉運數年諸艘通利惟十八年伏水發於五月十三比昔太早經冬雨雪遂成氷凍旅使船隻稍覺濡滯而喙喙爭鳴浮議復起今欲議長策擇善地職等謂資黄濟漕而欲黄不為害即神禹復生未有完筴祇縁官夫不能疏導啟閉不遵法禁則十五年八九月間阻船數千幾致意外此則可為隠憂而漕渠有必致之水勢治河無盡省之人功酌時宜申舊法如本官與該州所議諸事斷然行之即行所無事而漕渠永利固非敢持獨見而自用也謹用開欵列陳伏乞再加裁酌題覆遵行即兩地䝉安勞費且省國計民生胥有恃賴矣等因呈詳到臣案照先准工部咨該臣題前事謂鎮口清黄交接無往不淤另尋別道隨地皆然徐城積水止因義民盧泰放水灌入又兼去嵗雨雪甚多以致難消乞行勘議以息浮言以省勞費又該工科都給事中楊其休等題為臨河要地水漲可虞乞敕勘議以慰人心事謂徐城河水不落則地下之浸灌必深河勢日髙則城中之宣洩為難欲開月河以分水勢使徐無衝決之患通蘓伯湖以導積水使徐無停漲之虞要行會勘從長計議等因俱經該部覆奉聖㫖是著河漕等衙門勘議停當具奏欽此移咨臣等隨經備行各司道逐一虚心會勘去後今據前因該臣會同漕撫侍郎周寀巡漕御史賈名儒等將徐城新開支河併鎮口閘等處逐一躬親閱視委與該司道所呈無異為照徐城外河原係山東汶泗諸泉即今鎮口閘所出之水也涓涓之流卑於徐城之地多矣自宋熈寧十年黄河南徙會淮其勢始髙徐城遂有水患據宋臣蘓軾入市卷閭井之説則彼時河水委入徐城業再遷矣延至萬厯初年原任徐州道副使見任南京兵部尚書舒應龍剏築䕶城石隄而黄河始與徐城隔絶了無干涉矣止因萬厯十七年義民盧泰啟閘放水内灌而十八年雨雪連綿無處開洩遂至盈溢議論紛然或主遷城或主改河臣是以有請勘之疏而工科都給事中楊其休等亦具疏催勘今新開支河即科疏所稱蘓伯湖地方而此渠一開城水盡洩内渠曽無潛滋暗長外河亦無停蓄不流則城水之無預于外河可想見矣且故河係祖宗運渠固難輕改而河不兩行徒滋勞費若遷城本以避水今徐城安堵如故又似可免議遷矣至於鎮口閘外係清黄交接之處平時清水外出其流甚順一遇黄水暴漲不免倒灌成淤先年溜溝改梁山又改而為茶城為張孤山為古洪竟不能免如必欲為快意可喜之事須得清黄不會之處可也而運艘全資黄水豈能以不會哉勘工都給事中常居敬所云無往而不會黄則無往而不淤墊誠為不易之論也然鎮口去河止八十丈淤墊不多挑濬亦易隨濬隨進人力可施糧運無阻部疏所稱清黄交會之處無往不淤見在閘座去口尚近易於疏濬仍應照舊科疏所稱鎮口乃清濁交流之會黄水一發倒灌入漕而河遂淤黄強清弱隨通隨塞無適非是已為確見臣等又何敢為無益之紛更哉伏望敕下該部再加詳議覆奉明㫖容臣等遵奉施行其該司道欵列事宜臣等覆加參酌開坐于後恭候聖明裁奪臣等無任激切屏營之至為此謹題請㫖計開一甃石隄以固保障照得新開支河去城五里即為魁山石渠逼臨河濱約有一百餘丈已經剏築土隄防䕶但恐客土未堅暴漲易塌濁流内灌上下盈溢不惟徐城有倒注之虞而新渠亦難免淤墊之患矣合將前隄用石包砌以為一勞永逸之計工費銀兩應於城隄銀内動支伏候聖裁一建閘座以便啟閉照得州城東南䕶隄原設涵洞一座見今隄開洞啟城水已洩基址街道並成亢爽則城内之水固藉此口南注而濱河居民要從此河轉輸倉糧搬運貨物避黄河之風濤省舟車之顧賃不願填塞其情亦當俯從但閘座不設啟閉無時有如黄水暴漲潰隄内灌城中之民未可安枕而臥也合將東門減水舊閘量添工費移建本處請添閘官一員并乞欽定名目以垂永乆再撥新募人夫十名以司啟閉如遇黄漲鍵闗固守消落即行開放費用不多而利賴無窮矣伏候聖裁一設長夫以備修守照得魁山支河自徐州至小河延長一百六十二里原係沙土新開日夜經流未免坍淤且陳家林迤北土隄未堅蘓伯湖一帶伏秋黄水可慮合照邳睢事例添設隄夫二百五十名除見在遊夫一百名外應増一百五十名即於都事胡傅所領二升米銀募夫内撥發專管修守本隄并䕶城隄仍每五里建舖一座以便各夫棲止應用料價於城隄銀内動支仍責成鎮口總管官兼攝其事庶緩急有濟而近年失守灌城之事當不再蹈覆轍矣伏候聖裁一改隄夫以專疏濬照得鎮口閘外即為黄河黄濁倒灌則必淤墊全藉挑濬通行而糧船體製重厚往來多挾私貨非併力撁輓豈能利涉先該工部題覆勘河都給事中常居敬條議將徐吕二洪人夫摘撥六百三十三名專司鎮口諸閘嗣因年歉稅少工食不敷裁減二百三十三名止存四百名分派前閘拽溜其工銀改之夏鎮湖租非不稱善而糧運之時苦不足用查得徐州上河判官分管該州一帶西隄額夫三百二十九名原屬中河管轄而西隄專為防䕶内漕應屬夏鎮分司事體方便合將前縷隄并夫改屬夏鎮分司管理再於都事胡傅所領募夫内調撥二百名夏鎮分司再於各閘壩裒撥七十一名共一千名并三閘夫六十名俱責上河官管領悉聴夏鎮總管官調度專令住守本口但有灌淤并力疏濬運艘入口分投扯拽運完之日即行幫築西隄庶糧運無阻而河官亦免推諉矣伏候聖裁一信法令以防淤阻先該總河衙門題將鎮口比照淮安閘規嚴禁啟閉該部覆議凡遇黄河暴漲即便閉閘一應官民船隻俱遵閘規放行敢有阻撓挐問叅奏至於鮮貢諸船如遇黄水盛發亦令暫候刻石金書昭如星日而每嵗伏秋閉閘避黄往來船隻公然違背禁例閘吏理阻備受荼毒甚至有斬闗而出者矣頻起頻淤日無寧晷而回空糧船經月守候有誤新運誤事不小合再申飭今後除進貢龍袍鮮品船隻嚴催五月以前入閘外其餘棕藤架木與使客等船但遇黄漲閉閘守候外水消落啟板通行若王程迫促不能緩待者聴該州拘留閘口内外泊船互相倒換敢有勢要抗違法禁及家人船頭攬装違禁私貨夾帶民船搶關射利者聽管河官呈報總河衙門照例叅挐重治庶法禁森嚴而閘口不致常淤矣伏候聖裁一添設職官以便彈壓照得鎮口首閘清黄交㑹灌淤之患必不能免而督夫挑濬派撥撁輓阻遏勢要必得職事稍重官員方可專責成而便駕馭也先該都給事中常居敬題請淮安府管河同知移住境山誠於閘務有裨但靈睢邳宿河防最為險要一官豈能遙制故不得已仍歸邳州舊署而判官職微權輕無可托重勢要經臨則吞聲啟閘黄水内灌則束手無措合無添設府佐專官一員駐劄境山地方將珠梅閘起至鎮口閘外一帶河道併徐州䕶隄及新開支河防濬事宜悉付本官管理其自徐州迤南并豐碭沛河道仍歸原設管河同知則地分而幹辦克濟任專而責成自易矣再照設官不難而得人為難要害之區似非練習有素者鮮不僨事查得見今添設徐邳管河帶銜山東都事胡傅徐州管糧判官蔣繼祖才力俱堪是任蔣繼祖履任未朞遽難轉擢胡傅歴官河上先後已逾九年累經保薦先該河漕衙門會請加銜管理邳州河務因註選已定未經推補合無即將本官加陞職銜管理前項地方隄閘事務上河判官聽其調度則付托得人而河防有賴矣伏候聖裁奉聖㫖工部知道工部覆前疏題為垂亡之人憂思轉切謹摘河上一二易惑浮言乞恩俯賜勘議以定久計以免勞費事該本部題都水清吏司案呈奉本部送工科抄出總理河道兼理軍務右都御史潘季馴總督漕運提督軍務右侍郎周寀巡漕御史賈名儒題同前事各等因俱奉聖㫖工部知道欽此欽遵抄出到部送司案查本年三月内該總理河道右都御史潘季馴題前事又該工科都給事中楊其休等題為臨河要地水漲可虞乞敕勘議以慰人心事各題議勘改鎮口閘遷徐州城避水患縁由等因該本部覆奉聖㫖是著河漕等衙門勘議停當具奏欽此備行河漕等衙門欽遵勘議去後今該前因案呈到部看得治河一如治寇防口甚於防川自昨夏黄河非時驟漲客冬徐城積水未消或議當改河以全城或議當遷城以避河或議當改建鎮口一閘以免黄水倒灌衆論紛紜靡所決策臣等亦知事體重大遽難輕議特以運道民命所闗茍有裨于禦災捍患即興大役動大衆自不當以勞費為解故因右都御史潘季馴都給事中楊其休等先後條陳覆請會勘無非欲廣集衆思確求至當以息訛言以定乆訃今該總河總漕二臣及巡漕御史會題前因大率謂魁山支河既開城水盡洩改河遷城無容復議鎮口閘去黄河甚近即有倒灌易於挑濬仍應照舊并將河閘善後事宜開欵上請勘議明的衆論僉同既可以省目前之勞費又可以破一時之羣疑相應依擬内除添設管河府佐一欵徑咨吏部議覆外謹將甃石隄等五事酌議覆請恭候命下容臣等移咨河漕部院及咨都察院轉行巡漕御史督率司道等官將一應善後事宜查照覆議著實遵行仍咨總河大臣此外如有未盡事體不妨及時條議上聞次第修舉務使河防州治可永恃以無虞道路傳言不更興于異日庶幾國計民生咸有攸賴等因奉聖㫖依議行計開一甃石隄以固保障前件看得徐州新開支河惟魁山一帶最為𦂳要其隄岸雖經用土剏築但本隄逼臨黄河誠恐客土未堅暴漲易塌濁流内灌不惟徐城有倒注之虞而新渠亦難免淤墊之患合依所議行令用石包砌一應工費俱於城隄銀内動支工完將用過數目造册報部查考伏候聖裁一建閘座以便啟閉前件看得徐城東南䕶隄原設涵洞一座目今隄開洞啟城水已洩而濱河居民欲從此口轉輸搬運不願填塞議要就此開閘一座時其啟閉以防黄水内灌其石料即將東門減水舊閘量添工費移建本口仍撥新募人夫十名常川看守以司啟閉既係民情所願相應依擬其閘官應否添設并欽定閘名俱候工完再加詳議移咨前來另行題請伏候聖裁一設長夫以備修守前件看得魁山支河延袤一百六十餘里原係沙土新開易淤且陳家林迤北土隄未堅蘓伯湖一帶伏秋黄水可慮其本隄及䕶城隄委應撥夫修守合依所議照邳睢事例添設隄夫二百五十名除見在遊夫一百名外應増一百五十名於都事胡傅輕齎二升米銀内雇募撥發應用仍每五里建舖一座以便各夫棲止一應工料價銀俱於城隄銀内支用備行夏鎮主事總管事完將用過銀兩數目報部查考伏候聖裁一改隄夫以專疏濬前件看得鎮口閘外即係黄河每遇黄水倒灌勢必墊淤全資挑濬兼以糧艘體重貨多必藉撁挽先該本部題覆勘河都給事中常居敬疏將徐吕二洪人夫責撥六百三十三名以供本閘各項役使後因工食不敷裁減二百三十三名止存四百名分派前閘拽溜遇有修築疏濬之事動致缺人前項夫役委應増設合依所議將徐州上河判官分管該州一帶西隄原屬中河郎中統轄者改屬夏鎮分司管轄即將西隄原設額夫三百二十九名再於都事胡傅所領夫内撥二百名各閘壩裒撥七十一名共足一千名并三閘夫六十名俱責上河判官管理悉聴夏鎮分司調度専令住守本口遇有灌淤併力疏濬運艘入口分投扯拽糧運完後即行幫築西隄庶事體不致互相推諉夫役不必另増工食一更置之間費省事集而運道有賴矣伏候聖裁一信法令以防淤阻前件看得鎮口閘係清黄交接之處啟閉尤當以時閘禁不嚴則將有黄水灌入運道淤塞之患先於萬厯十六年閏六月内該總理河道右都御史潘季馴題稱茶城三閘要比照淮安閘禁事例將題准明㫖刻石金書豎立茶城之上該本部覆奉欽依備行欽遵去後縁時乆弊生人情玩愒法禁廢弛委當再行申飭如龍袍貢鮮船隻照例于五月以前入閘外其餘棕藤架木官民船隻倘遇黄水盛發通候消落啟板放行其王程迫促不容緩待者許令地方官撥船搬剥如有官豪勢要及家人船頭攬裝私貨夾帶民船違禁射利者許管河官指名揭報總河衙門查照原題從重叅提究治伏候聖裁河防一覽卷十二
