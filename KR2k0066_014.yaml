body:
  text: 河防一覽卷十四明潘季馴撰查理沁衛二河疏都給事中常居敬題為查理沁衛二河以濟運道以安民生事據河南按察司管河道僉事余希周呈䝉臣并撫按兩院憲牌前事牌行該道會同分守河北道即便轉行各該掌印管河官要見衛河上源有無淤阻果否引以灌田作何禁止沁河經行有無衝決當從何處導引作何隄防引沁通衛是否可減黃河有禆運道即今蓮花池口應否免塞逐一勘報務求經久長策以憑會議施行蒙此依䝉會同守巡河北道及牌行懷衛二府掌印官會同勘議去後隨據衛輝府呈稱依䝉行委輝縣主簿周時禮帶領熟知地里人役郭周等查得衛河上源並無淤阻無事挑濬其旁河居民引水灌田在四五月之後兌運漕糧在二三月之間前後相隔日期頗逺自國朝二百年來臨清漕舟直達天津並無阻礙再查前此雨暘時若衛河之水運道通行今因連歲天旱源泉枯竭不獨下流淺澀上流源頭幾至不流以此阻塞其理顯然及查沁河經行懷慶府河內縣出武陟下合黃河與衛河相離甚逺亦無支流相通等情又據懷慶府呈䝉依蒙會同衛輝府知府周思宸看得沁河經行武陟如蓮花口等處屢決而屢議興修舊隄寧不惜工力艱難必不肯姑順水勢使入衛河者誠以衛輝一府屬縣在河下流而橫流一發被災最逺且臨清運道不能賴其清流之利而每遭其淤阻之害節經歷年詳議卷案可查今談者以謂足以殺黃河之勢而有賴于運道此不過據舊說及臆度之耳況潞府新封衛城利害所關不敢輕議竊詳果從會衛濟漕之說則懷慶一府既免頻年修築之煩而武陟一帶地土永無水患即本府首當主其議者但以國家大計通論斷斷乎有難于行合候詳示轉行各委官照舊將蓮花口隄工催督修築使沁水仍歸黃河故道各緣由具呈到道據此該本道看得此畨行查係奉欽依事體重大又經駁行二府掌印官行令劉薛二同知親詣細勘另報今據懷衛二府會呈關行劉薛二同知及會委臨河汲新河武等七縣各掌印官勘議隨該汲縣知縣李賦秀會同新鄉縣知縣張赤心輝縣知縣龔世仰獲嘉縣知縣張諭淇縣知縣崔璵河內縣知縣黃中色武陟縣知縣李日茂俱親詣衛沁二河踏勘間當據汲新輝獲等縣社里老劉應逵高進表宋廷珏師以正楊濤德等各連名告稱衛河發源在於輝縣蘇門山下其水陡峻通流灌田不過些須並無淤阻其沁水河身寬一里有餘衛水河身寬不過三四丈先年曾遭沁水衝開木欒店蓮花池隄口附近地方俱受淹沒且流入獲新二縣城門用土屯塞漂流民舍淹沒民田一百二十餘里衛輝府關廂巷口行舟衝倒民房八千餘間壓死男婦陳可立等百十餘口等情各具告到官會看得引沁入衛固殺黃河之流且濟運道之便但恐沁水本大若一入衛河二水合流勢必滔害不惟各縣民居民田深有可虞况潞府新建方將高其隄預其防惟恐不固而敢引沁以貽不測之患等因會申到府又准本府同知劉應聘會同衛輝府同知薛應麟關稱各親詣衛河源頭踏勘得衛水流清土堅原無淤阻雖有軍民水田蓋為水由地行故乘勢以資其灌溉非敢阻塞以專其利也前此雨暘時若源泉不枯河水盈溢漕舟無滯年來亢旱泉源不流而漳河以下諸水亦俱淺澀因此衛流愈覺微細此議者不得不歸咎于居民灌田至于引沁入衛謂于漕河有濟也但查沁水原無支流可以通衛今欲因衝決之道而遂挽之以入衛則目前似足以助衛濟漕而將來水緩沙停其終必致淤塞則既見其利而又思其害是不可不為深長慮也等因會關到府猶恐不的隨該本府知府趙以康會同衛輝府知府周思宸親詣前項河口逐一踏勘會看得衛水枯澀併沁於衛則衛水大而漕舟可行豈不曰運道有所禆益哉但衛小沁大則其勢難容衛清沁濁則末流必淤如先年沁河一決而臨清東昌等處遂至淤塞徵之往事竊恐不減黃河之害而又增運道之梗斯時歸咎誰其任之且沁衛地勢高下殊懸必須創開河身沿河築隄此其費地費工固為不資而伏秋水漲橫流滔天則生靈城池不可不為之計也此皆前人已有成說利害較然如曰姑舍是而輕試以建非常之功非職等之所敢擅議也至若引水灌田誠當禁止但末流之微細實起於源頭之枯竭即今三年亢旱泉源幾至不流有如昨歲運道阻澀漕院差官守視衛源盡導上流而管河道亦駐劄輝縣親至泉所禁之非不嚴也斯時田禾日槁而衛水不增則其故誠不係於淤阻也惟是漕運重務關係匪細合無以後水源有餘則從民之便而不妨與民同利亦可也如水源不足則禁其引灌而專以濟漕等情具呈到道卷查先年升任曹副使奉總理河道萬都御史查勘沁丹等水案行開封府管河同知張崇謙會同各州縣掌印官親詣沁河上源會看得沁河北岸大樊口先年原有決開隄壩故道一處詢問居民執稱先年秋水漲大溢過隄岸致將修武獲嘉新鄉等處一帶城郭田舍盡被淹衝官民受害彼時即令官夫併力築堵見今遺有河形及修武縣西北有清水河一道經流獲嘉縣北六里直至新鄉縣西北侯家橋入衛河隨據本地居民齊口稱苦皆曰此處原有山河數處每年秋水泛漲淹沒民田以致小民逃竄若再開沁河則滔天水勢入於衛河本縣城郭鄉村盡皆漂流及相度地形西南大高東北卑下以修武縣較之大樊口地下約十五餘丈衛輝府志開稱地形衛城浮圖最高才與沁水平勢不可開在新鄉則河流城下兩岸居民千餘家在衛輝府西北一面離城僅有半里兩岸係商賈之藪居民稠密公署俱建於此若欲開濬兩岸各數十丈則新鄉衛輝城郭居民公署俱當改移數里方可動工況沁水猛漲勢比黃河稍有一線之決溢入衛河則臨河居民城池受害不支查得嘉靖三十五等年管河工部汪郎中題稱河南沁河衝開木欒店相鄰大樊口三百餘丈決水橫流突入衛河水半泥沙瀰漫異常至臨清逆流上擁運河板閘至甎閘七十餘里泥沙沉積二閘淤塞二千餘丈阻防運道應行河南管河道作速修築以保糧運議允遵行今若復引沁入衛則昔年壅塞運道勢所不免其患不專在衛輝而貽患於漕矣等因到道又該曹副使復議三難一河身之難闢二隄岸之難築三下流之難濬逐一條議具呈總理河道詳允停止訖今奉文覆勘該本道會同分守河北帶管分巡道徐參議會看得沁河自武陟縣速入于黃其來已久木欒店至衛河相去百餘里自西而東地勢極下其流甚易但先年引沁入衛屢議屢止蓋言利害相關莫敢承議繼今又奉欽依勘議會委多官悉心相度及查先年勘議牘中條析詳明利害較然且所為引沁入衛者蓋一以為稍殺黃流一以為有資衛河運道故紛紛建議欲舉行此䇿今無論前項工力之難與衛輝一帶淹沒之害即於黃流雖能稍殺而衛河運道仍有留塞則北河之厄猶之在南河也況今潞府建設利害所關尤非往年之比相應呈請合無將蓮花口隄工並淤塞河身照舊疏築大加工力疏河身必令寬大通流築隄壩務要堅固一勞永逸不得茍且塞責若衛河泉源之水所稱五六月間正係漕船過閘入衛之時難謂與民間灌田不過妨害相應嚴行衛輝府查其如遇天旱漕河乾涸則嚴禁居民不許分引灌溉庶不致阻塞河渠矣等因會呈到臣據此先該工部題稱去嵗春夏間天久不雨衛河之流幾竭以致漕舟淺閣儧漕御史吳龍徵奏報本部亦行北河郎中吳之龍查勘據稱漳衛兩河上源多有引以灌田以致末流日細行臣查勘應否許令引灌等因覆奉聖㫖是欽此又准總督漕運都御史楊一魁手本內稱引沁水以濟運河欵開要將武陟木欒店決口免其築塞因而通衛助運一節已經臣等會行該道查議去後今據前因該臣會同巡撫右副都御史衷貞吉巡按御史王世揚會議得古今論治水者孰不曰順水之性行所無事哉然而地當中土勢有重輕利害所關又非可以嘗試而漫為者沁河發源西晉經帶河內沛然東下勢若建瓴惟至武陟城東復折而南與黃河會流以故昨秋暴漲束隘難行遂致潰溢直衝木欒店決蓮花口滔滔東注則引沁通衛其勢良便也但細查衛輝府治地既卑下河復狹隘狂流灌注容受為難即今獲嘉已成巨浸新鄉亦若浮盂該府城垣去河不逺衝決之患殊為可虞況今藩封新建關係尤重昔人所謂不與水爭利者誠有不得而槩論者矣且沁水沙多善淤一入漕渠淤墊閘座昔有左驗恐利未得而害且隨之也既經道府勘議明悉又該臣等親閲相同仍應堅築隄壩寬闢河身務使南行無滯庶為長策至于漳衛上源據稱天旱泉微誠有之矣但民間灌溉壅遏泉流致妨運道合行該道將一應私壩悉行拆毁如遇雨少泉微盡令導入漕渠以濟糧艘河北分巡道仍不時周行巡察禁治如有阻撓許巡漕御史拿究如是則沁不得以病衛衛又得以濟漕其于國計民生均有禆益矣伏望敕下該部再加查議如果臣等所言不謬俯賜允行庶便刻日興工除工程錢糧另行類報外謹題請㫖奉聖㫖工部知道該工部覆議相同題奉聖㫖是河工大舉疏都給事中常居敬題為河工大舉酌議善後事宜以圖永利事據河南按察司管河道兼管水利僉事余希周呈奉臣并撫按憲牌前事照得兩河工程已有次第一應善後事宜行道悉心詳議以憑會題等因先該工科常都給事中批據帶管河道辛僉事條議事件蒙批管河道查照欵開事宜會同該道再議明悉詳奪并蒙巡撫衷都御史批仰管河道查照先今河工事宜備細類成條欵作速申報以憑酌議施行又䝉巡按王御史批新管河道會同該道確商詳報䝉此依奉照欵會議登答明白呈乞題請遵行等因到臣該臣會同巡撫河南兼管河道右副都御史𠂻貞吉巡按河南監察御史王世揚議照中州惟河患為最巨故其治河也為獨詳邇年人心玩于積習法制廢于因循致厪聖懷特㫖修築即今兩河工程臣等不敢不竭心力矣然必料理精詳庶可垂示永久若非奉有明㫖無以警惕人心既經該道會議前來又該臣等覆議相同合照欵列具陳伏乞敕下該部再加酌議上請行臣等遵奉施行謹題請㫖計開一預積掃料以防未然臣等查得河南水平岸高而土疏其湍急掃灣之處患常在下雖有高厚之隄卒然坍塌無所措手故防河之患無愈于捲掃而捲掃之料全資於稍草樁麻與土也往年所用樁木檾麻俱分派於出産州縣買運而柳梢谷草俱於臨河地方召商收買已有定議近因沿河各縣連年苦旱復遭大水百穀無收欲暫將谷草派之别府州縣買納解送亦通融之䇿但道途隔逺不惟腳價浩費抑恐反滋騷擾及查往年谷草定價每束連耗草二十二斤給銀二分今年谷草缺乏價貴合無每束增銀一分共給價銀三分仍舊召商收買此後豐年酌量估裁庶草價既增而商販自至矣至於捲掃胚胎純用好土始得堅完必須預積平日庶可取辦倉卒近因久無水患管河員役不復議積每遇急迫取土窵逺緩不濟事竟日般運不成一掃遂致決口漸闊為害滋大矣合無令各守隄守壩堡夫於閒曠之時查照成法令各管河官督令預運掃土堆垜於掃壩及緊要隄岸之上每年會計之時查算某處該積土若干責令各夫如數運積著實查驗無容虛報其河流衝射之處仍當預置旱掃如伏秋水發微有衝刷即時添補管河官一面督行一面申報則有備無患而掃不難成隄防愈有賴矣伏乞聖裁一議處工食以恤窮民臣等查得估計修築隄壩工程每築方廣一丈高五寸為一工每夫一名日完一工方給工食銀三分三釐三毫夫以一人而日築一工已為難完況取土有逺近之不一填築有險夷之不同槩以一例計工既不能依期報完復又計工給銀安能盡滿所望且今歲米價騰貴數倍往昔一工給銀三分三釐三毫亦不足其食用若一日不完一工則所得工食益不足以糊口無惑乎每遇募夫召之不至也合無將今歲做工夫役每一工給工食銀四分如取土在百步之內及在平地修築者俱仍以方一丈高五寸為一工若在坑坎水內填築及在百步之外取土者酌量減其寸數俱每工給銀四分如此則工食既加而養贍足工程有等而勞逸均人心亦知樂從矣其已後成熟年分仍照舊查給伏乞聖裁一議設堡房以慎守禦臣等查得黃河兩岸長月等隄并掃壩之處先年每二里建堡房一間僉堡老地方各一名統領火夫十名巡守以防河患原無工食數年以來天時亢旱河患稍息人心懈弛堡房傾倒而孑遺災民星散求食各隄防守遂無人矣惟各掃壩處堡房尚存數名然為數亦少不足應用昨歲河决雖出異常之災未必不由踈虞所致也合無於黃河兩岸各新舊長月等隄每二里仍建堡房一間每堡僉鄰近堡夫二名每五堡僉勤能堡老一名統率各堡夫晝夜往來巡守栽培柳樹但有盜決隄防及砍伐隄柳者即便擒拿送官究治遇有河水泛濫衝刷損傷即行填補每堡老一名月給工食銀五錢各役每名月給工食銀三錢俱於河道官銀內支給至於臨河掃壩尤係要害修守之工倍當加謹仍每二里建大堡房一重三間盛放掃料以備急用每堡設堡夫五名每二堡設堡老一名管河官不時查㸃遇有緊急衝刷不拘晝夜本堡鳴鑼各堡老督率各夫前來接濟併力堵塞其堡老必於鄰近鄉民中選精勤守法者充役如此庶防守俱各得人而河患可保無虞矣伏乞聖裁一議處厰夫以杜偏纍臣等查得臨河祥符等縣設有官厰八處收貯稍草樁麻以備捲掃每厰原有厰夫二名或三名令其看守物料先年俱於各州縣堡夫內選殷實大户充之凡管厰官合用心紅紙劄并雇覔書手造寫循環倒換盤纒及雇人晒晾物料并修理厰房墻垣冗費百出每名每年費銀五六十兩如遇不才官員需索常例費至百金者有之後因稱纍以堡夫二名朋應厰夫一名每年工食銀四十八兩至萬厯十三年該前任巡撫臧惟一允河道議每名裁定工食銀三十六兩以其數非不多也不知工食有限而額外之費無窮夫厰夫原以看厰為名惟晒晾物料是其職守乃至責以不資之費磨纍無休身家蕩敗無惑乎合口稱苦不敢承役也相應痛革以後每厰夫一名以二人當之給條鞭工食銀二十四兩扣除銀十二兩存貯官庫不許復僉正頭惟召募鄰近土民充當一切雜費如管河官心紅紙劄等項量於編派其登報文冊修理墻垣即於前扣銀內申請動支不許濫派厰夫出辦惟稍草等料有浥爛數多各役失於苫蓋晒晾者姑免問罪令其量賠如此庶需索之弊既革而厰夫之害可免矣伏乞聖裁一及時給散以杜侵剋臣等查得河工全賴人夫夫役全資工食河道錢糧俱貯府庫管河官不得自由必至河岸衝決方議調人夫請支錢糧已無及矣合無每遇春時該道行管河同知通判等官赴府領銀分發沿河州縣專聽不時之需遇有河患一面募夫一面申請事完稽查庶不耽誤至於給散工食往時獨責之各縣管河佐二官各官多不親理又委之部夫隂醫等官稱鑿給散其中不免扣剋以致各夫鮮受實惠合無以後給散河夫工食俱聽該府管河官督同各縣掌印官眼同包封唱名給散再不許令各縣部夫官總領致滋奸弊如府管河官偶在别縣督工一時不暇者聽各縣掌印管河官徑自給散如此庶扣減之弊既除而夫役之逃可免矣伏乞聖裁一責成正官以便查核臣等竊惟設官定制在府州縣雖有清軍管糧捕盜理刑管河等官分任佐理而兼總條貫則掌印官事非謂各官之外掌印官全無相干也故一州縣之中河渠要害孰非正官之所當料理防守者況中州生靈命脉係於黃河可以正官而漫不關心乎乃向來河務該道止行文府管河官府管河官止行文州縣管河官而該府州縣全不經由故問河水衝決非不曰某州某縣之某口決也問應用人夫應動錢糧所以治其決者則曰有管河官在非本州本縣事也不知河患係民瘼最切不此之究而徒諉之於一二佐二彼其威令不行召集人夫既多阻撓操持不定動用錢糧又難清楚況修理工程必動錢糧管河官身任其事則錢糧自有粘帶每年會計既令其查議矣乃年終核實亦令其自為而自核之無論工程虛薄錢糧冒破無由而覺即工程堅固錢糧明白誰則信之是尤不可解也合無自後申飭各府州縣掌印官凡遇河務雖有管河官專管至於催儧人夫給發錢糧各掌印官務破積習協心共濟其會計工程亦與管河官會同估議每年河防畢日該道將各掌印管河官分别勤惰開呈兩院量行奬戒如此則精神流貫而法亦昭明責任各專而功可永賴矣伏乞聖裁一議豁隄糧以蘇民困臣等看得黃河兩岸皆係民間納糧田地而新舊所築長月縷水減水等隄壩南北兩岸上下綿亘六七百里其根闊有七八丈者有十餘丈者所壓占民地不下千百餘頃自來地內夏秋稅糧并各項差銀尚係地主賠納臣等竊謂築隄乃為一縣小民捍患非一人一家私事其占用各戶之地既不償以原價復令包納虛糧誠於人情有所不堪合無候部議行臣等轉行臨河各縣逐查各該地方除年逺舊隄外其有五年以內新創及幫築隄壩若干道某道根闊若干長若干共計壓占民地若干每年共計稅糧差銀若干即與除豁均派槩縣地內徵收抵數及查見今種麥挑穵者量給倉穀以補子種之費庶包賠之糧不致偏纍而沿河之民可免向隅矣伏乞聖裁奉聖㫖工部知道該工部覆議相同題奉聖㫖依議著實行欽奉敕諭查理河漕疏都給事中常居敬題為欽奉敕諭查理河漕以保運道事據淮揚海防兵備兼管河道副使胥遇徐州兵備兼管河道僉事陳文燧會呈䝉臣并先任總督漕運侍郎楊一魁巡按御史劉懷恕會牌前事行職等躬歷各該河道地方逐一查閲要見古洪淤塞作何疏通濁河內灌作何防禦徐邳一帶隄岸有無圮壞作何修治清江浦一帶河防有無衝決作何保守崔鎮等壩應否改拆塔山支河應否開通小浮橋故道果否可復草灣河口果否當濬并調度夫役議處錢糧逐一查勘虛心詳議務求長䇿永裨運道十日內具由詳報以憑會議等因該各道會同南河郎中羅用敬夏鎮主事楊信悉心踏勘議照得國家定鼎燕京歲輸漕糧四百萬石運艘涉江淮經徐邳入運河抵京師濟寧以北必資汶洸沂泗諸水而徐邳以南必資淮黃二水濟之俱會淮安外河掠草灣歷雲梯關入海北高南下勢若建瓴淮弱黃强時有衝阻𢎞正以前姑不必論嘉靖末年河道日益多故歸德而下丁家等口忽然衝塞黃水不從小浮橋故道達徐初徙於溜溝再徙於秦溝三徙於濁河口於茶城相近全河逆行至嘉靖四十四年徐邳一望瀰漫不辨州里該先任尚書朱衡改建南陽新河運道復通自老黃河故道既失雲梯海口未疏隆慶年間河決於崔鎮淮決於高堰寶應興鹽等州縣遂成巨浸水泛沙停轉運甚艱至萬厯六年先任右都御史潘季馴創築遙隄盡塞諸決束水歸海使由故道民獲安堵漕得順利已逾八年其功昭昭在人耳目惟是支河既塞海沙尚高一帶河身日漸淤墊決塞之患比歲稍多在淮安上流不分全河直衝范家天妃等口通濟福興諸閘歲苦衝淤王公隄屏蔽清浦歲遭二瀆嚙射隨修隨圯勞費不資在徐州下流不分黃水倒灌古洪內華諸閘淤塞日久今未極力挑通萬一黃河暴漲不免復淤阻滯運道關係不小高寶一帶由淮引黃河渠日高雖有湖隄越河足避風濤然邵伯寶應二隄尚未包砌土隄單薄巨浪乘風傾潰可慮善後之計不可不圖謹將淮揚應議應舉工程欵列開呈等因到臣先該工部題為欽奉聖諭事照得黃河東經梁靖口田劉口至茶城河逆而上而茶城淤又東則淮黃河流其勢益盛於是天妃壩決而淮安河流幾沒隄岸行臣要見徐邳之隄岸淮安之堰壩作何修防草灣河見今議濬可否分流以殺水勢崔鎮壩見今議拆可否泄水以沃民田合用錢糧若干作何措處合用人夫若干作何起派司道等官聽其便宜委用未盡事理聽其陸續會題仍嚴督地方官上緊興工事完之日核實造册奏繳回京有功官員查照閲邊事例分别舉薦如有阻撓誤事推諉抗拒應提問者徑自提問應奏請者奏請定奪等因奉聖㫖是欽此又該總督漕運侍郎楊一魁題為議處兩河水患以固運道以奠民生事內稱覆勘草灣口等七事該部覆奉聖㫖崔鎮壩應否改拆還候差去科臣到彼再議定奪其餘俱依議著實行欽此又該侍郎楊一魁題為恭報運河疏通空船過盡并陳善後事宜以圖永濟事條議改閘座等十事該部覆稱開支河移官夫復故道等事行臣會同查議等因奉聖㫖依議行欽此該臣先同巡按御史劉懷恕并南河郎中羅用敬徐州道兵備僉事陳文燧自上而下由豐沛經徐邳以至桃清復同總督漕運侍郎舒應龍等自上而下由清浦以至古洪梁境一帶或艤舟閲視或登陸荒度看得豐縣田劉口河勢掃灣原有縷隄坍入河中新築月隄一道堪以防禦郭家灣匙頭灣栲栳灣等處雖係迎溜見今修築掃壩亦無大害徐邳自桃源五百餘里河身就下河岸甚高遙縷二隄俱無衝決歸仁集高家堰范家口續修石工俱各堅厚寶應越河運艘甚便惟古洪河口去秋濁河倒灌今雖挑通尚屬可虞清江浦一帶運河與黃河僅隔丈餘王公隄二百九十丈二瀆南徙衝刷日甚隄懸一線勢甚危急至於高寶西隄邵伯石隄俱屬要害委不容己一一查閲明白又經催行司道會議去後今據前因該臣會同總督漕運侍郎舒應龍巡按御史劉懷恕巡鹽御史陳禹謨巡漕御史喬璧星議照我國家挽漕東南全賴河渠古洪以北必資汶泗諸水徐邳以南悉藉淮黃二瀆河雖不同利害相因故理漕必先於理河治黃即所以治漕誠不可一日不講也然徐州以上之河恐其潰而入有衝決之患徐州以下之河恐其潰而出有漫散之虞審水性之順逆酌時勢之緩急要非可以執一而論者往無論矣嘉靖初年河漸北徙濟寧魯橋以下河道淤填至嘉靖十三年該副都御史劉天和挑濬河身復修閘座四十四年河決沛縣舊河淤塞該工部尚書朱衡開通南陽至留城新河徐邳以上河道賴之隆慶以來黃河決崔鎮等口淮河決高堰等處二瀆漫流水緩沙淤運道艱阻該右都御史潘季馴創築遙隄盡塞諸決兩河復合沙刷水深運道民生均有裨益徐邳以下河道賴之雖先後河臣經略良畫尚不止此此其功之最著者也惟自萬厯十四年以來清河以下一決范家口而全河幾奪一決天妃壩而福興漸淤徐州以上濁河灌注古洪阻塞要害之地委屬可虞然則有思患預防之心者安得不為補偏救弊之謀哉但據稱上源小浮橋之路久塞故道當復也支河當開也下流之老黃河難復三壩當拆也草灣當濬也此其計慮甚周而用心良勤矣臣等隨處查勘虛心商度故不敢曲徇以茍同亦豈敢有心以求異然而勢當酌其所急功必期其可成茍或心思雖竭而經理實乖議論雖多而治效則鮮於河道終無補也今據司道㑹詳臣等復加酌議除升閘座等項已䝉俞允見今責令興工外謹將應舉應停工程事宜欵列分别上請其當行者雖無新竒之見而實切於事機其當止者雖嫌意見之殊而實採之輿論河漕重務彼此何心要皆求以便國計耳伏乞敕下該部再加查議俯賜俞允行總督侍郎舒應龍查照遵行庶於運道民生裨益非淺鮮矣謹題請㫖計開一添造閘座以便防守查得古洪內華為入運首閘先因規制未堅啓閉不時一遇暴漲遂多淤塞今古洪等閘己奉㫖改造加石數層似已得䇿但自古洪以至河口尚有一百八十餘丈每遇閉閘外成灘淺兩岸土隄又易奔潰奔岸之土與黃水之沙并填其中無惑乎阻塞之易也且鮮貢船隻勢難久待古洪失守直至梁境數里淤填誠難為力合仍於古洪以外酌中之所相擇堅地添建鎮口閘一座長砌鴈翅寬鑿閘窩以便停泊南北兩岸俱用樁掃廂護共銀二千三百兩如船入鎮口則急閉上閘候外閘既閉漸次而啓庶彼此聨貫既可以蓄內漕之水關防嚴密又可以禦外河之漲重門禦暴防守自便此外縱有淤淺所餘無幾俟黃水少落而以盈漕之水衝之勢自易易矣伏乞聖裁一接築縷隄以防中潰查得黃河自西而東漕河自北而南至河南開歸以下相去伊邇南高北下其勢易趨先年潰滎陽灌臨清決荆隆衝張秋竭天下財力而始塞該都御史劉大夏等自胙城經曹單至豐沛創築大隄即所謂大黃隄也嘉隆以來治河諸臣又自豐沛市里寨接築直至茶城漕渠之內遂免濁流之患然彼時河會茶城而出以故隄亦止此近該郎中陳瑛另開內華古洪二閘逺避戚港運艘利之則茶城東下又十餘里矣兩河相望隄防未築每至伏秋幾成橫潰萬一失守是短垣可踰而扄鑰雖嚴竟亦何益合無自茶城以下塔山支河西岸起接至河口止督率隄淺洪閘等夫接築縷隄一道計長五百丈底闊四丈頂收一丈二尺高一丈又補築舊河缺口一道長六丈幫修舊隄一百丈共計土一萬三千八百七十六方上用犒夫銀四百一十六兩二錢俱用堅實老土勿雜浮沙則束水歸河下流益速黃河不致漫潰而諸閘亦可恃以無虞矣伏乞聖裁一議修掃壩以防危急淮安自西門皇華亭抵清江浦約三十餘里內外二河僅間一隄至於王公隄一段最為喫緊先年兩河之濵相去里許居民比密後因黃淮逼流偏向南徙衝刷日甚民居蕩析僅隔丈餘雖有石隄止在浮面濁流掃根利如矛㦸以如線之隄而當排山之勢必無幸也萬一蟻穴潰防泥丸難塞則清江一帶蕩為巨浸不但無淮城且無運道矣查得每年樁掃費亦不資但因新於舊續卑為高基址不實工力未堅隨填隨陷實由於此合於本隄海神祠起至孫贍門首止計長二百九十丈出水三丈捲丁頭掃五層計掃二千五百箇鴈翅之內實以土石捲掃之外密釘樁木每隄二十丈作順水壩一座共計一十四座逼水北流以刷對岸之沙以數年之費為一勞之計庶危隄可保而運道有賴矣伏乞聖裁一開創月河以避衝決王公隄一帶地當要害單薄可虞今畨所議掃壩可保數年無恙矣但欲為萬全之計不可無永賴之圖議者欲於河北王家營開河一道引河北徙意非不善但工力浩大開創甚艱而地勢髙亢淤塞亦易河成矣而水不趨水趨矣而後不繼是委財於壑也然與其挽黃以避漕孰若引漕以避黃相應於運河南岸另開月河一道共計九百丈內上自劉相屋基起至紅廟止五百丈地形稍高應挑深二丈自紅廟起至清江閘上首止地形稍窪挑深一丈八尺俱面闊十二丈底闊七丈共計土一十六萬三千四百方共該銀九千八百零四兩仍將舊河築攔河壩二道或即以挑河之土填實於中務令堅厚如是則兩河相隔幾二三里許河雖善決亦必不能奪漕而入矣伏乞聖裁一築寶應西隄以束漕流照得固隄即所以導河導河即所以利運從來治河試有明驗彰彰矣何也水之為性專則急分則緩而河之為勢急則通緩則淤理固然也其在寶應湖口三官殿米市竹巷口一帶嵗每淤每撈邑恆患之究其故該縣未築西隄則水多肆溢河流不束赴下力微以故湖口三官殿等處淤淺殊甚前者一歲一挑今則一歲二挑猶以淺澀為慮重運所經不無遲滯合無比照山陽縣培築西隄一道自黃浦南壩口起至𢎞濟河北閘向南二三丈止計二十里許加築土隄高五六尺底闊一丈二尺頂闊五六尺共該銀四千一百三十一兩則因河勢以築隄固隄防以束水而該縣淤淺之患漸可去矣伏乞聖裁一砌邵伯湖隄以免歲修照得司河務者無日不以繕隄為事亦無日不以決隄為患不知功非永圖則隄雖繕猶弗繕也潰決之患其何能免高寶邵伯諸湖西受盱泗天長石梁汊澗甘泉五塘諸山之水聨貫汪洋一望無際其在高寶湖隄凡係險要各經甃石中有未石若寶應之三里湖口高郵之南小湖口俱稱險地萬厯十五年曽經動支歲修銀兩分委砌石一包八百餘丈一包三百餘丈工俱將竣惟邵伯湖隄正當湖面寬廣之所一遇西風則兼天震撼勢若排空中有包石者原無地釘襯石年久塌卸甚多其未包石者則止排樁廂板不時汕削尤易節經歲修隨即圮壞徒耗工費真為無䇿今合於一淺二淺隄向湖心險要一帶除已包石外俱應接續包砌該銀二萬二千九十七兩庶一勞永逸而歲修可省矣伏乞聖裁一濬裏河河身以利運艘從來議治河者不過曰築曰濬而已然而治黃河與閘河異蓋黃河濁流隨挑隨合人力難施閘河則愈挑愈深功效立見先臣平江伯陳瑄創立裏河規制每歲挑淤法至善也因循至今惟知築隄不知濬河即歲時調度夫役無多竟成故事自萬厯十四年以來天妃壩等處衝漫黃流灌淤河腹日飽兩隄夾水形若圜堵一遇衝擊下無實土將潰裂肆出而不可支矣合無由淮安至儀真內河一帶俟其重運過畢至六月間清口大壩築完乘此水涸即當查復淺船密布淺夫多備器具濬淺已深河則水由地中而隄根皆係實土斯可以杜決而防潰矣伏乞聖裁一酌議分地以便責成自通㑹河至瓜儀俱設有工部司屬等官分理河道其責為甚專也然河有逺近則畫地不可不均勢有緩急則立法不容不變先年新河初成設立夏鎮主事一員專管閘務上自珠梅閘以至黃家閘僅百餘里耳至於梁境茶城一帶則原屬徐州洪主事謂其駐劄相近防守自便也後將徐州主事裁革盡屬中河郎中不知中河所轄自梁境至天妃六百餘里道里遼逺則耳目有所難周閘河兼司則事體有所未便當伏秋河漲徐邳沿河隄壩俱當時時料理乃復欲遡流而上濬漕渠而防淤阻其將能乎似應將梁境至首閘盡屬夏鎮主事管理中河郎中專管黃河則湖水之蓄泄有度各閘之啓閉以時誠便計也第管閘主事原未奉有欽依關防以致人有玩心事多掣肘今既加分古洪等閘正運道咽喉事權安可不重況動支錢糧調度夫役持空牘而理要地非所以重委任也合無比照三河事例請給敕諭關防以便行事庶責成專而事權重閘河亦永有賴矣伏乞聖裁一移調官夫以資䇿應查得吕梁洪設有洪夫一千二百一十名徐州洪夫三百七十八名又協濟夫四十五名原為灘高水險以資撁挽今河勢漸平挽舟甚易各夫閒曠私役為多古洪以上三閘為運道咽喉而隄淺等夫僅僅五百委屬不足該督臣楊一魁議調吕梁夫七百名未為無見該部覆稱移徙未便誠體恤貧民之意但夫役流寓原無身家衣食於奔走隨地皆可居也況相去未甚逺乎合酌議二洪共撥六百三十三名以六百名均散古洪等四閘各一百五十名以三十三名即充新閘閘夫專司啓閉吕梁洪仍存七百名徐州洪仍存三百名以供拽運亦足應用管河同知移住境山常川防守庶夫役適均而䇿應自便調度有人而防守無虞矣伏乞聖裁一設山陽長夫以便河工照得先年總河部院題設民船出閘稅銀以濟河工殊亦稱便嗣因先任淮安府知府邵元哲呈請民船仍舊車盤俾小民藉有生計乃於牙行埠頭每年顧夫一千八百名此山陽行夫之所由設也每名雇覔一日給工食銀三分每年做工六箇月計銀五兩四錢相因舊矣但售雇者非老弱不堪即遊食無賴朝㸃暮逃全無實用及至勾攝輒以往返數日廢時誤工莫此為甚合議將行夫二名共合一名做工一年每名日給工食銀二分一年計該銀七兩二錢責令牙行納銀在縣比照髙堰隄夫規則務選年力精壯者籍名在官即注曰某處隄夫該實在人夫計九百名如王公隄險要處所即注夫五百名西橋禮壩各一百名范家口二百名常川修守俱屬分委官管理如本工無虞則臨時酌量通融調撥别工應用仍刋刻木榜注為定規責令各夫專聽河上應役其各衙門别項工作不得私役一名違者聽總督部院參究庶夫役有定額而牙行無賠纍之擾分派有常所而河工獲實濟之益矣伏乞聖裁一寢開支河以防善淤照得先年黃河從秦溝入徐濟運正與茶城對衝而戚家港一帶水勢湍溜挽舟而上為力頗艱覆溺漕舟不知其幾該見任侍郎舒應龍為副使時另開塔山支河一道行舟數年頗稱利便後因淤阻後開內華等閘即支河遺意也今督臣欲將支河挑濬建設閘壩與內華古洪兩處行舟亦有備無患之意但泉源無多難容兩行誠有如該部之議矣臣等以為不患內水之難分而患外水之易入黃河暴漲一隙可乘勢如奔馬豈獨灌閘漕而不灌支河乎方欲嚴扄鐍以禦寇而復開徑竇以導賊非長䇿也查得昨歲古洪之淤從閘口入者尚無幾從支河引透直至梁境為害頗大今方塞之惟恐不固也尚可自多其門戶乎人有惡噎者而穿咽於脅恐非攝生之道也況支河之外沙渚橫截挑濬亦難寢之為便伏乞聖裁一查議故道以省繁費徐州以北之黃河即運道上流也自小浮橋之路塞而河出濁河口易於灌淤議者欲自歸德丁家道口開濬故道或從碭山縣韓家口或從石城逼水南行俱從小浮橋經流庶為順利此其議甚正而慮甚逺矣臣已行河南守巡管河三道㑹勘明悉大都自丁家道口至石將軍廟二百五十餘里地勢髙亢已成平陸內有稍窪者挑成樣河一尺以下盡為沙泥無論工費之難即挑成亦易淤塞臣又勘得韓家口一帶亦未見河形水勢滔滔東下欲挽之使南勢必不能惟石城濁河之南小有河形一遇伏秋水泛亦分十一冬春之間遂多淤填欲築壩分流則地盡浮沙無可豎基誠難為力矣此故道之大較也然人皆知故道不能復臣以為不必復可也何也閘河出口無往而不㑹黃則無往而不受淤豈從濁河則淤而出小浮橋則否耶先年河臣潘季馴欲復新集故道蓋恐來流散漫非為出口受淤也即今虞城碭豐之間水皆通流原無決裂儘可濟漕萬一盡從小浮橋出則古洪至此尚三十餘里弱汶之流曾不足以潤河身之沙不知漕舟何所藉以上行則故道之復亦難輕議伏乞聖裁一停拆三壩以保成功查得萬厯七年該總督潘季馴經略兩河塞決固隄慮縷隄束水太急恐有奔潰也逺創遙隄以廣容納又慮遙隄涓滴不泄恐有汕刷也創建滚水壩以便宣泄崔鎮徐升季太等壩皆因地勢卑下使水易趨原以防異常之漲非以減平漕之水也數年以來束水歸漕河身漸深水不盈壩隄不被衝此正河道之利矣議者欲將三壩拆落用心良苦臣量得崔鎮壩石頂去地僅二尺八寸視遙隄低七尺徐升壩石頂去地僅二尺五寸視遙隄低七尺三寸季太壩石頂去地僅二尺視遙隄低八尺三壩臨水河岸離水面各八九尺一丈不等較之三壩各高三四尺不等是河岸甚高石壩原低每遇伏秋水高於岸即從各壩滚出其不得出壩者乃不得出岸者也欲分水勢壩可拆矣一帶河岸可盡削耶據鄉民畢九臯馮吉趙倫等訴稱壩外水鄉漸成膏腴逃徙之民近方歸業若欲將壩改拆二層是為無壩先年河從此決又可虞矣酌之事勢仍舊為便伏乞聖裁一停濬草灣以節財用查得黃淮二瀆自清河口㑹流入海其勢最盛由清浦操西橋繞淮城從赤晏廟而下此正河也每遇伏秋淮城告急西橋而上北岸原有草灣河一道河口雖係新衝河身即先年侍郎吳桂芳所開也北流之勢分則淮城之勢減議者欲開濬草灣未為無見臣曾慮其復淤亦未得之目擊也今閲草灣一支黃河分流幾十之四自顔家河一從赤晏廟一從安東頭鋪復㑹流入海原無阻滯且東西兩岸闊幾二百丈頗足容納若復以為不足而濬之不知屈曲灣環本河之性沙淤如飴人力莫施縱使挑開一遇暴漲衝塞靡定竟無益也查得先年曽費十數萬金塞之不得忽然自塞費四十萬金開之未能倐爾自通已有明驗矣今乃欲以數千金挑之又何濟於萬一耶即去歲督臣具題時尚有沙觜今已衝刷殆盡難以再濬故雖奉有俞㫖而至今尚未興工亦不敢為無益之舉也合無免其開濬將原議銀六千一百四十四兩為王公隄月河之用庶錢糧不致虛費而漕渠得有實濟矣伏乞聖裁奉聖㫖工部知道欽此欽遵該工部覆議條列一十四欵除相同外其稍有異議者四欵開列于後計開一開創月河以避衝決前件臣等看得漕黃相隔僅一王公隄諸臣既欲修本隄設順水壩又欲於運河之南開月河引漕水南流則兩河相隔幾二三里若時加培築即數年可保無虞可謂計深而慮逺矣但工程浩大錢糧措處或難合候王公隄築完次第舉行未為晚也伏候聖裁一濬裏河河身以利運艘前件臣等看得淮安至儀真內河一帶舊係三年一濬自萬厯六年以後更定歲修之法而今則隄形已高淤者未必濬矣諸臣欲俟重運過畢清壩築完之際乘時挑濬甚為有見但所稱查復淺船一節不知船料船工作何計處及今修復猶能不誤挑濬否似合候總理河道至日會同漕撫衙門再議舉行伏候聖裁一酌議分地以便責成前件臣等看得治河之臣信地分則責任有歸事權重則法紀不紊此事理之易見者所據諸臣欲將梁境至首閘屬之夏鎮主事茶城至清口黃河屬之中河郎中則道里既均循行亦便誠為計之得者至稱地方一分關係頗重欲比河道郎中事例將夏鎮管閘主事給以關防敕書尤為確論但查南旺管泉主事亦有錢糧夫役與夏鎮事體相同科臣相度徐沛尚未至於汶濟以故未議及此相應一併題請容臣等移咨禮部鑄給關防二顆頒給南旺夏鎮二主事欽遵行事惟是二主事奉差以往已有精微批文所議敕書似應免給伏候聖裁一停濬草灣以節財用前件臣等看得草灣一河乃先任督臣開之以保淮城者第此河見闊二百餘丈則淮黃之水未嘗不藉以分流且開塞靡常歷有明驗是又所謂不必開者既經諸臣勘議詳明相應停濬其原擬應用銀兩合聽别項支用但河流無常海口易淤倘夏秋淮黃盛發草灣舊口難泄則淮安城池生靈不無意外之虞合候臨時酌量緩急不妨另議題請是又未可執論也伏候聖裁奉聖㫖依議行酌議河道善後事宜疏都給事中常居敬題為酌議河道善後事宜以裨運務以圖永利事竊惟國家定鼎燕冀轉漕東南九重之供億六軍之儲需咸取給焉所賴以灌輸者河道也豈不稱重巨哉故治河者既欲祛其害復欲資其利誠難之難者矣考之國家之功令諸臣之經略犁然具備若可持循然而時勢少殊則法制不可不講人心易怠則申飭不可不嚴桑土之謀當於未雨況河道多艱補偏救弊之方其容以或已乎臣疏庸無似誤蒙皇上任使日夕兢兢罔知報稱日來奔走河漕酌之事機詢之輿論稍得其概除各項工程㑹同撫按諸臣另疏具題外敬抒一得列為八事用備採擇少效涓埃伏乞敕下該部再加酌議上請施行其於河漕未必無裨益萬一矣謹題請㫖計開一復河臣以一事權竊惟今所稱漕河者南盡瓜儀北通燕冀天下所由飛芻挽粟而通塞之機所關於國計甚重也第河道源流既逺名稱亦殊分合異形決塞靡定即使精神專而料理密尚恐不足以濟事也先年設尚書侍郎或都御史一員總理河道以故事體畫一興作甚便議定而行無敢格者諸臣經略之蹟至今班班可考乃邇年罷不設歸諸總督漕運而各省則令巡撫兼之不思河道變遷常在指顧呼吸之間非專一則牽制而難行非身親則怠緩而誤事稍顧忌則齟齬而敗績或猶豫則後時而罔功此其所係何如者至於各巡撫專制一方辨官邪審刑名稽錢穀理鹽盜日不暇給乃欲出其什一辦河務其將能乎非獨此也河南之令不能行於山東山東之令不能行於淮揚即一舉而可以垂永利此最忠國便計而各省牽連甲可乙否卒亦憤惋而止至於氣脉不貫事體抵牾此其害未可一二言也嗟夫禹平水土稷教稼穡未聞兼理奈何令并漕運河道而兼之也即今督臣初任經理方新才品卓然足以勝此但以河道事理論之仍當專設總督重臣庶權不分而事易集矣伏乞聖裁一嚴啓閉以杜淤淺查得先臣平江伯陳瑄疏濬清江浦裏河慮黃河灌入泥沙易淤設建三閘以慎啓閉鎖鑰掌於督臣啓閉屬之分司運畢即行封鎖一應官民并回空船隻悉令車壩法至善也時久人玩禁令遂弛萬厯七年都御史潘季馴題為乞恩查復舊規以利漕渠事該部覆奉聖㫖這築壩盤壩事宜俱依擬有勢豪人等阻撓的即便拿了問罪完日於該地方枷號三箇月發落干礙職官參奏處治欽此一時人心肅然啓閉以時漕渠便之及數年以來閘規復廢黃流內灌河道墊淤大有可虞矣合無查照舊規嚴行申飭如山陽通濟等閘三月初運畢即行封鎖惟遇鮮貢船隻啓一閉二官民船隻照舊車盤其在瓜洲二閘俟蘇浙運畢即行封鎖庶不失先年建閘肅規之意而於運道大有裨矣伏乞聖裁一催糧運以謹河防查得通濟等閘止許漕艘鮮貢經行啓一閉二至六月初旬始行築壩此舊例也夫築壩者正恐黃水內灌運道淤阻耳然節氣之早晚不齊黃河之驟發靡定或發於四月或發於五月至六月則濁浪排空勢如奔馬千夫辟易矣今時各省漕糧俱二月終盡數過淮及鮮貢等物各以時至猶可言也獨白糧船聽其自便遲速不齊遂使沿途規什一之利至有六月中旬尚逶迤不前者管河官謂此內府錢糧自當由閘必使盡出而後築壩是時滚滚濁流業已內灌每歲挑淺所費不資十一年之覆轍可鑒也夫漕糧白糧徵兌之時亦不甚逺自當接踵而至無論河道即運艘亦甚便也合無請敕漕運總督衙門比照漕糧事例填注限單臨時查照遲速嚴加賞罰其掌印及運糧官亦以先後為奬戒務使四月中旬盡數出閘聽管河官先期辦料探量水勢隨發隨築毋拘六月初旬舊例庶免衝淤之患而省挑濬之費矣伏乞聖裁一定賢否以便責成照得東南之所急者無大於河漕而所以重河防而責成效者無過於賢否今時河道督臣總理於上部司分理於下乃各府佐官則專率州縣管河判官主簿聽候部司分委辦料興工且吏部給與文憑填注專管河道不許營求别委法甚善也乃賢否則各衙門主之而部司不與焉夫河道艱虞脫有緩急若救火追亡猶恐弗及乃部司曾不得操賞功酬勞之權是求前於却欲責其功力難矣以故别衙門執賢否以便差委而各官亦或冀差委以圖親信反視河道若駢拇枝指然及潰決而圖之已無及矣合無查照清江造船厰官事例凡係管河官專屬河道部司年終考核分别賢否徑呈督撫咨部施行不許别謀差委及查濵河處所俱有各官公署仍量行修理常川駐劄毋使混居府城以妨職業庶賢否定而人心趨責成專而分理便矣伏乞聖裁一議近轉以勵人心語云耕當問奴織當問婢語專一也夫耕織細事猶不可泛任況河道重務茍非得其人專其任徒使素不經事者嘗試而漫為之猶未能操刀而使割也驟而語地利孰知險夷驟而語板築孰辨工苦及舉事不當始議更置錢糧實已耗費亦無及矣故任河務者非得忠勤任事之人久任而責成之不可也第州縣佐二官卑祿薄欲使之數年不調其志易隳故欲勵人心莫若近轉如巡司之守隄堰也州縣佐二之司歲修也通候部道年終核實分别類呈督撫咨部紀録倘主簿缺則推大使判官缺則推主簿縣令缺則推判官否則加銜以俟遇缺推補其同知通判等官亦照此行但宜慎重考核果有顯蹟方得推舉則雖升遷不出淮揚四府異日舉大役興大工令此素習者為之輕車熟路蔑不濟矣矧其人尚留地方即不稱吾得而議處之夫既叨顯庸而又知茍且之無所逃罪也有不視河事如家事者乎伏乞聖裁一議錢糧以濟河工竊以勇士不能為徒手之搏巧婦不能為無米之炊治河全賴工料必需錢糧淮揚河渠固運道咽喉非止為二府之河也查得歲額銀不過三萬兩而歲修銀至有六七萬者如淮城之石工高寶之支河以錢糧不繼工遂難完至於各該州縣庫有額設河道樁草磚灰湖塘地租船稅香銀等項專備河道支用者也近因人心玩怠輒行借支别用因而積猾人等通同侵分及至查核遂以災傷告蠲矣合無行督臣逐一清查每年額銀若干歲用實該若干有無足用作何設處即今未完工程速行措辦其各州縣掌印官凡額設河道錢糧某年某項原係若干徵完若干收頭某人拖缺若干曾否蠲免明立文簿每季終著落經手吏書赴管河分司查比勒限徴完貯庫專聽河道支用不許别項借支庶錢糧有歸著而河工有實濟矣伏乞聖裁一稽工料以資實用淮揚徐邳運河延袤千有餘里歲用樁草繩檾灰石等料所費不資乃積猾商販通同官老書識人等賤開貴價虛出實收弊孔百端及工完查盤則料已入水無從究詰若夫夫役逃曠工食虛冒糜費甚多蓋緣任不得人委肉于虎良足惜也合無於柳浦灣鎮另建設料厰一所每年春初動支歲修銀兩買辦樁草等物務選委廉幹職官管理經收凡遇歲修敕修工程仍委府佐官親赴工所查驗明白方許支給如有工料不實未久潰壞者查追料價職官一體參處至於夫役工食每小委官一員給票三十張每日填一張如某小委官管夫若干本日在某處用工某夫病某夫逃病者半月一算逃者三日一扣管河丞幕按月類送府佐府佐按季類送司道然後司道以所核夫曠扣銀入官彚報總院則稽核嚴而物料足支銷明而虛冒革矣伏乞聖裁一重修守以謹河防天下之事作之者固不易而守之者尤難況於河道關漕運重計乎何也水勢之緩急夫役之調度錢糧之盈縮工料之磨算是無一事可忽也正月辦料二月興工三月終工未就而桃花水發五六月而伏水發七八月而秋水發是無一時可忽也若遙縷各隄若歸仁集若高家堰若王公隄若西橋范口等處是無一地可忽也此其責甚重而其勞為獨至然實不外於歲修之中但在人見其無竒功在已見其守舊轍於是茍安者多玩愒好事者喜紛更其於河漕何所裨益不知治河如治邊防水如防冦今各邊之臣謹斥堠修城堡練士卒飭器械豈必犁冦庭計首功而後可以言勞哉然而秋防有叙互市有薦閲邊有録以故人心有所激勵而興起今河臣出入風濤奔走拮据勞瘁之狀不減邊臣乃歲修之功莫由自見非情也臣以為有怠事之罰亦當有勤事之賞合無除興舉大工外每年歲終總河大臣將部司以下各官查其修守勤惰分别注考移咨吏工二部紀録案候三年該部類題請㫖賞罰以昭勸懲果有成勞雖破格超遷或加服俸亦不為過如或持祿養交偷安廢事致妨河務者即行議處如是則人知職業修而事功自見防守嚴而河道永賴矣伏乞聖裁奉聖㫖該部知道欽此該工部摘將嚴啓閉等五欵覆議相同題奉聖㫖依議行欽此又該吏部摘將定賢否議近轉二欵覆議相同題奉聖㫖近年管河佐二等官多有營求差委妨廢職務不行用心防守的總理衙門務遵敕諭拿問重治不許姑息其餘依擬行欽此又該吏工二部㑹議復河臣一欵題奉聖㫖這總理河道官准復設著推練達老成有才望的去漕運河道衙門各職掌還查擬停當來說祖陵當護疏都給事中常居敬題為祖陵當護運道可虞淮民百萬危在旦夕恭進開復黃河故道圖說懇乞聖明采擇以垂百年永利事據潁州兵備副使楊芳徐州兵備僉事陳文燧會呈䝉臣案驗行道移會分司率領各該府州縣掌印管河等官喚集知音父老人等并平水匠役親詣老黃河故道一帶自桃源三義鎮起至瓦子灘止九十里逐段探量地勢高下要見某處見在河形計長若干某處淤為平陸計長若干總計若干里如果堪泄泗州水患於祖陵運道民生有裨應該挑復就將合用人夫錢糧若干估計的確應於何項措處務要從長計議畫圖貼說具由通詳以憑覆核議題中間若有窒礙難行此外有何良䇿可以疏泄淮水永護祖陵保固運道救民昏墊亦要明白聲說毋得含糊兩可致貽後艱未便䝉此又該各道并奉總督漕運戶部右侍郎舒應龍劄付同前事等因奉此隨該司道㑹同督行淮安府并山陽等縣掌印管河各官親詣老黃河故道查勘去後續蒙本科批據淮安府經歷司呈勘議老黃河難開止於三義鎮下開溝建壩引入線河達海以泄黃流祖陵宜護當於高堰減壩放入草子湖以泄堰水緣由䝉批據議亦悉第老黃河應否可開當有一定之說昨會閲止有毛家溝至漁溝二十餘里間有河形從此以下六十餘里盡平陸也至謂河不可開於三義鎮下建壩引水以達鐡線溝至安東入海似與原題馳背且壩內所減幾何孰若見今草灣通流也事關題覆該道即㑹分司酌議另詳俱候總漕部院㑹題行繳䝉此又經會同行據淮安府呈據山陽縣知縣張光緒清河縣知縣鄒守約桃源縣知縣華存禮呈稱查勘得老黃河故道在桃源縣三義鎮入口經毛家溝清河縣界由漁溝至大河口見行黃河止計長一萬二千四百六十七丈其中間有河形寬窄深淺丈尺不等議者欲自老黃河口經漁溝改由葉家衝至周伏三莊瓦子灘入顔家河出赤宴廟入大黃河下海上護祖陵下衛民生誠為得策但查見行黃河此時水尚未發水面量闊二百四五十丈深二三丈若開故道深闊必宜凖此一半計長八十餘里工程浩大費用不資萬一全河俱入故道自三義鎮至淮河口三十五里未免淤塞阻誤運道欲自淮城南角樓轉出東壩外河下行四十五里入赤宴廟遡流而上出老河口又百餘里較之見行河路止三十五里者程途太逺恐違過淮過洪之限且彼處曠野去府縣遼逺漕糧并進貢船隻俱未稱便職等復行拘集父老詳細計議講求疏泄淮水以免泗州淹沒之策有謂三義鎮壩下舊有線河一道近因河岸淤平水不能入如開挑引水河一道築壩分水由線河至毛景方莊按老黃河地界至漁溝鐵線溝達澗橋東北順流而下入璉湖而注之海者有謂髙家堰南周家橋原有泄水支河一道下接草子湖尚有二十五里未曾挑完可接挑由白馬湖達寶應漕河經高郵邵伯分流瓜儀出通江閘而注之江者俱為用力簡易勞費無多但恐分泄勢微僅可少疏淮口一分之水未能大有所濟且恐伏秋暴漲或全河決入線河致阻運道或高堰橫被衝決為患高寶亦未可知又覆勘得清河東北數里名為訾家營西北正迎淮口如於此處開一支河由盧思方莊從夏虎門首經羅家河周喬禮等莊入草灣河出赤宴廟復歸大河下雲梯關入海量長八千六十三丈五尺比之開老黃河以入顔家河者道里僅止一半工費亦可半省係在淮黃已合運艘出口之下可免全奪正河阻塞運道之虞或可以為分泄水患一路等因到府該本府知府張允濟㑹行管河同知姜桂芳查得古有大清口小清口大清口在清河縣後即今之老黃河也小清口在清河縣前即今淮水所出之清口也淮出清口東數里大河口與黃㑹黃河入三義鎮以下老河口亦出大河口與淮㑹同流至雲梯關九十里入海此𢎞治正德以前運道漕船到淮俱由伍壩車盤以達外可泝流至大河口由清河縣後經漁溝等處出三義老河口而北達桃宿邳徐以上淮不入裏河黃不至清口自塞三義口而黃流橫絶清口矣自開天妃壩而外河引入內灌矣黃淮轉折直射清浦淮南之患始殷淮口之沙日積泗北之水日聚故議者每每欲開復老黃河意蓋有見於此耳近年以來泗水之瀦愈厚而王公隄之勢愈危通濟閘外常淤而天妃壩亦決故首慮祖陵次慮運道次慮民生而復開老黃河之說若不容已者今本府與同知姜桂芳知縣張光緒鄒守約華存禮公同勘得欲開老黃河應自三義鎮臨河迎流入口下至顔家河張仁家北首地勢直順出口自沈相莊謝家莊毛家莊至葉家衝共長七千八百四十丈略有河形自葉家衝至瓦子灘劉家河共長三千七百五十丈自劉家河至出口處共長三千六百三十丈中有七千三百七十丈盡係蘆葦為力頗難總計挑河共長一萬五千二百一十丈計八十四里五分內以地形稍卑間露河形沙土可挖者為易工計七千八百四十丈該四十三里五分五釐共計土五百八十四萬三千四百方每方給銀八分餘有地形漸高雜生蘆葦或有水窪者為難工計七千三百七十丈該四十里九分四釐共計土四百三十八萬九千方每方給銀一錢通共該銀九十萬六千三百七十二兩應用錢糧夫役尚未敢擬誠開此河接入赤宴廟大河下海使淮不受敵順勢東注無復退縮洄洑之狀泗北積水自消祖陵可無他虞黃流既與通濟閘隔逺清江浦運道自下受衝而王公隄岸可保是老黃河有可開之利矣但河流既分萬一全奪正河自三義鎮至清河三十餘里水少而淺漕艘膠阻國家大計可慮也河性靡常遷徙不一儻開後淤墊或别有改移致虛勞費可慮也連歲災傷民窮財盡一旦動大衆營大費時詘舉贏可慮也是開老黃河亦非全利而無害者矣及思别求疏泄淮水之䇿行據三縣㑹查有欲引黃水入線河順行至五港灌口入海者計其築壩開溝泄之小不足以消暴水之盛漲泄之大亦不免有全奪正河之虞有欲開高家堰周家橋以赴高寶諸湖泄淮水入江者計其分注南流開之狹不足以疏泗水之瀰漫開之濶亦不免為高寶月河之害此外有緑楊溝武家墩開渠建閘分泄之說總之俱宜穿高堰而南一則逼臨大澗舊口一則直迎淮口回溜往年曾有衝決泛溢之患築塞堵救工力甚難此其利與周家橋相同而其害則倍之矣於是反覆勘度惟有清河縣東訾家營支河順入草灣一路似為可分黃流之漲以縱淮水之出既無運道之慮亦紓祖陵之憂但查估工費量長八千六十三丈該四十四里七分計土論方共土六百二十二萬一千九百四十方每方通融算銀九分共該銀五十五萬九千九百七十四兩六錢工若可必永利費亦頗為不資適今年荒時詘應否併候豐收舉事等因據此該職等會同勘得救民者先除其害治水者必因其性性之所趨不能遏而使止性之所背不能挽而使通自昔治水必稱神禹而行所無事乃其大智賈讓謂黃河尺寸之地不可與爭而歐陽修謂故道已棄難以復回皆確論也然禹之治水主於除害害茍可除江可注也海可注也惟其所便尚勤三過歷八年而成功今以國家定鼎燕都歲漕東南粳粟四百萬石實京師必資黃淮二水濟之淮不敵黃墊必內壅藉黃濟漕則漕以黃病乃築遙隄以防河決築高堰以防淮決為善後深計而海口難濬河身日高伏秋暴漲非上灌古洪則下衝淮城亦勢所必至者欲資二水以濟運而又欲免二水之衝墊恐神禹復生未必有完策也今談老黃河故道者其利四故道一復黃縮淮伸分流入海不憂漲漫三城鞏固淮民奠安利之一也黃不遏淮清口順達洪澤諸湖滔滔東注高堰之水朝滿夕除祖陵山麓涓瀝不得相干利之二也清口而下單注淮水王公隄不受衝齧清江浦不必遷移利之三也通濟閘口黃不浸灌高寶湖隄足恃而三官廟運道歲省撈濬淺澀利之四也昔人謂茍利社稷無愛髮膚而利至於此安得不為修復之議然而談老黃河之害者亦有四故道淤塞七十餘年且八十里逺河性遄速不能必回欲攙全河挑挖深闊須與正河等費當百萬金動衆曠時恐生他故害之一也黃河口二十里至毛家溝平陸高亢二十里至漁溝僅有河形一望民田二麥已秀清河被淹淮水種植最少熟地可耕僅僅有此復盡棄之害之二也漁溝浪石地勢低窪蘆根膠結難以刪削隄岸不高水且散溢水泛沙停未免淤墊而清桃田地卒為汚萊沼支邑以救郡城害之三也清河十室之邑面瀦淮水背繞黃河巨浪乘風捲而去之勢若拉朽害之四也夫以四利較四害則利害相當尤可以權輕重為之而通淮藉黃專為運道先年崔鎮一決運艘艱阻見今欲議於壩下開溝分泄尤多縮手而不敢任而必復老黃河藉令正河被奪自三義鎮至清河口延亘三十餘里水利淺涸浮沙難挑歲漕駕八千艘急於星火而水道不通誰則任之如由淮安阜城河繞出東壩順流四十五里入赤晏又百餘里逆上出桃源即順風必數日始達儻羈逆揚過淮過洪必踰期限回空遭遇伏秋又不免古洪淤滯矣永濟新河去淮安五里清浦十里皆為地方遼寂糧艘貢艦恐有他虞今離淮浦六十里而榛莽閒曠之濱安能保其萬全且東隄如遇伏秋回空必用車盤單隄難守易致潰灌淮城剝膚之勢其視今日又當何如哉司道竊謂言官觸目激衷發憤言事為國計民生深長之慮必欲貽萬祀不朽之利而職等竊祿淮徐職守所關儻故道可復時勢可為即請百萬金歷數十年殫力濬治亦可效犬馬報主一念而郡邑多官勘議若此恐費用無處事功難成成且慮有運道之阻則安敢靡國家之財而置之無益之地也然以淮城較運道則運道重以運道較祖陵則祖陵尤重彼老黃河失已七十年遙隄高堰築且八九載淮安三城猶然無恙而包王公之隄岸護清浦之運河惠濟祠范家口西橋禮壩修築且竣隨其要害再加護持未必遽然沉竈産蛙凛凛乎不可一朝居者隨經行據泗州查報祖陵山麓所被水患淮河自泗州城下北岸起至下馬牌止共計長一千五百四十七丈下馬牌起過外橋至寶城門共長一百一十五丈寶城門起至寢殿午門長四十一丈五尺寢殿北牆至御冢長二十六丈今淮水被阻河沙逆流倒灌浸及寶城以東隄岸而寢殿午門之前舊有金水小河東越寶城與沙湖相連如水發灌入或有淹及御路儀衛底座三四寸深者若御冢周圍地形頗高向無水至蓋祖陵背枕山岡龍騰鳳躍淮黃二水並㑹天心真天造形勝為聖子神孫億萬年鍾祥孕秀之地雖淮流之壅閉停蓄未有遽及御冢之勢然以寶城寢殿嚴重邃密之區即水發游波尺寸浸蕩亦於臣子保護之誼所宜亟圖而不敢玩視之者今歲河南諸決盡塞全黃直衝清口未易消涸未然之防不可不講細詢疏泄泗水護陵長䇿諸如三義壩下開渠由線河達澗橋璉湖灌口而注之海自高堰周家橋緑楊溝武家墩南北分入草子湖永濟河由高寶出瓜儀閘河而注之江又有謂從龜山下鑿澗河經天長六合二百四十里可直㵼入江者乃各官見謂壩下渠狹分泄無多如大為開闢又全奪可憂堰水一減勢不能支淮力不厚清口反滯而龜山之水南泄於江入懷返跳堪輿所忌安敢輕議於祖陵之前支東失西終無全利惟議自清口對岸大河口以西清河縣以東另開支河一道長四十四里七分零計八千六十三丈五尺口闊四十丈至八十丈底深二三丈不等經黑墩湖掠羅家口仍歸顔家河入海其道里半於老黃河所省工費數亦如之約計五十餘萬金可以底績即開通之後稍有淤墊亦可隨時濬瀹非若干係運道重大迫切難以措手此河既通即清口順利堰水不停子隄可以無築而陵麓益見亢爽鬱蔥佳氣萬年無窮且上流既殺王公隄清江浦與淮安三城並免衝齧而運道民生胥足恃賴尺短寸長雖非完䇿較之老黃河則事半功倍亦所謂彼善於此者也既經各官勘報前來相應呈請合無請乞再加酌議如果足護祖陵有裨運道早為㑹請施行等因具呈到臣并准中河郎中沈修南河郎中羅用敬手本俱同前事據此案照先准工部都水清吏司手本該禮科給事中王士性題前事大率謂淮泗水患日甚黃强淮縮退溢泗州祖陵運道可虞民生危急乞要勘復老黃河故道等因奉聖㫖著工部便行與漕運衙門及勘河科官從長計議來說欽此欽遵備行到臣隨經會行各該司道及府縣掌印管河等官公同前詣黃河故道經行一帶地方先行查勘丈量繪圖貼說回報臣復同督撫諸臣躬自桃源三義鎮老黃河口循行至漁溝浪石瓦子灘顔家河復自赤晏廟從草灣新河而上越大河口至清河縣逐一周覽相度探勘丈估俱與各官所報相同又經催行司道廣集輿論畢舉羣䇿從長計處去後今據前因該臣㑹同總督漕運提督軍務巡撫鳳陽等處地方戶部右侍郎兼都察院右僉都御史舒應龍議照謀國而圖就利避害者當先其所重決䇿而思捍災禦患者當慮其所終我國家肇基淮甸鍾祥二陵淮水發源桐柏自西北以指東南至鳳泗復繞東北與黃河㑹而入海二陵三面臨流淮水環繞如帶所以綿國祚億萬年無疆之慶者端在於兹顧不為至重至重者與其次則定鼎燕冀轉漕東南歲輸四百萬石於京庾自淮至徐五百餘里必資黃河以為利涉之途運道所經國脉係焉稱並重矣其次則畿輔根本之地南北咽喉之區淮泗赤子較之四方安危要害迥不相侔誠重地也自嘉靖中年黃河以全流經徐吕二洪由邳宿桃清橫絶淮口而下暴水時至則積沙內壅淮弱黃强不得以縱其東注之性勢必泛濫於盱眙泗州之墟洪澤諸湖汪洋數百餘里室廬田畝盡屬汙池民生困瘁已非朝夕鳳陽皇陵相去淮口尚二百餘里勢不相及惟祖陵寶城係在泗州城北十里雖御冢地據岡巒游波似無可及之勢而寶城舊有金水小河以消積水者東與湖連時被灌入溢於廷階以故諸臣展謁之時偶值水發不能不為悚然動念者往嘉隆之際運道之在徐沛邳宿間稱多故矣自有遙縷二隄以束河歸漕復築高堰石隄以遏淮南注至今七八年間淮徐以上河流漸深未聞旁決淮安以南高寶二湖不至衝溢此亦運道小康之日也獨自天妃壩以至清江浦係當黃淮㑹合全流惟上游之隄防既固則下注之勢力倍增決齧衝隕勢有不免況清浦運渠相去外河逺者不及數里近者僅餘十丈伏秋危險之狀幾若纍卵此祖陵之受侵運道之可慮民生之昏墊三患昭然在人耳目凡生於其鄉吏於其土所宜日夕焦思而亟為之謀者故欲疏淮水之盛漲莫不欲分黃流以東注欲分黃流以東注莫不以復老黃河為良䇿所謂善為川者決之使導是矣檢之往牘萬厯三年曾具題於巡按御史舒鰲萬厯五年曾再題於巡漕御史陳世寶然皆旋議旋罷竟未能有建必然之畫者豈果任事之難其人第為國家惜巨費為徒衆惜煩苦而遽前却耶夫事無全利亦無全害如使三患可祛一成無毁即利少害多尤宜以祖陵運道為急毅然為之今據開復之利有四如泗水可泄陵麓無虞清浦不遷通濟無阻開復之害有四河性靡常疏鑿之役綿亘百里功不可必勞費為虛災地民田近甫耕穫少救疲癃旋即捐棄漁溝卑窪河流既東沙土難隄淹沒無際清河腹背受水稍一泛溢蕞爾縣治不盡為沼不已也似此害與利均已非萬全之算矣至於運道之計本欲為清浦一路安全之謀而黃流一分自三義鎮至清口三十餘里即有梗澀之患如欲繞出東壩轉由赤晏以出三義較之見行河路更增一百餘里險阻之途夫運道之藉力黃流數逢其害少用尋丈可冀尋丈之安顧欲迂回百里隔逺城邑以出濁河草莽之區異時不測之害有非今日之可悉指數者臣等自奉勘河之役夙聞老黃河故道之議業已博訪多方籌畫講求緣以有妨運道退而中輟乃今肅將明命周覽荒度利之所在固不敢不較其所重而漫為同聲之和害之所在亦不敢不慮其所終而恐貽日後之艱惟是三患所關國計民生至重且巨仰承明㫖從長計議何敢藐然玩視付之末可誰何第逐一體查淮水之於陵麓有倒壞而無衝射寢殿廷階之水係金水小河內灌所致御冢之去水痕尚在百步之外蓋以乾坤靈淑之氣攸萃於兹而山陵背負層岡蜿蜒嶐起百神呵護萬水朝宗雖形若浮盂而其巍然鎮奠之勢當自有歷千古同悠久於天地者矣顧惟國家萬年拱護之誼臣子一念嚴恪之忱即寶城午門尺寸之水茍可以為祛除之䇿竭力盡瘁其何敢辭況以清浦運道之阽危泗民昏墊之可憫悉軫宸衷宵旰之慮臣等隨經督行司道郡邑多官重覆博訪於是議疏黃水者有三義壩下開渠以達澗橋璉湖入海之說議疏淮水者有穿高堰通草子湖永濟河以下高寶與鑿龜山通天長六合直達長江之說夫淮之不敵於黃也正以强弱為勝負如欲穿高堰以泄淮無論高寶運河之害將不可支淮退一尺則黃進一尺恐清口之淤日益甚耳此前門驅盜後門納賊之喻也若龜山開鑿由天長六合達之長江患實同此況為堪輿所忌而綿亘二三百里欲盡以人力疏鑿通之又難之難者也緣淮之受病在河而治病者當探其本則疏河為拔本之論無俟言矣璉河灌口諸處皆雲梯關海口之外别為入海之途以故談疏河者莫不曰河流可疏得由他道入海不與淮合自無交漲之虞今欲於三義壩下開渠經線河以達璉湖皆是說也不知河以泥沙善淤自昔兩行必不能久璉河灌口之去河崖迂曲周回二百餘里勢難直達海口測其深闊不及雲梯十分之一朝泄而夕淤可逆覩者惟分之於淮水既合之後合之於下流近海之口則以淮水之清滌河沙之濁初分而可必不至驟淤既合而自能保其可久所據各該司道續有開訾家營支河以接草灣經赤晏合流下海之說蓋庶幾近之者矣淮之與黃雖勢不相敵然彼此泛溢亦先後不齊今訾家營正與淮口相迎當黃之漲而半分東注則侵淮之分數自減當淮之漲而河適消落則淮口之沙可衝或謂淮口以清濁交㑹既歲有停沙則支河之黃淮並流亦宜有淤墊不知河水之遇淮流兩相迎則沙自停聚兩合流則沙可通行固自然之勢至較著者且天下之事凡有開創於前者貴能繼續於後如兩河隄岸之築閘渠汶泗之流莫不有歲幫歲挑之制臣等周視草灣新渠深闊將半於舊河通順直達於海口當萬厯四年初開之時何嘗不以淺澀為患哉惟其下出赤晏與大河相㑹入海勢足容受不如灌口諸港淺狹迂繞之甚以故上有所納者下有所泄日衝月刷自臻深廣所據新議淮口支河下有草灣一段通利如此即上段四十餘里新開之工如能比照汶河歲挑之例稍有積沙間歲一挑自能衝刷緣在淮流已合之下非若獨分黃流之沉濁易淤者可同日論也萬一河勢東注全流盡奪而運艘之出通濟閘口亂淮入河尚在支河未分之上本無運道中斷之虞似於三患可望救補即開河所經山陽清河安東三縣之地或有旁溢之害若與漁溝相同第三縣河北舊無隄岸即無開河每歲水發亦所不免又所急在泗州陵園則三縣舊災之地自不能與之較輕重矣俟河成之後即以挑河之土修築北隄亦可以資屏障未必如泗郡數百餘里之盡為湖泊也但內經黑墩湖羅家河恐有散漫之虞亦未敢為必然之畫儻以祖陵山麓之水未及𤣥宫運道之危在清浦王公隄者先年已有石隄目前加築掃隄尚可保無決裂淮黃交匯之地昏墊之害祛之於西者不免移之於東則今議支河重役巨費非有全利若未可以輕舉而試為之如必為淮水疏泄之謀求人事之可盡者固不能舍此有他圖耳臣等竊又聞之舉大事者必順天時動大衆者必資人和支河雖若可開而延長四十四里論土計方六百餘萬計必鳩夫數萬始可匝歲報完適今連歲阻饑米價騰踊足民先於足食雖工費五十餘萬國家念切祖陵捐之內帑不吝出納而珠米桂薪工食所給不滿一飽何以責其盡力胼胝之餘各官議欲稍俟豐稔之歲誠亦悅以使民之道兹者恭逢皇上軫念河漕大計允采輿議復設總理河臣而用人求舊從善轉圜特起都御史潘季馴之歷試有功精熟河防者而專任之寰海人士莫不翕然頌服聖明之豁達大度知人善任平成之效可立覩已前項疏泄泗水議開支河之謀臣等遵奉德意博采羣議折衷鄙見井蛙之識僅僅如此合無請乞并行新任總理河道都御史潘季馴覆勘詳確以為行止當必能晰利害之大致貽久逺之宏謨非臣等疏淺庸昧之所能及也伏乞皇上敕下該部再加議擬覆請施行謹題請㫖奉聖㫖工部知道欽此欽遵抄出到部該工部看得國家決大議興大役必權利害之輕重而要其成度時勢之難易而定其畫斯工不虛舉事克有濟方今淮水波浸於祖陵黃河流迫於淮安故禮科給事中王士性議復黃河故道者其為祖陵淮民慮也甚逺然民疲不可勝役時詘不可舉盈故查勘河防科臣常居敬總督漕運撫臣舒應龍議故道難復者其為運道財力計也甚詳臣等連日反覆科撫諸臣之疏熟籌祖陵淮民運道之利則黃河故道之議勘者固已憂其不可復而當此財匱力乏之際是誠不能以遽復者似宜已之以省覆勘存之以俟續議至議開訾家營支河以接草灣較諸故道之復固事半而功倍要其入海之路又散漫而難收事既未見全利議亦未敢遽決今新任總理河臣潘季馴前後治河將幾十稔閲歷既久聞見必真所據支河之議宜令覆行勘閲既經科撫諸臣會勘前來相應如議題請恭候命下本部備咨總理河道右都御史潘季馴作速到任將科撫諸臣所議於訾家營開支河以接草灣一事覆行勘閲果為利多害少在所當行或為徒費無益在所當止儻衆議未妥别有長䇿可以護祖陵保淮安固運道者但求事可功成不拘人己同異即令從實具奏以便覆請定奪目今河水漸次將發本部一面仍咨總督漕運衙門遵奉先後欽依事理查照纍年修守成規多方措處務保無虞庶足紓九重南顧之慮固萬年轉輸之防矣謹題請㫖奉聖㫖是這黃河故道既勘議明白難以開復罷訾家營應否添開支河還著河道衙門從長計議具奏欽奉敕諭查理漕河疏都給事中常居敬題為欽奉敕諭查理漕河以重國計事據濟寧兵備兼管河工山東按察使曹子朝曹濮兵備帶管東兖道僉事劉𢎞道武德兵備帶管臨清道僉事李三才㑹呈䝉臣并巡撫山東兼管河道右副都御史李戴巡按山東監察御史吳龍徵㑹牌前事備行臣等躬歷山東漕河一帶逐一查勘要見泉源有無湮塞作何疏濬河道有無淤淺作何挑通坎河口先年石灘有無滲漏作何捍禦南旺等湖多被侵占不堪瀦蓄作何查復某處隄壩應修某處閘座應建一應長䇿勘議明悉具由呈報以憑㑹閲施行等因蒙此該各道移㑹北河郎中吳之龍南旺管泉主事蕭雍督同管河同知陳昌言等查勘得山東河道全賴泉源汶河自南旺南北分流以濟運道惟上源衝帶浮沙淤淺殊甚業已挑濬其餘閘座之圮壞隄岸之傾頽者已經呈詳本科兩院次第興舉外惟坎河口滲水不便防禦火頭灣無閘不便節宣與夫修復水匱工程浩繁并定期遏流請給關防增官添夫等項事體重大合無俯賜題請以便遵行等因具由到臣卷查先該工部題為欽奉聖諭事國家運道悉藉㑹通河而轉輸咽喉則黃河其尤要也故旱則㑹通患涸或至膠舟漲則黃河患淤或多旁決題奉欽依行臣會同撫按諸臣講求利害之原博采治平之術未盡事理聽臣陸續㑹題等因奉聖㫖是欽此又准工部都水司手本據北河郎中吳之龍等呈該本部看得南旺分流全濟汶水而坎河口則汶水入海之路宜有經久之圖濬泉官宜有責成之道並未盡事宜該巡撫官俟查勘科臣至日㑹集管河司道從長計議作速另行題請等因奉聖㫖這河道事宜依擬便行與各該巡撫等官從長計議著實修舉欽此該臣㑹同巡撫右副都御史李戴巡按御史吳龍徵看得新運已臨天時亢旱泉脉細微躬詣各縣督率官夫逐一料理外復據前因議照得國計莫重於漕河漕河必資乎水利我成祖文皇帝定鼎燕薊挽漕東南自徐邳以北臨清以南千有餘里全賴汶泗沂洸諸泉之水以濟運道雖祖元人㑹通遺意然壩戴村遏汶流分濟南北則尚書宋禮用老人白英之議也其間設官立法建閘築壩至精至備二百年來運道其永賴矣第泉源雜於沙礫則湮塞甚易湖地侵於豪右則清復為難至於事權間多牽制法制廢於因循兼之天時久旱地脈漸微運艘經行不無遲滯乘時經理委不容緩兹者上厪聖懷特申聖㫖臣等周行河上逐一查勘博采羣䇿列為八事雖率循不外于舊章而經畫似關乎要務伏乞敕下該部再加酌議速賜施行庶于漕河少有裨益矣謹題請㫖計開一濬泉源以資灌注查得㑹通河南北千里盡賴十八州縣百八十餘泉之流分為五派至于新泰萊蕪平隂汶上䝉隂寧陽等九州縣入南旺者為分水派泗水曲阜等四縣入濟寧者為天井派其功最大其所需尤甚切也夫藉泉以資運則涓滴當惜必使源流充溢庶於漕渠有濟若養身者氣血周流無滯始無壅閼之患也乃平昔之疏濬既踈天時之亢旱又久是以泉政多弛通流無幾近據管濟寧道按察使曹子朝分守濟南道參政吕坤新濬出泰安州謝過城等六泉新泰縣劉官莊等五泉萊蕪縣韓家莊等五泉東平州源頭泉一處曲阜縣新跑泉一處發源頗盛導入汶河堪以接濟則自此之外安知無湮沒于沙礫而散漫于草莽者乎但濬泉雖易治汶實難蓋河廣沙深屈曲之流不足以潤久渴之吻臣等親見龍灣等泉源源而來至汶則一吸而盡猶無泉也又必督令撈淺等夫擇其積沙淤漫者濬為河泓俾深五尺闊一丈則水得所歸而趨壑亦易矣然各泉坐落各府州縣近者四五十里逺者三四百里管泉分司豈能遍歷近奉聖㫖各分守道兼管已為得䇿矣臣以為仍當責成各州縣掌印官督率夫老不時疏濬每年終分守道會同管泉分司將各官新泉搜出若干舊泉廢棄若干類報總河衙門分别奬戒庶人心有所警惕而泉流足濟運道矣伏乞聖裁一復湖地以預瀦蓄查得山東泉源有時微細故設諸湖積水以濟飛挽盜決有禁占種有禁誠重之也乃今則不然南旺安山蜀山馬場等湖始因歲旱氷涸地屬閒曠當事者召人佃種徵租取息以補魚騰兩縣之賦於是諸河之地平為禾黍之場甚至奸民壅水自利私塞斗門復倡為湖低河高之說申禁非不嚴而占吝若故矣除安山湖批查未報外今勘得南旺湖周圍九十三里計地二千七百頃原有斗門一十四座止存關家大閘常明口二處其餘邢通口孫强口等十二處俱已湮塞合行修復本湖東邊高阜地量留護岸一里共計一百六十二頃南北留護岸地半里共計一百一十六頃一十畝令原主佃種納課其餘專備蓄水仍築子隄一道以為封界湖內北高南低應于中亘築長隄一道自吳家巷天字號起至黃家寺止長一十四里根闊一丈五尺頂闊八尺高八尺界為二區寺前鋪張住口建斗門一座以便上下接濟馬踏湖周圍三十四里零二百八十步計地四百一十餘頃俱應退出還官其東北空缺處長十里零二百四十步應築土隄一道約束湖水不使泄漏西岸原有王岩口滚水石壩年久湮沒合行修復蜀山湖周圍六十五里零一百二十步計地一千八百九十餘頃除宋尚書香火地六頃并高亢地八頃五十三畝照舊令民佃種納租外其餘地一千八百七十五頃四十六畝二分俱築隄蓄水東岸季泰口閘以下十五里原有馮家滚水大壩相應修復馬場湖周圍四十里零三分內高阜地九十三頃二畝先年召種納課抵補魚滕縣糧今查前項補足責令退業還官并低窪地六百四十頃四十二畝九分俱築隄蓄水內有安居斗門三座合行修復其各湖占種麥田法應追奪但念年荒民貧且成業已久收成將近候麥熟之日令其芟刈照地退還以上各湖應修復斗門閘壩隄岸工料人夫等項細數冊報外通共該銀四千七百一十七兩七錢於兖州府庫河道銀內動支修完于湖口竪立大石明注界址斗門以杜侵占如是庶法紀明而漕河永有賴矣伏乞聖裁一築坎河以防滲漏查得汶合諸泉之水西流抵南旺分注南北以成漕而濟運故汶蓄則漕盈汶泄則漕涸夏秋之間水固有餘冬春之後不可使有涓滴他適明矣乃戴村以上有坎河口西趨鹽河為入海故道沛然就下勢若建瓴先年總河侍郎萬恭堆集石灘蓋謂溢則縱之平則留之意甚善也但時久灘廢非不歲有修築而沙隄一線亂石數堆其走泄甚易矣萬一泉河盡趨則運道之涸可立而待豈得為完計哉臣等督同管河同知陳昌言東平州判官張汝榮等㑹估得本口應修滚水石壩一座計長六十丈面闊一丈底闊一丈五尺深入土四尺出土三尺并鴈翅細石及樁木鐵灰工食等項除細數冊報外通共計銀八千一百六十七兩四錢一面辦料興工水溢則由頂以上任其宣泄水落則由壩以內盡資實用且以免鹽徒盜決之弊也汶其有全利乎或者以地多沙磧恐築之不堅不知石灘之外原有老土石壩不髙入土已深其勢自固且汶河隨漲隨消終非黃河比也又何衝決之患耶如是則一勞永逸而歲歲補石之費亦可免矣伏乞聖裁一建閘座以便節宣夫漕河之水名曰無源蓋謂其出有限而其流無窮所以撙節積蓄俾盈科而進全有賴于諸閘也故地有高下則閘有踈密要之勢相聨絡庶幾便于啓閉惟濟寧寺前鋪閘至天井閘則延長七十里東昌通濟橋閘至梁家鄉閘則延長五十里閘啓水泄積蓄為難司河者每當糧運盛行之時排木堵水名為活閘茍且一時終非久計甚至各幫運軍船一經過捧土築壩流入河中愈成灘淺運艘正行不便挑濬無惑乎舟行之艱也合于二處適中之所南則巨野縣火頭灣地方建閘一座名曰通濟北則博平縣梭隄集地方建閘一座名曰永通俱照各閘事規啓閉濟運除各匠役工食候工完扣算外每閘估計粗細石料并木樁鐵麻船隻等項各該銀三千九十五兩八錢九分五釐於東兖二府河道銀內動支每閘閘夫三十名闕役夫內撥用如是則關束有具節宣得宜水利有所停蓄而運艘不致淺閣矣伏乞聖裁一設閘官以肅漕規國家之設官也有似大而實冗者裁之為宜有似小而實切者增之為便查得運河一帶閘座每閘設官一員統領夫役蓋啓閉有人責成良便頃緣新河告成棗林上下水平閘面不行啓閉遂將棗林閘官裁而不設間付之南陽閘官兼理之邇來天時久旱河流細微本閘水淺啓閉為急尚可以南陽之官攝之乎夫一啓南陽一閉棗林互相闔闢勢如呼吸一不得人直㵼而盡矣近且無官付之一二閘夫之手在官船則莫敢誰何在民船則大為簸弄既以病商復以弊運以故漕舟至此殊費牽挽而往來者亦稱不便也不知閘官雖卑職掌猶在且廩俸無多國家亦何惜此五斗而令河道要害之地為無人之境哉合于棗林并新添二閘各該官一員俾司閘務庶職守得人而漕規不廢矣伏乞聖裁一給關防以重事權國家之事莫重於河漕故于泉閘特設部臣經理之所以重委任而專責成也各管河郎中俱奉有敕印是以文移稱便惟南旺管泉主事其設已久關防未給因循至今夫管泉管閘先年曾以二人理之今并責之一官其任亦重矣督理乎十六州縣之泉而相隔數百里之逺止以空白文移臨之即旁午載道鮮不以辨髦視河臣欲其昭法守而一衆志也難矣且糧船過閘例應十日一報漕撫衙門相隔十里無關防則驛遞不行事多掣肘殊非一端夫以一閘官之微尚有條記關防何獨於部臣而反靳之也至於漕河黃河二同知職守既專責任亦重凡工程之勤惰錢糧之出入咸賴稽察事緒孔棘弊竇易生使少失于防間未免稽違河務近見邸報楊村管河通判已奉明㫖給與關防則兖州府管河同知事體相同合無將管河主事并兩河同知均賜鑄給庶文移便而事權重矣伏乞聖裁一嚴築壩以便挑濬照得汶水入湖接濟運道每歲寒沍之時遂將河口築壩遏流分泄蜀山馬踏等湖候來春冰泮之日開壩受水是冬則以河之水匯于湖春則以湖之水濟于河故南旺臨清一帶因得乘時挑濬不致淤淺法至善也除隔歲大挑已奉有欽定期限外其餘每年當天氣漸寒正宜築壩絶流也而往來船隻力以緩築為請多方阻撓甚至十一月中尚不得築者不知天寒冰合乃驅荷鍤之夫裸體跣足鑿冰施工其將能乎及寒冰初解正宜固封蓄水也則又以速啓為請百計催促至有正月初旬放水行舟者不知隔歲之水所蓄無幾三春無雨則運艘方至又將何以濟之乎法制未明事體掣肘管河官徒茹苦而不敢言也合無請賜明㫖除大挑年分外每年定以十月十五日築壩絶流至次年二月初一日開壩行舟勢豪船隻不得橫擾該管官員不許阿徇違者聽督撫衙門參究大書刋石於南旺板閘二處以便觀覽如是則明㫖森嚴人心惕息不但便於挑河亦且足以蓄水一舉而兩得之矣伏乞聖裁一復夫役以備修防山東河道淺深不一而汶河衝發淤塞為多各項夫役俱不可缺查得兖州府屬如汶上巨野嘉祥濟寧魚臺南陽利建等處原額設撈淺淺鋪隄夫各數不等共計二千四百五十二名後因河流稍順遂裁減一千一百三十三名扣銀入官以備支用止存見役夫一千三百一十九名不知扣存有節省之名而雇募起無窮之弊一時河道淤淺調度徵發為難工之弛廢久矣今議于汶上縣量復撈淺夫七十四名淺鋪夫三十名巨野嘉祥二縣量復撈淺夫三十八名淺鋪夫五名濟寧衛量復撈淺夫一十一名濟寧州量復撈淺夫三十二名淺鋪夫十二名魚臺縣量復撈淺夫十名淺鋪夫二十名南陽利建量復隄夫八名東平州量復泉夫二十名東昌府通濟橋閘量添閘夫十名庶挑河濬泉不致乏人矣然猾民之包攬肆意安閒管工之代替任情隱射甚至逃故不報占吝私意種種情弊雖增猶弗增也合行管河同知陳昌言通判王心逐一汰選嚴加稽核庶工役得有實濟而河防不致稽違矣伏乞聖裁奉聖㫖工部知道欽此該工部看得查勘督理河工工科都給事中常居敬會同巡撫山東都御史李戴巡按山東監察御史吳龍徵條列八欵具題俱思深慮逺大於河防有裨相應開立前件議擬上請恭候命下本部備咨漕運衙門并山東巡撫督率管河司道及咨都察院轉行山東巡按御史行令府州縣各官一體欽遵施行奉聖㫖依擬行清復湖地疏都給事中常居敬題為清復湖地以濟運道事據濟寧兵備兼管河工山東按察使曹子朝分守東兖道參政郝維喬會呈䝉臣并撫按憲牌前事照得南旺以北僅有安山一湖所係甚重先因行查未報未經具題今㑹閲得滿湖成田禾黍彌望曾無涓滴之水殊失設湖之意當此亢旱何裨接濟牌行該道督同管河官親詣該湖逐一勘議要見某處卑窪堪以蓄水某處高亢僅可通溝承佃若干作速清理侵盜若干作何禁治查議明悉作速通詳以憑酌議等因蒙此隨該司道行據兖州府管河通判王心查得安山一湖周圍共一百里其間東北自通湖閘起至西北焦天祿莊止計長十三里自焦天祿莊起至西南王禹莊止計長七里零自王禹莊起至東南青孤堆止計長九里零自青孤堆起至通湖閘止計長七里零周圍共計三十八里此係水匱堪以積水者也但湖形如盆碟高下不甚相懸水積于中原無隄岸東南風急則流入西北燥地西北風急則流入東南燥地未及濟運消耗過半且自許民佃種以來百里湖地盡成麥田先年總理河道傅都御史履畝分析除徵租銀二千六百五十三兩歲抵魚滕二縣秋糧外其低窪處所封為水匱法非不善但統隴無界禁例不嚴民情無厭漸至今日殆無曠土矣為今之計應將水匱三十八里築一高隄隄以外照舊佃種徵銀隄以內挑深蓄水管河通判等官不時巡歷庶隄界既明人無盜種之弊矣至于安山閘邊原無通濟積水二閘不便出水訪得萬厯九年有金把總曾于八里灣掘溝放水人甚稱便至今形迹猶存應于此處建閘一座又西北地名似蛇溝其地更低水勢散漫應于此處亦建閘一座庶于舊閘入者于新閘出蓄泄得宜漕河有賴矣等因到道先該北河郎中吳之龍議得漕河之利有二泉與湖而已每春末夏初正糧運盛行之際泉源往往微耗惟藉資湖水可濟不虞故自濟寧至東平築設南旺安山等湖潦則引水入湖以預瀦蓄旱則決湖入運以通漕艘慮至深也物盛致蠱日漸廢湮嘉靖二十年都御史王以旗奉命清復疆界頓還舊制數十年來大為運道利自隆慶四年都御史翁大立開召耕種姦民始得藉口而濫觴極矣萬厯三年都御史傅希摯清丈諸湖安山湖高而田者計地七百七十一頃九十八畝卑而宜匱者四百一十六頃二十六畝三分具疏題請斯亦通變之微權公私兩利之道矣奈何管河各官利於混淆而不利於清别竟未及立尺寸之疆界是以豪强者大肆兼并之謀姦頑者曲為欺隱之計狼吞蠶食不至於盡湖而有之其心未饜也今雖湖底窪處已不遺寸土再數年不將占官地為世業乎為今之計相應查照前項頃畝于髙下交承之處築一束湖小隄底闊九尺頂濶四尺髙八尺隄以內永為水匱隄以外作為湖田如是則界限分明內外各别登隄一望具在目前小民既難于侵越官司亦易于稽查矣具呈巡撫山東李副都御史䝉批湖以濟運關係匪輕緣無界限故水得漫流而人易侵占束湖小隄委當急築如議速會管河道踏勘基址定出夫事宜報奪等因在卷今奉㑹牌前因該司道㑹行兖州府管河通判王心㑹同本府同知陳昌言督同東平州知州徐銘管河判官張汝榮復勘得安山湖水匱周圍長三十八里內除東北一帶自通湖閘至焦天祿莊止長十四里係運河隄岸不必修築外其餘共長二十四里折四千三百二十丈共計用夫一千名每名計工五十日每名日給工食銀三分三釐共銀一千六百五十兩又八里灣似蛇溝創建出水小閘二座每座合用石塊樁木地平板龍骨木油灰糯米石灰鐵麻等項該銀三百六兩九錢二分二座共銀六百一十三兩八錢四分通共銀二千二百六十三兩八錢二分合于兖州府庫貯河道銀內動支雖無救于目前實漕河將來之永利也等因到道該管河道按察使曹子朝分守東兖道參政郝維喬北河郎中吳之龍㑹議得南旺至臨清綿亘四百餘里惟安山一湖上下賴以接濟誠宜急為修復但滄桑更變原隰異壤自非築隄要束禁治雖嚴罔利蓄瀦其修築工料屢經估勘似為妥當相應申請以便興工等因到臣先該臣等題為欽奉敕諭查理漕河以重國計事內復湖地以預瀦蓄一節該部覆稱安山一湖科臣見在行查俟勘明日一併修復等因奉聖㫖依議行欽此卷查巡按山東監察御史毛在題為巡歷事竣敬陳補偏救敝之略以備採擇事該工部覆奉聖㫖各地方湖泉接濟運河去處著各該巡撫司道等官及差去部屬官用心整理如有占種阻塞的即便拿問枷號重治應參奏的指名參奏欽此該臣等催行查議去後今據前因臣會同巡撫山東右副都御史李戴巡按山東御史吳龍徵議得設湖蓄水本漕政之良規清湖濟漕實治河之要務自南旺而下四百餘里始達衛河其間全賴安山一湖積水濟運所係之重何如也惟自召佃之弊政一行而豪民之侵占無已變沮洳為膏腴視官湖為己業日侵月削久假不歸寸土無遺殊可痛恨即今久旱河淺百計疏濬如抱漏巵沃焦釡倣徨無策皆緣水匱未復之故也及今則清湖蓄水真若蓄艾豈非第一義哉侵盜姦民本應盡法重究槩奪還官亦不為過但私相授受其來已久展轉耕佃已非一人且四外高亢之地不便瀦蓄終成曠廢據勘將少窪之地三十八里周遭築隄封為水匱既可以免滲漏易竭之患又可以杜强梁無厭之謀似亦計之得也外八里灣似蛇溝二處便于放水委應建立閘座其築隄建閘之費初據各官議將盜種湖麥刈半入官以為工料之需但恐饑民乘機起釁且非大公之體仍聽本主收割前項經費相應動支河道銀兩應用清理之後大竪石碑明立文冊又必嚴盜決之禁定巡視之法如是則一勞永逸而國朝水匱之良規庶幾可復矣伏乞敕下該部再加酌議行總河大臣督令各官作速興工事完奏報則所以濟運通漕者豈曰小補之哉謹題請㫖奉聖㫖工部知道欽此該工部看得南旺至濟寧一帶河漕綿亘四百餘里全賴安山一湖蓄水濟運其關係誠重矣近緣侵種成田復以纍年亢旱遂致湖水蓄泄無所漕河安能有濟今查勘河防科臣常居敬會同山東撫按李戴吳龍徵看議安山湖周圍一百里除四外高阜之地不便瀦蓄照舊佃種外其低窪處三十八里合行築隄封為水匱深於漕運有裨其動支河銀建立閘座等項區畫周詳悉應如議題請恭候命下本部備咨總理河道并山東巡撫衙門及咨都察院轉行山東巡按御史行令司道府州縣管河各官仍劄行本部管河郎中查照原議動支河道銀兩作速興工務期完固仍大竪石碑分别界限差官不時巡察敢有勢豪姦頑人等侵占盜決者輕則徑自拿問重則參奏處治工完之日將役過人夫用過錢糧造冊奏繳清冊送部查考謹題請㫖奉聖㫖這湖地依擬築隄仍畫定界限永逺遵守如有侵占盜決等弊照前㫖著實參治其各處泉湖蓄水濟運的都著一體清查整理河防一覽卷十四
