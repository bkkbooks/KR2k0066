body:
  text: 河防一覽卷三眀潘季馴撰河防險要淮南一歳防髙堰髙堰為淮揚門户隄防不可不嚴修守不可不預内除石隄三千丈外両頭土隄毎嵗伏秋畫地分守隨汕隨葺似可無虞矣但幇䕶之法湏於冬春間樁内貼蓆二層緊綑草牛挨蓆宻䕶毋使㱔湏漏縫然後實土堅夯則是以樁蓆䕶草牛以草牛䕶土浪窩何從得來至於宻植橛桞茭葦以為外䕶湏於水落即種庻免淹浸是在當事者加之意耳一歳防湖隄諸湖隄岸見議加幇髙厚且多減水閘尋常之水似可無虞矣但或霪潦彌月山水併發則又不可不預為之計也查得沙壩并芒稻白塔二河俱可洩水當事者因慮私販塩徒潛通間道每毎築壩斷流殊不知欲禁舟航何湏築塞河心宻布樁柵仍委白塔廵檢嚴防越渡船隻𤓰儀諸閘一體開放閘口攔以木柵則湖水可洩而鹽政稅課亦無妨矣一嵗防清江浦外河清江浦内外河相隔僅得一線之隄最為喫𦂳况黄河自清河縣出口由西射東勢甚湍急然掃灣迎溜之處不過一百五十丈止是捲築鷄嘴六道每道相去二三十丈不等阻隔來流復於鷄嘴中間捲埽䕶岸即可支持然倉卒措辦未免張皇莫若於冬春之間捲築大埽幇䕶老隄埽外深下宻樁内用両笆両蓆以䕶埽亦如歳防髙堰之法自可無虞合用人夫查有近議行銀募夫專聴本隄興作免其别處差撥自可足用其餘樁草所費不多措辦自昜至於用石甃砌以為永乆之計則俟工力少裕為之可也鷄嘴即順水壩之俗名近日河由草灣清江浦外淤灘甚逺猶恐河性不常二三年間復歸正河修守之法當謹識之一議守徐家壩清河而下黄淮二瀆交流注海越五十里一大折於淮郡之西橋又三十餘里一大折於徐家壩其衝激怒號之勢無異西橋前此治者屢壩屢壊為與水争尺寸耳今議棄舊址只營月壩去水稍逺令無湍激外䕶樁埽用實壩基事省功倍良得䇿也每歳派撥官夫預備物料伏秋將届專責山陽令督管河主簿不時廵視少有圯壊輙先綜理年復如斯斯永頼也一議守八淺隄寳應縣之西十餘里有白馬湖其當湖心而東即所謂八淺隄也徃歳隄決湖水奔逸建瓴而下舟楫過者少遇西風輙沉溺不可救其決處濶八十餘丈深且二丈五六尺而水勢湍急莫可名状雖不惜費寕能與水角力哉屢築無功覆轍可鍳也乃議從湖心淺處先築西隄一道以捍其外仍於河之南北壩二道暫令運艘越湖而行隄壩成則八淺正決瀦水不流捧土而塞之矣是築西隄若乃所以塞東決也但東決雖塞西隄終不可棄必湏歳加修築仍宻種橛桞茭葦之類使其能當濤浪則東隄不守而自固矣此當於冬初預行寳應縣掌印管河官料理可也一寳應月河自黄浦至三官廟前長二十里水多旁潰入湖是以流緩沙停新閘一𢃄淺阻為梗今加築西上隄一道長三千六百三十五丈以束漕水可省挑濬之費湏責夫㸔守栽植茭桞加意培䕶歳修之工可勿緩也一嚴閘禁河口諸閘之設先臣平江伯陳瑄殊有深意蓋節宣有度則外河之水不得突入運河之水不得盈漕非惟清江板閘一帯隄岸易守而寳應諸湖亦緩此一派急流矣但啓閉之法非嚴不可如啓通濟閘則福清二閘必不可啓啓清江閘則福通二閘必不可啓啓福興閘則清通二閘必不可啓河水常平船行自易單日放進雙日放出蒲漕方放放後即閉時將入伏即於通濟閘外填築軟壩秋杪方啓悉照先年舊規與近日題准事例行之其於河道關係不小也一歳守淮城北岸遥隄查得清江浦起由桞浦灣至髙嶺止共隄一萬六千九十一丈近又加至戴百户營止共隄八千一百五十六丈向來置之若棄萬歴十三年范家口一決淮城幾為魚鱉工費不貲復還故物今已増設大使一員夫五百名專守一代隄岸乃淮安城北外捍殊為喫𦂳如有油刷隨宜修補倘遇大有損動即於隄内有産之家量起夫役相幇修築伏秋之時選撥省祭隂醫等官盡地分守仍須預備樁草䋲葦之類各安置要害處所以待不時之需每歳冬春之交即預行申飭山陽縣掌印官可也目今河由草灣正河俱淤殊不足處然河性不常一旦忽歸正道修守之法仍須志之一歳守通濟閘外大壩舊通濟閘逼近外河河形淺直水勢洶湧不便啓閉而朱家口一帶隄岸尤為難守今移閘於甘羅城旁改河於西南隅而於舊閘内半里許築攔水大壩一道置朱家口於度外似為得䇿矣但大壩最為喫𦂳萬一傾圯則新河與舊河之水併㵼入閘勢必不支毎歳四月初湏專委一的當義民官撥夫十餘名量備樁草守之毋忽毋忽議者又謂從大壩迤東両頭直接泰山築隄一道僅三里許則壩東與髙堰七里墩迤北両岸一帶隄岸俱不須守而隄内之田皆可耕矣冬涸之時夫力稍暇即宜圗之一防清口淤澁清口乃黄淮交㑹之所運道必經之處稍有淺阻便非利渉但欲其通利須令全淮之水盡由此出則力能敵黄不為沙墊偶遇黄水先發淮水尚㣲河沙逆上不免淺阻然黄退淮行深復如故不為害也徃歳髙堰潰決淮從東行黄亦隨之而東清口遂為平陸今髙堰築矣獨慮清河縣對岸王家口等處淮水過盛從此決出則清口之力㣲矣故於清河縣南岸築隄一千一百八十丈今又接築張福口隄四百四十餘丈以防其決蓋為此也工若甚緩而關係甚大已經題奉明㫖每歳專責清河縣掌印官責差的當員役㸔守如遇塌損即便修築更有一事尤宜稽察河南鳳泗等處商販船隻最利由此直逹毎為盗決須嚴防之一京口閘附江南丹徒丹陽一帯河道原無水源藉江為源潮長則開京口閘以放舟潮落則下板以蓄水若水涸舟膠則丹徒閘亦係通江支河放水可濟潮水既落車戽亦可須臨時斟酌申嚴啓閉守閘者勿弛禁也淮北一碭山舊縷隄原因傍隄取土以致隄根成河每上流劉霄等口漫溢則直灌隄河壅激衝撞縷隄坐此不支今棄此隄於不用而另幇近年所築月隄已為得䇿又慮縷隄決則月隄亦危且碭山居豐沛上游碭隄乃豐沛外戸外户失守則堂奥隨之故復彷黄河順水壩之意於單碭接界處築斜長大壩一道長千餘丈使上流漫溢之水循壩徑歸大河不得迫縷隄以危月隄試有成效宜加意此壩冬春撥夫幇培伏秋倍夫防守此保全碭豐沛一𢃄隄防關鍵也一豐縣邵家大壩乃斷絶秦溝舊路最為喫𦂳今已倍幇髙厚又接長數百丈毎歳冝摘調徐北隄夫赴此加修加守若日後夫役錢粮有餘再於華山斜築大壩直至樓子集將秦溝濁河二口俱斷則全勝之䇿也但壩頂髙大斜向東南勿令兠水乃可經乆姑識之以竢將來一磨臍溝減水壩徐州東岸南去十餘里有狼矢溝又東十五里許有磨臍溝每歳黄水暴漲則從狼矢溝直下至磨臍溝洩出赤龍潭經鰻蛤諸湖落馬湖出宿遷董陳二溝嘉靖年間全河俱從此出而両洪正河俱為之奪萬歴七年已於本溝築遥隄一道而地形甚卑水入囊底隨復衝決遂議築減水石壩一座佘郎中親徃視之不可而止今此議尚存馴躬率中河沈郎中徃視之地形較之河口卑數丈黄河暴漲之時必至逾隄漫流豈肯循軌入壩今議於長塔二山新築隄中建石壩一座長三十丈水漲則洩水退歸漕自無奪河之患矣但壩西與徐州居民甚不利此恐有盗決之患須特設一老人常川看守庶可乆耳一徐北鎮口等閘此泉河與黄河交㑹之處伏秋黄水大發時多灌入本口動至淤阻原任中河郎中陳瑛剏建古洪内華二閘近該工科都給事中常題建鎮口一閘如遇水發下板謹閉俟黄水消落即啓閘縱水外衝而漕河無淤墊之患啓一閉二悉如清江裏河事規與近日題奉明例行之其鎮口閘外東西両隄原係挑河所積客土未堅内水湧出未免剥損伏秋之前宻䕶樁笆隄固則閘無虞矣司閘者冝加慎焉一塔山牛角灣等縷隄鎮口古洪二閘以東多傍山麓以西一望平曠濁河經流更無隄防黄水出岸横截閘河腹心受病故於塔山支河接築縷隄九百四十二丈而牛角灣係茶城運河舊渠又築壩一道東接塔山西接長隄幾二里許以遏黄流傍入但壩地原係河身下多積沙創築卑薄連歳失守肘腋為患已於本壩之南自舊縷隄支將軍廟起東接塔山増築長隄七百餘丈頗得重門禦暴之意冬春之際多加幇䕶伏秋之時晝夜防守預辦樁草以備不虞夏鎮第一要害宜殚心力勿忽一徐州之房村牛市口犁林鋪李家井靈璧之雙溝曲頭集栲栳灣睢寕之馬家淺王家口白浪淺何字舖邳州之匙頭灣張林鋪沙坊等處皆係掃灣急溜先年屢經衝決最為要害今雙溝一帯已議棄縷守遥矣其餘毎歳冬春間務及時詳加勘議應䕶埽者忽䕶應築磯嘴壩者急築若水既發則難施工矣水發之後尤須倍嚴防守司道府官俱當不時廵閱矧濵河田地毎利於黄河出岸淤填肥美奸民徃徃盗決蓋勢既掃溜止須掘一蟻穴而數十丈立潰矣凡此等處夜防尤不可懈識之慎之一羊山横隄雙溝棄縷守遥固為得䇿但恐漲水直至近山未免分流今於邳州對河羊山龜山土山相接處剏築横隄長四百八十丈縱有順隄之水遇格即返仍歸正漕自無奪河之患此隄雖係睢寕縣地方然去邳州不逺專責該州掌印管河官時加督閱培築之工勿怠勿忽一議格隄防禦之法格隄甚妙格即横也蓋縷隄既不可恃萬一決縷而入横流遇格而止可免泛濫水退本格之水仍復歸漕淤溜地髙最為便益今於南岸房村單家口雙溝馬家淺辛安峯山等處俱築格隄一道併羊山横隄共七道倘歳歳増修髙厚可永無分流奪河之患矣俟工力有暇再為増築北岸亦倣而行之多多益善也一歸仁集隄本隄所以捍禦黄水睢水湖水使不得泛溢泗州并攻髙堰而又遏睢水湖水使之併入黄河益助衝刷關係最為重大毎歳三月間即當撥洪夫二百餘名恊同本隄夫併力修䕶隄下宜宻栽茭桞以搪風浪其水浸隄根稍深處即預下䕶埽一二層樁笆欹朽者務逐一掘換填築内四舖以至九舖尤為危險工宜倍之毎歳冬春宜多運樁􅐨䋲草分貯各舖其管河主簿督令專駐本隄以便督率前歳議築石隄以工力不足僅成二千一百丈尚餘二千九百丈若得全完幇䕶之工可免矣然其槖籥則又在小河口之通塞蓋小河通則睢水徑入黄河而歸仁之水減半其藩籬則又在耿車時兒灘一帯之隄蓋此隄髙厚堅固則睢水不能漫入埠子等湖而小河常通矣故上自髙卓下至時灘皆當接築長隄歳加修守且宻栽茭草葦以䕶之蓋修守此隄即所以修守歸仁也况小河常通則靈睢宿遷積水得泄而沮洳漸成膏膄舟行徑直免犯湖險而小民便於販易為地方利又非淺鮮也司河者宜加意促成之一馬厰坡隄桃源縣地方有馬厰坡横隄長七百四十六丈蓋慮黄水大漲則從此入淮而淮為之淤淮水大漲則從此洩出而清口流弱故特築横隄一道以遏之使黄不得入淮不得出最為𦂳關宜慎修之一直河邳州東南六十里原有直河以宣泄蒙沂諸山之水近年因濁流倒灌直河遂塞諸山水俱迤邐由落馬湖經董陳二溝以出大河水勢紆廻則近邳田地常被淹浸湖波淼𣺌則候風舟楫遲滯艱危不特直河居民失市廛之利己也昔已開復通行而迤裏閻家集等口乃原通落馬湖故道復築長隄遏水此隄之堅瑕乃直河所視以通塞者毎歳仍須加髙加厚水發之時嚴行防守不令復出落馬湖庶直河可保不淤也柰何繼者失守長隄復決直河因之復塞矣務須查倣先年規制為之此與耿車時灘之隄同一關捩在司河者加之意耳一瀕􅈁居民遥縷夾中居民及濵河居民俱當諭以移居髙阜處所或即結廬於遥隄之上蓋黄河伏秋盛漲之時縷隄逼水必難恃以為安若水至而後避則無及矣此亦徙民當水衝者之遺意也即小民安土重遷亦須諭以四月暫移至九月復還故址毎歳春杪司道即嚴行各州縣家諭而戸曉之乆之而民知遥隄之外皆樂土自有不待驅迫而相率移居者矣山東一歳守武王二壩曹縣武家壩王家壩迎溜掃灣逼近老隄最為險要而武壩險又甚焉萬一此壩潰決則城武金鄉數郡邑者悉成沮洳且逼近閘河甚為可虞須於正月間多捲釘頭磯嘴埽壩以遏直射及將老長隄幇厚増髙伏秋防守官夫時刻勿懈萬歴十七年武家壩外忽成淤灘此亦一時之幸未可恃以忽修防也一修守曹單太行隄曹單二縣太行隄剏自𢎞治十年河決黄陵岡大傷張秋運道先臣都御史劉忠宣公自河南以至碭沛築長隄一道即太行隄也向來修守止及近水縷隄而行隄置於度外萬歴四年河決魯家口則曹單金魚被渰殆盡萬歴八年題准大加修築屹然可恃以後毎二年一次加幇著為定例當事者慎毋居安忘危爽期廢格可也一守戴村壩汶水從陶泰而來就塩河由􅀶興車瀆入海自宋司空築壩戴村蜒蜿九里屹如天成廻狂瀾而逆之西㑹通河始得濟運此壩係全河屏障先年設夫増土植桞培䕶周宻歳乆防弛以漸单薄萬一乗瑕復歸故道不無可慮宜令東平汶上管河官督夫培土栽桞悉如舊制此係運河第一喫𦂳關鍵故首及之一守坎河口石壩坎河口與戴村壩無異蓋因戴村既築之後水無傍洩歳乆復衝此口泉水決入鹽河運河每至淺涸萬厯十六年都給事中常㑹同撫按題請築壩馴於十七年剏築石壩一道長六十丈水漲則任其外洩而湖河無泛濫之患水平則仍復内蓄而漕渠無淺涸之虞利頼甚重防守當嚴必毎歳六月初旬即令東平州管河官駐劄壩上備料集夫相機捍禦九月初旬始得徹守著為定例永保萬全司河者宜加慎焉一守馮何二壩馮家壩係蜀山湖之門户地卑而水易洩故築壩以障之蓄可益運泛不病民何家口係南旺湖之尾閭此口稍卑汶水就西而下每決房家口而傷運河之隄南旺之水則涸矣今築石壩平時任其南逝水漲洩而之西良得䇿也毎歳伏秋專責管河官不時廵視少有圮壊即便修砌二壩皆係都給事中常㑹題剏築馴督築頗固真永賴也一挑浚汶河淤沙坎河口石壩固為完䇿但可以洩水而不可以通沙日久淤停沙填河内則能致水漲漫或沙嘴横射河灣則能逼水衝決宜督管河官乗暇集夫挑浚使水不東逼徑直南趨誠為保全石壩要務是在司河者先事而加之意爾一廵守五湖隄岸運艘全頼於漕渠而漕渠毎資於水櫃五湖者水之櫃也止因舊隄浸廢界址不明民乗乾旱越界私種盡為禾麥之塲先臣兵部侍郎王原建土隄南旺湖週圍隄長一萬九千七百八十八丈三尺蜀山湖隄自馮家壩起至蘇魯橋止長三千五百八十丈自蘇魯橋西至田家樓止原係收水門户栽植封界髙桞馬塲湖隄東面長一千六百二十丈北面原留入水渠道栽植封界髙桞馬踏湖隄自𢎞仁橋起至禹王廟止長三千三百一十三丈安山湖隄長四千三百二十丈而斗門閘壩悉已完備可收濟漕永利萬歴十六年又􅔜都給事中常㑹題増修馴因舊為新督築完固但近湖射利之徒覬覦水退希圗耕種盗決之弊禁令當嚴每年冬春管河官週圍廵閱責令守湖人役投逓甘結庻河防飭而水利無滲洩之患疆界明而奸民杜侵越之萌矣一因時分合汶流南旺分水地形最髙所謂水舂也決諸南則南流決諸北則北流惟吾所用何如耳當春夏糧運盛行之時正汶水㣲弱之際分流則不足合流則有餘宜效輪畨法如運艘淺於濟寕之間則閉南旺北閘令汶盡南流以􅈅茶城如運艘淺於東昌之間則閉南旺南閘令汶盡北流以􅈅臨清當其南也更發濵南諸湖水佐之當其北也更發濵北諸湖水佐之泉湖兼注南北合流即遇旱暵克有濟矣此以智役水以人勝天力不勞而功倍計無愈此臨時酌之一先期挑濬月河南旺舊例両年一大挑築壩斷流不通舟楫始開月河官民稱便欲挑正河必先挑月河一時両役並興夫多苦累時迫則工必畧工畧則沙必淤自今萬歴十八年挑正河為大挑十九年挑月河為小挑以後著為定規庶舟楫徃返既不阻於稽緩夫役用工亦不病於煩難矣一築土壩以利接濟閘河地亢衛河地窪臨清板閘口正閘衛両水交㑹處所毎歳三四月間雨少泉澁閘河既淺衛水又消髙下陡峻勢若建瓴毎一啓板放船無幾水即盡耗漕舟多阻宜於閘口百丈之外用樁草設築土壩一座中留金門安置活板如閘制然將啓板閘先閉活閘則外有所障水勢稍緩而於運艘出口易於打放衛水大發即從拆卸歳一行之費無幾何此亦權宜之要術也一疏衛濟運衛水發源於河南輝縣蘓門山名曰朔刀泉經新鄉等處合淇漳二水逾館陶至臨清合汶河之水經徳州出天津直沽入海板閘以下全賴此水濟運夏秋之交粮運盛行毎患淺澁盖因輝縣源頭建有仁義禮智信五閘壅泉灌溉民田以致水不下流殊妨國計宜行分廵東昌道毎嵗糧運北行衛水消涸呈報總河衙門移文河南管河道速將五閘封閉俾水盡歸運河其餘月分或水勢充盈仍聴民便庶公私兩不相妨而運艘不滯矣一疏濬泉源校山東泉源屬濟兗二府一十六州縣共一百八十泉分為五派以濟運道新㤗萊蕪㤗安肥城東平平隂汶上蒙隂之西寧陽之北九州縣之泉俱入南旺分流其功最多關係最重是為分水派也泗水曲阜滋陽寕陽迤南四縣之泉俱入濟寕關係亦大是為天井派也鄒縣濟寕魚䑓嶧縣之西曲阜之北五州縣之泉俱入魯橋是為魯橋派也滕縣諸泉近入獨山吕孟等湖以逹新河是為新河派也又沂水䝉隂諸泉與嶧縣許池泉俱入邳州徐吕而下黄河經行無藉於此是為邳州派也酌其緩急則分水天井魯橋之派屬漕河命脉毎歳春夏聼司道嚴督管泉官夫疏濬通逹俾源源而來庶幾有濟但數月不雨其流必渇萬歴十六年漕渠乾涸百計疏濬卒無涓滳之流至閏六月初司大雨連朝諸泉俱湧河渠遂盈則地利未嘗不係於天時也至於山泉沙磧頗多汶河每為淤墊須於大挑之期一併挑濬使泉流無阻亦一䇿也司漕者志之河南一南岸隄防南岸逼近省城藩封重地最為喫𦂳如滎澤縣之小院村中牟縣之黄煉集祥符縣之瓦子坡槐疙疽劉獸醫口陶家店張家灣時和驛兎伯堽埽頭集陳留縣之王家樓蘭陽縣之趙皮寨儀封縣之李景髙口普家營商丘縣之楊先口俱為要害劉獸醫口先年築有埽壩壩内有月隄一道惟恐月隄不支又於萬歴十七年築遥隄一道長二千七百三十二丈足為屏翰本年題准埽壩不足恃專守月遥二隄訖又陶家店幇接隄長一千八百七十一丈壩長三千六百二十九丈張家灣加修舊壩一道舊隄一道時和驛幇築隄長九百二十丈壩長三百二十七丈又兎伯堽至埽頭集止有一隄倘被衝決則水直至野鷄岡趨鳳泗重千陵寢萬歴十八年増築遥隄長二千九百三十丈重門待暴或可無慮又趙皮寨起至李景髙口一𢃄係黄河舊趨鳳泗故道萬歴十七年剏築遥隄長二千三百五十九丈九尺最為要害宜慎守之一北岸隄防北岸迫近漕河關係運道最為要害如滎澤縣之甄家庄郭家潭陽武縣之脾沙堽原武縣之廟王口封丘縣之于家店中欒城荆隆口祥符縣之黄陵岡陳橋貫臺馬家口陳留寨蘭陽縣之銅瓦廂板厰樊家庄張村集馬坊營儀封縣之穵泥河煉城口榮花樹三家庄考城縣之陳隆庄芝麻庄孝城口俱為要害荆隆口萬厯十五年河決長東二縣幾溺萬厯十七年剏築遥隄長二千九十丈所當加意防守又榮花樹幇築隄長一百七十五丈六尺壩長五百五十九丈三家庄剏築壩長二百七十丈芝蔴庄剏築壩長八十六丈孝城口補築隄長二十八丈壩長二十丈四尺皆係喫𦂳隄岸並宜分撥官夫防守不懈者也以上南北両岸要害處所毎歳冬春掌印管河官沿隄相度或預捲乾埽以防其油或多築磯嘴以遏其衝各該管河官駐守河濱該道不時廵閱四防二守之法務須三令五事丁寕告戒慎之慎之一修守南北兩岸長隄黄河北岸𢎞治十年河決黄陵岡張秋運道淤阻都御史劉忠宣公築有長隄一道荆隆口之東西各二百餘里黄陵岡之東西各三百餘里自武陟縣詹家店起直抵碭沛一十餘里名曰太行隄蓋取聳峙蜿蜒如山之状南岸亦舊有長隄一道起自虞城縣至滎澤縣止両隄延亘一千五百餘里實為該省屏翰但地鮮老土最易衝汕卑薄已甚已經題加幇築於萬厯十七年計築完隄壩共長四萬八千一百二十二丈庻幾可恃以後年分管河官各照地方但有剥損悉如嵗修事例覔取老土填淤加幇髙厚不得擁沙塞責管河道不時廵視探騐加意毋忽一修守沁河隄岸沁河發源於沁州綿山穿太行逹濟源至懐慶府武陟縣與黄㑹合其湍急之勢較黄河益甚而武陟縣東岸之蓮花池金屹􅨅最其衝射要害處也萬厯十五年沁從此決新鄉獲嘉一帯俱為魚鱉毎年堵築埽壩勞費不貲且壩内為商民輳集之處煙㸑不下千餘倚隄為命今議甃石四百三十五丈隨守隨修限以三年告成此隄一成永乆可恃而議者畏難尚未興舉而北岸大樊村亦係掃灣要害幇隄捲埽均在司河者留意焉直隸一通惠河濬淺築隄通惠河發源於昌平州神山泉㑹馬眼諸泉經都城入府南出玉河橋由大通橋至通州而與白河合白河發源於霧靈山由宻雲縣㑹榆渾諸河至張家灣總名曰潞河至通州而與通惠河合勢並南流楊村以北通惠之勢峻若建白河之流淤沙易阻夏秋水漲則懼其潦冬春水㣲則病其澁浮沙之地既難建閘以備節宣惟有濬築之工殊為喫𦂳萬厯十五年剏設管河通判專駐楊村其為修防計得矣但查沿河両隄如搬繒口火燒屯通濟厰東要兒渡口王家務華家口閻家口綿花市猪市口觀音堂蔡家口桃花口以上隄岸坍塌卑薄最為險要水發即決濵河州縣渰浸為患漕艘漂淌人甚危之應行司道督行管河官毎歳冬間辦積樁草春初率夫将前隄加髙幇厚填土實杵不得雜沙塞責粮運将至設法疏濬或築束水小壩衝刷深廣俾漕舟無膠滯之慮民業免沮洳之害司河者宜殚心焉一歳修輔郡長隄大名府屬長東二縣舊有長隄一道延亘一百三十里東至山東曹縣白茅集西至河南封丘縣新豐村止隄外即有淘北河一道相傳即黄河故道也萬歴十五年河由河南封丘縣荆隆口決入挾淘北河衝決本隄之大杜口両邑昏墊該工科都給事中常㑹同撫按題奉欽依修築隄完然隄外有月隄三壩名曰三尖口吳家口劉家口在長垣利在洩水不肯閉塞在東明懼其受渰堅欲堵截両相掣肘雖有壩名終屬虚應即令長隄專設府佐駐守杜勝閘而又畫界分理長垣縣管九十七里東明縣管三十三里建舖設夫以時修守隄既固矣三壩有無不足較也夫壩之有無係於長隄而隄之利害全在荆隆一帯故添設開封府同知專駐劄荆隆雖衛河南實衛長東二縣也總之荆隆堅守則長隄無事長隄無事則三壩不用二縣之民永帖袵席此探本遡源之論不可不知也長東河官須時時偵探荆隆口隄岸少有衝汕即申總院施行河防一覽卷三
