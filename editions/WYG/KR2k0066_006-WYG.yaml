body:
  text: 河防一覽卷六明潘季馴輯宋歐陽修泗州先春亭記景祐三年秋清河張侯以殿中丞來守泗上既至問民之所素病而治其尤暴者曰暴莫大於淮越明年春作城之外隄因其舊而廣之度為萬有九千二百尺用人之力八萬五千泗之民曰此吾利也而大役焉然人力出於州兵而石出乎南山作大役而民不知是為政者之私我也不出一力而享大利不可相與出米二千三百石以食役者堤成髙三十三尺土實石堅捍暴備災可久而不壞既曰泗四達之州也賔客之至者有禮於是因前蔣侯堂之亭新之為勞餞之所曰思邵亭且推其美於前人而志邦人之思也又曰泗天下之水㑹也嵗漕必廪於此於是治常豐倉西門二夾室一以視出納曰某亭一以為舟者之寓舎曰通漕亭然後曰吾亦有所休乎乃築州署之東城上為先春亭以臨淮水而望西山是嵗秋予貶夷陵過泗上於是知張矦之善為政也昔周單子聘楚而過陳見其道穢而川澤不陂梁客至不授館羇旅無所寓遂知其必亡蓋城郭道路旅客寄寓皆三代為政之灋而周官尤謹著之以為禦備今張侯之作也先民之備災而及於賓客徃來然後思自休焉故曰善為政也先時嵗大水州幾溺前司封員外郎張侯夏守是州築隄以禦之今所謂因其舊者是也是役也隄為大故余記其大者詳焉閲此則知淮漲於泗自古為然又何咎於髙堰也賈魯河記元至正九年冬脫脫既復為丞相慨然有志於事功論及河決即言于帝請躬任其事帝嘉納之乃命集羣臣議廷中而言人人殊唯都漕運使賈魯昌言必當治先是魯嘗為山東道奉使宣撫首領官循行被水郡邑具得修擇成䇿後又為都水使者奉㫖詣河上相視騐狀為圖以二䇿進獻一議修築北隄以制横潰其用功省一議疏塞並舉挽河使東行以復故道其功費甚大及是復以一䇿對脱脱韙其發䇿於是遣工部尚書成遵與大司農秃魯行視河議其疏塞之方以聞遵等自濟濮汴梁大名行數千里掘井以量地之髙下測岸以究水之淺深博采輿論以謂河之故道斷不可復且曰山東連歉民不聊生若聚二十萬衆於此地恐他日之憂又有重於河患者時脫脫先入魯言及聞遵等議怒曰汝謂民將反邪自辰至酉論辨終莫能入明日執政謂遵曰修河之役丞相意已定且有人任其責公勿多言幸為兩可之議遵曰腕可斷議不可易遂出遵河間鹽運使議定乃薦魯于帝大稱㫖十一年四月初四日下詔中外命魯以工部尚書為總治河防使進秩二品授以銀印發汴梁大名十有三路民十有萬人廬州等戍十有八翼軍二萬人供役一切從事大小軍民咸禀節度便益興繕是月二十三日鳩工七月疏鑿成八月決水故河九月舟楫通行十一月水土工畢諸掃隄成河乃復故道南滙于淮又東入於海帝遣貴臣報祭河伯召魯還京師論功超拜榮禄大夫集賢大學士其宣力諸臣遷賞有差賜丞相脫脫世襲荅刺罕之號特命翰林學士承㫖歐陽𤣥製河平碑文以旌勞績𤣥既為河平之碑又自以為司馬遷班固記河渠溝洫僅載治水之道不言其方使後世任斯事者無所考則乃從魯訪問方略及詢過客質吏牘作至正河防記欲使來世罹河患者按而求之其言曰治河一也有疏有濬有塞三者異焉釃河之流因而導之謂之疏去河之淤因而深之謂之濬抑河之暴因而扼之謂之塞疏濬之别有四曰生地曰故道曰河身曰減水河生地有直有紆因直而鑿之可就故道故道有髙有卑髙者平之以趨卑髙卑相就則髙不壅卑不瀦慮夫壅生潰瀦生堙也河身者水雖通行身有廣狹狹難受水水溢悍故狹者以計闢之廣難為岸岸善崩故廣者以計禦之減水河者水放曠則以制其狂水隳突則以殺其怒治隄一也有剏築修築補築之名有治水隄有截河隄有䕶岸隄有縷水隄有石舡隄治埽一也有岸埽水埽有龍尾攔頭馬頭等埽其為埽臺及推卷牽制薶掛之法有用土用石用鐵用草用木用杙用絙之方塞河一也有缺口有豁口有龍口缺口者已成川豁口者舊常為水所豁水退則口下於隄水漲則溢出於口龍口者水之所㑹自新河入故道之界也此外不能悉書因其用功之次第而就述于其下焉其濬故道深廣不等通長二百八十里百五十四步而强功始自白茅長百八十里繼自黄陵岡至南白茅闢生地十里口初受廣百八十步深二丈有二尺以下停廣百步髙下不等相折深二丈及泉曰停曰折者用古筭法因此推彼知其勢之低昻相準折而取匀停也南白茅至劉莊村接入故道十里通折墾廣八十步深九尺劉莊至專固百有二里二百八十步通折停廣六十步深五尺專固至黄固墾生地八里面廣百步底廣九十步髙下相折深丈有五尺黄固至哈只口長五十一里八十步相折停廣墾六十步深五尺乃濬凹里減水河通長九十八里百五十四步凹里減水河口生地長三里四十步面廣六十步底廣四十步深一丈四尺自凹里生地以下舊河身至張賛店長八十二里五十四步上三十六里墾廣二十步深五尺中三十五里墾廣二十八步深五尺下十里二百四十步墾廣二十六步深五尺張賛店至楊青村接入故道墾生地十有三里六十步面廣六十步底廣四十步深一丈四尺其塞專固缺口修隄三重并補築凹里減水河南岸豁口通長二十里三百十有七步其剏築河口前第一重西隄南北長三百三十步面廣二十五步底廣三十三步樹置樁橛實以土牛草葦雜稍相兼髙丈有三尺隄前置龍尾大埽言龍尾者伐大樹連稍繫之隄旁隨水上下以破囓岸浪者也築第二重正隄并補兩端舊隄通長十有一里三百步缺口正隄長四里兩隄相接舊隄置樁堵閉河身長百四十五步用土牛葦草稍土相兼修築底廣三十步修髙二丈其岸上土工修築者長三里二百十有五步有竒廣不等通髙一丈五尺補築舊隄者長七里三百步表裏培薄七步増卑六尺計髙一丈築第三重東後隄并接修舊隄髙廣不等通長八里補築凹里減水河南岸豁口四處置樁木草土相兼長四十七步於是隄塞黄陵全河水中及岸上修隄長三十六里百三十八步其修大隄剌水者二長十有四里七十步其西復作大隄剌水者一長十有二里百三十步内剏築岸上土隄西北起李八宅西隄東南至舊河岸長十里百五十步顛廣四步趾廣三之髙丈有五尺仍築舊河岸至入水東長四百三十步趾廣三十步顛殺其六之一接修入水兩岸埽隄並行作西埽者夏人水工徵自靈武作東埽者漢人水工徵自近畿其法以竹絡實以小石每埽不等以蒲葦綿腰索徑寸許者從鋪廣可一二十步長可二三十步又以曵埽索綯徑三寸或四寸長二百餘尺者衡鋪之相間復以竹葦麻檾大繂長三百尺者為管心索就繫綿腰索之端於其上以草數千束多至萬餘匀布厚鋪於綿腰索之上槀而納之丁夫數千以足踏實推卷稍髙即以水工二人立其上而與衆合聲力舉用小大推梯推卷成埽髙下長短不等大者髙二丈小者不下丈餘又用大索或五為腰索健丁操管心索順埽以立踏或掛之臺中鐵猫大橛之上以漸縋之下水埽後掘地為渠䧟管心索渠中以散草厚覆築之以土覆其上復以土牛雜草小埽稍土多寡厚薄先後隨宜修疊為埽臺務使牽制上下縝宻堅壯互為犄角埽不動揺日力不足夜以繼之積累既畢復施前法卷埽以壓先下之埽量水淺深制埽厚薄疊之多至四埽而止兩埽之間置竹絡或三丈圍四丈五尺實以小石土牛既滿繫之竹纜其兩旁並埽宻下大樁就以竹絡上大竹腰索繫於樁上東西兩埽及其中竹絡之上以草土等物築為埽臺約長五十步或百步再下埽即以竹索或麻索長八百尺或五百尺者一二雜厠其餘管心索之間候埽入水之後其餘管心索如前薶掛隨以管心長索逺置五七十步之外或鐡猫或大樁曵而繫之通管束累日所下之埽再以草土等物通修成隄又以龍尾大埽宻掛於䕶隄大樁分析水勢其隄長二百七十步北廣四十二步中廣五十五步南廣四十二步自顛至趾通髙三丈八尺其截河大隄髙廣不等長十有九里百七十七步其在黄陵北岸者長十里四十一步築岸上土隄西北起東西故隄東南至河口長七里九十七步顛廣六步趾倍之而强二步髙丈有五尺接修入水施土牛小埽稍草雜土多寡厚薄隨宜修疊及下竹絡安大樁繫龍尾埽如前兩隄法唯修疊埽臺増用白闌小石并埽上及前游修埽堤一長百餘步直抵龍口稍北攔頭三埽並行埽大隄廣與剌水二隄不同通前列四埽間以竹絡成一大堤長二百八十步北廣百一十步其顛至水面髙丈有五尺水面至澤腹髙二丈五尺通髙三丈五尺中流廣八十步其顛至水面髙丈有五尺水面至澤腹髙五丈五尺通髙七丈并剏築縷水横隄一東起北截河大隄西抵西剌水大隄又一隄東起中剌水大隄西抵西剌水大隄通長二里四十二步亦顛廣四步趾三之髙丈有二尺修黄陵南岸長九里百六十步内剏岸土隄東北起新補白茅故隄西南至舊河口髙廣不等長八里二百五十步乃入水作石船大隄蓋由是秋八月二十九日乙巳道故河流先所修北岸西中剌水及截河三隄猶短約水尚少力未足恃決河勢大南北廣四百餘步中流深三丈餘益以秋漲水多故河十之八兩河爭流近故河口水刷岸北行洄漩湍激難以下埽且埽行或遲恐水盡湧入決河因淤故河前功遂隳魯乃精思障水入故河之方以九月七日癸丑逆流排大舡二十七艘前後連以大桅或長樁用大麻索竹絙絞縳綴為方舟又用大麻索竹絙用舡身繳繞上下令牢不可破乃以鐡猫於上流硾之水中又以竹絙絶長七八百尺者繫兩岸大橛上毎絙或硾二舟或三舟使不得下舡腹畧鋪散草滿貯小石以合子板釘合之復以埽宻布合子板上或二重或三重又於隄前通卷攔頭埽各一道多者或三或四前埽出水管心大索繫前埽硾後攔頭埽之後後埽管心大索亦繫小埽硾前攔頭埽之前後先羈縻以錮其勢又於所交索上及兩埽之間壓以小石白䦨土牛草土相半厚薄多寡相勢措置埽隄之後自南岸復修一隄抵已閉之龍口長二百七十步舡隄四道成隄用農家塲圃之具曰轆軸者宂石立木如比櫛薶前埽之旁每步置一轆軸以横木貫其後又宂石以徑二寸餘麻索貫之繫横木上宻掛龍尾大埽使夏秋潦水冬春凌􅑉不得肆力於岸此隄接北岸截河大隄長二百七十步南廣百二十步顛至水面髙丈有七尺水面至澤腹髙四丈二尺中流廣八十步顛至水面髙丈有五尺水而至澤腹髙五丈五尺通髙七丈仍治南岸䕶隄埽一道通長百三十步南岸䕶岸馬頭埽三道通長九十五步修築北岸隄防髙廣不等通長二百五十四里七十一步白茅河口至板城補築舊隄長二十五里二百八十五步曹州板城至英賢村等處髙廣不等長一百三十三里二百步稍岡至碭山縣增培舊隄長八十五里二十步歸徳府哈只口至徐州路三百餘里修完缺口一百七處髙廣不等積修計三里二百五十六步亦思刺店縷水月隄髙廣不等長六里三十步其用物之凡樁木大者二萬七千榆柳雜稍六十六萬六千帶稍連根株者三千六百藁秸蒲葦雜草以束計者七百三十三萬五千有竒竹竿六十二萬五千葦蓆十有七萬二千小石二十艘䋲索大小不等五萬七千所沉大舡百有二十鐡纜三十有二鐡猫三百三十有四竹篾以斤計者十有五萬硾石三千塊鐡鑚萬四千二百有竒大釘三萬三千二百三十有二其餘若木龍蠶椽木麥楷扶樁鐡义鐡弔枝麻搭火鈎汲水貯水等具皆有成數官吏俸給軍民衣糧工錢醫藥祭祀賑恤驛置馬乘及運竹木沉舡渡船下樁等工鐡石竹木䋲索等匠傭貲兼以和買民地為河併應用雜物等價通計中統鈔百八十四萬五千六百三十六錠有竒魯嘗有言水工之功視土工之功為難中流之功視河濱之功為難決河口視中流又難北岸之功視南岸為難用物之效草雖至柔柔能狎水水漬之生泥泥與草并力重如碇然維持夾輔纜索之功實多葢由魯習知河事故其功之所就如此𤣥之言曰是役也朝廷不惜重費不吝髙爵為民辟害脫脫能體上意不惮焦勞不恤浮議為國拯民魯能竭其心思智計之巧乘其精神膽氣之壯不惜劬瘁不畏譏評以報君相知人之明宜悉書之使職史氏者有所考證也先是嵗庚寅河南北童謡云石人一隻眼挑動黄河天下反及魯治河果於黄陵岡得石人一眼而汝潁之妖冦乘時而起議者徃徃以謂天下之亂皆由賈魯治河之役勞民動衆之所致殊不知元之所以亡者實基於上下因循狃於晏安之習紀綱廢弛風俗偷薄其致亂之階非一朝一夕之故所由來乆矣不此之察乃獨歸咎於是役是徒以成敗論事非通論也設使賈魯不興是役天下之亂詎無從而起乎故今具録𤣥所記庶來者得以詳焉閲此則見魯之治河亦是修復故道黄河自此不復北徙蓋天假此人為我國家開創運道完固鳯泗祖陵風氣豈偶然哉都御史于湛題名記略或謂海運由浙西不旬日可逹都下較之河運費省而功倍丘文莊衍義補言之詳矣近年言者亦多厭河運之勞而欲舉文莊之策子顧極言河運之利而欲侈諸臣之功示諸乆逺何也曰海運之法作俑於秦效尤於元祖宗已棄之䇿三代以前未聞也文莊計漂溺之米而不計漂溺之人故以海運為便不知米漂而載米之舟駕舟之卒管卒之官能獨免乎考之元史至元二十八年海運漂米二十四萬五千六百有竒至大二年漂米二十萬九千六百有竒即如文莊言每舟載米千石用卒二十人則嵗溺而死者殆五六千人此殘暴之所忍於吾民也奈何君人而忍於百姓哉河運之費費於人所謂人亡人得損上益下者王者以天下為家又奚恤哉此説海運之害最為明悉故録之太常卿佘毅中全河説洪惟我國家定鼎北燕轉漕吳楚其治河也匪直祛其害而復資其利故較之往代為最難然通漕於河則治河即以治漕㑹河於淮則治淮即以治河合河淮而同入於海則治河淮即以治海故較之徃代亦最利邇嵗以來委寄靡專論議滋起於是有以決口為不必塞而且欲就決為漕者不知水分勢緩沙停漕淤雖有旁決將安用之無論沮洳難舟田廬咸沼也是索途于㝠者也又有以縷堤為足恃而疑遥堤之無益者不知河挾萬流湍激異甚堤近則逼迫難容堤逺則容蓄寛廣謂縷不如遥是貯斛于盂者也又有謂海口淺墊須别鑿一口者不知非海口不能容二瀆乃二瀆失其注海之本體耳使二瀆仍復故流則海口必復故額若人力所開豈能幾舊口萬分之一别鑿之說是穿咽于脅者也又有謂髙堰築則泗州溢而欲任淮東注者不知堰築而後淮口通淮口通而後入海順欲拯泗患而訾堰工是求前于却者也它如絶流而挑方舟而濬疏渠以殺流引洫以灌溉襲虛舊之談而懵時宜之窽者紛紛藉藉載道盈廷至于釣竒之士則又欲舍其舊而新是圖于是有泇膠睢三河之説焉不知既治河而又别治漕是以財委壑也又有興復海運之説焉不知嵗用民賦而又嵗用民命是以民委壑也嗟嗟謀室于路則三年靡成回車于岐則千里坐失又何惑乎漕幾成陸而民胥為魚耶然諸為前議者豈故好是鑿且竒哉總之不逹于水可攻水之理耳蓋黄河之性合則流急分則流緩急則蕩滌而疏通緩則停滯而淤塞故以人力治之則逆而難以水力治之則順而易今太子少保潘公屢膺河寄洞炤委原才諝精誠並稱絶世爰偕故右都御史江公決筴上請事悉具兩河經畧疏中大都盡塞諸決則水力合矣寛築堤坊則衡決杜矣多設減壩則遥堤固矣并堤歸仁則黄不及泗矣築髙堰復閘壩則淮不東注矣堤柳浦繕西橋則河不南浸矣修寳應之隄濬揚儀之淺則湖捍而渠通矣故自告竣以來河身益深而河之赴海也急淮口益深而淮之合河也急河淮併力以推滌海淤而海口之宣洩二瀆也急用是河嘗秋漲而涯畛屹然淮嘗夏溢而消耗甚速貢賦舳艫若履枕席轉徙孑遺復歸南畞盖借水攻沙之效已較然顯白矣若謂水馴于分湧于合恐其合而湧也則堤址既遥而奔騰可恣是寓分于合矣若謂胡不用濬而純用築也則築堅而水自合水合而河自深是藏濬于築矣若謂胡不使黄淮分背而乃使淮助河勢河扼淮勢也則合流之後海即大闢蓋河不決固自深得淮羽異則益深是用淮于河矣若謂河決為天數不可以人力彊塞故曰故道難復也然既塞之後河即安瀾是全天于人矣若謂胡不創開一渠而拘拘膠柱為也則二百年地紀之故道天儲之懿規本無庸創而自今復之是兼創于守矣若謂閘壩之復行旅稍滯然河渠既奠而行旅益通何便如之是含速于滯矣記禮者謂其數可陳也其義難知也治河之事良亦類此是故排河淮非難而排天下之異議難合河淮非難而合天下之人情難史遷氏曰甚哉水之為利害也余則曰甚哉人情之為利害也故今日之功非當事大臣暨余等諸臣之功皆聖明之功也蓋知河固難而知知河之人尤難知知河之人固難而任知河之人尤難語曰千夫輿瓢不如一人負而趨也千夫牧羊不如一人驅而走也使非聖明之併合河漕而事權歸一也其何能功縶騏驥之足則難望其必至縛孟賁之手則難望其必敵使非聖明之寛假便宜而不從中制也其何能功蜚蝗蔽天則農稷不能善稼奔駟曵轍則王造亦廢馳驅使非聖明之不惑浮言而私撓必黜也其何能功千仞而坡則牧竪陵其阜數尺而峭則樓季不敢踰使非聖明之嚴懲墮窳而凛莫可干也其何能功空柯無刃則公輸不能以斵虚鬵乏粒則易牙不能以炊使非聖明之破格折兊而大費不恡也其何能功張鵠以行賞然後人罔不射計程以齊足然後人罔不奔使非聖明之綜覈明允而微勞必録也其何能功昔晉富平津河橋之成武帝謂杜預曰非卿此橋不立預曰非陛下聖明不成今日之功良亦類此善乎部疏有云其本在明良之相遇其機在賞罰之必行真識體之論哉後之治河者其尚仰體君相任人圖治之心俯詧河臣嘔心腐舌之意相與踵而行之期于勿壊勿以事既即安而玩愒勿以功非已出而更張如周郊之有陳畢終始協心如漢法之有蕭曹寧一作頌如此則漕河之允翕當與國家億萬年靈長之祚同垂罔極也斯豈非國家甚盛隆事哉斯豈非國家甚盛隆事哉余謹不嫌侈大贅筆于簡作左契焉此篇獨悉順治之法故録之隆慶六年工部覆止泇河疏題為河道工完水消懇乞聖明申飭總理憲臣及時計處經乆長䇿以禆新運以免後艱事該左給事中雒遵題據山東分守叅政等官劉孝等呈據兖州府知府等官朱泰等勘得自馬家橋微山赤山吕孟等湖起葛墟嶺下止一段計水面長三十里該挑口濶三十丈底濶七丈除水挑深一丈八尺與馬家橋河底相平且本河水來自薛河上下及東山一帶山水五六月水發之時勢甚漲漫縱築土堤不免衝决工程最難葛墟嶺頂起至曹兒莊天齊廟止一段計長二十里該挑深六丈一尺五丈二三尺不等方與馬家橋河底相平岸既髙峻若非斜坡恐致傾墜凡鑿深一尺必須兩岸各開二尺斜作土嶝以便人夫上下連底占河身七丈共該挑口濶三十一丈隨經委官部領人夫七百二十名於嶺頂開鑿一工自隆慶五年十月十八日興工長十丈闊雖八丈除兩頭斜坡實止濶三丈五尺四丈不等至十一月十七日止計二十九日用過人夫二萬八百八十工工食銀六百兩僅挑前工上有黑土四尺下多砂石二三尺不等層靠又係礓土以下紅砂石層層厚一二尺不等鍁钁難施俱用鐡鍬石木等錘開鑿深淺不等深處二丈五六尺淺處二丈二三尺以下砂礓硼石愈加堅硬内有東西兩工泉水湧沸急流有聲戽水之工更多前項工程以下再挑二倍方與水平相等較之先做一分尤為加倍一則髙下出土之難二則晝夜徹水之苦實難開鑿自十二日至十六日止計五日戽水方纔見底及至動手天又將晚經過一夜水積尺餘無計可施自嶺頂東南至天齊廟沿路又挑四工長濶各一丈掘至二三尺下俱是礓石泉水湧出隨徹隨盈十夫做工十夫徹水尚不能勝再掘尺餘礓石愈大泉水愈多據此二十里岡嶺若强欲開鑿其貲費不可以數筭也又嶺下西路自利國驛起由郝家莊中心溝至曹兒莊止計一段長三十八里地勢雖少卑窪但郝家莊後一帶兩邊近山掘試俱係連根青石尤難開鑿無容更議曹兒莊起由大房嶺至棗兒莊小房嶺止一段計長一十八里原無河形該挑深三丈八九尺不等口濶三十丈在于天齊廟前挑試一工長濶一丈挑至二尺以下即有礓石大者如升斗小者如鷄卵層疊堅硬不能用鍁惟钁可施一钁不能竟寸石内泉水湧出終日徹打難盡夫役開鑿愈甚艱難大房嶺前微有窪水棗兒莊見有小溪濶一二丈水深六七寸不等中間挑試四工礓石泉水難鑿同前又據鄉民郭相等同稱伏秋天雨山水泛漲平地成湖冬春露地始見河形小房嶺起至萬家莊彭河頓家莊止一段計長一十八里見有河形口濶四五丈深一二尺尚該挑深二丈二三尺不等濶一十二丈不等自萬家莊挑試一工長濶一丈掘至二尺下俱是礓石用钁開掘僅入半寸兼之泉水湧發徹取不及掘石水中極為費力彭河口以下挑試二十工二三尺之下掘石徹水工力艱苦較前尤甚頓家莊起至侯家灣止一段計長二十五里河濶七丈水深二尺六七寸不等該挑深二丈八九尺不等在於頓家莊以下挑試七工穵至二三尺俱是砂礓硼石钁不能入俱難用工等因該各道先後叅勘得湖嶺浩廣計開鑿之功何止於十年水石堅深筭用工之夫終疲乎三省工費不貲竟難就緒等因又據徐州兵備等官副使馮敏功等呈據淮安府知府等官陳文燭等勘得山東地方侯家灣起至岔河口止一段計長四里零六十丈水深一二尺不等内二里一百四十丈石露水面一里零一百丈有浮沙下俱平底大石隨委官於隆慶五年十月十九日領夫一千名在於彼處興工河底有石走砂引水難以用工先開月河一道改水流行隨於原河有石處丈量一段長十三丈濶十丈打壩斷流分為六工每官各做長二丈二尺濶十丈各將工内撼動大小浮石盡行扛擡兩岸河底俱係過河青板大石又取石匠四十五名各用鐡鍫油錘打鑿數日僅及寸工至十一月十三日止計二十四日共用過夫匠二萬五千八十工銀六百九十七兩時日既乆工力徒施委難開鑿又勘得岔河口起至楊家林止一段計長一里零七十四丈有露面大石數處自楊家林起至李家道口止一段計長七十九丈錐探砂石相兼李家道口起至良城橋止一段計長一百七十六丈徧河俱係露面大石於橋東岸挑試一工長濶各一丈深八尺下係大石又於橋西岸挑試一工長濶各一丈深九尺下亦係大石良城橋起至馬蹄灣溝口止一段計長一里零一百一十丈挑試一工長四丈深濶一丈底有走砂難以深入溝口起至水靜溝止一段計長一里零三十八丈内有截河大石寛廣深厚餘俱砂礓於截石兩旁挑試二工土下二尺俱見大石又共挑試一工長十五丈濶二丈深一丈錐探底有大石水靜溝至泇口橋止一段計長九里零五十八丈俱係泥土挑試一工長四丈濶二丈深一丈底有走砂隨挑隨䧟再若加深岸必傾覆且據鄉民胡覲等禀稱每年夏秋各山水勢驟發髙至數丈居民房屋常被衝蕩且兩岸地勢髙阜既不可張水門又不可開水櫃諸水㑹集難以防禦傷船之害勢所不免實難開鑿又自泇口橋起至譚家園止一段計長三里零九十丈河形見濶一十四丈水深七尺除水仍該挑深一丈四尺自譚家園起至王史舖止一段計長十二里河形見濶十四丈水深四尺除水仍該挑深一丈四尺王史舖起至瓦子埠止一段計長十里河形見濶十二丈水深五尺除水仍該挑深一丈三尺瓦子埠起至齊家莊止一段計長二十里河形見濶十四丈水深四尺除水仍該挑深一丈二尺以上河身土砂相兼雖可挑濬但譚家園下有營河一道内多滚砂每遇山水泛漲乘水擁至易於淤塞又有成字河一道夏秋奔流易於衝射終為河患又齊家莊起穿蛤鰻土巨連汪等湖至杲家口止一段長六十五里湖心原係積水舊汪其餘皆係渰浸民地水深五六尺不等較測水平比之上源河底尚髙一丈三四尺北有蒙隂營河泇口成子河諸水瀰漫浩蕩非築隄不可成漕灘窪不平非挑濬不能通運然挑河於巨浸必不能固須下樁捲埽且取土於數里之外况沂河之水每遇陡發衝射甚猛今欲築隄横截恐亦難捍又杲家口起至直河口止計長二十一里零四十五丈中間周湖柳湖水勢相聨𣺌無涯岸然深處止四五尺比之上源河底上髙一丈二三尺必須更加挑深方可通運今湖坡之内蕩然一壑水將安徹又須多用樁草髙築隄防今四面皆水無從取土雖議用小船裝載亦覺道路艱逺難計工程况泇河出直河口復歸黄河則平昔險溜處所尚未盡避或遇黄河暴發則直河出口之際難保不淤是又不能無慮也等因該各道先後叅看得前項工程築鑿之費既已不貲而衝溺之虞有難預料雖耗公家之巨蓄難收運道之全功等因通呈到臣臣與催運御史張憲翔勘議得微山赤山吕孟等湖各官同稱水中難以築隄臣獨謂勢不甚難使鑿葛墟嶺以洩正𣲖開地浜溝以散餘波則其堤尚可築也但其工不得施於葛墟嶺未開之先泇口鎮至齊家庄一帶見有河形水亦可舟工夫省力莫此為最蛤鰻周柳等湖雖滙水汪濊倘濬導下流瀦水亦能漸去使無葛墟嶺侯家灣良城山假以年嵗不惜貲費濬河築堤以通漕艘雖不能盡脫宿遷以下黄河之害將不可避徐吕二洪之險哉無奈葛墟嶺髙出河底六丈有餘開鑿至二丈以下未及其半下即有硼石水泉湧出有聲侯家灣良城等處雖有河形流水水底俱有過河板石兩岸又多露石參差石在水中既不能火煆又不得錐鑿其勢必不可成功縱成功亦不可通漕昔先漢時人有上書欲通裦斜道及漕事言抵蜀從故道多阪回逺今穿裦斜道少阪近四百里而裦水通沔斜水通渭皆可以行船漕時張卬拜漢中守發數萬人作裦斜道五百餘里道果便近而水湍石不可漕至今論者不韙侯家灣良城一帶伏石根盤不斷脉串二洪縱令河形再深丈餘亦水湍石也葛墟嶺設使可開舟運於六丈之下人牽於六丈之上勢豈可漕耶且葛墟嶺𦂳防南北通衢去徐州洪僅七十里前人鑿洪之時諒必經歴此嶺諦較難易豈肯舍此易開之嶺而苦鑿難開之洪哉故諺有之曰寧鑿二洪不開一嶺此言雖俚可稽實難又恐蛤鰻周柳諸湖築堤水中工費無筭然葛墟嶺侯家灣良城一帶上源山石既不能開鑿湖中築堤豈能通運况運道借用黄河已經百數十餘年見今復安故道時加修防可保無虞漕規一加整頓運船亦自蚤能如期過洪入閘其機甚易又何必過費苦役以復開泇河哉再惟該部請開泇口河渠者思逺避河洪固為保運之謀也臣愚請止開泇口河渠者恐枉費財力功緒難成不敢取誤國之罪也但該部得於所聞臣愚本於所見又親嘗歴試尤為的確伏乞敕下該部再加詳議如果臣言有據覆議題請行令河漕官益修已安之運道大振乆壞之漕規預止無益之工程愛惜有限之財力庶國計人情永為便利等因又該廵按直𨽻監察御史張憲翔題同前事俱奉聖㫖工部知道欽此欽遵該本部看得泇口之議起於都御史翁大立蓋當黄河衝決之時漕運阻塞之後博采羣議開陳此䇿一時人情洶洶咸謂舊河難恃本部亦見頻年治河所費不貲而阻溺之患嵗不能免既經都御史翁大立題有前議相應及時查勘續為題請荷䝉皇上軫念國儲特差臺臣勘議復因科臣查勘功次再加叮嚀無非多方講求欲為國家建長乆之策今該科道諸臣奉命查勘躬親探測謂泇口必不可開具題前來所見必真但事關軍國大計不厭詳細即今本部尚書朱衡奉命經理河工見在地方合候命下移咨本部尚書朱衡㑹同總理河道都御史萬恭虛心再加查勘務求的實果如科道諸臣所言難以開掘别無遺議徑自具題施行萬厯三年工部覆止泇河疏題為河身淤墊運道可虞仍開泇河以圖永利事該工科都給事中等官侯于趙等題據山東叅政馮敏功等呈稱行委兖州府同知等官樊克宅等㑹勘得自泉河口水面至性義嶺頂從低至髙二丈四尺五寸又加挑下河身一丈共挑嶺頂深三丈五尺為止其嶺頂督夫試挑稍下即有砂礓俱用錛钁鋤斫隨即碎起泉水湧浸又侯家灣水面巨石參差難以施工隨向陡溝至岔河口廻避處所下有伏石未能逆料自性義河至岔河口共低四丈四尺總計泉河口穵泥作隄之工十里琴溝以下開河全挑之工二十三里七十丈性義嶺掘嶺之工十一里七十丈嶺西開河全挑之工四里巨梁橋東因河挑穵之工三十一里彭河以下隨河刷濬之工三十一里臺兒庄以下廻避至岔河口全挑之工十三里合用人夫并攔湖截水防潦築隄建閘建壩工料通共用銀一百三十四萬五千一百八十二兩一錢又據南直𨽻委官淮安府通判蔡玠等㑹同探測估筭大約自性義嶺至陵城湖上髙於下自陵城至大河口下髙於上合計窪地夾隄為河者該一百九十二里五十丈平地挑土成河者該三十七里零一百二十丈因舊河身而拓開成河者該九十八里其良城以至馬蹄灣石隱水底今放乾河水則河底板石露出計長五百五十丈共計河面濶二十丈底濶七丈估議石匠五百人夫三千名期以二年鑿深然皆非人所嘗試之工臨期果否報完亦難逆料此外所可慮者則有大河口倒瀼之淤山水暴漲之患今自大河口探測水平浪石以裏頗為窪下見今黄水灌入從此旁流溝渠分洩入海山水自泇口而下至邳徐桃源率由東北以趨黄河今開河欲逺黄流悉在諸湖之北誠恐開河之後山水勢必奔湖計非横過運道無路以逹建閘修隄築壩防禦之䇿所不容廢也總計挑河築隄建閘壩通共用銀二百六十三萬一千五百二十六兩六錢一分等因到道該各道㑹勘與前相同總計工料共用銀三百九十七萬六千七百八兩零如果黄河必不可用故道必不可復國家運道别無他路可通則泇河雖有﨑嶇之險勞費之大亦萬不得已而當竭力以圖之矣但今日之計既欲修治黄河以紓目前之急則力有所分勢難並舉其施為緩急之序非各道所敢擅擬也等因到臣該臣與工部郎中張純㑹同河道都御史傅希摯儧運御史劉光國親自復勘得地勢水源開築難易大畧與該道所呈無異諸所稱難亦人力可為非終不可成之事使此河果有利無害或利多害少可以一勞而永逸則當斷以不疑毅然舉行穿山鑿石夾湖改水築隄建閘百凡艱難皆所不辭財用人力亦不足惜但臣等反覆思惟作事當先其所急而後其所緩為謀貴審之於始而慮其所終我國家資河以為漕治河即所以治漕也使河水安流漕亦永利又何必别為漕計今惟黄河日益淤墊奔潰遷徙勢所不免兼之二洪為險茶城多阻皆自來為漕患者傅希摯目擊其艱焦勞為計因節年未定之議為通漕善後之䇿意以此河一開則清河以北夏鎮以南一帶六百餘里黄河可逺二洪茶城可避漕可恃以無恐䇿無便於此者若不論漕之大勢而止論一節不遍履地里始末而止據人言鮮不以為萬全之計也孰知今所慮者慮河之決也萬一南決淮揚則南無漕矣北決豐沛則北無漕矣南北有一於此中間泇河一段將安用之不可一日無漕則不可一日不治河也河乃漕之大勢治河可以兼漕泇特漕之一節開泇亦須治河是治河為急開泇為緩理勢之的然可見者也臣等詢之河臣及瀕河居民僉謂自直河至清河三百餘里自來河道無恙若於此段别創一河則逼近黄河其患易侵即使髙厚其隄亦難保其不衝與其創新河而倍加隄防之費孰若仍舊河而獲不勞之逸是此三百餘里者似無賴於泇當仍舊貫不惟省無益之作而落馬等湖黄水之灌與大河口倒流之淤皆不得為我害矣惟自徐吕至直河上下二百餘里誠恐河衝蕭碭則涸二洪衝睢寧則淤邳河不得已而開性義嶺以通泇河又必使良城石不為險豐沛水不能衝則泇河二百里斯為全利藉此二百里之利以避二洪邳河之害方為得計此先年河臣建議止欲於直河出口者蓋有見於此耳今仍議開至直河出口如該道所估可費一百五十餘萬金與其通開五百里之逺利少而害多孰若止開二百里之近省費而有利之為愈也臣等竊以為直河而下斷在可已直河而上猶所當講者也特開鑿良城工力難以逆料改口直河尚恐有似茶城此又所當慎重而不可輕率者若遽請内帑輙興大工恐有後艱咎將誰執合無先用在官徭夫動支河道官銀用資犒賞先鑿良城石工以開難克之工程預修豐沛隄防以杜黄水之東注俟二工俱有次第然後照依後開條欵議興前工則始無輕舉而終可底績誠為思患預防一䇿也等因具題奉聖㫖工部知道欽此欽遵抄送到部看得工科等衙門都給事中等官侯于趙等題稱㑹勘泇河事宜自泉河口起至大河口止五百三十餘里内自直河至清河三百餘里自來河道無恙無賴于泇斷在可已惟自徐吕至直河上下二百餘里猶所當為約費一百五十餘萬金特開鑿良城工力難以逆料豐沛河決猶慮灌入要先鑿良城石工預修豐沛隄防然後議興前工各一節為照治河無上䇿惟避之似為得策然亦在視為患之淺深權利害之輕重而已事當改作者固不可憚惜勞費計在乆逺者尤不可茍延目前徐邳以下河身淤澱日髙二洪水流無聲都御史傅希摯慮恐如近年邳河之變則咽喉梗塞故議開泇河以備不虞其為計至深逺也今據都給事中侯于趙御史劉光國等勘稱自直河以下三百餘里斷在可已無容再議外惟自徐吕直河口上下二百餘里可開以避二洪邳河之害㑹計工程難易并合用人夫錢糧俱有成數及查原委各道府縣等官原議大約以正河有目前之患泇河非數年不成故以治河為急開泇為緩臣等再三思惟目今正河尚可支持若不早設預備之䇿是猶作舍道傍終無可成之日患至而憂無救于患所據二河工當並舉自不相妨再查傅希摯原勘良城伏石七十五丈馬蹄灣不滿五丈共僅八十丈今科道諸臣勘得良城至馬蹄灣舊因石隱水底露面不多今放乾河水起去河面浮土萍草則河底板石露出總計有石之地長五百五十丈比原勘多四百七十丈所以議先鑿良城難克之功然後次第興工無非慎於謀始功出萬全之意相應通行議處恭候命下本部移咨河道都御史傅希摯一面督率管河副使郎中主事等官加意正河時常廵視某處縷隄卑薄當加修築某處河身窄狹當築遥隄此外别有長䇿虛心講求合用錢糧俱於河道原額徐州洪儀真閘船稅等銀從宜動支務堪保障一面另委能幹官員儘用在官徭夫河道官銀將良城伏石設法開鑿果見無甚艱阻即將前工照依後開條款次第興舉庶謀於其始而審則終可無悔計其所利者多則為無不成非徒漕道永賴而錢糧亦不致妄費矣此二疏泇河不可開之故甚悉故録之隆慶五年工科題止膠河疏題為漕河淤塞糧運艱阻乞開濬新河以便儲運以圖乆安事據萊州府知府楊起元掲稱㑹同濟南等府同知等官牛若愚等親詣膠州麻灣等處南自龍家屯北至海倉一帶勘得龍家屯四里三十步水淺不過四五寸每日潮至不能打壩斷水難施挑濬之工店口三里有大沽河横衝帶沙淤塞河雖挑深一遇沙淤前功盡棄韓家口六里二百四十步俱岡勾沙石此處苦難徹水不便挑濬又准青州府推官張集勘得趙家口起至杜家口止長十餘里水深一二尺河底俱係岡勾石且有大者若欲深鑿極為費力自杜家口至吳家閘三里餘係小沽河口横衝細沙恐難埧治吳家閘至譚家西南新口止共七里俱有淤沙岡石其沙皆係白河水帶來譚家西口至分水嶺共九里白河全無接濟旱則先乾澇則衝決又准萊州府推官岳凌霜勘得窩舖分水嶺至楚家口十里中多流沙楚家口至集蟇灣五里有餘北岸現河口夏秋雨多即有大水帶沙入河冬春乾涸董家莊至陶家莊四里餘内有岡石一遇秋雨泊水湧入無雨則乾又據掖縣知縣趙欽湯勘得周家莊至秦家圏泊水衝開溝口數道值雨則泛漲無雨即乾涸並無泉源引導河底俱有沙石又據髙宻縣知縣李尚賓勘得謝家口至玉皇廟約一十一里至于閘内沙石相半挑濬工費比之他處頗大自謝家口起至楊家圏止河岸水勢似有端緒説者謂新河可開或觸目于此耳又據黄縣知縣王中逵勘得楊家圏至新河閘面比之南邊一帶雖漸稍寛欲西引濰河但勢已近海引之無益况濰河地勢反下難以引入昌邑又居濰河下隰所當詳議又據滋陽縣知縣王琁勘得新河閘至海倉流沙壅滿難以行舟挑濬工程頗大新河閘係東省通衢凡經過見者起問此新河議開之端由于此耳又准青州府同知程道東等量得濰河韓信壩口河中到於東岸髙三丈四尺若濬溝徹水必幾四丈迤東間有髙阜處所將不止於四丈矣濰水難引委為的確又准浙江嚴州府同知李學禮等帶同監生崔旦勘得分水嶺挑濬二尺之下俱是岡石五尺下即是糜沙挑之九尺六寸隨即坍去四尺縁糜沙力軟不能承載易於崩塌又據青州府同知程道東南陽府同知李元芳等隨同監生崔旦募夫到於分水嶺口迤東南老地周圍開鑿三丈有餘上層至岸堅土四尺中層岡石五尺仍將岡石以下加挑四尺有餘俱是鬆軟糜沙旋挑旋墮工役難施等因到職該職勘得引水接濟雖東有大沽河西有濰河二水稍大亦係有源但一則南入麻灣口難以挽而西一則西隔百有餘里難以引而東若欲兩河通貫必深以六七丈使得兩平寛一十餘丈始免崩岸然經費非百餘萬程限非五六年不能成也其功可輕言耶等因到臣看得所呈中間恐有承委各官踏勘不的捏調虛文草率了事面同背異意見不協遽難輕信又經案行守廵海右道㕘政劉孝副使潘允端親詣覆勘大率謂隣河無可導之泉建閘無可蓄之水欲深鑿河身使海水南北貫通但分水嶺等處較之海面積髙六丈委難開濬不敢附合以千欺隱等因到臣臣㑹同廵撫山東右僉都御史梁夢龍廵按山東監察御史張士佩覆勘得分水嶺係新河命脉舊名王乾壩昔年王副使欲開河先於此相視因惡王字與姓同乾壩乃無水䜟遂易云分水嶺至今土民猶呼王乾壩其實河岸俱有八九尺河身沙泥淤積較兩頭差髙非岡嶺之嶺也募工鑿驗三尺以下皆岡石小塊無有頑石至一丈則皆流沙旋挑旋潰用力頗艱此處止有白河一道二三寸細水流入新河一股徃西北一股徃東南僅寛一步已經各官踏勘水源本來微細然新河之開須是借水以濟今現河小膠河張魯河九穴都泊雖接新河即今乾涸低處稍有積水亦不深廣膠河雖有微源僅得一線沽河停蓄之水有三五七尺亦多行潦漬積查其源頭亦細况地勢東下不能北引以逹分水嶺且陳村閘以下夏秋雨滂水溢俱從此河衝入新河流沙淤積為河大害前人云欲開新河當先治沽河不然未受水利先受水害况敢引之而入乎縱使諸水可引不論地勢不慮沙患然亦不過數寸之水安能充足二百里全河之用執此以論諸河之不足資審矣今人皆云新河易開者止見沿河一帶卑窪處積水有一尺二尺三尺者髙淺處有二寸三寸四五寸者若將髙淺處挖下則水自通深不知卑窪水積者以下流髙淺壅滯故停蓄耳若將髙淺處濬深則蓄水流行流則無源必竭安能積聚執此以論蓄水之不足恃的矣又因登萊二郡士民徃返新河閘上見河形稍寛海水潮入一二尺遂謂全河皆然不知迤南十里餘河之寛狹水之淺深逈不同矣有獻引濰河之䇿者濰河在髙宻縣之西離新河一百二十餘里中間髙嶺五層難於挑引及量濰河東岸三丈四尺方與石平石髙九尺方與水平即石岸甚髙已難挑濬况道里甚逺髙嶺甚多誠如各官所稱雖竭盡財力終難濟事執此以論濰河之不可引明矣夫新河之開必借濟於旁支之水水既無可借河決不可開此有目者所共睹即執抝如崔旦軰視之亦俛首嘆息而已且崔旦昔年所刋海運編請以一丸泥破之東塞沽河西塞濰河今因無水又獻策東引沽河西引濰河及委踏勘濰河則又具呈回稱委實難引夫以一人之言而前後牴牾懸絶如此以一人之見而旬日之間悖謬如此則新河之説皆游談而鮮定論益彰彰著矣臣又籌之新河無水以濟無泉可引固矣然南北兩頭海水相接中間三百里河身又與海相通旁水固無可引海水獨不可逹乎若將河身深濬廣開較海面更深數尺俾海水灌入停蓄亦可牽引舟楫縱工力繁難財費浩大亦須估計的確開説明白以曉示後人以杜絶後議復委各官帶領打水平匠役沿河計算丈尺以慿估計據各官所稱南自陳村閘以至分水嶺積髙二丈九尺八寸北自周家莊以至分水嶺積髙三丈九尺八寸復委同知李學禮等并監生崔旦募工鑿試濶四丈長十丈深三丈五尺隨據學禮等囊沙回稱挑濬一尺之下俱是岡石五尺下即是糜沙挑至九尺六寸隨時塌去四尺此河絶無能為矣蓋糜沙力軟不能承載崩潰甚速流淤不常滲漏亦易故耳是新河以上視之水源不足既無盈尺活泉可以引濟則全河之血脉已澁以下驗之糜沙不堅又易坍塌乾漏難以持乆則全河之軀腹已虧兹二者皆修河大忌也縱費帑金百萬開之何禆於用縱引海水數尺蓄之胡可以保則元史食貨志所載勞費而無成國初徧訪運道舍此而不顧王副使以後屢行奏勘而未興厥工者始得其真矣再考元益都田賦總管于欽山水纂文云至元初萊人姚演建言首起膠西縣東陳村海口自東南趨西北鑿陸地數百里欲通漕直沽海口數年而罷余嘗乘傳過之詢土人云此河為海沙所壅又水潦積淤終不能通徒殘人耳即此則彼時已議其非矣何今人之不審耶萬歴四年工部覆止膠河疏題為漕渠可虞議開新河以永禆國訃亊本部㑹同六部都察院通政司大理寺各堂上官六科十三道各掌印官尚書張瀚等看得尚書劉應節侍郎徐栻題稱南海口地方有積沙横絶中流已從古路溝另開十一里許以避此沙又議於新舊河水之交横建一閘俾浮沙不入北海口一帶築隄五百餘丈以約水障沙分水嶺一帶試開一處深至三丈以上運水甚難因而停工自王家丘至船路溝另開七里為一便路此處白河一道適當分水嶺之衝議建閘壩以遏之仍引水為用及造船之式欲以侍郎王宗沐海船為凖而稍儉其制載糧三四百石納水三四尺河海並行永永無患要動用原奏留銀三十萬其餘銀兩另行細估補發廵撫李世逹題稱試過三工俱已的無可行潮水引泉俱不可恃乞將二臣回部管事廵按商為正題稱淖沙為梗海水難通及又掲稱淖沙難去丈尺難據工程難計沙石難去潮水不足恃引河不足濟海運難行乞命二臣回京河工即為停止另請改議照尚書劉應節侍郎徐栻建議新河要捨故河而尋便道在于匡家莊一帶開濬以通海為主蓋兩海相貫則河渠充滿海舟直逹於河由河復入于海徃來無滯誠為得䇿隨該二臣改議黄阜嶺又改船路溝今却於分水嶺開試勘稱河形太髙而海最下勢不可通遂議及乘潮導河障沙造舟等亊意在多方求濟大約以兩頭所恃者潮南自麻灣以抵朱舖凡五十里北自海口以抵亭口一百八十里皆可通潮廵撫李世逹却謂南潮止及陳村閘距海口二十里北潮止及楊家圏距海口六十里間或至朱舖亭口者蓋一年之内有大風迅烈潮流疾速則然不可以為常也且潮水倐焉而長倐焉而落落則未免守候躭延踰時况潮之所及為有限乎潮不足恃明矣又以中段所恃者張奴河至膠乃最下之地為秋潦所歸十月以後日漸消耗至春月泉脉微細適糧運湧到之時雖置櫃建閘以時啟閉終不能使之源源而來滔滔不竭也至謂白河流沙為害議建壩二座以遏水之入而謂水流壩下引以濟河秋漲水經壩上則沙必與水俱入而謂内以停沙又皆臣等所未喻也河不足恃亦明矣兩海口地方各有淖沙至謂為淺沙客沙亦能為害全河長亘二百七十里内沙洲頗多自王家丘至船路溝七里雖為便路其下有沙與否亦未可知沙在海中者潮水湧進沙必隨之而入沙在地中者疏濬所及沙必隨之而出雖土沙中半土可蕩盡而沙則下沉日積日多愈挑愈有固非祛除所能絶亦非隄閘所能障也乘潮導河皆無足恃沙多水淺置舟則膠雖稍儉其制載糧三四百石亦非淺淺者所能勝也剥淺易舟建倉等議必將復起尚書劉應節亦謂善後之䇿難以逆覩竊恐所謂利者未必利而害將不止于什一矣國家舉事固不嫌於導河若無禆漕計亦奚以導河為哉今以百萬之銀驅數十萬之衆而希兾不可必成之功殊非萬全之謀亦非二臣建議之初意也且尚書劉應節原奉明㫖㑹同徐栻等并該省撫按官虛心計議先將難處開濬試驗果否的有可行今撫按官李世逹商為正俱各親到地方公同開濬試騐而執論互異如此則劉應節所謂為而可成成而可恃者詢謀原未僉同事體委多窒礙相應停罷以省勞費此疏膠河不可開之故甚悉故録之修鑿徐州中洪記畧四明陳穆鑿洪匪以徼功不得已也嘉靖庚子冬河決亳州明年辛丑徐州雲集橋流塞於是百步洪漸淺舟楫上下悉有中洪而裏外二洪遂以湮棄顧兹中洪年乆不用疏鑿罔施巉石旁羅利於劍㦸又其下多大石盤据横突隱見於波濤之間激飛湍而鳴雷霆者無慮數十塊舟一不戒而杵其上焉磨曳斯須輙敝壞而不救蹇余不佞叨職兹洪目擊厥危每為嗟悼思有以鑿去之而未暇也適是嵗冬河凍夫閒可以興役廼召夫總甲劉福等諭意衆咸樂從今年正月癸未即毅然舉事募匠紏夫擊牲釃酒躬親勸督萬夫子來晝夜詵詵並手偕作諸凡門限中方等石剗削殆盡費銀凡四百兩是則請于萬安郭公守衡而動支本洪嵗辦草束折色不絲粟干於民焉修鑿告成險阻以去洪流深緩牽路砥平一時軍民商賈翕然稱便鐫石而載之言聊以志嵗月云爾嘉靖壬寅秋九月記疏鑿吕梁洪記畧華亭徐階我國家漕東南之粟貯之京庾為石至四百萬其道涉江亂淮遡二洪而北又沿衞以入白然後逹於京師為里三千而遥而莫險於二洪二洪之石其獰且利如劍㦸之相向虎豹象獅之相攫犬牙交而蛇蚓蟠舟不戒輙敗而莫甚於吕梁吏或議鑿之其旁之人曰是鬼神之所䕶也則逡廵而不敢嘉靖甲辰都水主事陳君往蒞洪事惻然言曰古之君子茍利於民則捐其身為之矧里巷之浮言其不足聽葢審而以罷吾所當為是厚自為而為民薄也遂以二月二十六日率其徒鑿焉衆亦聞君言以為仁也咸忭以奮閲三日怪石盡去舟之行者如出坦途於是洪之士民來請余記始君為諸生余幸識之常與言萬物壹體之學君欣然受焉不意其果能行之也余故因君推本而記之陳君名洪範字錫卿辛丑進士淛之仁和人今將洪内鑿平獰石丈尺數目列于碑隂第壹處飲牛石在洪上口北岸納水去處長㭍丈叄尺濶㭍尺髙叄尺陸寸突出洪中最碍洪口凡下水船隻少失廻避必然粉碎今鑿去石伍百壹拾貳塊第貳處癩蝦蟇石其狀甚惡船隻難避原長伍丈濶壹丈伍尺髙伍尺叄寸打去石肆百叄拾貳塊第叄處壠子石如覆釜狀逆流碍舟長肆丈玖尺濶壹丈柒尺髙叄尺壹寸打去石叄百貳拾伍塊第肆處放篐頭石長肆丈捌尺濶壹丈肆尺髙叄尺肆寸上水船到此船纜必須先放篐頭方不相碍少遲多致重損打去石貳百捌拾㭍塊第伍處飛簷石叄處如屋簷飛出之狀共長伍丈捌尺濶㭍尺厚叄尺下水遇有㣲風船刮其上必然粉碎今已盡行鑿平去石叄百壹拾貳塊第陸處門檻石在洪咽口兩崖激水急溜上水至此稍有不慎船即撞激衝淌今南北口各打去石貳尺即今放船如履坦道第㭍處楊家林上首獰石共長㭍丈㭍尺濶貳丈髙伍尺叄寸當洪灣曲廻溜之處下水船隻但遇猛風掃灣傷船實多今打去石貳百伍拾壹塊第捌處楊家林下首獰石共長伍丈叄尺濶貳丈貳尺髙肆尺叄寸今打去石貳百壹拾伍塊今已悉平第玖處打舵石在洪中心碍洪傷舵常被撞沉今已打去圍圓仞餘大石叄處第拾處暖泉石叄處在洪東岸轉灣之處破舟避難共長叄丈貳尺圍圓髙伍㭍尺不等今已打去石伍拾叄塊第拾壹處磨盤石貳處在洪中心致水旋轉名曰磨盤船若至此夫力少有不加必致沉溺今已盡行打訖第拾貳處螃蠏窩石叄百餘塊如羣蠏聚窩之狀每塊圍圓數尺髙肆伍尺不等星分羅布當洪之中為害特甚今分工打去大石玖百叄拾玖塊第拾叄處滑皮石肆處在洪心每處約長捌玖尺濶陸㭍尺髙肆伍尺不等上下船隻挽䉡傷人溺水今打去石肆拾捌塊第拾肆處小轂輪石獰利長叄丈濶壹丈髙叄尺今已打去第拾伍處大轂輪石在洪心東岸廻溜之中下水船隻忽時遇風刮撞無不沉沒石長伍丈濶壹丈陸尺髙伍尺今打去大小轂輪貳處石共玖百捌拾叄塊第拾陸處紅石頭當洪之中石極堅峻圍圓㭍尺厚叄尺㭍寸一遇水漫船户廻避不及擦損沉漏無日無之打去石伍拾㭍塊第拾㭍處魚石峻峙參差為害匪細長伍丈叄尺濶貳丈髙肆尺貳寸盡行打訖第拾捌處溜溝石在洪中長叄丈陸尺濶㭍尺陸寸髙叄尺伍寸此貳石水乘石溜船若少不存意難保衝激之患今打去石玖拾叄塊第拾玖處牛角稍石在洪中迤南長叄丈貳尺濶捌尺髙叄尺捌寸下水稍有不慎每每撞溺今打去石捌拾伍塊第貳拾處黄石頭在大洪下口𦂳要兠水之石仍留未鑿第貳拾壹處夜义石取其聳峙水中之狀圍圓約有貳畆尖髙㭍尺水落則突出洪中水漲則渰漫為忒石勢險惡横絶廻避處所少有不謹日見破舟土人悲號痛楚慘不可言打去石尖肆尺其害悉平第貳拾貳處等船石叄處以其水勢瀰漫之日舟必衝激至此沉沒有似等船之意故以名也共長伍丈濶㭍尺陸寸髙五尺叄寸水勢泛漲漫渰船遇風抗或廻避不及船貨無踪今打去石峯叄尺俱已悉平陳洪範記又查得大明㑹典亦載其畧人弗之考耳河防一覽卷六
