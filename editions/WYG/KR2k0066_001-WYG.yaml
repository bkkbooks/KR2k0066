body:
  text: 河防一覽卷一明潘季馴撰敕都察院右僉都御史潘季馴近年沛縣迤北漕河屢被黄河衝決已經差官整理但恐河勢變遷無常漕河不時淤塞有妨糧運今特命爾前去總理河道督率管河管洪管泉管閘郎中􅓵外郎主事及各該三司軍衛有司掌印官守廵并管河副使臨清沂州大名曺濮等處兵備等官時常往来親歴多方經畫遇有淤塞去處務要挑濬深廣其黄河北岸長隄并各隄岸應修築者亦要著實用工修築髙厚以為先事預防之計凡所屬地方遇有水患即便訪究水源可以開通分殺并可築塞隄防處所嚴督各該官員量度事勢緩急定限工程久近分投修理一應合用工價人夫樁草等頊查照該部題准事理行令所在軍衛有司斟酌調用敕内該載未盡事理俱聼爾便宜處置若事關漕運者與各該撫按官計議而行事體重大者奏請定奪承委官員果能勤勞幹理著有成績爾即薦舉擢用其不遵約束乖方誤事及權豪勢要之家侵占阻截違例盜決河防應拏問者徑自拿問應叅奏者叅奏治罪每年終照例将挑濬修築過河隄并用過夫料數目造冊畫圖貼說具奏爾為憲臣受兹專委尤須竭忠盡力悉心區處毋或因循怠玩虚費財力責有所歸爾其慎之故敕嘉靖四十四年十一月十一日潘季馴近年沛縣迤北漕河屢敕都察院右副都御史被黄河衝決已經差官整理但恐河勢變遷無常漕河不時淤塞有妨糧運今特命爾前去總理河道督率管河管洪管泉管閘郎中員外郎主事及各該三司軍衛有司掌印官守廵并管河副使臨清沂州大名曺濮等處兵備等官時常往米親歴多方經畫遇有淤塞去處務要挑濬深廣其黄河北岸長隄并各隄岸應修築者亦要著實用工修築髙厚以為先事預防之計凡所屬地方遇有水患即便訪究水源可以開通分殺并可築塞隄防處所嚴督各該官員量度事勢緩急定限工程久近分投修理一應合用工價人夫樁草等項查照該部題准事理行令所在軍衛有司斟酌調用敕内該載未盡事理俱聼爾便宜處置若事闗漕運者與各該撫按官計議而行事體重大者奏請定奪承委官員果能勤勞幹理著有成績爾即薦舉擢用其不遵約束乖方誤事及權豪勢要之家侵占阻截違例盜決河防應拿問者徑自拿問應叅奏者叅奏治罪每年終照例将挑濬修築過河隄并用過夫料數目造冊畫圖貼說具奏近該科臣建議要将總理河道兼提督軍務山東濟寧各臨近地方南直𨽻淮揚潁州徐州山東曺濮臨清沂州河南睢陳北直𨽻大名天津各該地方聼其督理各兵偹道悉聼節制務要防䕶運道以保無虞如遇盜賊生發即便嚴督該道率領官兵上𦂳緝剿毋致延蔓如各官若有縱宼貽患者指名叅奏處治爾為憲臣受兹專委尤須竭忠盡力悉心區處如或因循怠玩虗費財力責有所歸爾其慎之故敕隆慶四年月日潘季馴近皇帝敕諭都察院右都御史兼工部左侍郎年河淮泛濫為害運道梗塞民不安居朕甚憂之已屢有㫖責之地方官經理奈無實心任事之臣動以工費艱鉅為􅄙又當事諸臣意見不同事多掣肘以致日久無功今特命爾前去督理河漕事務将河道都御史暫行裁革以其事專屬於爾其南北直𨽻山東河南地方有與河道相干者就令各該廵撫官照地分管俱聼爾提督爾宜親歴河流所經㑹同各廵撫官督同各部屬司道等官悉心協慮講求致害之因博采平治之䇿備查草灣口何為既開復淤及今作何開通全淮水何為南徙不復及今作何疏導徐邳河身髙並州城何以疏之使平黄浦崔鎮等口久塞無功何以築之使固及查諸臣歴年建議有行奏疏逐一勘議要見老黄河故道應否開復清挑正河應否挑濬髙家堰寳應隄應否修築小浮橋新衝口可否濟運應否加挑又徐邳以上地形南昂北下恐隄防一潰勢必奔流北徙将為閘河之梗亦要審其孰為正河孰為支河孰為合河或正而當厚其防或支而當殺其勢或合而當分其流一併勘議詳妥奏聞區處合用錢糧及選任司道等官俱許以便宜奏請給發委用㓛成之日通将效勞官員一體分别陞賞如有抗違不服及推諉誤事者文官五品以下武官四品以下徑自提問應奏請者奏請定奪其提督軍務事宜查照河道衙門原管行事爾候事寧之日奏請回京朝廷以爾諳習河道素有才望特兹重任爾尚殫忠籌慮盡力區畫俾河漕無梗塞之虞人民免昏墊之苦必有懋賞以酬爾功毋或畏難憚勞隐忠不效及苟且塞責有負委任爾其勉之慎之故諭萬厯六年三月初十日諭總理河漕兼提督軍務都察院右都御史兼皇帝敕工部左侍郎今加太子少保陞工部尚書兼都察院左副都御史潘季馴邇者河淮泛濫濬治㒺功運道有梗塞之虞民生淪墊溺之患疇咨俾又僉曰汝諧爾乃殫任事之忠誠而持之以果斷運亨屯之幹畧而出之以恭勤躬親胼胝之勞力主隄防之䇿束散漫之流而循故道借奔衝之勢以滌新淤使全河復合于淮而二瀆並趨于海以水治水計慮出于萬全知人任人率作先乎衆職庶㡬灑澤濬川之智允惟利民益國之勲有臣若時厥惟良顯兹科臣覈實聞奏式獲朕心特加爾太子少保陞工部尚書兼都察院左副都御史暫留河道經理廕一子入監讀書賞銀五十兩紵絲四表裏仍賜敕奨勵以示眷酬於戯懋功懋賞朕弗忘優渥之恩善作善成爾尚圖永終之績服予嘉命勿替初忱欽哉故諭萬厯八年四月二十八日皇帝敕諭都察院右都御史潘季馴該科臣建議先年河道原設有總理大臣近年裁革分屬各該廵撫官兼管事權不一目今河患不常工程重大要将原官復設簡擇熟知河務任事大臣管理該部議覆相應兹特命爾前去總理河道駐劄濟寧州督率原設管河管洪管泉管閘郎中員外主事及各該三司軍衛有司掌印管河兵備守廵等官将各該地方新舊漕河并淮揚蘇松常鎮浙江等處河道及河南山東等處上源著實用心往来經理遇有淤淺衝決隄岸單薄應該幚築挑淺去處務要先事預圖免致梗塞并查先年工部題覆事宜一一著實舉行合用人夫照常於河道項下附近有司軍衛衙門調取應用其各省直嵗修河工錢糧悉聼通融計處動支所屬大小官員果能盡心河務功績昭著者奨薦擢用敢有不服調度怠玩誤事及權豪勢要之家侵占阻截并違例盜決河防應拿問者徑自拿問應叅奏者指名叅奏其餘開載未盡及河道𦂳要事宜悉聼爾便宜處置其有干漕運撫按衙門事體公同計處重大者奏請定奪每年終将修理過河道人夫錢糧照例備細造冊畫圖貼說奏繳其南直𨽻淮揚潁州徐州山東曺濮臨清沂州河南睢陳北直𨽻大名天津各該地方軍務亦聼爾兼理其各兵備道悉聼節制務要防䕶運道永保無虞如遇盜賊生發即便㑹同各該廵撫嚴督該道官兵上𦂳緝剿毋致延蔓若兵備各官縱㓂貽患者叅奏處治爾為重臣受兹委託須殫心竭慮輸忠效勞務俾河道安流糧運無誤斯稱委任如或處置乖方以致誤事責有所歸爾其欽承之母忽故諭萬厯十六年五月十一日謹按形家之言未足深信然天生一代聖君使之紹統立極以開億萬年太平之業必有鍾靈毓秀之地以為之基者成周定鼎郟鄏卜世卜年慎重故也恭閱我三祖之陵居泗州東北一十餘里平原中突起髙阜較泗州城址髙二丈三尺一寸沙陡二湖瀦蓄于前面淮背黄兩河發源之處相距萬餘里蟺蜿而來合于清河縣之東並流入海更無涓滴中泄而龜山半出河中約攔去流于後風氣完固豈偶然哉好事者乃欲以私意鑿見分泄兩河萬一有誤得無令人寒心乎謹按鳳陽皇陵居祖陵之西南一百八十餘里奠南北向而亦面淮形勝稍異而有取于淮黄合襟則同知祖陵則知皇陵矣兩河闗係二陵喫𦂳如此私意鑿見者慎勿易易也黄河發源于星宿海繞崑崙歴積石越西域踰闗陜山西河南經豐碭出徐州始為運道㑹泗沂之水蟺蜿而至清河縣之清口又名南河口㑹淮而東經安東縣以入于海此黄河之大較也以運河言之由浙江至張家灣凡三千七百餘里自浙至蘇則資苕霅諸溪之水常州則資宜溧諸山之水至丹陽而山水絶則資京口所入江潮之水水之盈涸視潮之大小故裏河每患淺澁云自𤓰儀至淮安則南資天長諸山所瀦髙寶諸湖之水西資清口所入淮黄二河之水俱由𤓰儀出江故裏河之深淺亦視兩河之盈縮焉由清口至鎮口閘則資黄河與山東汶泗之水由鎮口閘以至臨清則資汶泗之水即泰安萊蕪徂徠諸泉也然汶河由南旺南北分流並濟故天旱泉㣲每苦不足由臨清至天津則資汶河與漳衞之水由直沽入海而自天津至張家灣則資潞河白河桑乾諸水矣此運河之大畧也若江西湖廣運艘俱由長江入儀真閘止有風波之險而無淺澁之虞此又在運道之外矣河防一覽卷一
