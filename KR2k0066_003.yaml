body:
  text: 河防一覽卷三眀潘季馴撰河防險要淮南一歲防髙堰髙堰為淮揚門户隄防不可不嚴修守不可不預內除石隄三千丈外兩頭土隄每嵗伏秋畫地分守隨汕隨葺似可無虞矣但幫護之法須於冬春間樁內貼席二層緊捆草牛挨席密護毋使些須漏縫然後實土堅夯則是以樁席護草牛以草牛護土浪窩何從得來至於密植橛桞茭葦以為外護須於水落即種庶免淹浸是在當事者加之意耳一歲防湖隄諸湖隄岸見議加幫髙厚且多減水閘尋常之水似可無虞矣但或霪潦彌月山水併發則又不可不預為之計也查得沙壩并芒稻白塔二河俱可泄水當事者因慮私販鹽徒潛通間道每每築壩斷流殊不知欲禁舟航何須築塞河心密布樁柵仍委白塔巡檢嚴防越渡船隻瓜儀諸閘一體開放閘口攔以木柵則湖水可泄而鹽政稅課亦無妨矣一嵗防清江浦外河清江浦內外河相隔僅得一線之隄最為喫緊况黃河自清河縣出口由西射東勢甚湍急然掃灣迎溜之處不過一百五十丈止是捲築雞嘴六道每道相去二三十丈不等阻隔來流復於雞嘴中間捲掃護岸即可支持然倉卒措辦未免張皇莫若於冬春之間捲築大掃幫護老隄掃外深下密樁內用兩笆兩席以護掃亦如歲防髙堰之法自可無虞合用人夫查有近議行銀募夫專聽本隄興作免其别處差撥自可足用其餘樁草所費不多措辦自昜至於用石甃砌以為永久之計則俟工力少裕為之可也雞嘴即順水壩之俗名近日河由草灣清江浦外淤灘甚逺猶恐河性不常二三年間復歸正河修守之法當謹識之一議守徐家壩清河而下黃淮二瀆交流注海越五十里一大折於淮郡之西橋又三十餘里一大折於徐家壩其衝激怒號之勢無異西橋前此治者屢壩屢壞為與水爭尺寸耳今議棄舊址只營月壩去水稍逺令無湍激外護樁掃用實壩基事省功倍良得䇿也每歲派撥官夫預備物料伏秋將屆專責山陽令督管河主簿不時巡視少有圯壞輒先綜理年復如斯斯永賴也一議守八淺隄寶應縣之西十餘里有白馬湖其當湖心而東即所謂八淺隄也往歲隄決湖水奔逸建瓴而下舟楫過者少遇西風輒沉溺不可救其決處濶八十餘丈深且二丈五六尺而水勢湍急莫可名狀雖不惜費寧能與水角力哉屢築無功覆轍可鑒也乃議從湖心淺處先築西隄一道以捍其外仍於河之南北壩二道暫令運艘越湖而行隄壩成則八淺正決瀦水不流捧土而塞之矣是築西隄若乃所以塞東決也但東決雖塞西隄終不可棄必須歲加修築仍密種橛桞茭葦之類使其能當濤浪則東隄不守而自固矣此當於冬初預行寶應縣掌印管河官料理可也一寶應月河自黃浦至三官廟前長二十里水多旁潰入湖是以流緩沙停新閘一𢃄淺阻為梗今加築西上隄一道長三千六百三十五丈以束漕水可省挑濬之費須責夫看守栽植茭桞加意培護歲修之工可勿緩也一嚴閘禁河口諸閘之設先臣平江伯陳瑄殊有深意蓋節宣有度則外河之水不得突入運河之水不得盈漕非惟清江板閘一帶隄岸易守而寶應諸湖亦緩此一派急流矣但啓閉之法非嚴不可如啓通濟閘則福清二閘必不可啓啓清江閘則福通二閘必不可啓啓福興閘則清通二閘必不可啓河水常平船行自易單日放進雙日放出蒲漕方放放後即閉時將入伏即於通濟閘外填築軟壩秋杪方啓悉照先年舊規與近日題準事例行之其於河道關係不小也一歲守淮城北岸遙隄查得清江浦起由桞浦灣至髙嶺止共隄一萬六千九十一丈近又加至戴百户營止共隄八千一百五十六丈向來置之若棄萬歷十三年范家口一決淮城幾為魚鱉工費不資復還故物今已增設大使一員夫五百名專守一代隄岸乃淮安城北外捍殊為喫緊如有油刷隨宜修補倘遇大有損動即於隄內有産之家量起夫役相幫修築伏秋之時選撥省祭隂醫等官盡地分守仍須預備樁草繩葦之類各安置要害處所以待不時之需每歲冬春之交即預行申飭山陽縣掌印官可也目今河由草灣正河俱淤殊不足處然河性不常一旦忽歸正道修守之法仍須志之一歲守通濟閘外大壩舊通濟閘逼近外河河形淺直水勢洶湧不便啓閉而朱家口一帶隄岸尤為難守今移閘於甘羅城旁改河於西南隅而於舊閘內半里許築攔水大壩一道置朱家口於度外似為得䇿矣但大壩最為喫緊萬一傾圯則新河與舊河之水併㵼入閘勢必不支每歲四月初須專委一的當義民官撥夫十餘名量備樁草守之毋忽毋忽議者又謂從大壩迤東兩頭直接泰山築隄一道僅三里許則壩東與髙堰七里墩迤北兩岸一帶隄岸俱不須守而隄內之田皆可耕矣冬涸之時夫力稍暇即宜圗之一防清口淤澀清口乃黃淮交會之所運道必經之處稍有淺阻便非利涉但欲其通利須令全淮之水盡由此出則力能敵黃不為沙墊偶遇黃水先發淮水尚微河沙逆上不免淺阻然黃退淮行深復如故不為害也往歲髙堰潰決淮從東行黃亦隨之而東清口遂為平陸今髙堰築矣獨慮清河縣對岸王家口等處淮水過盛從此決出則清口之力微矣故於清河縣南岸築隄一千一百八十丈今又接築張福口隄四百四十餘丈以防其決蓋為此也工若甚緩而關係甚大已經題奉明旨每歲專責清河縣掌印官責差的當員役看守如遇塌損即便修築更有一事尤宜稽察河南鳳泗等處商販船隻最利由此直逹每為盜決須嚴防之一京口閘附江南丹徒丹陽一帶河道原無水源藉江為源潮長則開京口閘以放舟潮落則下板以蓄水若水涸舟膠則丹徒閘亦係通江支河放水可濟潮水既落車戽亦可須臨時斟酌申嚴啓閉守閘者勿弛禁也淮北一碭山舊縷隄原因傍隄取土以致隄根成河每上流劉霄等口漫溢則直灌隄河壅激衝撞縷隄坐此不支今棄此隄於不用而另幫近年所築月隄已為得䇿又慮縷隄決則月隄亦危且碭山居豐沛上遊碭隄乃豐沛外戶外户失守則堂奧隨之故復倣黃河順水壩之意於單碭接界處築斜長大壩一道長千餘丈使上流漫溢之水循壩徑歸大河不得迫縷隄以危月隄試有成效宜加意此壩冬春撥夫幫培伏秋倍夫防守此保全碭豐沛一𢃄隄防關鍵也一豐縣邵家大壩乃斷絶秦溝舊路最為喫緊今已倍幫髙厚又接長數百丈每歲冝摘調徐北隄夫赴此加修加守若日後夫役錢糧有餘再於華山斜築大壩直至樓子集將秦溝濁河二口俱斷則全勝之䇿也但壩頂髙大斜向東南勿令兜水乃可經久姑識之以俟將來一磨臍溝減水壩徐州東岸南去十餘里有狼矢溝又東十五里許有磨臍溝每歲黃水暴漲則從狼矢溝直下至磨臍溝泄出赤龍潭經鰻蛤諸湖落馬湖出宿遷董陳二溝嘉靖年間全河俱從此出而兩洪正河俱為之奪萬歷七年已於本溝築遙隄一道而地形甚卑水入囊底隨復衝決遂議築減水石壩一座佘郎中親往視之不可而止今此議尚存馴躬率中河沈郎中往視之地形較之河口卑數丈黃河暴漲之時必至逾隄漫流豈肯循軌入壩今議於長塔二山新築隄中建石壩一座長三十丈水漲則泄水退歸漕自無奪河之患矣但壩西與徐州居民甚不利此恐有盜決之患須特設一老人常川看守庶可久耳一徐北鎮口等閘此泉河與黃河交會之處伏秋黃水大發時多灌入本口動至淤阻原任中河郎中陳瑛創建古洪內華二閘近該工科都給事中常題建鎮口一閘如遇水發下板謹閉俟黃水消落即啓閘縱水外衝而漕河無淤墊之患啓一閉二悉如清江裏河事規與近日題奉明例行之其鎮口閘外東西兩隄原係挑河所積客土未堅內水湧出未免剝損伏秋之前密護樁笆隄固則閘無虞矣司閘者冝加慎焉一塔山牛角灣等縷隄鎮口古洪二閘以東多傍山麓以西一望平曠濁河經流更無隄防黃水出岸橫截閘河腹心受病故於塔山支河接築縷隄九百四十二丈而牛角灣係茶城運河舊渠又築壩一道東接塔山西接長隄幾二里許以遏黃流傍入但壩地原係河身下多積沙創築卑薄連歲失守肘腋為患已於本壩之南自舊縷隄支將軍廟起東接塔山增築長隄七百餘丈頗得重門禦暴之意冬春之際多加幫護伏秋之時晝夜防守預辦樁草以備不虞夏鎮第一要害宜殫心力勿忽一徐州之房村牛市口犁林鋪李家井靈璧之雙溝曲頭集栲栳灣睢寧之馬家淺王家口白浪淺何字鋪邳州之匙頭灣張林鋪沙坊等處皆係掃灣急溜先年屢經衝決最為要害今雙溝一帶已議棄縷守遙矣其餘每歲冬春間務及時詳加勘議應護掃者忽護應築磯嘴壩者急築若水既發則難施工矣水發之後尤須倍嚴防守司道府官俱當不時巡閲矧濵河田地每利於黃河出岸淤填肥美姦民往往盜決蓋勢既掃溜止須掘一蟻穴而數十丈立潰矣凡此等處夜防尤不可懈識之慎之一羊山橫隄雙溝棄縷守遙固為得䇿但恐漲水直至近山未免分流今於邳州對河羊山龜山土山相接處創築橫隄長四百八十丈縱有順隄之水遇格即返仍歸正漕自無奪河之患此隄雖係睢寧縣地方然去邳州不逺專責該州掌印管河官時加督閲培築之工勿怠勿忽一議格隄防禦之法格隄甚妙格即橫也蓋縷隄既不可恃萬一決縷而入橫流遇格而止可免泛濫水退本格之水仍復歸漕淤溜地髙最為便益今於南岸房村單家口雙溝馬家淺辛安峯山等處俱築格隄一道併羊山橫隄共七道倘歲歲增修髙厚可永無分流奪河之患矣俟工力有暇再為增築北岸亦倣而行之多多益善也一歸仁集隄本隄所以捍禦黃水睢水湖水使不得泛溢泗州并攻髙堰而又遏睢水湖水使之併入黃河益助衝刷關係最為重大每歲三月間即當撥洪夫二百餘名協同本隄夫併力修護隄下宜密栽茭桞以搪風浪其水浸隄根稍深處即預下護掃一二層樁笆欹朽者務逐一掘換填築內四鋪以至九鋪尤為危險工宜倍之每歲冬春宜多運樁􅐨繩草分貯各鋪其管河主簿督令專駐本隄以便督率前歲議築石隄以工力不足僅成二千一百丈尚餘二千九百丈若得全完幫護之工可免矣然其槖籥則又在小河口之通塞蓋小河通則睢水徑入黃河而歸仁之水減半其藩籬則又在耿車時兒灘一帶之隄蓋此隄髙厚堅固則睢水不能漫入埠子等湖而小河常通矣故上自髙卓下至時灘皆當接築長隄歲加修守且密栽茭草葦以護之蓋修守此隄即所以修守歸仁也况小河常通則靈睢宿遷積水得泄而沮洳漸成膏膄舟行徑直免犯湖險而小民便於販易為地方利又非淺鮮也司河者宜加意促成之一馬厰坡隄桃源縣地方有馬厰坡橫隄長七百四十六丈蓋慮黃水大漲則從此入淮而淮為之淤淮水大漲則從此泄出而清口流弱故特築橫隄一道以遏之使黃不得入淮不得出最為緊關宜慎修之一直河邳州東南六十里原有直河以宣泄蒙沂諸山之水近年因濁流倒灌直河遂塞諸山水俱迤邐由落馬湖經董陳二溝以出大河水勢紆回則近邳田地常被淹浸湖波渺渺則候風舟楫遲滯艱危不特直河居民失市廛之利己也昔已開復通行而迤裏閻家集等口乃原通落馬湖故道復築長隄遏水此隄之堅瑕乃直河所視以通塞者每歲仍須加髙加厚水發之時嚴行防守不令復出落馬湖庶直河可保不淤也奈何繼者失守長隄復決直河因之復塞矣務須查倣先年規制為之此與耿車時灘之隄同一關捩在司河者加之意耳一瀕縷居民遙縷夾中居民及濵河居民俱當諭以移居髙阜處所或即結廬於遙隄之上蓋黃河伏秋盛漲之時縷隄逼水必難恃以為安若水至而後避則無及矣此亦徙民當水衝者之遺意也即小民安土重遷亦須諭以四月暫移至九月復還故址每歲春杪司道即嚴行各州縣家諭而戶曉之久之而民知遙隄之外皆樂土自有不待驅迫而相率移居者矣山東一歲守武王二壩曹縣武家壩王家壩迎溜掃灣逼近老隄最為險要而武壩險又甚焉萬一此壩潰決則城武金鄉數郡邑者悉成沮洳且逼近閘河甚為可虞須於正月間多捲釘頭磯嘴掃壩以遏直射及將老長隄幫厚增髙伏秋防守官夫時刻勿懈萬歷十七年武家壩外忽成淤灘此亦一時之幸未可恃以忽修防也一修守曹單太行隄曹單二縣太行隄創自𢎞治十年河決黃陵岡大傷張秋運道先臣都御史劉忠宣公自河南以至碭沛築長隄一道即太行隄也向來修守止及近水縷隄而行隄置於度外萬歷四年河決魯家口則曹單金魚被淹殆盡萬歷八年題準大加修築屹然可恃以後每二年一次加幫著為定例當事者慎毋居安忘危爽期廢格可也一守戴村壩汶水從陶泰而來就鹽河由博興車瀆入海自宋司空築壩戴村蜒蜿九里屹如天成回狂瀾而逆之西會通河始得濟運此壩係全河屏障先年設夫增土植桞培護周密歲久防弛以漸單薄萬一乘瑕復歸故道不無可慮宜令東平汶上管河官督夫培土栽桞悉如舊制此係運河第一喫緊關鍵故首及之一守坎河口石壩坎河口與戴村壩無異蓋因戴村既築之後水無傍泄歲久復衝此口泉水決入鹽河運河每至淺涸萬厯十六年都給事中常會同撫按題請築壩馴於十七年創築石壩一道長六十丈水漲則任其外泄而湖河無泛濫之患水平則仍復內蓄而漕渠無淺涸之虞利賴甚重防守當嚴必每歲六月初旬即令東平州管河官駐劄壩上備料集夫相機捍禦九月初旬始得徹守著為定例永保萬全司河者宜加慎焉一守馮何二壩馮家壩係蜀山湖之門户地卑而水易泄故築壩以障之蓄可益運泛不病民何家口係南旺湖之尾閭此口稍卑汶水就西而下每決房家口而傷運河之隄南旺之水則涸矣今築石壩平時任其南逝水漲泄而之西良得䇿也每歲伏秋專責管河官不時巡視少有圮壞即便修砌二壩皆係都給事中常會題創築馴督築頗固真永賴也一挑浚汶河淤沙坎河口石壩固為完䇿但可以泄水而不可以通沙日久淤停沙填河內則能致水漲漫或沙嘴橫射河灣則能逼水衝決宜督管河官乘暇集夫挑浚使水不東逼徑直南趨誠為保全石壩要務是在司河者先事而加之意爾一巡守五湖隄岸運艘全賴於漕渠而漕渠每資於水匱五湖者水之匱也止因舊隄浸廢界址不明民乘乾旱越界私種盡為禾麥之場先臣兵部侍郎王原建土隄南旺湖周圍隄長一萬九千七百八十八丈三尺蜀山湖隄自馮家壩起至蘇魯橋止長三千五百八十丈自蘇魯橋西至田家樓止原係收水門户栽植封界髙桞馬場湖隄東面長一千六百二十丈北面原留入水渠道栽植封界髙桞馬踏湖隄自𢎞仁橋起至禹王廟止長三千三百一十三丈安山湖隄長四千三百二十丈而斗門閘壩悉已完備可收濟漕永利萬歷十六年又􅔜都給事中常會題增修馴因舊為新督築完固但近湖射利之徒覬覦水退希圗耕種盜決之弊禁令當嚴每年冬春管河官周圍巡閲責令守湖人役投遞甘結庶河防飭而水利無滲泄之患疆界明而姦民杜侵越之萌矣一因時分合汶流南旺分水地形最髙所謂水舂也決諸南則南流決諸北則北流惟吾所用何如耳當春夏糧運盛行之時正汶水微弱之際分流則不足合流則有餘宜效輪畨法如運艘淺於濟寧之間則閉南旺北閘令汶盡南流以灌茶城如運艘淺於東昌之間則閉南旺南閘令汶盡北流以灌臨清當其南也更發濵南諸湖水佐之當其北也更發濵北諸湖水佐之泉湖兼注南北合流即遇旱暵克有濟矣此以智役水以人勝天力不勞而功倍計無愈此臨時酌之一先期挑濬月河南旺舊例兩年一大挑築壩斷流不通舟楫始開月河官民稱便欲挑正河必先挑月河一時兩役並興夫多苦纍時迫則工必略工略則沙必淤自今萬歷十八年挑正河為大挑十九年挑月河為小挑以後著為定規庶舟楫往返既不阻於稽緩夫役用工亦不病於煩難矣一築土壩以利接濟閘河地亢衛河地窪臨清板閘口正閘衛兩水交會處所每歲三四月間雨少泉澀閘河既淺衛水又消髙下陡峻勢若建瓴每一啓板放船無幾水即盡耗漕舟多阻宜於閘口百丈之外用樁草設築土壩一座中留金門安置活板如閘制然將啓板閘先閉活閘則外有所障水勢稍緩而於運艘出口易於打放衛水大發即從拆卸歲一行之費無幾何此亦權宜之要術也一疏衛濟運衛水發源於河南輝縣蘇門山名曰朔刀泉經新鄉等處合淇漳二水逾館陶至臨清合汶河之水經德州出天津直沽入海板閘以下全賴此水濟運夏秋之交糧運盛行每患淺澀蓋因輝縣源頭建有仁義禮智信五閘壅泉灌溉民田以致水不下流殊妨國計宜行分巡東昌道每嵗糧運北行衛水消涸呈報總河衙門移文河南管河道速將五閘封閉俾水盡歸運河其餘月分或水勢充盈仍聽民便庶公私兩不相妨而運艘不滯矣一疏濬泉源校山東泉源屬濟兗二府一十六州縣共一百八十泉分為五派以濟運道新泰萊蕪泰安肥城東平平隂汶上蒙隂之西寧陽之北九州縣之泉俱入南旺分流其功最多關係最重是為分水派也泗水曲阜滋陽寧陽迤南四縣之泉俱入濟寧關係亦大是為天井派也鄒縣濟寧魚臺嶧縣之西曲阜之北五州縣之泉俱入魯橋是為魯橋派也滕縣諸泉近入獨山吕孟等湖以逹新河是為新河派也又沂水蒙隂諸泉與嶧縣許池泉俱入邳州徐吕而下黃河經行無藉於此是為邳州派也酌其緩急則分水天井魯橋之派屬漕河命脈每歲春夏聼司道嚴督管泉官夫疏濬通逹俾源源而來庶幾有濟但數月不雨其流必渴萬歷十六年漕渠乾涸百計疏濬卒無涓滳之流至閏六月初司大雨連朝諸泉俱湧河渠遂盈則地利未嘗不係於天時也至於山泉沙磧頗多汶河每為淤墊須於大挑之期一併挑濬使泉流無阻亦一䇿也司漕者志之河南一南岸隄防南岸逼近省城藩封重地最為喫緊如滎澤縣之小院村中牟縣之黃煉集祥符縣之瓦子坡槐疙疽劉獸醫口陶家店張家灣時和驛兔伯堽掃頭集陳留縣之王家樓蘭陽縣之趙皮寨儀封縣之李景髙口普家營商丘縣之楊先口俱為要害劉獸醫口先年築有掃壩壩內有月隄一道惟恐月隄不支又於萬歷十七年築遙隄一道長二千七百三十二丈足為屏翰本年題準掃壩不足恃專守月遙二隄訖又陶家店幫接隄長一千八百七十一丈壩長三千六百二十九丈張家灣加修舊壩一道舊隄一道時和驛幫築隄長九百二十丈壩長三百二十七丈又兔伯堽至掃頭集止有一隄倘被衝決則水直至野雞岡趨鳳泗重千陵寢萬歷十八年增築遙隄長二千九百三十丈重門待暴或可無慮又趙皮寨起至李景髙口一𢃄係黃河舊趨鳳泗故道萬歷十七年創築遙隄長二千三百五十九丈九尺最為要害宜慎守之一北岸隄防北岸迫近漕河關係運道最為要害如滎澤縣之甄家莊郭家潭陽武縣之脾沙堽原武縣之廟王口封丘縣之于家店中欒城荆隆口祥符縣之黃陵岡陳橋貫臺馬家口陳留寨蘭陽縣之銅瓦廂板厰樊家莊張村集馬坊營儀封縣之穵泥河煉城口榮花樹三家莊考城縣之陳隆莊芝麻莊孝城口俱為要害荆隆口萬厯十五年河決長東二縣幾溺萬厯十七年創築遙隄長二千九十丈所當加意防守又榮花樹幫築隄長一百七十五丈六尺壩長五百五十九丈三家莊創築壩長二百七十丈芝麻莊創築壩長八十六丈孝城口補築隄長二十八丈壩長二十丈四尺皆係喫緊隄岸並宜分撥官夫防守不懈者也以上南北兩岸要害處所每歲冬春掌印管河官沿隄相度或預捲乾掃以防其油或多築磯嘴以遏其衝各該管河官駐守河濱該道不時巡閲四防二守之法務須三令五事丁寧告戒慎之慎之一修守南北兩岸長隄黃河北岸𢎞治十年河決黃陵岡張秋運道淤阻都御史劉忠宣公築有長隄一道荆隆口之東西各二百餘里黃陵岡之東西各三百餘里自武陟縣詹家店起直抵碭沛一十餘里名曰太行隄蓋取聳峙蜿蜒如山之狀南岸亦舊有長隄一道起自虞城縣至滎澤縣止兩隄延亘一千五百餘里實為該省屏翰但地鮮老土最易衝汕卑薄已甚已經題加幫築於萬厯十七年計築完隄壩共長四萬八千一百二十二丈庶幾可恃以後年分管河官各照地方但有剝損悉如嵗修事例覔取老土填淤加幫髙厚不得擁沙塞責管河道不時巡視探驗加意毋忽一修守沁河隄岸沁河發源於沁州綿山穿太行逹濟源至懷慶府武陟縣與黃會合其湍急之勢較黃河益甚而武陟縣東岸之蓮花池金屹􅨅最其衝射要害處也萬厯十五年沁從此決新鄉獲嘉一帶俱為魚鱉每年堵築掃壩勞費不資且壩內為商民輳集之處煙㸑不下千餘倚隄為命今議甃石四百三十五丈隨守隨修限以三年告成此隄一成永久可恃而議者畏難尚未興舉而北岸大樊村亦係掃灣要害幫隄捲掃均在司河者留意焉直隸一通惠河濬淺築隄通惠河發源於昌平州神山泉會馬眼諸泉經都城入府南出玉河橋由大通橋至通州而與白河合白河發源於霧靈山由密雲縣會榆渾諸河至張家灣總名曰潞河至通州而與通惠河合勢並南流楊村以北通惠之勢峻若建白河之流淤沙易阻夏秋水漲則懼其潦冬春水微則病其澀浮沙之地既難建閘以備節宣惟有濬築之工殊為喫緊萬厯十五年創設管河通判專駐楊村其為修防計得矣但查沿河兩隄如搬繒口火燒屯通濟厰東要兒渡口王家務華家口閻家口綿花市豬市口觀音堂蔡家口桃花口以上隄岸坍塌卑薄最為險要水發即決濵河州縣淹浸為患漕艘漂淌人甚危之應行司道督行管河官每歲冬間辦積樁草春初率夫將前隄加髙幫厚填土實杵不得雜沙塞責糧運將至設法疏濬或築束水小壩衝刷深廣俾漕舟無膠滯之慮民業免沮洳之害司河者宜殫心焉一歲修輔郡長隄大名府屬長東二縣舊有長隄一道延亘一百三十里東至山東曹縣白茅集西至河南封丘縣新豐村止隄外即有淘北河一道相傳即黃河故道也萬歷十五年河由河南封丘縣荆隆口決入挾淘北河衝決本隄之大杜口兩邑昏墊該工科都給事中常會同撫按題奉欽依修築隄完然隄外有月隄三壩名曰三尖口吳家口劉家口在長垣利在泄水不肯閉塞在東明懼其受淹堅欲堵截兩相掣肘雖有壩名終屬虛應即令長隄專設府佐駐守杜勝閘而又畫界分理長垣縣管九十七里東明縣管三十三里建鋪設夫以時修守隄既固矣三壩有無不足較也夫壩之有無係於長隄而隄之利害全在荆隆一帶故添設開封府同知專駐劄荆隆雖衛河南實衛長東二縣也總之荆隆堅守則長隄無事長隄無事則三壩不用二縣之民永帖袵席此探本遡源之論不可不知也長東河官須時時偵探荆隆口隄岸少有衝汕即申總院施行河防一覽卷三
