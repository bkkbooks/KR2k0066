body:
  text: 河防一覽卷四明潘季馴撰修守事宜一築隄凡黃河隄必逺築大約離岸須三二里庶容蓄寬廣可免決齧切勿逼水以致易決隄之高卑因地勢而低昻之先用水平打量毋一槩以若干丈尺為凖務取真正老土每高五寸即夯杵三二遍若有淤泥與老土同第須取起晒涼候稍乾方加夯杵其取土宜逺切忌傍隄挖取以致成河積水刷損隄根驗隄之法用鐵錐筒探之或間一掘試隄式貴坡切忌陡峻如根六丈頂止須二丈俾馬可上下故謂之走馬隄工費凡創築者每方廣一丈高一尺為一方計四工土近者每工銀三分最近者二分土逺者四分如隄根六丈頂二丈須通融作四丈折算此計土論方之法也如幫隄則先計舊隄若干今增濶各若干尺以前法折算一塞決凡隄初決時急將兩頭下掃包裹官夫晝夜看守稍待水勢平緩即從兩頭接築如水勢洶湧頭裹不住即於本隄退後數丈挖槽下掃如裹頭之法刷至彼必住矣此謂截頭裹也如又不住即於上首築逼水大壩一道分水勢射對岸使回溜衝刷正河則塞工可施矣塞將完時水口漸窄水勢益湧又有合口之難須用頭細尾粗之掃名曰鼠頭掃俾上水口濶下水口收庶不致滚失而塞工易就也掃以土勝為主掃臺須要卧羊坡以便推挽揪頭繩須要緊扯以防下遊又須時時打鬆令其深下仍覔慣會泅水之人入水探驗底掃著地方下簽樟簽樟須要酌中掃掃釘著方為堅固倘有數寸空懸無有不敗事者如寒天或水急不能泅水即看揪頭寬鬆便是著地之驗繫繩留橛令人專守略有走動便須另下一橛橛頭上填記苐幾掃揪頭滚肚明白以便點查收放掃面出水未高寧加一小掃不可多用土牛推掃時易動故也此等事須要勇往直前俗諺謂之搶築稍稍逗遛必有後悔以上數端茍不詳審勞費罔功輒疑鬼怪甚可嗤也如用大掃長伍丈髙六七尺者用草六百束每束重十斤價銀二釐該銀一兩二錢栁稍一百二十束每束重三十斤價銀一分該銀一兩二錢如無栁稍以葦代之草繩六十套每套四十二條每條長二丈四尺價銀三分該銀一兩八錢樁木五根每根銀一錢該銀五錢揪頭滚肚繩四條共用􅐨二百五十斤每斤價銀五釐該銀一兩二錢五分每大掃一箇約共該料價銀五兩九錢五分挑土夫土逺近不等難以預計中掃并土牛工料以次遞減一築順水壩順水壩俗名雞嘴又名馬頭專為喫緊迎溜處所如本隄水刷洶湧雖有邉掃難以久恃必須將本隄首築順水壩一道長十數丈或五六丈一丈之壩可逼水逺去數丈隄根自成淤灘而下首之隄俱固矣安掃之法上水廂邉掃宜出將裹頭掃藏入在內下水掃宜退藏入裹頭掃內庶水不得揭動掃也如築長六丈濶四丈高一丈用掃兩面廂邉每邉用掃二行裹頭二行中間填土每行用掃三層共計用中掃十八箇每箇長五丈高三尺用草四百束栁稍八十束草繩四十條排樁簽樁共用樁木四根人夫二十五工共用捲掃隄夫四百五十工運土隄夫二百工俱不議工食共用草七千二百束該銀一十四兩四錢栁稍或葦一千四百四十束該銀二十四兩四錢草繩七百二十套該銀二十二兩六錢椿木七十二根該銀七兩二錢行繩十二條每條重四十斤共用􅐨四百八十斤該銀二兩四錢約共該銀六十兩如無栁稍以葦代之一下獲根乾掃凡隄係掃灣須預下乾掃以衛隄根此掃須土多料少簽椿必用長壯入地稍深庶不坍蟄如下長三丈高三尺掃一箇用草一百六十束該銀三錢二分柳稍四十束該銀四錢草繩十二套該銀六錢樁木三根該銀三錢量用􅐨作行繩用隄夫二十工不議工食每掃一箇約共該料價銀一兩六錢二分一造滚水石壩滚水石壩即減水壩也為伏秋水發盈漕恐勢大漫隄設此分殺水勢稍消即歸正漕故建壩必擇要害卑窪去處堅實地基先下地釘樁鋸平下龍骨木仍用石楂鐵縫方鋪底石壘砌鴈翅宜長宜坡跌水宜長迎水宜短俱用立石攔門樁數層其地釘椿須劄鷹架用懸硪釘下石縫須用糯汁和灰縫使水不入如石壩一座壩身連鴈翅共長三十丈壩身根濶一丈五尺收頂一丈二尺高一尺五寸迎水濶五尺跌水石濶二丈四尺四鴈翅各斜長二丈五尺高九尺用粗細石計長一千三百九十餘丈并地釘樁龍骨木鐵錠鐵銷煤炭石灰木炭糯米􅐨麻及各匠工食約共該銀一千九百餘兩其運石抬石搬料夫船并官夫廪糧工食臨期酌給一建石閘建閘節水必擇堅地開基先挖固工塘有水即車乾方下地釘樁將樁頭鋸平縫上用龍骨木地平板鋪底用灰麻艌過方砌底石仍于迎水用立石一行攔門樁二行跌水用立石二行攔門樁八行如地平板鋪完工過半矣自金門起兩面壘砌完方鋪海漫鴈翅金門長二丈七尺兩邉轉角至鴈翅各長五丈共用石三千一百丈閘底海漫攔水跌水共用石九百丈二項共用石四千丈并鐵錠鐵銷鐵鋦天橋環地釘樁龍骨木地平板萬年坊閘板絞關閘耳絞軸托橋木石灰香油􅐨麻柴炭等項及各匠工食約共該銀三千兩有竒其官夫廪糧工食臨期酌給一建涵洞建涵洞以泄積水基址亦擇堅實方可下釘樁砌石水多則建二孔少止一孔如涵洞一座口濶一丈五尺身長二丈中立石墻一堵亦長二丈寬五尺分為二孔每孔寬五尺兩邉四鴈翅各一丈五尺共用石二百丈并地釘樁鐵錠石灰板木并各匠工食約該銀一百八十餘兩其夫役工食臨期酌給一建車船壩先築基堅實埋大木于下以草土覆之時灌水其上令軟滑不傷船壩東西用將軍柱各四柱上橫施天盤木各二下施石窩各二中置轉軸木各二根每根為竅二貫以絞關木繫蔑纜于船縛于軸執絞關木環軸而推之一挑河凡桃河面宜濶底宜深如鍋底樣庶中流常深且岸不坍塌如不用隄須將土運于百餘丈外以免淋入河內凡創開河者每方廣一丈每夫日開深一尺為一工挑濬泥水相半者減十分之五全係水中撈取者減十之七八取土登岸就而築隄者亦以半折算焉一閘河偶淺急疏之法凡閘河淺處如水溜在中須兩岸築丁頭壩以束之水溜在傍將淺邉順築束水長壩以逼之水由壩中其勢自急中溜自深如淺處不多或排板插下泥內逼水湧刷或排小船用杏葉杓挖濬必不得已則用樁草製活閘節水亦一䇿也一栽柳護隄卧柳長柳須相兼栽植卧柳須用核桃大者入地二尺餘出地二三寸許柳去隄址約二三尺密栽俾枝葉搪禦風浪長柳須距隄五六尺許既可捍水且每歲有大枝可供掃料俱宜于冬春之交津液含蓄之時栽之仍須時常澆灌長柳宜用棘刺圍護以防盜拔畜嚙一栽茭葦草子護隄凡隄臨水者須於隄下密栽蘆葦或茭草俱掘連根叢株先用引橛錐窟深數尺然後栽入訃濶丈許將來衍茁愈蕃即有風不能鼓浪此護臨水隄之要法也隄根至面再採草子乘春初稍鋤覆密種俟其暢茂雖雨淋不能刷土矣一伏秋修守四防一曰晝防隄岸每遇黃水大發急溜掃灣處所未免刷損若不即行修補則掃灣之隄愈漸坍塌必致潰決宜督守隄人夫每日捲土牛小掃聽用但有刷損者隨刷隨補毋使崩卸少暇則督令取土堆積隄上若子隄然以備不時之需是為晝防二曰夜防守隄人夫每遇水發之時修補刷損隄工盡日無暇夜則勞倦未免熟睡若不設法巡視恐寅夜無防未免失事須置立五更牌面分發南北兩岸協守官并管工委官照更挨發各鋪傳遞如天字鋪發一更牌至二更時前牌未到日字鋪即差人挨查係何鋪稽遲即時拿究餘鋪倣此隄岸不斷人行庶可無誤巡守是為夜防三曰風防水發之時多有大風猛浪隄岸難免撞損若不防之于微久則坍薄潰決矣須督隄夫捆札龍尾小掃擺列隄面如遇風浪大作將前掃用繩樁懸繫附隄水面縱有風浪隨起隨落足以護衛是為風防四曰雨防守隄人夫每遇驟雨淋漓若無雨具必難存立未免各投人家或鋪舍暫避隄岸倘有刷掃何人看視須督各鋪夫役每名各置斗笠蓑衣遇有大雨各夫穿帶隄面擺立時時巡視乃無踈虞是為雨防二守一曰官守黃河盛漲管河官一人不能周巡兩岸須添委一協守職官分岸巡督每隄三里原設鋪一座每鋪夫三十名計每夫分守隄一十八丈宜責每夫二名共一段於隄面之上共搭一窩鋪仍置燈籠一箇遇夜在彼棲止以便傳遞更牌巡視仍畫地分委省義等官日則督夫修補夜則稽查更牌管河官并協守職官時常催督巡視庶防守無頃刻懈弛而隄岸可保無事二曰民守每鋪三里雖已派夫三十名足以修守恐各夫調用無常仍須預備宜照往年舊規於附近臨隄鄉村每鋪各添派鄉夫十名水發上隄與同鋪夫併力協守水落即省放回家量時去留不妨農業不惟隄岸有賴而附隄之民亦得各保田廬矣一竪立旗竿燈籠以示防守各鋪相離頗逺倘一鋪有警别鋪不聞有誤救護須令隄老每鋪𥪡立旗竿一根黃旗一面上書某字鋪三字燈籠一箇晝則懸旗夜則挂燈以便瞻望仍置銅鑼一面以便轉報一鋪有警鳴鑼為號臨鋪夫老挨次傳報各鋪夫老併力齊赴有警處所即時救護首尾相顧通力合作庶保萬全一防盜決守隄之法隄防盜決最為喫緊蓋盜決有數端坡水稍積決而泄之一也地土磽薄決而淤之二也仇家相傾決而灌之三也至於伏秋水漲處處危急鄰隄官老隂伺便處盜而泄之諸隄皆易保守四也巡警稍怠或乘風雨之時或乘酣睡之處即被下手矣防禦者不可不知一議涵洞涵洞泄水本是無妨但須明設石閘以嚴啓閉若暗開隄址草木蒙叢便難覺察萬厯八年姦民私囑管河主簿將南岸遙隄暗開涵洞數座十七年伏水暴漲單家口水從涵洞泄出勢甚洶湧一鼓而開遂成大決此可謂明鑑矣司河者知之一歲辦物料河防全在歲修歲修全在物料而州縣河官視為竒貨歲估既定冒銀入已括取里遞草束河夫攀折栁稍遮掩一二便為了事近日徐州判官彭鶴靈璧主簿元仲賢之事可鑒也今議於十一月間司道官估計停當各掌印官領銀收買法固善矣又須特委亷能職官一二員專管收支工完之日將捲築過掃壩收支過物料數日開報總河衙門查考庶幾事有責成而錢糧無冒破矣又冬初修守稍暇即督夫於漫坡中採取野草每束十斤者每夫每日可採四十束積至百萬可省千金禆益非小草料既備掃護必周衝決之患可免即脫有不測而物料在手計日可塞何致延闊糜費此河道第一喫緊工夫也一水汛立春之後東風解凍河邉人候水初至凡一寸則夏秋當至一尺頗為信驗謂之信水二月三月桃花始開氷泮雨積川流猥集波瀾盛長謂之桃花水春末蕪菁華開謂之菜華水四月壠麥結秀擢芒變色謂之麥黃水五月瓜實延蔓謂之瓜蔓水朔野之地深山窮谷氷堅晚泮逮乎盛夏消釋方盡而沃蕩山石水𢃄礬腥併流于河故六月中旬之水謂之礬山水七月菽豆方秀謂之豆華水八月荻薍華謂之荻苖水九月以重陽紀節謂之登高水十月水落安流復其故道謂之復槽水十一月十二月斷氷雜流乘寒復結謂之蹙凌水此外非時暴漲謂之客水皆當督夫巡守而伏秋水勢最盛非他時此故防者晝夜不可少懈云河防一覽卷四
