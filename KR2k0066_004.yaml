body:
  text: 河防一覽卷四明潘季馴撰修守事宜一築隄凡黄河隄必逺築大約離岸須三二里庻容蓄寛廣可免决齧切勿逼水以致易决隄之高卑因地勢而低昻之先用水平打量毋一槩以若干丈尺為凖務取真正老土毎高五寸即夯杵三二遍若有淤泥與老土同第湏取起晒凉候稍乾方加夯杵其取土宜逺切忌傍隄挖取以致成河積水刷損隄根驗隄之法用鉄錐筒探之或間一掘試隄式貴坡切忌陡峻如根六丈頂止須二丈俾馬可上下故謂之走馬隄工費凡創築者毎方廣一丈高一尺為一方計四工土近者毎工銀三分最近者二分土逺者四分如隄根六丈頂二丈須通融作四丈折筭此計土論方之法也如幇隄則先計舊隄若干今増濶各若干尺以前法折筭一塞決凡隄初决時急將兩頭下埽包裹官夫晝夜看守稍待水勢平緩即從両頭接築如水勢洶湧頭裹不住即於本隄退後數丈挖槽下埽如裹頭之法刷至彼必住矣此謂截頭裹也如又不住即於上首築逼水大壩一道分水勢射對岸使回溜衝刷正河則塞工可施矣塞將完時水口漸窄水勢益湧又有合口之難湏用頭細尾粗之埽名曰鼠頭埽俾上水口濶下水口收庻不致滚失而塞工易就也埽以土勝為主埽臺湏要卧羊坡以便推挽揪頭䋲湏要緊扯以防下㳺又湏時時打鬆令其深下仍覔慣會泅水之人入水探驗底埽着地方下簽樟簽樟湏要酌中埽埽釘着方為堅固倘有數寸空懸無有不敗事者如寒天或水急不能泅水即看揪頭寛鬆便是着地之驗繫䋲留橛令人專守畧有走動便須另下一橛橛頭上填記苐幾埽揪頭滚肚明白以便㸃查收放埽面出水未高寜加一小埽不可多用土牛推埽時易動故也此等事湏要勇徃直前俗諺謂之搶築稍稍逗遛必有後悔以上數端茍不詳審勞費罔功輒疑鬼恠甚可嗤也如用大埽長伍丈髙六七尺者用草六百束毎束重十斤價銀二厘該銀一両二錢栁稍一百二十束毎束重三十斤價銀一分該銀一両二錢如無栁稍以葦代之草䋲六十套毎套四十二條毎條長二丈四尺價銀三分該銀一両八錢樁木五根毎根銀一錢該銀五錢揪頭滚肚䋲四條共用􅐨二百五十斤每斤價銀五厘該銀一両二錢五分每大埽一箇約共該料價銀五両九錢五分挑土夫土逺近不等難以預計中埽并土牛工料以次逓減一築順水壩順水壩俗名鷄嘴又名馬頭專為喫緊迎溜處所如本隄水刷洶湧雖有邉埽難以乆恃必須將本隄首築順水壩一道長十數丈或五六丈一丈之壩可逼水逺去數丈隄根自成淤灘而下首之隄俱固矣安埽之法上水廂邉埽宜出將裹頭埽藏入在内下水埽宜退藏入裹頭埽内庻水不得掲動埽也如築長六丈濶四丈高一丈用埽両面廂邉毎邉用埽二行裹頭二行中間填土毎行用埽三層共計用中埽十八箇每箇長五丈高三尺用草四百束栁稍八十束草䋲四十條排樁簽樁共用樁木四根人夫二十五工共用捲埽隄夫四百五十工運土隄夫二百工俱不議工食共用草七千二百束該銀一十四兩四錢栁稍或葦一千四百四十束該銀二十四兩四錢草䋲七百二十套該銀二十二兩六錢椿木七十二根該銀七兩二錢行䋲十二條毎條重四十斤共用􅐨四百八十斤該銀二両四錢約共該銀六十兩如無栁稍以葦代之一下獲根乾埽凡隄係掃灣須預下乾埽以衞隄根此埽須土多料少簽椿必用長壮入地稍深庻不坍蟄如下長三丈高三尺埽一箇用草一百六十束該銀三錢二分柳稍四十束該銀四錢草䋲十二套該銀六錢樁木三根該銀三錢量用􅐨作行䋲用隄夫二十工不議工食毎埽一箇約共該料價銀一兩六錢二分一造滚水石壩滚水石壩即减水壩也為伏秋水發盈漕恐勢大漫隄設此分殺水勢稍消即歸正漕故建壩必擇要害卑窪去處堅實地基先下地釘樁鋸平下龍骨木仍用石楂鉄縫方鋪底石壘砌鴈翅宜長宜坡跌水宜長迎水宜短俱用立石攔門樁數層其地釘椿須劄鷹架用懸硪釘下石縫須用糯汁和灰縫使水不入如石壩一座壩身連鴈翅共長三十丈壩身根濶一丈五尺收頂一丈二尺高一尺五寸迎水濶五尺跌水石濶二丈四尺四鴈翅各斜長二丈五尺高九尺用粗細石計長一千三百九十餘丈并地釘樁龍骨木鉄錠鉄銷煤炭石灰木炭糯米􅐨麻及各匠工食約共該銀一千九百餘兩其運石抬石搬料夫船并官夫廪粮工食臨期酌給一建石閘建閘節水必擇堅地開基先挖固工塘有水即車乾方下地釘樁將樁頭鋸平縫上用龍骨木地平板鋪底用灰麻艌過方砌底石仍于迎水用立石一行攔門樁二行跌水用立石二行攔門樁八行如地平板鋪完工過半矣自金門起兩面壘砌完方鋪海漫鴈翅金門長二丈七尺兩邉轉角至鴈翅各長五丈共用石三千一百丈閘底海漫攔水跌水共用石九百丈二項共用石四千丈并鉄錠鉄銷鉄鋦天橋環地釘樁龍骨木地平板萬年坊閘板絞關閘耳絞軸托橋木石灰香油􅐨麻柴炭等項及各匠工食約共該銀三千兩有竒其官夫廪粮工食臨期酌給一建涵洞建涵洞以洩積水基址亦擇堅實方可下釘樁砌石水多則建二孔少止一孔如涵洞一座口濶一丈五尺身長二丈中立石墻一堵亦長二丈寛五尺分為二孔每孔寛五尺兩邉四鴈翅各一丈五尺共用石二百丈并地釘樁鉄錠石灰板木并各匠工食約該銀一百八十餘兩其夫役工食臨期酌給一建車船壩先築基堅實埋大木于下以草土覆之時灌水其上令軟滑不傷船壩東西用將軍柱各四柱上横施天盤木各二下施石窩各二中置轉軸木各二根毎根為竅二貫以絞關木繫蔑䌫于船縛于軸執絞關木環軸而推之一挑河凡桃河面宜濶底宜深如鍋底様庻中流常深且岸不坍塌如不用隄湏將土運于百餘丈外以免淋入河内凡創開河者每方廣一丈毎夫日開深一尺為一工挑濬泥水相半者减十分之五全係水中撈取者减十之七八取土登岸就而築隄者亦以半折筭焉一閘河偶淺急疏之法凡閘河淺處如水溜在中須兩岸築丁頭壩以束之水溜在傍將淺邉順築束水長壩以逼之水由壩中其勢自急中溜自深如淺處不多或排板挿下泥内逼水湧刷或排小船用杏葉杓挖濬必不得已則用樁草製活閘節水亦一䇿也一栽柳䕶隄卧柳長柳湏相兼栽植卧柳須用核桃大者入地二尺餘出地二三寸許柳去隄址約二三尺宻栽俾枝葉搪禦風浪長柳須距隄五六尺許既可捍水且毎歳有大枝可供埽料俱宜于冬春之交津液含蓄之時栽之仍須時常澆灌長柳宜用棘刺圍䕶以防盗㧞畜嚙一栽茭葦草子䕶隄凡隄臨水者須於隄下宻栽蘆葦或茭草俱掘連根叢株先用引橛錐窟深數尺然後栽入訃濶丈許將來衍茁愈蕃即有風不能鼓浪此䕶臨水隄之要法也隄根至面再採草子乗春初稍鋤覆宻種俟其暢茂雖雨淋不能刷土矣一伏秋修守四防一曰晝防隄岸每遇黄水大發急溜掃灣處所未免刷損若不即行修補則掃灣之隄愈漸坍塌必致潰決宜督守隄人夫毎日捲土牛小埽聴用但有刷損者隨刷隨補毋使崩卸少暇則督令取土堆積隄上若子隄然以備不時之需是為晝防二曰夜防守隄人夫毎遇水發之時修補刷損隄工盡日無暇夜則勞倦未免熟睡若不設法巡視恐寅夜無防未免失事湏置立五更牌面分發南北兩岸恊守官并管工委官照更挨發各鋪傳逓如天字鋪發一更牌至二更時前牌未到日字鋪即差人挨查係何鋪稽遲即時拿究餘鋪倣此隄岸不㫁人行庻可無誤巡守是為夜防三曰風防水發之時多有大風猛浪隄岸難免撞損若不防之于㣲乆則坍薄潰決矣須督隄夫綑札龍尾小埽擺列隄面如遇風浪大作將前埽用䋲樁懸繫附隄水面縱有風浪隨起隨落足以䕶衞是為風防四曰雨防守隄人夫毎遇驟雨淋漓若無雨具必難存立未免各投人家或鋪舍暫避隄岸倘有刷掃何人看視須督各鋪夫役毎名各置斗笠蓑衣遇有大雨各夫穿帶隄面擺立時時巡視乃無踈虞是為雨防二守一曰官守黄河盛漲管河官一人不能周巡兩岸須添委一恊守職官分岸巡督毎隄三里原設舖一座毎鋪夫三十名計毎夫分守隄一十八丈宜責毎夫二名共一段於隄面之上共搭一窝舖仍置燈籠一箇遇夜在彼棲止以便傳逓更牌巡視仍畫地分委省義等官日則督夫修補夜則稽查更牌管河官并恊守職官時常催督巡視庻防守無頃刻懈弛而隄岸可保無事二曰民守毎鋪三里雖已派夫三十名足以修守恐各夫調用無常仍須預備宜照徃年舊規於附近臨隄鄉村毎鋪各添派鄉夫十名水發上隄與同鋪夫併力恊守水落即省放回家量時去留不妨農業不惟隄岸有頼而附隄之民亦得各保田廬矣一竪立旗竿燈籠以示防守各鋪相離頗逺倘一鋪有警别鋪不聞有誤救䕶須令隄老毎鋪𥪡立旗竿一根黄旗一面上書某字鋪三字燈籠壹箇晝則懸旗夜則掛燈以便瞻望仍置銅鑼一面以便轉報一鋪有警鳴鑼為號臨鋪夫老挨次傳報各鋪夫老併力齊赴有警處所即時救䕶首尾相顧通力合作庻保萬全一防盗決守隄之法隄防盗決最為喫緊蓋盗決有數端坡水稍積决而洩之一也地土磽薄决而淤之二也仇家相傾决而灌之三也至於伏秋水漲處處危急隣隄官老隂伺便處盗而洩之諸隄皆易保守四也巡警稍怠或乗風雨之時或乗酣睡之處即被下手矣防禦者不可不知一議涵洞涵洞洩水本是無妨但湏明設石閘以嚴啓閉若暗開隄址草木蒙叢便難覺察萬厯八年奸民私囑管河主簿將南岸遥隄暗開涵洞數座十七年伏水暴漲單家口水從涵洞洩出勢甚洶湧一鼓而開遂成大決此可謂明鑑矣司河者知之一歳辦物料河防全在歳修歳修全在物料而州縣河官視為竒貨歳估既定冐銀入已括取里逓草束河夫攀折栁稍遮掩一二便為了事近日徐州判官彭鶴靈璧主簿元仲賢之事可鑒也今議於十一月間司道官估計停當各掌印官領銀收買法固善矣又湏特委亷能職官一二員專管收支工完之日將捲築過埽壩收支過物料數日開報總河衙門查考庻幾事有責成而錢糧無冐破矣又冬初修守稍暇即督夫於漫坡中採取野草毎束十斤者毎夫毎日可採四十束積至百萬可省千金禆益非小草料既備埽䕶必周衝決之患可免即脫有不測而物料在手計日可塞何致延闊糜費此河道第一喫緊工夫也一水汛立春之後東風解凍河邉人候水初至凡一寸則夏秋當至一尺頗為信驗謂之信水二月三月桃花始開氷泮雨積川流猥集波瀾盛長謂之桃花水春末蕪菁華開謂之菜華水四月壠麥結秀擢芒變色謂之麥黄水五月瓜實延蔓謂之瓜蔓水朔野之地深山窮谷氷堅晚泮逮乎盛夏消釋方盡而沃蕩山石水𢃄礬腥併流于河故六月中旬之水謂之礬山水七月菽豆方秀謂之豆華水八月荻薍華謂之荻苖水九月以重陽紀節謂之登高水十月水落安流復其故道謂之復槽水十一月十二月㫁氷雜流乗寒復結謂之蹙凌水此外非時暴漲謂之客水皆當督夫巡守而伏秋水勢最盛非他時此故防者晝夜不可少懈云河防一覽卷四
