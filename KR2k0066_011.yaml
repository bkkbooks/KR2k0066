五丈栁浦灣張家窪等處土隄樁笆共長一千一百九十八丈二尺并建物料厰一所築過鹽壩迤南隄岸長六十一丈挑濬淮揚運河北自清河口南至瓜儀共長四千四百一十三丈九尺築過裏河東西束水樁笆土隄共長三百二十丈修砌界首三里湖石隄長八百四十丈高郵州南北小湖口石隄共長三百九十丈寶應西土隄二十里俱經報完邵伯石隄二十里修砌將完正在報竣其各處歲修工程隨地幫築者不可勝紀積勞之後致感喉疾身故為照本官經濟練才膚敏素抱始以寶應功成薦擢水部因而南河受事值際河艱荒度三年歷寒暑而曾無厭怠拮據萬狀雖纖細而必自身親闕緒奚啻千端土石隄防若欽工若歲工延袤殆將百里工已報竣人即云亡蓋平生精力殫於胼胝而一念艱貞比之金石宦囊淡薄衾斂無以為資旅櫬淒涼道路為之動惻所謂鞠躬盡瘁死而後已者於本官真無愧矣即今旦夕報功已在首敘之列豈可勤勞死事寂無優恤之酬及查萬厯九年中河郎中佘毅中在任病故該部院題奉明旨加贈太常寺卿今郎中羅用敬工程勞績委與佘毅中事例相同合無請乞本院俯賜會題特加贈典庶幽魂永慰於地下而人心激勵於將來等因到臣該臣會同總督漕撫户部右侍郎兼都察院右僉都御史舒應龍照得原任工部都水司南河郎中羅用敬秉心忠赤敷治精明出宰菰城遺思尚在明刑淮甸平反有聲改任南河之官正當弛防之日范家口之隄未固天妃壩之決復仍東支西吾此顧彼失敡歷三年之久曽無片刻之休延袤千里之間寧有不遍之足舊工未艾新役復興濬淺培卑種種皆其料理鳩工集事紛紛多所取裁朝于斯暮于斯飲食起居于斯已絶生人之樂寒不息暑不息烈風暴雨不息常懷殉國之心以故河湖夾攻之地並無一隙之虞築濬兼舉之秋能獲萬全之䇿形神俱敝智力兩窮寸心如焚諸火並發積成喉病其及宜矣又聞本官未死之二曰猶扶疾遍歷諸工口不能言惟以手指醫人立勸歸署就榻即仆古人所謂鞠躬盡瘁死而後已者非其人哉身死之後囊無餘資臣等與地方諸寮曲為捐助始就棺殮又可知其生平矣興言及此不覺淚下身在固當優敘歿後尤宜厚酬所據司道查有原任工部郎中佘毅中事例曲為申懇似宜允從伏望敕下該部再加查議如果臣等所言不謬具疏覆請從厚優恤河臣幸甚臣等再照天下之事勞心以治人者其力或可少憩勞力以治於人者其心尚有餘間維兹河工必須心力兩盡方克有濟故雖以大禹之智猶不免于手足胼胝也十年之內但經河工大舉必有殉身之臣兩淮運同贈行太僕寺少卿黃清中河郎中佘毅中山東參政馮敏功徐州道副使莫與齊河南僉事余希周南河郎中羅用敬相繼客死工所臣等皆所目擊而其他卑官散秩泯沒無聞者未可悉數故近來大小諸臣視河官如桎梏偶得脫免若釋重負如蒙皇上俯賜矜憐曲為優處恤既死者於身後鼓見任者於生前亦礪世磨鈍之一機也臣等不勝惶悚懇祈之至謹題請旨奉聖旨該部知道該吏部議覆奉聖旨羅用敬準贈太僕寺少卿河防一覽卷十一
