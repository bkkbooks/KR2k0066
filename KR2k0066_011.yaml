body:
  text: 河防一覽卷十一明潘季馴撰添設管河官員疏臣潘季馴謹題為查議管河官員以禆修防事據河南管河道副使陳九仞呈稱蒙臣閲視河隄勘得府州縣管河官員有地方廣逺一官難以管攝者有河防險要未經額設專官者有升遷事故見今懸缺待銓者牌仰本道會同酌議某處應該添補某處應該更調就便遴選賢能堪任官員具由通詳以慿會題蒙此行據開封府議呈前來該本道會同守巡大梁道參政王來賢僉事王九儀議得黃河經行開封府屬岐分兩岸延袤千里南岸如小院村瓦子坡黃煉集閻家寨劉獸醫口陶家店張家灣時和驛槐疙疸王家樓掃頭普家營等處繫關省會藩封重地北岸如甄家莊郭家潭脾沙堽于家店中欒城荆隆口陳橋貫臺馬家口陳留寨銅瓦廂張村集煉城口榮花樹三家莊等處逼鄰漕河重干運道先年屢被衝決今雖築隄完固但管河同知止有一員平時修守已難周遍若遇河漲風濤兩岸相隔顧此失彼何以克濟應照淮安兗州兩府各有管河同知二員事例添設一員駐劄北岸荆隆口及查河北舊有演武亭一處乃滎澤等四縣聨界之區盜賊出沒水陸為害先年曽設官兵防禦今已廢格時有警虞似當以添設管河同知仍兼捕務往來督視以靖地方庶為兩便及查祥符縣河工浩繁道里遼逺額設主簿一員委難卒辦相應添設主簿一員以分責任滎澤縣居黃河上流向屬縣丞兼管今改沁水與黃合流盡由該縣出口二河併湧兩岸俱險乃縣丞督糧兊運往返不暇有誤河防相應創置主簿一員以專責成蘭陽縣管河主簿王佩儀封縣管河主簿余純華俱已升任員缺未補以上四縣應添應補官員若候銓選未免耽延時日且初任未諳恐致墮誤河工今據該府推舉各道遴擇查有開封府經厯姚學孔才幹優裕操守謹嚴督工克效勞迹防禦已竭心力宣武衛經厯劉汝行小心勤慎幹理條達河工夙夜多勞厰務纎毫無染俱蒙院科會薦內應選擇一員加以帶銜州判管祥符縣添設主簿河務原任滎澤縣典史今升光山縣牛山巡檢高榮魁向委隄工克勤厥事雖經遷轉而修防皆屬經手相應升補該縣管河主簿原任通許縣縣丞今升陜西葭州判官吕文承委修築則竭力經營居官操持則恪守清潔今雖報升尚未離任似宜改留仍以帶銜州判管理蘭陽縣主簿河務原任陳州吏目今升甘泉縣主簿李克己才力俱壯心行亦純若畀胼胝之任必收底績之功相應改留頂補儀封縣管河主簿其中牟縣管河該府議欲添官但邑小民疲既有縣丞兼理似應照舊再照黃河兩岸盜賊繁興舊委巡河指揮二員徒擁虛名無益河防且擾害莊民需騙船户今既添設同知主簿駐守河濵巡緝事宜應歸河官約束督理原委武職革撤回衛庶分理得人河防捕務均有攸賴等因呈詳到臣據此近該臣前往河南地方躬率管河道副使陳九仞并分守道參政王來賢分巡道僉事王九儀開歸二府知府王見賔陳裪及各該州縣管河等官沿河踏勘每至本官該管地方備將本處要害細加詢問做過工程細加閲視中間隄壩堅好應答如流者固有而苟且虛應蒙昧無知者亦多揆厥所由有因道里遙逺而奔走不及者有因官係兼攝而志意不專者有因河官懸缺暫委代署者隨行該道查議去後今據前因該臣會同巡撫河南右副都御史衷貞吉巡按河南監察御史王世揚看得河南實運道上流關係甚重而用人實治河首務毗藉甚殷經理于上者固為巨艱而委任于下者尤為喫緊頃者節奉聖諭自今推選委用務在得人欽此臣等仰見我皇上留神河務洞燭治原矣臣等不勝感服今據各道議將開封府比照淮安兖州二府事例添設同知一員駐劄荆隆口地方帶管巡捕事務蓋荆隆口逼近長東二縣去年黃河從此決入長東幾溺若有府官駐劄必能保守衛河南亦衛長東二縣也其應添設及銓補管河主簿就將經歷姚學孔劉汝行內定一員加以判官職銜分管祥符縣河務巡檢高榮魁升授主簿管滎澤縣河務判官吕文仍以原職帶銜改留管理蘭陽縣主簿河務主簿李克己應以原職改留頂補儀封縣管河主簿中牟縣邑小民疲河患亦少原係縣丞兼攝委應照舊其升補各官遺下員缺聽另銓補原委巡河指揮擾民無益合革回衛一應巡河事宜歸併管河官兼管尤為良便似應依擬伏望敕下該部再加查議如果臣等所言不謬覆請允行速賜改補以便預備來歲修防儀封蘭陽二主簿缺或於臣疏未到之前已經銓補仍恐初任未諳亦望轉改别用其開封府添設同知查無相應官員乞於鄰省查有資俸相應者就近調補勒限到任庶承委得人而河防允賴矣緣係查議管河官員以裨修防事理謹題請旨奉聖旨吏部知道該部覆奉施行申明河南修守疏臣潘季馴謹題為申明河南修守事宜以固河防事臣竊惟黃河防禦甚難而中州為尤難蓋河自崑崙歷關陜以至河南則伊洛渭沁諸水合焉水愈多勢愈盛而自三門七律以下地皆浮沙最易汕刷故自漢迄今東衝西決未有不始自河南者也去歲河決劉獸醫荆隆口等處勢如飛電呼吸千里上厪聖慮特遣科臣會同撫按諸臣分投督築地方始有更生之樂然先事之防固當預慎善後之計尤宜亟圖則今日修守之事臣之事也臣之責也敢不盡心力而圖之乎臣於受事之初惓惓申飭各該道府管河等官又將四防二守之法丁寧告戒今歲幸保無虞矣而猶慮河情地勢目所未睹足所未及者固難以懸想而測度之也復於九月初七日自濟寧州起程前往該省督同管河道副使陳九仭及郡縣掌印管河等官將南北兩岸堤壩逐一閲視河患叵測將來可憂者一而修防喫緊目前應舉者六一者何河南之委流是也查得河南黃河涓滴皆由徐邳出清口會淮入海舊由新集歷趙家圈蕭縣薊門出小浮橋勢若建瓴河南無阻梗之虞徐邳有衝刷之利水之道也後因河南水患另開一道出小河口本河漸淤至嘉靖三十六年河遂北徙一變而為溜溝再變而為濁河又再變而為秦溝今則由胡佃溝梁樓溝北陳雁門石城等處而復出濁河矣中間經行之處皆係民間住址陸地較之故道河底高出三丈有餘漫流平地無渠可歸深者不過數尺淺則尺餘耳黃河并合汴沁諸水萬里湍流勢若奔馬陡然遇淺形如檻限其性必怒奔潰決裂之禍臣恐不在徐邳而在河南山東也緣非運道經行之處耳目所不及見人遂以為無虞而豈知水從上源決出運道必傷往年黃陵岡孫家渡趙皮寨之故轍可鑒乎臣於萬歷六年題為黃河來流艱阻後患可虞乞恩速賜查議以圖治安事該工部覆行鳳陽河南山東撫按會勘得開復故道勞費不資事體重大時勢未宜工部覆奉欽依停止夫開復此河工費須以百萬計各省俱當災歉之餘內帑正值空乏之際一時委難輕議臣未敢瑣瑣陳乞姑候年歲豐稔民力少蘇另行題請外今將修防緊關事宜條列于後伏望敕下該部再加查議如果臣言不謬覆議上請行臣遵奉施行河防幸甚臣愚幸甚謹題請旨計開一查得黃河北岸逼鄰漕河關係甚重𢎞治年間先臣劉大夏築有長隄一道起自曹縣界至武陟縣詹家店止延袤五百餘里南岸逼近省會藩封重地最為要害亦有長隄一道起自虞城縣至滎澤縣止兩隄延亘千有餘里實為該省屏翰但地鮮老土隄皆浮沙而河流遷改靡常多有濵河難守者矣今據該道逐一查核分為緩急二工開封府如儀封縣北岸煉城口舊隄一段長一千五十丈舊壩一段長六百五十六丈壩後水坑長二百五十丈南岸普家營等處新舊月隄四段共長三千一百五十五丈藺陽縣楊家莊至賈家樓舊隄一段長一千六百丈南岸自陳留縣界至儀封縣界舊隄一段內有缺口二十一處祥符縣南岸劉獸醫口迤南舊隄一段長一千二百五十丈張家灣老壩塌斷應築繞後月壩一段計長三百五十丈又自陶家店至兔北堽自掃頭集至舊隄頭長隄二段共長七千五百五十六丈又該河南撫按會同工科都給事中常居敬題奉欽依創築劉獸醫口遙隄一道長三千七百丈封丘縣北岸荆隆口中欒城于家店張家莊蕭家莊各有水衝潭窩共長一百七十五丈又該科撫按諸臣題準該縣荆隆口創築遙隄一道長二千零九十丈陽武縣北岸脾沙堽掃壩長三百丈原武縣舊隄一道分為五段共長二百八十九丈滎澤縣北岸長隄一道自朱世花大王廟至王婁店郭家潭等處共九段俱有潭窩共長一千七百七十二丈八尺歸德府考城縣北岸芝麻莊迤東掃壩三段共長八十九丈李秀厰東隄決口四丈唐家水口壩基二十二丈水坑二十八丈商丘縣南岸楊先口隄三十二丈以上工程或創築或加幫或捲掃皆係險要之處亟宜興舉者也又如儀封縣北岸榮花樹舊隄一段長一千六百三十三丈穵泥河舊壩坍塌共三百七十丈祥符縣北岸馬家口舊隄三段共長一千四百七十丈省城四面大隄一道高下通融修理共計六萬五千五百工陽武縣北岸舊隄自王估莊至脾沙堽分為九段共長四千零八十丈南岸舊隄自訾家莊後至中牟縣圓墩寺止分為六段共長三千三百六十四丈原武縣南岸舊隄二段共長五百四十四丈中牟縣舊隄六段共長一千四百七十丈俱應加幫河勢稍緩應俟急工完日次第興舉者也兩工告竣可恃防禦但築隄不難而覓土為難若非真淤老土隨修隨壞徒費無益容臣嚴行管河道刻期幫築加意驗探如有墮誤或夾雜浮沙或夯杵不實茍且塞責者容將管河官參拿究治伏乞聖裁一臣查得沁河發源于沁州綿山穿太行達濟源至武陟縣而與黃河合其湍急之勢不下黃河兩河交併其勢益甚而武陟縣之蓮花池金圪壋最其衝射要害處也去歲沁從此決新鄉獲嘉一帶俱為魚鱉今幸堵塞築有掃壩矣但係浮沙恐難久恃且壩內為商民輳集之處煙㸑不下千餘以隄為命關係不小查得最險之處僅四百三十五丈甃之以石方為可久况每歲修守費亦不資積之數年與石無異何憚而不為耶已行該道查估隨守隨築遲以三年之久必可竣事此隄一成百年永賴矣伏乞聖裁一臣查得河道錢糧止是徭編河堡夫銀工役所恃以為生河防所恃以為固者此也而有司視為末務每倦追徵吏書乾沒收頭侵欺殆十五矣向來舊例俱係各州縣另徵另解庶便稽查近有議請併入條鞭者夫條鞭之法非為不美但解京錢糧與本地方急用銀兩儘先徴解而待次可緩者輒為贅旒此有司之常情也若一槩併入條鞭則畸零人户逋負糧稍皆作河道錢糧矣臣請仍照舊例追徵管河道立限催比收至百兩以上俱解赴開封府收貯如遇考滿升遷完不及三分之二者不準離任庶人知警惕而錢糧自裕矣臣又查得河道銀兩節經題奉欽依不許别項那借今以祿糧借以驛傳借以會銀借以紙贖借者不知幾萬兩夫以本項未徵借貸則當於已徵扣還而久假不歸玩愒殊甚合無容臣嚴行管河道備查明白照數扣還再有逋負容臣參究實於河工有禆伏乞聖裁一臣惟防河在隄而守隄在人有隄不守守隄無人與無隄同矣近該管河道副使議令開歸懷三府遵照工科給事中常居敬題準事例各於隄壩之上每二里修建堡房一座僉令堡老堡夫常川住堡看守掃料防護隄岸修補坍塌填塞窩穴看守栁株禁逐樵牧三伏九秋之間不分風雨晝夜竭力防守法至備矣但終歲勞苦雖得官給工食糊口不敷合無行令三府掌印官即於近隄處所勘刷地段堡老每人給與六畝堡夫五畝以便耕種稍助食用其應給地畝先儘沒官田地如有缺少動支曠工河銀置買民産仍給帖照免其糧差則人心樂為之用而隄防可久矣伏乞聖裁一臣惟勵世磨鈍之術惟在勸懲有道而於河防最苦之事人心尤易懈弛先於萬厯八年四月內該勘工給事中尹瑾題為河工告成敷陳善後事宜以圖永利事內開定法制以核歲修該工部覆議於秋冬之交將各經管官員分别功罪奏請升賞罰治題奉欽依在卷但此例僅行於淮除而河南未經題請未敢擅行誠為缺典合無容臣於秋防報竣之日將河南掌印管河等官一體甄别遵例具題施行庶人心知警而河防不至弛墮矣伏乞聖裁一河南雖非運道經行之處而河情水性與徐淮無異則當以治徐淮者治之矣先該臣於八月二十二日題為申明修守事宜以圖永賴事皆為徐淮隄防而設內有責成長令以一事權蓋欲歸重於郡邑掌印官也預定工料以便工作蓋欲早核歲修工程以便興舉也立法增築以固隄防蓋欲遵例加培舊築以固隄防也兹三事者皆可行之於河南者也已經題奉明旨臣不敢再贅合無容臣行令河南管河官員一體遵照施行實於河道有裨伏乞聖裁奉聖旨工部知道工部覆奉聖旨依擬行停寢訾家營工疏臣潘季馴謹題為祖陵當護運道可虞淮民百萬危在旦夕恭進開復黃河故道圖説懇乞聖明采擇以垂百年永利事據管理中河郎中沈修南河郎中羅用敬會呈奉臣劄付仰司會同各道督同淮安府并山陽清河二縣各掌印管河官地老知音人等親詣訾家營地方逐一丈量查勘要見清河縣東見行正河水面若干丈今議新開支河果否能分正流日後可無淤阻分後果否可保泗州永無水患原議工食有無足用黑墩湖羅家口湖中起隄作何設法濬築從長計議毋求同而為遷就之計毋畏難而忘久逺之圖斟酌停妥會呈詳奪以慿具題施行蒙此隨該職等督同淮安府知府張允濟管河同知薑桂芳山陽縣知縣張光緒清河縣知縣鄒守約桃源縣知縣華存禮喚集彼處土人楊甫等丈勘明白回報前來該職等議照國家興大役舉大事者非持意見以為可否惟深晰夫利害之辨而已據府縣申謂訾家營支河一開除目前之患害收將來之全利惡在乎其不可也但查清河縣東見行正河水面闊二百四五十丈其深約有三四丈不等則支河之開視全河必得三分之一乃可分流而導之使趨今議面闊止四十丈底深止二丈五六尺試以全河形之果有三分之一乎必須面闊底深比原議丈尺稍增其數方為完計若嗇其數於勘估之初恐費病于不繼之請似未可以原估五十五萬九千九百七十餘兩限之也况黑墩湖又係窪濕積淤之所夫以四十餘里平陸易淤之地而欲新創導河入海之功工力巨艱舉動匪細鳩夫役必至數萬奏成功須待經年及今徐淮以南歲苦大祲二麥稍熟復罹大疫流移飢殍枕藉相望此何時也瘡痍未起閭閻蕭條即以大工召募給散工食聊濟一飽而已率僵仆甫起之民而責以趨事赴工之敏恐亦難矣合無俯從該府之議姑待年豐興舉為便呈乞再加查議等因又據整飭淮揚兵備副使周夢暘潁州兵備副使楊芳徐州兵備僉事陳文燧會呈蒙臣案驗會同管河分司行據淮安府勘議前來覆該各道議照自昔治水惟有二䇿非厚築隄堰以遏橫流則多開支河以泄暴漲而總之審時度勢乃可底績安民若時事未便漫然嘗試未利先害非計之得者該府所稱訾營之開一舉四利而挑濬情節曲暢旁通不為無見但工費頗為艱巨帑藏又多空虛淮民連歲災傷瘡痍未復目今秋旱燥烈黍豆不登窮冬苦寒又恐糊口無䇿而以煮粥聚賑傳染瘟疫枕藉而死者十之二三見存孑遺之民尩羸么麼可靜而不可動可逸而不可勞萬分煦育猶恐不能保其殘喘而鳩數十萬之夫挑五十里之河計算時日必數年之久乃可竣事是猶以疲癃奄息而責之艱重之任未有不仆者况五十里長途滿目荒萊居民流徙竟日不聞雞犬見井竈不惟數萬夫役棲身無所即督工官員亦未有駐足之地天時人事俱屬不便職等初議亦謂年歉不能舉事請行再議者蓋與本府今議大略相同而非遷就畏難不顧久逺之利也相應準從等因到臣通候覆議間又據管河郎中沈修羅用敬徐州兵備僉事陳文燧會呈為河道事本年八月二十六日據淮安府管河同知薑桂芳揭報本月十四日清江浦外隄對岸清河縣地方有鮑家營住民張思禮門首勢當黃淮西南而來直射東北河水大漲忽從本營漫流闊二百餘丈隨令大河衛經歷章淮率領本方熟知河道鄉民唐山駕船隨流探勘水勢歸向自本口東北十里經官莊浪石二十里至娘子莊又二十里至澗橋又三十里至古寨俱係湖蕩又十五里至桑墩入見成連河抵幞頭關下新壩入海此口離清河縣三十里外係迎溜內有河湖故道即今分殺黃流清江浦石隄以下一帶可保無虞緣由到職先該職等據實揭報本院訖今蒙批行覆勘為照鮑家營正當王家營之上訾家營之下既非運道又非民居先年不議築隄留以分殺暴漲之勢今清江浦外隄加築高厚而黃河大漲果由此分泄自娘子莊徑由澗橋古寨以入于海不勞工力不費財用而盈溢之勢可殺清浦外隄可保真天開之訾家營也若慮水落之後難保不淤而來歲水漲勢必復泄淤則平時無奪河之患泄則臨漲有分殺之功誠於河防有益無損呈乞本院詳示將本口照舊存留以備分泄惟於兩岸用掃包裹以成河口二三年後時和年豐再舉訾營之議未為晚也等因各呈詳到臣據此先該臣準工部咨前事該本部覆議內開訾家營支河以接草灣較諸故道之復固事半而功倍要其入海之路又散漫而難收事既未見全利議亦未敢遽決今新任總理河臣潘季馴前後治河將幾十稔閲歷既久聞見必真所據支河之議宜令覆行勘閲恭候命下本部備咨總理河道右都御史潘季馴作速到任將科撫諸臣所議於訾家營開支河以接草灣一事覆行勘閲果為利多害少在所當行或為徒費無益在所當止倘衆議未妥别有長䇿可以護祖陵保淮安固運道者但求事可功成不拘人已同異即令從實具奏以慿覆請定奪等因奉聖旨是這黃河故道既勘議眀白難以開復罷訾家營應否添開支河還著河道衙門從長計議具奏欽此欽遵備咨到臣該臣督同司道并府縣等官親往訾家營一帶地方逐細閲視行據各官會呈前因正在詳審間忽據徐州道僉事陳文燧揭報清江浦外隄對岸鮑家營衝開一口幾二百丈水從本口入荒坡往東北浪石舊河身至娘子莊澗橋古寨俱係湖蕩又十五里至桑墩入見成連河分支一百餘里下新壩入海此口離清河縣三十里與運河經行之處眇不相及而清江隄修築既高水從西激鮑口一開清江隄乃完運道可免嚙潰改徙而上之順承泗水下之分殺淮水其入口至浪石娘子莊即前勘議訾家營經流之處折至東北經澗橋達古寨入海則又不必鑿五十里入赤晏廟而水有所歸是省六十萬金之費以開訾家營此皆本院拯溺救民忠誠仁愛孚格蒼穹昭昭者默助其成不勞而底績也僉謂若念訾營工費難處績效難成而鮑家口不係運道不淹民田俯賜存留以代訾營無損之益輿情自安等因又據管河同知薑桂芳揭報相同俱經臣批行司道覆勘及親閲相同外今據前因為照論天下之大事者創其始必先究其所終成天下之大計者圖其利必先慮其所害若聊且虛應於一時而漫然為嘗試之舉舉之未幾廢即隨之咎將誰歸且工役以十萬計時以年計工費幾六十萬計勞民動衆關係不小我皇上以科臣之言下之科撫而復以科撫之言下之于臣亦誠以事體艱重未可易易耳臣敢不虛心博訪以仰體皇上至嚴至慎之意乎臣於六月十七日一接邸報即率同各官躬往閲視訾家營委與清口相對地勢平衍並無崎嶔險阻中間雖有黑墩湖羅家口二處頗難濬築然工力稍倍亦似可成開成之後分流甚便由此而至顏家口四十五里由顏家口而至赤晏廟復與大河相會不逺矣分流之後欲殺泗州水勢於二百里之外固不可得而清江浦外伏秋之漲委為可減但該府原議工費五十五萬九千止言濬河而不及築隄若欲比照舊例建築遙隄運土于一二里之外其費又當倍之矣計土論方之法固是舊規而濬至一丈之下地泉迸出非十倍其工不可則其費亦未可知也然成大事者不惜小費此亦未足論也臣所慮者河性喜深廣而避淺隘今以闊四十丈深二丈五尺之河而欲與闊二百四五十丈深三四丈者同流並驅似亦難保不淤伏秋之時河水消漲不常旋淤旋濬恐滋煩苦若欲加濬深廣費須數倍非惟錢糧難措抑恐妨奪正河蓋河不兩行自古記之先年河臣劉大夏劉天和王以旗諸臣有開孫家渡以殺水勢者有濬趙皮寨以濟二洪者有開李景高口引水出徐者皆不久即淤可為明鑒矣當此中外告匱之時萬一虛費工力罪將誰諉司道府臣係原勘原議之官而懇懇以荒歉請停為辭其意亦可想見臣又查得漕撫侍郎舒應龍工科都給事中常居敬原題內開訾家營經黑墩湖羅家口恐冇散漫之虞亦未敢為必然之畫倘以祖陵山麓之水未及玄宫運道之危在清江浦者先年已有石隄目前加築掃隄尚可保無決裂淮黃交匯之地昏墊之害祛之於西者不免移之於東則今議支河重役巨費非有全利若未可以輕舉而試為之如必欲為淮水疏泄之謀求人事之可盡者固不能舍此有他圖耳等因是二臣之見與臣亦不甚異臣所以展轉思惟未敢遽決者此也今據司道議有新開鮑家營去訾家營密邇既非運道經行之處亦無民田損害之虞入海另由别路可免大河合後復漲之事雖水落勢必復淤與慮訾家營者無異但不費一塵可免後悔而漫流廣闊淤不甚高來歲水漲之時勢必復通淤則平時無奪河之患通則臨漲有分殺之功與崔鎮等減水四壩無異也姑俟三四年後本口衝刷成河留之固善若沙淤漸高水流不順時或地方豐稔民力稍蘇再議别圖亦未為晚所據司道諸臣之言似為有見此皆仰仗我皇上留心國計軫念民勞上帝鑒臨百靈效順之所致也合無將本口兩頭掃護留備分泄其原議訾家營工程暫行停寢伏望敕下該部查議如臣所言非謬覆請允行臣愚幸甚地方幸甚緣係祖陵當護運道可虞淮民百萬危在旦夕恭進開復黃河故道圖説懇乞聖明采擇以垂百年永利事理謹題請旨奉聖旨工部知道工部覆前疏題為祖陵當護運道可虞淮民百萬危在旦夕恭進開復黃河故道圖説懇乞聖明采擇以垂百年永利事該總理河道右都御史潘季馴題前事等因奉聖旨工部知道欽此欽遵抄出到部送司案查萬厯十六年三月內該禮科給事中王士性題前事內議開復黃河故道等因奉聖旨著工部便行與漕運衙門及勘河科官從長計議來説欽此已該本部備行查勘河工都給事中常居敬總督漕撫侍郎舒應龍查議去後本年六月內該查勘河工都給事中常居敬總督漕撫侍郎舒應龍題稱黃河故道難復訾家營另開支河順入草灣河緣由已經本部覆奉聖旨是這黃河故道既勘議明白難以開復罷訾家營應否添開支河還著河道衙門從長計議具奏欽此已經備行總理河臣會司司道各官勘議去訖今該前因似應具題案呈到部看得訾家營另開支河之議蓋為黃河故道難復欲别求一䇿以殺泗州水勢本不得已之計也彼時科撫諸臣查勘及臣等議覆業已謂其難行特事關運道民生非經詳核遽難定議故行河臣覆勘以求畫一之説今潘季馴督率諸臣躬親查閲謂其水性之難強錢糧之難措工績之難成種種不可開濬之狀昭若指掌與部科原議若相吻合又况鮑家營突衝一口入海甚徑非若訾營之迂繞不煩工力非若訾營之勞費淤則平時無奪河之患泄則臨漲有分殺之功然則訾家營支河非惟不當開亦有不必開者相應如議停寢恭候命下本部備咨總理河道衙門及劄付中河南河郎中備行各該道府州縣官員一體遵奉施行奉聖旨訾家營既難開濬罷見今河道疏通只著該管官員遵守成規用心隄防不許妄生意見阻壞成功徒滋勞費修復湖隄疏臣潘季馴謹題為修復湖隄以便蓄水濟運事據管理南旺泉閘主事王元命濟寧道按察使曹子朝分守東兖帶管分巡兖州道參政郝維喬呈蒙臣劄案俱為檢查節奉欽依河工分派司道各官以便責成以圖早竣事分行司道遵照工部議覆工科都給事中常居敬原題各項工程勒限興舉除將應修閘壩斗門等工俱已如法甃砌將完馬踏安山二湖應築約水土隄見今工有次第通候另報外其蜀山馬場南旺三湖各原議築束水子隄一道以為封界及南旺湖中隄一道嚴督官夫修築間節據委官兖州府同知陳昌言等呈稱各湖先年創有封疆老隄水至隄根十常八九後因隄防廢弛湖水難蓄蒙工科踏勘之時正值亢旱舉目禾黍故議築子隄中亘長隄隄內蓄水隄外召佃官民兩便但自去歲夏秋恆霖斗門洞開坎河壩築涓滴不遺水勢瀰漫即今湖中築隄不惟水深工難縱築成隄內外汕刷易圮又恐湖狹水微似非濟漕初意且地被水占亦難召佃利民查得嘉靖二十二年兵部侍郎王以旗清復湖界築有大隄年久傾廢似應修復蜀山湖西南一帶俱臨運河隄岸高聳無容别議其東北一帶自南頭馮家滚水壩起至蘇魯橋迤南大隄頭止俱有舊隄根址相應修復自大隄頭至南旺田家樓止原係受水門户今應密植栁株以正封界水至入湖為運河之資水退據栁為民田之限馬場湖地勢南面臨河窪下出水濟運北面原係入水渠道今宜照舊仍留入水密栽栁樹以為湖界東面舊隄約長八里餘相應修復南旺湖東面高埠遵照原議量留一里築子隄一道其餘三面應將原隄建復其中亘長隄正在湖中難以施工相度地勢應濬溝渠通接斗門庶為完計各具呈前來覆該司道親閲相同委屬妥當雖與原議稍有不同求其濟運利賴則一呈乞酌議題請等因到臣據此卷查先該臣查將工科都給事中常居敬原題查復南旺等五湖築建隄壩閘座等工分委北河郎中吳之龍查復馬踏湖建永通閘築子隄修王岩口滚水石壩南旺主事蕭雍查復蜀山湖建坎河壩築束水隄修滚水大壩濟寧道按察使曹子朝查復馬場湖建通濟閘築子隄修安居斗門三座分守東兖道參政郝維喬查復南旺湖修邢通等斗門十三處築封界子隄中亘長隄分巡兖州道僉事劉𢎞道查復安山湖築封界隄建八里灣似蛇溝兩閘等因具題該工部覆議備咨總理河道轉行司道各官查照分地竭力修治倘興工前後或有事體與原議稍異者即便從宜處置或有原議未盡者不妨别議增補通完奏報等因覆奉欽依咨臣通行司道督率興工勒限報竣去後今據前因覆閲相同除將閘壩斗門等工及馬踏安山兩湖應築隄岸俱照原議候通完核實類奏外該臣看得運艘全賴于漕渠而漕渠每資于水匱五湖者水之匱也先該勘工科臣常居敬洞燭其源倡為封界子隄之説蓋因比時旱魃為災湖身龜裂地方之民乘時射利盡為禾黍之場故欲築隄限之非濬湖以就民乃限地以蓄水也良法美意可謂善之善者第自去年六月以後天雨頻仍湖水盈溢不惟湖地難耕即民地亦成沮洳矣詢之湖濵年老之人皆云如此景象向來歲居十七今欲盡泄湖水創築子隄亦甚易易但恐築成之後隄泡水中立見傾圮而子隄之外必成夾河豈能耕種隨查得先臣兵部侍郎王以旗原有土隄一道意與科臣常居敬封界正同而圍湖稍廣蓄水更多今歲之水正及隄址止因年久浸廢界址不明乾旱之時遂有越界私種者矣若將此隄加幫高厚盡復舊業隄內為湖隄外為地納水處所不便築隄密栽水栁為界庶湖水不縮經界不淆而亦不失科臣原題之意矣其南旺湖中隄水內積土成功固艱隄成水泡汕刷必易似宜免築所據各司道之議相應依擬具題伏乞敕下該部再加查議如果臣言不謬覆議上請行臣遵照督令上緊修築勒限報竣謹題請旨奉聖旨工部知道該工部覆奉施行就近銓補分司疏臣潘季馴謹題為河防緊急乞恩就近銓補賢能官員事臣於三月十六日據徐州兵備兼管河道按察使陳瑛揭稱南河郎中羅用敬於三月初八日忽患喉毒病故見今河務方殷缺官管理等因臣查得本官所管高家堰清江浦范家口等處俱係兩河要害歲修之工方在興舉寶應縣西土隄邵伯石隄適當諸湖之濵題奉欽依修築尚未告竣郎中羅用敬畢力肩承業有成績忽爾奄逝臣實痛心除候工完之日將本官另行敘報外臣竊照欽修之工原限三月以裏併日而作猶懼愆期矧夏令去今不過數日伏秋之備正在此時若候推補前來遷延便須數月廢時失事必致疏虞矣該臣會同總督漕撫侍郎舒應龍看得管理清江厰兼管閘座工部營繕司署員外郎事主事黃曰謹禔身狷潔任事精詳司閘禁而怨讟不辭淤墊之患可免嚴厰務而工費俱省侵剋之弊頓清况久處兩河之濵聞見甚確習知通塞之故疏治不難若將本官轉擢南河郎中就近到任接管則河防得人而官不久虛矣及又查得臣於萬厯十六年十月內題為申明修守事宜以圖永賴事該工部覆稱今後中南兩河郎中員缺敕下吏部即于工部主事查有曽經分司河上及歷俸稍淺者遴選推補俟後職業克修容令歷俸九年方為破格遷擢題奉欽依在卷今員外郎黃曰謹正係曾經分司河上之官若令銓補久任九年方行遷擢則非惟目前得其分猷之力而遲之歲月必收永賴之功矣其清江厰員缺另行推補伏望敕下吏部再加查議如果臣等所言不謬覆請施行河道幸甚臣愚幸甚謹題請旨奉聖旨吏部知道該吏部議覆相同題奉聖旨是就近銓補河官疏臣潘季馴謹題為黃河要地缺官乞恩就近銓補以防伏秋事臣於三月十六日接到邸報內開南京户部湖廣司缺員外推淮安府同知徐伸升補等因該臣查得徐伸為管河同知北自夏鎮珠梅閘起歷豐沛蕭碭徐邳靈睢等處至桃源縣止一帶黃河俱係本官管理而中間掃灣迎溜素稱善決者無處無之故河防惟以中河為難而司道官之所責成者惟同知一人而已矧今時將入夏去伏不遙捲掃護隄正當預備齗齗于畚鍤之內逐逐于河漕之濵殆未可以頃刻缺人者也若候銓補依限前來未免耽延時日倘從逺方升調則又未可以時日計矣臣查得駐劄楊村河間府管河通判申安歷任甚著賢聲修防業有成效曾經通惠河郎中陸夢熊揭薦到臣楊村河患頗少未展其才山東德州知州趙可學才識通敏施為練逹節該司道開薦到臣查訪委為可用臣於去年十二月內將二臣具疏列薦之矣若於內揀選一員加以同知職銜前來管理河事必克有濟而二臣見任地方去中河不及千里恭候命下之日容臣促令兼程趨任浹旬即可接管倘以本官資俸未深明開疏中令其久任於河道更為有禆伏望敕下該部再加查議如果臣言不謬覆請升補施行庶河防得人而要地不至久於缺官矣謹題請旨奉聖旨吏部知道該部議覆通判申安升補題奉聖旨是查議通濟閘疏臣潘季馴謹題為目擊時事敷陳愚悃以禆治安事據管理閘座工部署員外郎事主事黃曰謹徐州兵備兼管河道按察使陳瑛海防兵備帶管南河工部分司副使周夢暘會呈蒙臣案驗仰各司道速查清江裏河通濟閘今自開春啓閘之後是否波濤內訌不能閉閘回瀾水勢較比往年有無湍激即今應否改移閘口於稍南要是何項地名有何便利可避河流之衝此外有無别所另尋一路堪以濟運清江浦口應否填築以收永利務要躬親相度會議妥當呈詳覆議具題蒙此行據淮安府呈稱督同管河同知等官薑桂芳等查勘得通濟閘建立甘羅城堅實之地兩崖頗高撁挽甚便水勢北趨河流平緩運艘往來頗稱利便所據閘壩不必改移宜從舊貫等因據此該職等親詣前項地方督率多官覆加查勘謹按舟從今通濟閘出口者以此口專向淮河獨受清水惟伏秋大漲黃流未免倒灌故於入伏之時閘外捲築軟壩無非為避黃計也至九月水落仍復開壩由閘蓋自九月以後至五月以前通濟之水有清無濁三閘遞相啓閉其法甚便故先年改天妃閘而為通濟閘以天妃閘當黃而通濟閘近清也見今糧運通行水皆清平如舊旋啓旋閉頗為不難况昔黃流只有一道今分流草灣一百五十餘丈已減全河大半若欲改閘而南必從淮城以下出口張口受黃日有沙壅是平江伯建閘以避濁今反背清而就濁矣全河大勢已奔草灣而清浦西橋一帶漸淤復從淤處建閘是又舍通而就塞矣且板閘鈔關與船厰倉庾户工各部三分司皆在清江沿河地方以便督造抽分二百餘年於兹矣今若改閘而南則清江板閘一帶必至乾斷三分司與諸閘厰俱當改建為費不資三閘延袤六十餘里人煙輳集仰商賈挑盤之利者萬有餘家若閘改而南必奪生理移署遷民事在得已况糧艘經由清浦如履盤盂之內甚為平穩遽從淮南出口是舍清夷之渠而多受黃河六十餘里撁挽之苦仍恐運軍亦難之耳再詢淮中士夫皆稱淮城風水前有清淮後有黃河環流回抱有如襟帶乃縉紳生靈之血脈也今從淮南建閘將使淮地中斷而自絶其襟帶矣談者多稱不利難以拂衆強圖及勘通濟閘迤南一帶别無可通舟楫之所職等反覆思惟誠不如仍舊為便呈乞本院定議題請等因又據清江管閘分司呈稱蒙臣憲牌仰司即查通濟閘入春以來有無黃流內入波濤湍激是否不能閉閘回瀾各閘啓放之後因何不行下板備將致害緣由從實呈報依蒙查得清口乃糧運咽喉所係自有通濟等閘啓閉以來順時節宣河無漲溢成效如覩去冬遵守新立傳籌規矩啓一閉二遵行無失入春黃水未發糧運出口絡繹無停三閘俱開晝夜催儧時難暫閉外水雖入悉皆清流平緩若糧船出盡即遵前法啓閉况今清江外隄修築完固附隄淤土一望數十餘丈決無他患緣由各呈報到臣據此案照萬厯十七年三月初九日準工部咨該南京户科給事中徐常吉題欵開四曰淮揚水患清江浦口運艘所經而頻年以來黃河內衝出入為梗安東之流日緩而浦口之入漸多今自開春之後運船出口千檣並集舳艫相銜未免啓閘以納水而波濤內訌不能閉閘以回瀾水勢亟矣乞敕該部轉行總理河道衙門多方籌畫或移閘於稍南以避清河之衝或通漕舟于别所以為萬世之利其清江浦口則令築壩堵截不許復開如此則庶幾民生可保不然開口受沃而束手待盡臣恐湍激之黃流將直穿乎高寶而百萬之蒼生且胥而為魚鱉此淮揚水患臣之所可憂也等因題奉聖旨該部知道欽此欽遵備咨行臣即查前項閘口應否可移于稍南漕舟有無可通於别道其清江浦口應否築堵不許復開凡奏內事情一一從長計議妥當具題前來以慿覆請施行準此先該臣接到邸報隨即督同南河郎中羅用敬淮安府署印同知趙坰山陽縣知縣張光緒等親詣淮城以南東壩地方及通濟閘以下清江浦等處逐一踏看猶恐未確又經案行各司道查勘去後今據前因該臣查得國初踵習元人故事以海為運永樂年間平江伯陳瑄創鑿清江浦一帶以通淮黃兩河始以河為運矣然清浦原無來流全借河流內灌方可浮舟而黃流甚濁恐至淤墊故復設天妃等五閘遞互啓閉以便節宣時將入伏閘外即築軟壩一應船隻俱于五壩車盤良法美意二百餘年利賴之矣後因天妃閘全納濁流故復改於三里溝尋復改於甘羅城即今之通濟閘是也此處為南河口乃淮水獨經之地離黃向淮用清避濁漕渠無淤墊之患舟航有利涉之休人甚便之惟於五六月間黃水盛發不免逆上與淮並入而時將入伏築壩斷流九月開壩則黃水業已退矣今給事中徐常吉題請移閘稍南通漕别所極為訏謨長慮如果徙避有地真為萬世之利但細查淮郡之外别無支流可引欲通漕舟不得不資兩河欲資兩河必難免其內灌然分流不及十分之一而滔滔北去由安東入海者固如故也若移閘愈南則納濁愈甚司道諸臣所云背清就濁舍通就塞而運艘多涉險阻六十餘里皆所不免矣至如改建衙門遷移厰閘費雖不資無足論也臣又查得初春水落正當平緩之時止因運艘晝夜放行諸閘不便下板傳者遂謂不能啓閉今運艘如期出口各閘啓閉如故委與該司查勘相同臣不敢蔽伏望敕下該部再加查訪擬議上請或行撫按及巡鹽巡漕衙門覆加勘議務求久安長治之䇿以為河漕永賴之計地方幸甚臣愚幸甚謹題請旨奉聖旨工部知道工部覆前疏題為目激時事敷陳愚悃以禆治安事該總理河道右都御史潘季馴題前事奉聖旨工部知道欽此欽遵抄出到部送司案呈到部看得我國家歲漕東南數百萬石以海運非便故鑿清江浦引淮黃二水以通漕舟又建通濟等閘以避黃而就淮此法行之二百餘年未有能變者給事中徐常吉慮黃水灌淤條議移閘座塞清浦似或有見今據總理河臣潘季馴督率多官再三籌度謂清浦若塞更無别道可通漕舟閘座若移則去淮流益逺而納濁流益甚受濁不若受清故更新不若仍舊其説甚明且悉而河臣猶不敢自是復請下撫按及巡漕巡鹽御史覆議臣等以為清江浦之于運道譬若人身之咽喉即使少有淤阻不過隨宜修濬之耳未聞塞其咽喉而别求吐納之處者况清浦見無淤阻而别處又無可通漕既經踏勘明白似惟仍舊為便不必再議恭候命下本部備咨總理河道并巡撫漕運衙門及咨都察院轉行巡按巡漕巡鹽各御史并劄付南河清江厰郎中主事一體遵奉施行奉聖旨清江浦運道見在通行只著照舊修守不必再議更改河工告成疏臣潘季馴謹題為省直河工告竣據實恭報仰慰聖衷事節據南直𨽻中河郎中沈修南河郎中羅用敬夏鎮主事余繼善海防兵備副使周夢暘徐州原任兵備管河僉事陳文燧見任按察使陳瑛潁州兵備副使楊芳會呈節奉總理河道并總督漕撫衙門劄案俱為檢查節奉欽依河工分派司道各官以便責成以圖早竣事行職等將先後題準應修土石二程勒限興工上緊報竣職等遵依督率分委府州縣等官親詣工所如法率作俱至萬厯十七年四月二十九等日通完訖總計築過邵伯寶應界首三里湖高郵南北小湖口鹽壩南隄高家堰天妃壩清江浦惠濟祠禮字壩范家口栁浦灣潘家壩張家窪馬家湖黑墩蒯家窪金家窪賈家窪王家口張福口塔山并護陵石隄共長七千一百六十五丈八尺土隄共長一萬三千五百七十五丈樁笆隄工共長六千二百九十丈六尺築過順水草壩十四座石磯嘴一座蓋過栁浦灣料厰一所建過鎮口閘一座增砌過古洪內華閘二座挑濬過裏河淤淺并濬支河澗河及開鎮口閘上下河道共長一萬一千六十九丈九尺塞過決口長一百二丈填築過喻口河壩一道其各隄高卑酌量地形低昻水勢緩急稍有增損俱經呈明除長濶高厚丈尺數目已蒙各院及委官親詣各工逐一核實訖職等議照上下江運艘皆由瓜儀歷邵伯高寶淮徐至茶城以入漕河延袤千里中間湖波萬頃則有風濤之虞流沙久積則有淤墊之虞兩河湍急則有衝決之虞淮黃交接則有沙澀之虞故邵伯東隄每至傾圮寶應西口率多淺阻清口茶城濁流難免逆上而范家口天妃壩隄岸坍塌相繼衝決淮揚幾為魚鱉此往事之明徵也至如高堰一隄尤為二河關鍵隆慶初年淮水從此潰入黃亦隨之而東海口無水衝刷因之堙塞而淮揚興鹽高寶之間則一望瀰漫桑田為海矣自萬厯七年修復本堰之後兩河始歸故道近年以來隄防久弛漸至汕刷誠為可慮幸蒙部院科臣先後具題濬築之工至周大備職等遵奉節行案劄起派官夫分投興舉晝夜督促如期告竣除用過錢糧見在覆查另行造册送核外所據完過工程擬合開坐呈報等因又據揚州府推官李春開鳳陽府推官蓋國士會呈蒙總理河道并漕撫按鹽各院俱行職等前去各工核實依蒙遍歷邵伯寶應界首高郵高堰天妃清江浦惠濟祠禮字壩范家口澗河栁浦灣張家等窪張福口王家口鎮口閘塔山縷隄古洪內華二閘及護隄等處逐一錐探土隄委係老土夯實驗勘石工俱各甃砌堅緻河渠深廣一一足數合式經久可恃隨具不致扶同甘結呈報前來又據山東管理北河郎中吳之龍管理泉閘主事王元命濟寧兵河按察使曹子朝分守東兖道左參政郝維喬分巡兖州道僉事和震會呈蒙總理河道并撫按衙門備行職等分督修復湖隄建築閘壩斗門等工鳩夫辦料刻期完報依蒙督委府州縣等官修築過馬場馬踏蜀山南旺安山五湖土隄共長三萬二千五百五十一丈三尺建過火頭灣通濟閘梭隄迤南永通閘八里灣似蛇溝閘共四座坎河口何家口馮家口五里鋪各滚水石壩共四座安居五里營十里鋪關家大閘常明孫強劉家焦欒濟運閘盛進張全各斗門共十一座砌過石隄四丈築過土隄二百九十五丈又挑過建閘河身長八十四丈順水溝渠長一千一百七十四丈六尺填過水口十一處築過河口一處栽過護隄卧栁一萬六千一百五十株封界高栁六千七十一株俱於萬厯十七年四月二十五等日通完訖職等議照運艘入鎮口閘直至臨清板閘一帶漕渠共計八百餘里皆藉汶河之水以資利涉而漕渠頗逺泉源頗微故多設閘座以便節宣修復南旺等五湖以便瀦蓄建立減水閘壩以便出納皆為治漕要務不可不講求者也近年以來法久寢廢一遇亢旱遂同涸轍幸蒙勘河都給事中常居敬前來會同撫按躬親踏閲逐一檢查將封殖五湖建復閘壩斗門等項會疏題奉明旨通行總河及撫按衙門轉行職等分派工程定立期限晝夜督促幸以告成等因及據山東按察司按察使葉夢熊呈蒙總理河道及撫按衙門憲牌行職查得馬場等湖隄永通等閘坎河等壩安居等斗門各項工程委係精緻堅實别無滲漏今具不致扶同甘結呈報等因各具呈到臣據此案照萬厯十六年閏六月二十九日準工部咨該查勘河工都給事中常居敬題為欽奉敕諭分别效勞官員以勵臣工以重河漕事本部議覆內開案查萬厯十五年十一月內該鳯陽巡撫都御史楊一魁題為議處兩河水患以固運道以奠民生事內議修砌范家口等處隄岸并改拆崔鎮等壩及疏草灣河口緣由本部覆奉聖旨崔鎮壩應否改拆還候差去科臣到彼再議定奪其餘俱依擬著實行欽此隨該本部備行鳳陽巡撫及差去科官欽遵訖萬厯十六年四月內該查勘河工都給事中常居敬會同總督漕運户部右侍郎舒應龍題為欽奉敕諭查理河漕以保運道事內題議古洪以外添建鎮口閘并修築運河隄岸及停拆崔鎮等壩停濬草灣等緣由又該本部覆奉聖旨依擬行欽此備行淮揚撫按轉行管河司道各官一體欽遵訖本年四月內該都給事中常居敬會同山東撫按題為欽奉敕諭查理漕河以重國計事欵開南旺湖修築子隄中亘長隄修復邢通等斗門共十三座馬踏湖東北築隄修復王岩口石壩蜀山湖周圍築隄修復馮家大壩馬場湖周圍築隄修復安居斗門三座及修坎河口滚水石壩一座長六十丈建火頭灣通濟閘梭隄集永通閘各緣由又經本部覆奉聖旨依議行欽此備行山東撫按轉行司道等官欽遵訖本年六月內該都給事中常居敬會題為清復湖地以濟運道事要將安山湖低窪處封為水匱及八里灣似蛇溝建閘二座緣由又該本部覆奉聖旨這湖地依擬築隄仍畫定界限永逺遵守如有侵占盜決等弊照前旨著實參治其各處泉湖蓄水濟運的都著一體清查整理欽此已經備行南北直𨽻河南山東各巡撫衙門轉行管河司道各官一體欽遵訖今科臣常居敬比照閲邊事例將各管理諸臣分别勤惰題請但在淮揚則經理之議甫定在山東則濬築之役方興見今總理大臣新到一切調用人夫參酌河務似應候各工通完之日併議優處仍咨總理河道鳳陽山東各巡撫衙門轉行管河司道各官查照本部節題事理將見在工程及河道應行未盡事宜上緊督催完日將做過工程役過人夫用過錢糧等項核實造册奏繳清册送部備查候工完之日河道都御史仍將大小官員分别舉劾另行具題以慿覆請賞罰施行等因具題節奉聖旨是直𨽻山東等處工程通候完日河道衙門奏報併敘欽此備咨到臣本年八月初五日又準工部咨為檢查節奉欽依河工分派司道各官以便責成以圖早竣事先該臣題議除將修建鎮口閘塔山支河縷隄修清江浦外隄草壩添設栁浦灣料厰先該漕撫侍郎舒應龍行委南河郎中羅用敬中河郎中沈修夏鎮主事楊信徐州兵備僉事陳文燧見在興舉臣照舊督行各官上緊修築外其興築寶應縣西土隄二十里砌邵伯湖石隄二十里疏濬淮安至儀真一帶裏河淤淺查係南河郎中羅用敬海防道副使周夢暘地方三工俱當以中為界北段屬之羅用敬南段屬之周夢暘其在山東各工分委北河郎中吳之龍查復馬踏湖建永通閘築子隄修王岩口石壩南旺主事蕭雍查復蜀山湖建坎河壩築束水隄修滚水大壩濟寧道按察使曹子朝查復馬場湖建通濟閘築子隄修安居斗門三座分守東兖道參政郝維喬查復南旺湖修邢通等斗門十三處築封界子隄中亘長隄分巡兖州道僉事劉𢎞道查復安山湖築封界隄建八里灣似蛇溝兩閘等因該部覆議備行總理河道并鳯陽山東各巡撫衙門一體遵照施行及行管理河道泉源閘壩司道各官查照分地督率府州縣管工官員竭力修治本部仍咨都察院轉行各該巡按巡鹽御史各照所轄地方不時稽察工程期于同心共濟倘興工前後或有事體與原議稍異者即便從宜處置或有原議未盡者不妨另行增補悉如原題定限十七年三月終通完其總河大臣仍親自查閲委果工程堅固足保無虞從實奏報其效勞大小官員分别勤惰題請以俟賞罰等因覆奉聖旨是河道工程著司道等官各照分定地方用心管理上緊完報不許疏玩欽此備咨前來本年十月十四日又準工部咨為申明修守事宜以圖永賴事該臣條議一接築舊隄以防淤淺本部覆議清口乃淮黃交會而淮黃原自不敵然清口所以不致壅淤者以全淮皆從此出其勢足以敵黃也若分之則必致壅淤先年淮決高堰而清口遂成平陸可鑒矣今王家口隄被商販盜決淮流之勢已分將來清口沙淤運道阻塞患必由之此隄在清河縣對岸而該縣任其盜決罪將誰諉今議欲行司道官接築長隄專責清河知縣管理修守疏虞參治庶幾責任既專而隄防可固等因覆奉欽依咨臣俱經通行司道勒限興工間節據司道呈報南河分司工內天妃壩原議內外包石後蒙工科親閲本壩地勢廣濶諭令內填實土不必砌石清江浦外隄原議險要去處捲掃釘樁并作順水壩十四座今酌量水勢緩急添築草掃排樁長四百八丈止築草壩四座惠濟祠外河石隄加石二層并添順水草壩一座裏河石隄原議五十七丈今減去平緩處所一十三丈實砌過四十四丈范家口石隄原議長四百丈今覆勘隄堅水緩去處減砌七十丈實砌過三百三十丈海防道工內邵伯湖原題應築石隄二十里除舊石頗堅量加修補不敢算工外實砌過石隄一千八百九十八丈八尺夏鎮分司工內塔山縷隄原議六百六十丈今加築三百三十六丈共長九百四十二丈古洪閘原議改造今因添建鎮口閘啓閉頗易不必更改以滋虛糜止議本閘并內華閘各加石四層鴈翅加石五層北河分司工內原議王岩口建壩今酌量地勢即於本口之上地名何家口建滚水石壩一座并增修房家口石隄四丈築塞河口一處南旺分司工內續議填築水口十一處坎河壩兩頭接築土隄共長二百九十五丈迎水處所俱用灰石壘護分守東兖道工內原議修復斗門十三座今議照舊修復八座其餘五座改於五里鋪添建滚水大石壩一座長五丈開挑順水溝渠長一千一百七十四丈六尺各緣由前來萬厯十七年三月二十三日又準工部咨為修復湖隄以便蓄水濟運事該臣具題本部覆議南旺蜀山馬場三湖目今水勢瀰漫直及舊隄根址去年所議築子隄長隄處所見今俱在湖心難以施工欲行免築要將舊隄培築高厚納水處所不便築隄仍密栽栁樹以為封界雖與科臣原題稍殊而其為蓄水濟運則一且圍湖更廣蓄水更多相應如議備咨總理河道轉行司道府州縣官一體遵照施行等因覆奉聖旨是欽此咨臣通行遵依緣由俱各在卷及查原委司道南旺主事蕭雍夏鎮主事楊信徐州兵備僉事陳文燧分巡兖州僉事劉𢎞道工俱有緒各以限滿升官離任隨行接管主事王元命余繼善按察使陳瑛僉事和震督理臣等向在嚴催節據各工報完隨即躬親閲視惟恐頭緒多端中間倘有隱瞞丈尺工少報多又經覆委南直𨽻揚州府推官李春開鳳陽府推官蓋國士山東按察司按察使葉夢熊各查核去後今據前因該臣議照我國家定鼎幽燕歲漕四百餘萬以實京師自瓜儀至淮安則資湖自淮安至徐州鎮口閘則資河自鎮口閘至臨清板閘地方則資汶泗河洚洞之水其患在潦汶泗涓涓之流其患在涸固其隄使之可捍深其渠使之可容此治潦之法也湖以蓄之使其不匱閘以節之使其可續此治涸之法也所據部科諸臣先後具題築濬諸工種種皆切河務蓋邵伯隄固而湖水無泛濫之虞寶應隄成而閘口免回沙之積高堰無傾圮之患則淮揚免昏墊之災淮河絶支岐之流則清口有專攻之力茶城鎮口之增建深得重門禦暴之䇿永通通濟之添閘自無長渠濟運之艱五湖隄界既明則汶泗停涵而不時之需可待斗門閘壩既設則蓄泄有所而湖河之利相須汶水西趨而泉河易竭故坎河大壩之關係匪輕汶水北注而南旺之東流必少故何家一壩之利賴不小至如捲築樁掃加幫卑薄雖非一勞永逸之計然亦每歲修防之必不可已者臣謹遵成議畫地分工各司道併力一心刻期告竣然事連省直興作之頭緒頗多而羣力難於畢舉工歷三時官夫之勞苦難任而人情易於怠弛仰賴我皇上誠孝上格乎玄穹祗靈助順威德誕孚於蒼赤黎獻傾心奉職者咸效靖躬之義趨事者俱竭子來之誠俾臣等得竭犬馬之勞以效涓埃之報厥功告成絲粟皆我皇上神聖之所致也臣愚不勝慶幸除用過錢糧候委官查明另行造册奏繳及將效勞官員遵旨另疏敘録外今將各工通完數目日期擬合從實奏報為此具本關坐謹具題知計開南直𨽻工程總管官海防兵備道副使周夢暘與同原任南河郎中羅用敬督同揚州府通判劉汝大等砌完邵伯湖石隄長一千八百九十八丈八尺內創新砌石長一千二百八十五丈五尺拆砌舊石六百一十三丈三尺各高九尺至一丈一二尺計石十層十一十二層不等其餘修補舊隄不敢算工築完寶應西土隄長三千六百三十五丈內樁笆工長二千八百三十七丈土工長七百九十八丈俱底闊一丈三四五尺頂濶八九尺一丈高五六七尺不等寶應縣知縣耿隨龍管砌完界首三里湖石隄長八百四十丈高郵州知州楊汝澯管砌完該州南北小湖口石隄共長三百九十丈磚石相兼各高九尺至一丈一二尺不等淮安府同知薑桂芳揚州府同知張文運通判劉汝大江都縣知縣劉道隆儀真縣知縣趙廷杞清河縣縣丞關大倫等築過裏河東西束水樁笆土隄共長三百二十丈底闊六七尺頂闊四五尺不等俱高五尺幫築過鹽壩迤南隄岸長六十一丈闊二三丈高五六尺不等挑濬河身淤淺自清河口起至瓜儀江口止共長四千四百一十三丈九尺面闊三四丈至十五六丈深三四尺不等總管官南河郎中羅用敬徐州兵河僉事今升漕儲道參議陳文燧督同淮安府同知薑桂芳修補完高堰石隄長三千一百一十丈幫完土隄長七千七百九十二丈樁笆工長一千五百四十四丈挑濬完堰內泄水支河長二千一百五十五丈築完天妃壩裏口長一十八丈外口長三十二丈清江浦外隄草掃排樁長四百八丈草壩四座砌完惠濟祠外河石隄長五十四丈五尺高十六層草壩一座裏河石隄長四十四丈高十三層祠西包石長四十二丈禮字壩土隄長三百四十九丈石隄取直上一百六十四丈高一十五層范家口土隄長四百五十丈幫完副壩一道長二百七十丈排樁一道共長六百九十三丈自水底築高三丈四五尺底闊十丈四尺面闊五丈五六尺砌完石隄長三百三十丈高十九二十層不等築完順水草壩九座石磯嘴一座濬完澗河長四千九十丈引水溝長一百九十五丈幫完栁浦灣潘家壩樁笆隄長二百二十八丈一尺張家窪土隄長二百九十一丈喻口河壩一道馬家湖樁笆工長一百八十丈黑墩工長十丈蒯家窪土隄長一百丈金家窪土隄長二百丈賈家窪土隄長一百九十丈俱底濶一丈三尺頂濶五尺高八尺建完栁浦灣料厰一所總管官中河郎中沈修徐州兵河按察使陳瑛督同淮安府同知薑桂芳清河縣署印本府通判田有年等塞完清河縣南岸張福決口長一百二丈加築隄長一百二丈底濶六丈頂濶二丈五尺高八尺五寸兩頭并中段俱護掃排樁長闊不等接築張福口以東新隄長四百四十一丈根闊六丈頂闊二丈高一丈北面創築斜坡