如故也臣等不勝驚訝隨據徐州碭山鄉民段守金龔泮王霜等各呈稱老河故道自新集厯趙家圈蕭縣薊門出小浮橋一向安流名曰銅幫鐵底後因河南水患另開一道出小河口本河漸被沙淺至嘉靖三十七年河遂北徙忽東忽西靡有定向行水河底即是陸地比之故道高出三丈有餘停阻泛濫妨運殃民懇乞開復老河上下永利等情臣等當督前司道并山東管河道副使邵元哲河南管河道副使唐汝迪由夏鎮歷豐沛至崔家口復自崔家口歷河南歸德府之虞城夏邑商丘諸縣至新集閲視間則見黃河大勢已直趨潘家口矣隨據地方鄉老靳廷道等稟稱去此十二三里自丁家道口以下二百二十餘里舊河形迹見在儘可開復臣等即自潘家口歷丁家道口馬牧集韓家道口司家道口牛黃堌趙家圈至蕭縣一帶地方委有河形中間淤平者四分之一地勢高亢南趨便利用錐鑽探河底俱係滂沙見水即可衝刷又據夏邑虞城等縣鄉官王極鄉民歐陽照等七百餘人連名呈告俱為乞疏舊河便民事竊照黃河故道自虞城迤下蕭縣迤上夏邑迤北碭山迤南嘉靖年間岸闊底深水勢安流既於運河無虞亦於民田無害商賈通行貿易大遂民稱豐庶自嘉靖三十六年以後故道漸淤河隨北徙黃流泛溢青野汪洋居民十不存一運道屢年阻滯告乞早為開通上利下便是誠萬世盛舉等情臣等度其言實為探本之論但道里遙遠工費巨艱復又沿河荒度更無省近可從者而臣等猶冀崔家口一帶淺阻去處或可疏濬成河易為力也復督各官駕小舠至梁樓溝北陳等處躬親測量委果淺阻河底原係陸地委難衝刷蕭縣地方一望瀰漫民無粒食號訴之聲令人酸楚該縣城外環水為壑城中瀦水為池居民逃徙官吏嬰城難守見今題請遷縣臣等竊思之一縣之害此其小也夫黃河并合汴沁諸水萬里湍流勢若奔馬陡然遇淺形如檻限其性必怒奔潰決裂之禍臣等恐不在徐邳而在河南山東也止緣徐州以北非運道經行之所耳目之後人不及見止見其出自小浮橋而不考小浮橋之所自來遂以為無虞耳豈知水從上源決出運道必傷往年黃陵岡孫家渡趙皮寨之故轍可鑒乎臣等又查得新集故道河身深廣自元及我朝嘉靖年間行之甚利後一變而為溜溝再變而為濁河又再變而為秦溝止因河身淺澀隨行隨徙然皆有丈餘之水未若今之逾尺也淺愈甚則變愈速臣等是以夙夜為懼也臣等又查得此河先年亦嘗建議開復止緣工費浩繁因而寢閣臣等竊料先時諸臣雖以工費為辭實非本心蓋誠慮黃河之性叵測萬一開復之後復有他決罪將安辭目前既有一河可通姑為茍安之計耳而不知臣子任君父之事惟當論可否不當論利害惟當計其功之必成不當慮其後之難必且所慮者他決也隨決隨塞亦非有甚難者故河變遷之後何處不溢何年不決寧獨不慮之乎臣等與司道諸臣計之故河之復其利有五河從潘家口出小浮橋則新集迤東一帶河道俱為平陸曹單豐沛之民永無昏墊之苦一利也河身深廣受水必多每嵗可免泛溢之患虞夏豐沛之民得以安居樂業二利也河從南行去會通河甚遠閘渠可保無虞三利也來流既深建瓴之勢導滌自易則徐州以下河身亦必因而深刷四利也小浮橋之來流既安則秦溝可免復衝而荼城永無淤塞之虞五利也臣等以為復之便至於復故道難仍新衝易復故道勞仍新衝逸則臣等計之熟矣然舍難就易趨逸避勞慮日後未可必之身謀而不惜將來必致之大患皆非臣等之所以盡忠於陛下也臣等勘議之後即擬具題但因伏水將發猶望水勢洶湧或可衝刷成渠近又行據同知王琰回稱勘得北陳等處原深一尺六七寸者今止深七八尺臣等看得伏秋暴漲之時水增六尺有餘則客水消落之後不免仍存本體矣伏望敕下該部查議如果臣等所言不謬擬議上請特差素識水性科臣一員前來候秋深水落與臣等會同山東河南撫臣及兼理河道巡鹽御史躬親勘議如果可復即便估計錢糧會本題請早賜施行地方幸甚臣等幸甚謹題請旨奉聖旨工部知道申飭徐北要害疏臣潘季馴謹題為伏秋將屆徐北來流未安乞恩申飭地方當事臣工嚴守要害處所共保無虞事先該臣于去年六月間勘得黃河自徐州小浮橋迤北胡佃梁樓北陳鴈門等處水僅逾尺散漫不能成渠下壅上潰勢甚可慮博訪輿論僉謂開復新集舊河為便該臣會同漕撫侍郎江一麟題為黃河來流艱阻後患可虞乞恩速賜查議以圗治安事請差科臣前來會勘間該工科都給事中王道成等題為河工艱巨懇乞聖明特議次第舉行以求萬全事該工部議覆咨臣及江一麟會同各該撫按督率司道等官親詣踏勘虛心講求科臣不必議遣臣隨咨行河南山東兩省巡撫都御史并劄行管河道備呈巡按巡鹽御史各督行布按都三司守巡管河等道先勘明妥通詳臣等約期會集覆議未報臣竊惟徐淮之間水患相仍錢糧正當缺乏之時地方又值災傷之候頻年動衆殊有隱憂今兩河之工延袤千里至艱且巨臣不自揣度復以徐北為請誠慮夫伏秋水漲蕭碭從中梗阻則河南山東不無潰決之虞而去嵗伏秋已幸無恙臣言益愧其迂矣況大工至今未完若復遠事開濬強弩之末官夫俱疲轉眼入伏大雨時行其勢自不能不候南工報竣之後方行議處也然杞人之憂則猶有未能釋然者臣自去冬至今節行郎中佘毅中徐州道參政遊季勳躬往踏勘其淺阻漫散如故見分一股衝出濁河倒灌茶城濁河即嘉靖年間所決之河也伏秋之時難保不更他徙臣再三咨訪咸謂開復既所未能則隄防誠為喫緊查得河南則有廟王口李景文莊前于家店劉獸醫口黃陵岡陶家店馬家口銅瓦廂泥河煉城口榮花樹芝麻莊山東則有楊家口梁靖口毛王寨武家壩侯家林韋家樓單縣縷隄七鋪至十一鋪太行隄十五鋪至二十鋪等處皆為掃灣迎溜之所先年失事往往由此若能固守或可無虞苐須各該河臣移駐要害處所躬親督理乃克有濟臣以南工方在促成之際東奔西馳未遑他顧而淮安去河南山東千有餘里文移往返動經月餘伏秋之時呼吸變態臣坐鎮于千里之外豈能調度之適期也臣查得先該尚書吳桂芳準吏部咨節奉聖旨河道事務著各該巡撫官照地分管俱屬吳桂芳提督欽此臣奉敕諭開載亦同伏望敕下該部轉行各該巡撫都御史就近督同管河道及各該府縣等官躬親料理某處隄岸卑薄相應加修某處水勢衝突相應捲掃大小一心晝夜無懈則時水雖狂力既不能旁決勢必勉就原趨而張秋迤南一帶運道自可無虞矣再照夫人之情難於慮始而天下之事貴在廣忠臣與江一麟具題之時諄諄乞差科臣者誠見新集故河淹塞已久一旦創為開復之説殊駭觀聽且臣愚一人之見誠不自信而欲求協於僉謀之同耳今該部既稱科臣不必議遣而復行臣會同各該撫按是又以臣為主議之人而以各該撫按為附矣諸臣縱有異同其誰能逆覩黃河之無恙遂決然於拂臣之請乎亦孰肯面斥臣言之非而昌言其不必復乎至於心知其當復而深畏其勞費之難因循不敢言者即司道之中難保其不無也少有依違後言滋起僨事之由端在於是且自徐州直至虞夏商丘等處臣俱足蹈而目擊之而臣之愚見膚説亦盡於前疏矣未經勘議者在河南山東諸臣耳伏望敕下該部催行各該撫按及淮揚巡鹽御史徑自會期躬赴淺阻及應開復處所逐一踏勘如果臣言可采不嫌於徇同臣言乖違不妨於互異或俟南工報完即行議舉或念官夫積困姑事隄防虛心講求務求協一會本具題聽該部覆議咨臣遵奉施行則人心早定而河患可弭矣臣非敢有所推避也正欲以諸臣之見訂臣之得失為行止也伏望皇上特賜允行河防幸甚臣愚幸甚謹題請旨奉聖旨工部知道河防一覽卷八
