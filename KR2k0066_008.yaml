body:
  text: 河防一覽卷八明潘季馴撰恭報續議工程疏臣潘季馴謹題為遵奉明旨恭報續議工程以便查核事據管理河道工部郎中佘毅中張譽主事陳瑛管河兵備水利營田等道參政龔大器遊季勳副使張純僉事朱東光史邦直會呈抄蒙總理河漕并漕撫衙門憲牌仰職等即查各工內有與原議不同工程會同類總開呈以憑覆核奏聞依蒙隨將各工逐一查勘除兩河分合及應築應塞工程俱與原議無異又隄工各高闊丈尺各相度地形增減不等候通完之日册報外所有隄岸閘壩勢當小更難拘原議者委應裁酌用圗經久以淮北言之如南岸遙隄原議自靈璧縣張字鋪起至邳州果字鋪止共長九十八里其張字鋪以上原因河岸甚高故止議將玄黃二鋪掃灣處所展築月隄長八百五十丈今續勘得徐州三山頭起至靈璧縣張字鋪共五十餘里一帶河岸雖高然先年遇有異常泛漲亦往往漫決若止展築玄黃二鋪月隄尚有可虞相應一並接築遙隄計長九千餘丈庶成全隄無復遺慮其玄黃二鋪止築順水壩以遏水勢不必另行展築果字鋪以下原因縷隄頗逺故未議築遙隄續勘得果字鋪至李字鋪縷隄約四里餘猶覺逼近仍應增築遙隄計長七百五十丈北岸遙隄內邳州谷山并匙頭灣二處俱有水溝瀦畜積水合行疏泄今議各建函洞一座以便泄水桃源縣古城起至季太口止計六十里內原議滚水壩三座已經建完今嵗伏水漲溢之時甚賴其減泄之力但季太口至清河縣計五十餘里未議建壩恐水勢至此尚致漲溢勘得三義鎮地形原窪衆水所趨合增建滚水壩一座其長闊丈尺俱照前壩庶分殺之路既多則衝漫之患可免此淮北工程所當續議者也以淮南言之原議修復清江等閘今勘得通濟閘逼近淮河直受衝囓勢甚湧且閘設年久底樁朽爛加石太重不免坍缷相應改建於甘羅城東堅實之地仍改濬河口斜向西南使水勢紆回不至直射庶便啓閉前閘既已改建則新莊閘距此不及一里難容多船而關鎖太促水勢湍急不易啓閉相應拆缷福興閘上距通濟閘計二十里下距清江閘止五里逺近懸絶且亦因年久圮壞難以加石今議改建於夀州厰適中處所其清江一閘仍照原議修復至於板閘地窪水平無庸啓閉止須照舊免行增高又勘得原議修復五壩內信字壩逼近淮城且係黃河掃灣先年久廢不用今已將禮智二壩修復見在車盤船隻其仁義二壩原共一口出船亦係黃河掃灣又與清江閘相鄰恐有意外衝漫之患見今築隄在上以禦黃流不便修復查得舊有天妃閘正與清河直對相應建壩一座於本閘之裏則車盤尤便而船隻無阻矣其興鹽等處入海支河原因高堰未築黃浦入淺等決未塞水勢浩蕩故踵襲節年舊議欲加挑濬以泄積水近勘得高堰築完黃浦八淺俱塞下流已乾無水可泄而海口之水反高於內地若復挑濬則海水灌入既傷民田復損鹽利正在勘議間隨該巡鹽御史薑璧躬親踏勘題請免濬復經司道會勘委應停止夫興鹽等處既以無水可泄免濬支河若寶應湖隄仍照原議於三十里之內添建減水閘六座又恐分流太多興鹽難受況建閘初意秪因上流水溢恐致傷隄今高堰既築通濟閘外又經題準每年水漲之時築壩斷流則寶應湖水不甚盈溢湖隄可保無虞不必多建減閘今議修復舊閘二座創建一座通共四座庶運道民田俱有攸賴其開挑興鹽支河工費銀二萬五千八百七十六兩原議於巡鹽衙門動支運司銀兩仍聽該衙門作正支銷此淮南工程所當續議者也以上事宜皆因地損益隨時劑量期於有濟不敢執泥俱經會議僉同陸續呈請舉行訖今蒙行查理合類報轉奏施行等因到臣案照先準工部咨為奉明旨陳愚見議治兩河經略以圗永利事該臣等題議各項工程事宜本部覆題奉聖旨這治河事宜既經河漕諸臣會議停當依擬都準行著他們悉心著實興建永利各該經委分任人員如有玩愒推諉虛費財力者許不時拏問參治其未盡事宜及臨時事勢或與原議不合的也著陸續奏聞務求有益應用錢糧你部裏便會戶部上緊議來欽此備咨到臣俱經通行司道欽遵興舉間續據郎中佘毅中等議將各工增損事宜節次會呈前來又經臣等親閲相同批允舉行訖秪緣工程大體俱無更張止於節目微有不同事涉煩瑣未敢屑屑瀆奏兹當告成伊邇合行通查類報今據前因為照兩河大工延袤千里臣等荒度之初止詳於兩河分合大勢而隄岸閘壩之遠近多寡委須臨時再加斟酌仰荷我皇上坐照萬里洞燭事機假臣以便宜之權開臣以續奏之路所據司道陸續議報前來在淮北則有徐州三山頭起至張字鋪加築遙隄五十餘里玄黃二鋪止建順水壩一道果字鋪起至李字鋪加築遙隄四里餘谷山匙頭灣添建函洞二座三義鎮添建滚水壩一座此皆原題未載委應增益在淮南則有通濟福興二閘從新改遷新莊逼近通濟閘勢難兩存板閘止宜仍舊信字壩逼近黃河不便修復仁義壩改建天妃閘以裏至于興鹽等處入海支河因高堰黃浦入淺隄成無水可泄自宜停止而寶應湖隄減水閘止須修建四座此原備載委當更易因時審勢隨地制宜臣等固不敢惜勞以貽一簣之虧亦不敢妄舉以滋無益之費其應添錢糧即於原議河工銀內通融裁節濟用並無求益加派之事除將各隄工高闊丈尺相度地形增減不等通候查核外相應奏報謹具題知奉聖旨工部知道查復舊規疏臣潘季馴謹題為乞恩查復舊規以利漕渠事臣等謬膺簡畀肩厥巨艱日夕兢兢惟恐一事未周有負任使兹幸廟堂主持諸臣效力導河防決之工駸駸然有涓埃之驗矣但於淮安一帶閘河終有未安者臣等初至地方目擊淮安西門外直至河口六十里運渠高墊舟行地面昔日河岸今為漕底而閘水湍激糧運一艘非七八百人不能牽挽過閘者臣竊怪之詢之地方俱云自開天妃閘後専引黃水入閘且任其常流並無啓閉而高堰決進之水又復鎖其下流以致沙淤日積萬厯五年河渠堙塞隨濬隨淤不得已開朱家口引清水灌之方得通舟臣等乃決意開復通濟閘以引范家湖清流且請修舉陳瑄故事嚴其啓閉隨該工部覆奉欽依咨行遵照見由通濟閘引水濟舟河身亦覺漸刷數年之間或可復故矣但沙淤可免而湍溜如舊牽挽不易而啓閉甚艱且聞淮河暴發亦有渾流臣等求其善處之術而未得也隨行據司道等官郎中張譽等博訪志傳查得永樂初年原由海運淮郡與黃淮二河隔絶不通後因平江伯陳瑄疏清江浦之渠引水以通淮安東南運艘始得直逹京師復慮黃淮之水沈沙易淤也乃建清江福興新莊等閘遞互啓閉鎖鑰掌之漕撫開放屬之分司法至嚴矣復慮水發之時湍急難於啓閉又於新莊閘外暫築土壩以遏水頭水退即去壩用閘如常延至嘉靖八年間壩禁廢弛河渠淤塞該漕運都御史唐龍河道侍郎潘希曽題奉欽依仍復舊規載在簡册者班班可考也數十年來初議浸失前患復滋臣等詢之地方耆宿皆云運渠卑隘最易沙淤淮地低窪最易盈溢若倣古人之制嚴啓閉於春冬之時築外壩於伏秋之際則非惟河身無壅墊之患而田廬亦無浸潦之苦矣臣等反覆思惟請復舊規為便及查每嵗三月以前糧運俱過六月初旬鮮貢已盡其餘船隻皆可盤壩並無妨礙即如鎮江京口閘遇冬築塞入春方啓其例固可援也伏望敇下該部再加查議如果臣等所言不謬每嵗於六月初旬一遇運艘并鮮貢馬船過盡即於通濟閘外暫築土壩以遏橫流一應官民船隻俱由盤壩出入至九月初旬仍舊開壩用閘庶於國計民生兩利之矣再照人情易玩法禁易弛勢豪人員任情自恣者難保不無地方當事之臣稍稍阿徇輒至濫觴懇望皇上特降嚴旨容臣等刻石金書垂示各閘之上庶幾人心有常目之警而良法無久弊之患矣謹題請旨奉聖旨工部知道工部覆前疏題為乞恩查復舊規以利漕渠事該總理河漕右都御史潘季馴題前事又該總督漕運右侍郎江一麟題同前事俱奉聖旨工部知道欽此欽遵送司案呈到部看得總理河漕右都御史潘季馴等題稱淮安一帶黃淮灌入運渠高墊且閘水湍急啓閉甚難查得平江伯陳瑄建清江福興新莊等閘遞互啓閉以防黃水之淤又於水發之時閘外暫築土壩遏水頭以便啓閉水退即去壩用閘如常其法至善議要修復舊規并請特降嚴旨垂示各閘使勢豪人員不敢任情阻撓一節為照黃淮二河之入淮郡也由先臣平江伯陳瑄疏濬清江浦始也而其立法則甚密矣慮黃淮灌入泥沙易淤而建閘以慎啓閉又慮水發湍急難于啓閉而築壩以遏水衝自是渾流不入閘河不壅大為運道之利後來閘壩廢弛淮安一帶河渠始日就墊塞費區畫矣況水發常在六月此時糧運及鮮貢船隻俱已過盡築壩似無妨礙雖官民船隻盤剝未便終不得因此而廢河漕大計也且築壩止是水發時候自六月至九月初旬不過三月餘即去壩用閘如常不便於民船者無幾時而使於漕渠者則甚大所據都御史潘季馴等具題前來似應依擬恭候命下本部備咨總理河漕右都御史潘季馴漕運侍郎江一麟即查先年閘壩舊規斟酌修復凡清江福興新莊等閘俱要以時啓閉不得開放無度以致泥沙灌入有礙運道每嵗至六月初旬運艘馬船過盡伏水將發即於通濟閘外暫築土壩以遏橫流一應官民船隻俱暫行盤壩出入至九月初旬開壩復用閘啓閉仍將題準明旨刋示各閘之上如有勢豪人員恃強阻撓應拏問者徑自拏問應參奏者徑自參奏母得阿徇假借庶人心知警法不廢格而河渠有賴矣奉聖旨這築壩盤壩事宜俱依擬有勢豪人等阻撓的即便拏了問罪完日於該地方枷號三箇月發落干礙職官參奏處治申明鮮貢船隻疏臣潘季馴謹題為乞恩查復舊規以利漕渠事準南京兵部咨稱案照先準臣等咨已經備行南京內守備廳速查今運鮮貢等差總計幾起已撥裝載五月以前過淮出口者幾起未撥差限尚遲約在築壩之後發行者幾起一面移文本部差撥就令通濟閘外停泊以待各差抵閘盤船前進庶免臨期誤事隨準該廳回稱氷鮮鰣魚例在五月初旬採完楊梅例在小暑之後採取俱各在京裝船先用底蓋鹽氷打築結實然後起運前進氷鮮船隻勢不可盤煩為議處到部合咨河道漕運衙門酌量前差尚在五月之內伏秋未至水勢未發姑待二起鮮船出口方行築壩如壩不容緩前項氷鮮作何計處使不誤事希由咨報等因到臣案照萬厯七年七月二十六日準工部咨該臣等會題前事本部覆議每嵗至六月初旬伏水將發即于通濟閘外暫築土壩以遏橫流一應官民船隻俱暫行盤壩出入至九月初旬開壩仍將題準明旨刋示各閘之上如有勢豪人員恃強阻撓應拏問者徑自拏問應參奏者徑自參奏母得阿徇假借等因題奉聖旨這築壩盤壩事宜俱依擬有勢豪人等阻撓的即便拏了問罪完日於該地方枷號三箇月發落干礙職官參奏處治欽此備咨臣等通行欽遵間今嵗遇閏五月二十二日即已入伏相應先期築壩誠恐鮮貢船隻所至後期預咨該部轉行早發去後今準前因該臣會同漕撫右都御史江一麟議照清江裏河向因外河伏水帶入泥沙致坫漕渠應照先臣陳瑄舊規先期築壩已經題奉嚴旨通合遵守今該監既謂氷鮮鰣魚在五月初旬楊梅在小暑之後各採完若肯較常早發沿途無滯計五月二十以前二項鮮船俱可趕到若至入伏之日各船愆期不至勢難久待隨經咨覆該部及延至入伏之日定行築壩外但恐各監拘泥故常逗遛不發延至壩成又以盤船不便推諉臣等不無掣肘況所進氷鮮不多盤壩只須頃刻即使車盤不便亦可預撥馬船停泊壩外鮮到之日對船般剝亦無妨礙漕渠關係甚重似當量從權宜伏望皇上軫念國計敇下該部申飭南京守備衙門每嵗氷鮮船隻較常催儧早發務在伏前旬日抵淮不至有礙築壩萬一愆期即從天妃壩車盤或預撥馬船停泊外河船剝著為定例庶臨期不致妨阻而漕渠永無沙坫矣謹題請旨奉聖旨工部知道工部覆前疏題為乞恩查復舊規以利漕渠事該總理河漕尚書潘季馴總督漕撫右都御史江一麟題為前事奉聖旨工部知道欽此欽遵抄出到部送司案呈到部看得氷鮮船隻關係上供而築壩護漕關係國計均之有不可緩者今據河臣題稱遵旨築壩當在伏水未發之先其勢必不能停築以待船據守臣回稱鮮船發行常在閘壩既成之後其勢又不能車船以盤壩似於上供國計兩有所妨然臣等竊以為無傷也查得正德嘉靖年間五月已有鰣魚到京且既稱鮮品尤宜早進既係薦廟尤該及時但近年以來進鮮內臣每以採鮮既完之後方行措辦裝具附載貨物勾當稽留動踰旬日沿途淹頓又致愆期比至京師則色味俱變不惟有礙築壩且於薦鮮之義亦甚無當也臣省吾先任南京見守備太監喬郎每事用心整飭才復優於幹濟即據今回稱鰣魚例在五月初旬採完蓋四月二十日前後已行採矣若隨船器用如冰鹽之類預備停當一經採完即便發行不過半月即可過淮正是伏前之期自於築壩無礙至於楊梅等物又與魚鮮不同即至壩成不妨盤剝但今年閏月伏早此時議行恐不及事而壩又不容緩築萬一鰣魚到遲必須設法對船般剝方克有濟此在內守備臣及河漕大臣各以上供國計不分彼此一體籌度處置自當無誤其剝完之後自淮以北仍須嚴令地方官多方護送速進務期共濟不得應付遲緩至于以後年分鰣魚鮮船定限五月初頭發行伏前定限過淮楊梅等船定從便聽將南京馬快空船於未築壩之先預撥過淮停泊壩外以俟般剝則上供既無後時之虞國計亦得先事之備矣又訪得南京進鮮各船每將起程之時有無籍棍徒號稱夥光設局詐騙肆意把持要得倚船覔利領差內臣萬一不從即遍遞誣狀使船不得行在京不遂復隨至沿途騷擾管河各官或有不察墮其計中即復稽留延緩是以船行不得如期非盡由發船之果遲也合無恭候命下容臣等行南京及河漕各衙門出示嚴禁如有前項棍徒仍前作梗者即便拏問從重究罪仍枷號通渠或濵河處所示警至於到淮般剝之際在河漕大臣尤宜加意禁約使奉差者不苦於道路之難則般剝從容儧進便利所關於築壩治漕者實非小補均乞聖明裁定敇下欽遵施行奉聖旨是報黃浦築塞疏為恭報黃浦築塞事據管理南河郎中張譽呈稱蒙臣等牌督修築黃浦決口隨行揚州府同知韓相鳩工聚料于本年三月初三日興工官夫晝夜併力攔河北壩于本月初十日南壩于十二日各合口斷流訖又蒙本院部親臨工所仍恐卑薄難恃又於北壩之外加築一壩共闊十丈足禦水患為照黃浦衝決為害已極經營數年勞費不資妨運病民莫此為甚即今兩壩告成橫流堵截山寶興鹽一帶生靈悉得平土而居耕穫而食官民船艘往來無虞復業編氓歡聲載道誠地方無窮之利也除將舊口填土接築老隄通候工完另呈合先具報等因到臣據此案查先該臣等題為河患已除流民復業乞恩蠲租以廣招徠事已將高堰隄成黃浦見在興築緣由于本月初一日具題訖臣隨督行該司設法督築黃浦去後今據前因該臣會同漕撫侍郎江一麟照得高堰據黃浦之上遊而黃浦為興寶鹽城之門戶高堰既築黃浦之工自易黃浦既塞則興寶鹽城一帶田地盡行乾出自兹兩河橫流涓滴皆由正道千里之內民業皆可耕穫而海口河身日見深刷亦可免壅潰之患矣除將正口填築高厚務俾永賴仍候大工全完另報外為此具題奉聖旨工部知道河工告成疏臣潘季馴謹題為恭報兩河工成仰慰聖衷事萬厯七年十月初六日據管河郎中佘毅中張譽主事陳瑛管河兵備營田等道參政龔大器遊季勳副使張純僉事朱東光史邦直會呈節奉總理河漕并總督漕撫衙門劄付俱為奉明旨陳愚見議治兩河經略以圗永利等事行職等將派定工程鳩夫辦料刻期興舉該職等遵依督率分委府州縣等官親詣工所照式率作俱自萬厯六年九月十五等日興工至今陸續通完訖總計築過土隄長一十萬二千二百六十八丈三尺一寸砌過石隄長三千三百七十四丈九尺塞過大小決口共一百三十九處建過減水石壩四座每座長三十丈修建過新舊閘三座車壩三座築過攔河順水等壩十道建過函洞二座減水閘四座濬過運河淤淺長一萬一千五百六十三丈五尺開過河渠二道栽過低栁八十三萬二千二百株其各隄高卑酌量地形低昻隨宜增損自一丈二尺以至七八尺不等數目煩瑣聽候勘官至日另册開送核實外照得數年以來黃淮二河胥失故道至以地方州縣為壑蓋由黃河惟恃縷隄而縷隄逼近河濵束水太急每遇伏秋輒被衝決橫溢肆潰一瀉千里莫之底極北岸則決崔鎮季太等處南岸則決龍窩周營等處共百餘口而又從小河口白洋河灌入挾永堌諸湖之水越歸仁集直射泗州陵寢以至正河流緩泥沙停滯河身墊高淮水又因高家堰年久圮壞潰決東奔破黃浦決入淺而山陽高寶興鹽悉成沮洳清口將為平陸黃淮分流淤沙罔滌雲梯關入海之路坐此淺狹而運道民生俱病矣自去秋興工之後諸決盡塞水悉歸漕衝刷力専日就深廣今遙隄告竣自徐抵淮六百餘里兩隄相望基址既遠且皆真土膠泥夯杵堅實絶無往嵗雜沙虛鬆之弊蜿蟺綿亘殆如長山夾峙而河流于其中即使異常泛漲縷隄不支而溢至遙隄勢力淺緩容蓄寬舒必復歸漕不能潰出譬之重門待暴則暴必難侵增纊禦寒則寒必難入兼以歸仁一隄橫截于宿桃南岸要害之區使黃水不得南決泗州至于桃清北岸又有減水四壩以節宣盈溢之水不令傷隄故在遙隄之內則運渠可無淺阻在遙隄之外則民田可免淹沒雖不能保河水之不溢而能保其必不奪河固不能保縷隄之無虞而能保其至遙即止蓋嘗考𢎞治以前張秋數塞數決自先任都御史劉大夏將黃陵岡一帶增築太行隄一道而張秋之患遂息此其已試之明驗也今職等所築之遙隄即太行隄之别名耳況係真正淤土較之太行雜沙又有不侔者故今嵗伏初驟漲桃清一帶水為遙隄所束稍落即歸正漕沙隨水刷河身愈深河岸愈峻前嵗桃清之河膠不可楫今深且不測而兩岸逈然高矣上流如吕渠兩崖俱露巉石波流湍急漸復舊洪徐邳一帶年來篙探及底者今測之皆深七入丈兩岸居民無復昔年蕩析播遷之苦此黃水復其故道之效也高家堰屹然如城堅固足恃今淮水涓滴盡趨清口會黃入海清口日深上流日涸故不特堰內之地可耕而堰外湖坡漸成赤地蓋堰外原係民田田之外為湖湖之外為淮向皆混為一壑而今始復其本體矣其高寶一帶因上流俱已築塞湖水不至漲滿且寶應石隄新砌堅緻故雖秋間霖潦浹旬隄俱如故黃浦入淺築塞之後俱各無虞栁浦灣一帶新隄環抱淮城並無齧損不特高寶田地得以耕藝而上自虹泗盱眙下及山陽興鹽等處皆成沃壤此淮水復其故道之效也見今淮城以西清河以東二瀆交流儼若涇渭誠所謂同為逆河以入于海矣海口之深測之已十餘丈蓋借水攻水以河治河黃淮並注水滌沙行無復壅滯非特不相為扼而且交相為用故當秋漲之日而其景象如此昔年沙墊河淺水溢地上秖見其多今則沙刷河深水由地中秪見其少地方士民皆謂二十年來所曠見也此蓋仰仗我皇上聖德格天神明協相聖心獨斷廟算堅持是以本院部得行初志職等得效胼胝向使少為異議所搖則此時不知更作何狀矣今財力不多費而功遍于兩河時日不久曠而效收于期月數千里魚鱉之民一旦登于袵席億萬年命脈之路一旦底于翕寧職等幸獲遭逢曷勝慶幸除各用過錢糧另行册報外所據完過工程擬合開坐呈報施行等因到臣據此案查萬厯六年五月十五日該臣欽奉上諭都察院右都御史兼工部左侍郎潘季馴近年河淮泛濫為害運道梗塞民不安居朕甚憂之已屢有旨責之地方官經理奈無實心任事之臣動以工費艱巨為解又當事諸臣意見不同事多掣肘以致日久無功今特命爾前去督理河漕事務將河道御史暫行裁革以其事専屬於爾其南北直隸山東河南地方有與河道相干者就令各該巡撫官照地分管俱聽爾提督爾宜親歷河流所經會同各巡撫官督同各部屬司道等官悉心協慮講求致害之因博采平治之策備查草灣口何為既開復淤及今作何開通全淮水何為南徙不復及今作何疏導徐邳河身高並州城何以疏之使平黃浦崔鎮等口久塞無功何以築之使固及查諸臣歷年建議有行奏疏逐一勘議要見老黃河故道應否開復清桃正河應否挑濬高家堰寶應隄應否修築小浮橋新衝口可否濟運應否加挑又徐邳以上地形南昻北下恐隄防一潰勢必奔流北徙將為閘河之梗亦要審其孰為正河孰為支河孰為合河或正而當厚其防或支而當殺其勢或合而當分其流一併勘議詳妥奏聞區處合用錢糧及選任司道等官俱許以便宜奏請給發委用功成之日通將效勞官員一體分别升賞如有抗違不服及推諉誤事者文官五品以下武官四品以下徑自提問應奏請者奏請定奪其提督軍務事宜查照河道衙門原管行事爾候事寧之日奏請回京朝廷以爾諳習河道素有才望特兹重任爾尚殫忠籌慮盡心區畫俾河漕無梗塞之虞人民免昏墊之苦必有懋賞以酬爾功毋或畏難憚勞隱忠不效及茍且塞責有負委任爾其勉之慎之故諭欽此臣遵奉綸音會同撫臣躬率司道等官沿河荒度周咨分合之勢博求平治之謀羣策畢集衆諭僉同隨題為奉明旨陳愚見議治兩河經略以圗永利事該工部覆看得都御史潘季馴侍郎江一麟足遍口訊僉議詳酌為是六説其所修置寢格俱目擊利害而非道聽之言庶同則繹而非弗詢之謀蓋隄防既固塞決又蕃水無旁駛而正流自急沙隨水刷而海口自復此正以水治水而不為穿鑿之論迂謾之談頃來治河之説未有逾於二臣之議等因題奉聖旨這治河事宜既經河漕諸臣會議停當依擬都準行著他們悉心著實興建永利各該經委分任官員如有玩愒推諉虛費財力者許不時拏問參奏其未盡事宜及臨時事勢或與原議不合的也著陸續奏聞務求有益應用錢糧你部裏便會戶部上緊議來欽此備咨臣等欽遵查照興舉施行準此又該臣等題為勘估兩河工程乞賜早請錢糧以便興舉事欵議分督徐州北岸自吕梁洪至邳州直河止遙隄該海防道參政龔大器總管自桃源古城以下遙隄并塞界內決口及建減水壩一座又先分馬厰坡遙隄該中河郎中佘毅中總管自桃源縣界至清河縣北遙隄并塞界內決口及建減水壩一座該添注管河道副使張純總管自徐州南岸并靈睢界內遙隄及建減水壩一座該徐州道副使林紹總管睢寧界內遙隄并築歸仁集隄該潁州道僉事朱東光總管修復淮安運河各閘修築裏河兩隄并新城北一帶幫築新舊隄及塞黃浦口催濬興鹽支河該水利道僉事楊化總管築高家堰塞天妃閘朱家口開復通濟閘修築趙家口迤西隄岸修復各壩該添注管河郎中張譽總管修築寶應一帶土石隄并建減水閘及挑濬揚州至儀真一帶河道該南河郎中施天麟總管等因本部覆奉欽依咨行臣等分工間郎中施天麟降調將原分寶應隄工改委營田道僉事史邦直揚州挑淺改委該府知府虞德燁僉事楊化罷黜將原分清江浦兩岸築隄改委主事陳瑛增修閘座改委淮安府知府宋伯華各管理栁浦灣修築新舊隄并添寶應入淺決工增委今補水利道副使張純黃浦口決工增委今補南河郎中張譽各兼理副使林紹間住原分一工該今任參政遊季勳管理俱於上年九月十五日起土興工臣等具本題知訖又該臣等查得司道續報工程淮北有徐州三山頭起至張字鋪增築遙隄玄黃二鋪止建順水壩一道果字鋪起至李字鋪增築遙隄谷山匙頭灣添建函洞二座三義鎮添建減水壩一座此皆原題未載續議增益淮南有通濟福興二閘從新改遷新莊逼近通濟閘勢難兩存板閘止宜仍舊信字壩逼近黃河不便修復仁義壩改建天妃閘裏興鹽等處支河因高堰黃浦入淺隄成無水可泄自宜停止寶應湖隄減水閘止須修建四座此原題備載續議更易又經具本題知訖臣等向在催督各工去後今據前因除將報到工程逐一查核相同外該臣會同漕運巡撫侍郎江一麟竊照我朝建都燕冀轉輸運道實為咽喉自儀真至淮安則資淮河之水自清河至徐州則資黃河之水黃河自西而來淮河自南而來合流於清河縣之東經安東達雲梯關而入於海此自宋及今兩瀆之故道也數年以來崔鎮諸口決而黃水遂北高堰黃浦決而淮水遂東桃清虹泗山陽高寶興泰田廬墳墓俱成巨浸而入海故道幾成平陸臣等受事之初觸目驚心所至之處孑遺之民扳輿號泣觀者皆為隕涕然議論紛起有謂故道當棄者有謂諸決當留者有謂當開支河以殺下流者有謂海口當另行開濬者臣等反覆計議棄故道則必欲乘新衝新衝皆住址陸地漫不成渠淺澀難以浮舟不可也留諸決則正河必奪桃清之間僅存溝水淮揚兩郡一望成湖不可也開支河則黃河必不兩行自古紀之淮河泛溢隨地沮洳水中鑿渠則不能别尋他道則不得況殺者無幾而來者滔滔昏墊之患何時而止不可也惟有開濬海口一節於理為順方在猶豫而工部遺咨叮嚀臣等親詣踏看臣等乃乘輕舠出雲梯關至海濵延袤四望則見積沙成灘中間行水之路不及十分之一然海口故道則廣自二三里以至十餘里詢之土人皆云往時深不可測近因淮黃分流止餘涓滴入海水少而緩故沙停而積海口淺而隘耳若兩河之水仍舊全歸故道則海口仍舊全復原額不必别尋開鑿徒費無益也臣等乃思欲疏下流先固上源欲遏旁支先防正道遂決意塞決以挽其趨築遙隄以防其決建減水壩以殺其勢而保其隄一嵗之間兩河歸正沙刷水深海口大闢田廬盡復流移歸業禾黍頗登國計無阻而民生亦有賴矣蓋築塞似為阻水而不知力不専則沙不刷阻之者乃所以疏之也合流似為益水而不知力不𢎞則沙不滌益之者乃所以殺之也旁溢則水散而淺返正則水束而深水行沙面則見其高水行河底則見其卑此既治之後與未治之先光景大相懸絶也每嵗修防不失即此便為永圗借水攻沙以水治水臣等蒙昧之見如此而已至於復閘壩嚴啓閉疏濬揚河之淺亦皆尋繹先臣陳瑄故業原無竒謀祕策駭人觀聽者偶幸成功殊非人力實皆仰賴我皇上仁孝格天中和建極誠敬潛孚而祗靈助順恩威並運而黎獻傾心念轉輸乃足國之資軫昏墊切警子之慮宵旰靡皇絲綸屢飭其始也併河漕以一事權假便宜以任展布故臣等得效芻蕘之言其既也逮偷墮以警冥頑折淆言以定國是故臣等得竟胼胝之力俯從改折之議國計與民困咸紓特頒賞賚之仁臣工與夫役競勸致兹無量之功遂成一嵗之內今兩河蒸黎歌帝德而祝聖夀者且洋溢乎寰宇矣臣等何敢貪天功以為已力哉除用過錢糧聽巡鹽衙門查核奏繳外謹將完過工程總數開坐伏乞敇下該部覆議差官勘閲明實施行謹題請旨計開淮北工程總管官中河郎中佘毅中督淮安府同知王琰兖州府同知唐文華桃源縣知縣郭顯忠濟寧衛指揮文棟等築完原分桃源縣北岸遙隄自古城起至關王廟止長八千六百八十九丈二尺俱根闊六丈頂闊二丈高一丈至九尺不等塞完崔鎮大決口一處及劉真君廟等決口共三十六處共長四百六十一丈五寸築完古城堰口隄一道長三百六十丈造完崔鎮減水石壩一座壩身連鴈翅共長三十丈又築完續增徐州南岸三山遙隄長二千四百二十八丈三尺五寸俱根闊四丈頂闊一丈六尺高八九尺不等又督淮安府同知蔡玠築完桃源縣迤南馬厰坡遙隄長七百四十六丈根闊七丈至五丈不等頂闊二丈高一丈至八尺不等以上各隄共栽過低栁一十六萬一千六百株總管官海防兵備道參政龔大器督廬州府通判宋守中邳州知州張延熙泰州同知王法祖等築完原分邳州北岸遙隄自吕梁山麓起至直河止長九千四百六十四丈一尺俱根闊六丈至五丈不等頂闊二丈至一丈五六尺不等高九尺至七八尺不等造完續增谷山并匙頭灣函洞各一座又築完續增徐州南岸三山遙隄長一千三百九十一丈八尺俱根闊四丈頂闊一丈四五尺不等高八尺以上各隄共栽過低栁五萬二千株總管官徐州兵備道參政遊季勳督淮安府同知蔡玠徐州知州孫養魁靈璧縣知縣張允孚睢寧縣知縣徐密桃源縣知縣郭顯忠等築完原分靈睢南岸遙隄自竇老穀堆起至象山止長一萬一千七百五十七丈二尺俱根闊六丈頂闊二丈高九尺造完徐升鎮減水石壩一座壩身連鴈翅共長三十丈又築完續增徐州三山遙隄二千六百四十七丈一尺六寸俱根闊四丈頂闊一丈六尺高九尺順水壩一道又會同南河分司改建通濟閘一座并閘外攔河壩一道以上各隄共栽過低栁一十五萬一千六百株總管官水利道副使張純督兖州府同知樊克宅清河縣知縣石子璞等築完原分桃源清河縣北岸遙隄自關王廟起至護城隄止長九千七百二十一丈俱根