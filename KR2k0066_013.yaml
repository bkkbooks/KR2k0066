body:
  text: 河防一覽卷十三明潘季馴撰請遣大臣治河疏南京湖廣道御史陳堂題為星象示異河患可虞懇乞聖明特遣大臣董理疏治以拯民生以通國計事臣聞明天之道者必驗于人應天之變者當以其實是故古之明王遇災而懼隨事格天而卒保治安於無虞者良有以也臣頃見彗星見於西南彌月不滅考之往牒災應謂主大兵謂主大水或應之一年之逺或應之數月之近臣愚以為兵無大於邊防水無大於河患邇年蕃王效順邊境稍寧雖有可虞然猶諉之曰未形臣愚亦已列名同官御史林應訓等疏末以勸皇上戒備之矣若黃河之水東橫西決散為洪流自徐邳以下以至淮之南北不啻千里流離漂沒莫可勝數居無尺椽食無半穗上阻運道下墊民生斯不謂之已形者哉然而當事者一切付之無可奈何無有持一長策可據以為疏理者臣愚以為今日治河之難者有五曰事權不專也羣策不一也利害不審也錢糧沮格也功罪不核也何以知其然也國家以理漕屬之漕司以治河屬之河道俱以都御史重職奉璽書行事豈非使之各盡其職業無有推諉無有阻撓以共成國計哉乃邇年來輒因河之不治遂以漕司而責之天妃閘以南於河道而責之天妃閘以北畫地既分遂成彼已一設官也而或去或留一決口也而或築或否以致有司下吏彼此觀望迄無成功無論今日即自臣有知識以來漕艘遲緩不曰漕艘而曰河道梗阻河道梗阻不曰河道而曰漕艘稽遲彼此相推而卒莫有引咎自反者大都然也頃者朝廷鋭情國計舉漕糧四百萬石通限正月以裏過淮懸重法以繩之然後僅免黃河伏發之候而可保無事今又以淮之南北分信地矣近雖部議欲以河道都御史仍照敕書行事而撫屬地方水患又聽漕運都御史從宜料理言非相悖而行不免于牽制者即有不治如今日之患不止則當責之誰哉且黃河之與淮河其流雖二其為運道相維繫貫通者則一未有黃不治而可以治淮亦未有淮治而黃可以無事者也今之議者為黃河計曰築崔鎮口矣今聞崔鎮而上至於邳州一帶決者不下一二百處大者百餘丈小者亦三四十丈何可勝築也即築之又何保其不復決也曰復老黃河矣然引黃河東流將必引淮逆為北向而後可以與黃會而全運道竊恐非水之性勢難成功益退而壅決于宿邳之間不可為也曰挑正河矣然河之決也由下無所歸故上有所壅今河無入海之路雖使河身日濬奚益哉為淮河計者曰築髙家堰則工費不資束手無策曰築髙寶黃浦等隄則隨築隨決漫不可支欲引淮泗而入之江則江上流也而海為下海近而江逺髙寶之間所經興鹽等縣皆為入海之路豈能盡隄防之而使必逆而南哉兼之草灣海口淤澱如故遂使河身日髙黃水日漲不圖為疏導之計而惟築隄以防之將見隄之髙也有窮而水之髙也無限其勢必內灌而并泗水以趨於淮黃之一日不治則淮之人一日不安枕此定勢也以是數者積時纍日坐觀其大敗決裂而不可救此何以哉臣愚以為天下之事有利必有害未有有其利而無其害者擇其利多而害少者為之則可矣漕渠古無有也自漢唐以來宜莫如劉晏然史稱晏盡得運之利與害各有四當時即盡以漕事委晏使晏得盡其才固未嘗以利而諱害亦未嘗以害病利也今之司河漕者能如晏自按行浮淮泗達于汴入于河循底柱硤石觀三門遺迹而至河陰鞏洛視前人宇文愷等之所為者乎每藉口必曰神河而皆付之曰不可治又曰神禹而不能治不知今之人有能三年於外者乎三過其門而不入乎胼手胝足而不勝勞瘁者乎大抵治河者委於治河之官故事行勘一聽之于郡縣佐二彼以河為職遂見黃之害而不見淮之害見黃之利而不見淮之利不知淮利而黃亦未嘗不利淮害而黃亦未嘗不受其害者其治淮者輒委之郡縣之守令彼以守土為職其所見又復然如之何而不互相持衡莫決也然猶可諉者曰下之人異議耳自古師行糧從雖有巧婦未有無米而可以議炊者今淮揚之間自隆慶三年以至今日之巨浸真堯之所謂九年之水矣土地所産既無一毛之入而河漕工費動稱巨萬當事者復厪內帑而不之請豈所謂通國體者哉夫有非常之事者必有非常之工非常之工非非常之財不可濟也國家二百年餘河神亦可謂效職矣以至今日始有此變非如曩時之猶可以安常襲故者近者淮揚撫按諸臣疏請賑濟僅借留一二萬金為災民計而猶格于部議安望其能請內帑百萬以濟大工哉臣知其不能也夫人臣為國家守財非徒能守其財之難而善用其財之難今之户部錢糧曰濟邊急矣不知邊猶人之肩背而淮揚之地則腹心也運道則咽喉也今之工部錢糧曰上用急矣不知百姓足君孰與不足百姓不足君孰與足有若之言固似孔子者二部大臣豈以百姓為可緩而視身之咽喉腹心不若肩背哉彼河漕二臣目擊河工之急也欲裁其費則用小而不可為欲大其施則力限而不能為即如崔鎮口與髙寶隄之築塞皆傅希摯與吳桂芳之所自以為必不可已者而亦苦於措處之無及東搜西括莫可支持他可知己臣愚以為今日司國計者皆過也錢糧既已不敷而國家之待河漕二臣輒復以次敘遷無所責成其殫心竭力鞠躬盡瘁者秩不加升坐視如故者罪不加罰率皆三年之內僥幸無事相繼棄去何怪乎河患之日甚一日哉即如傅希摯彼自以為實心任事者三年考滿不聞查核功罪其在於今經理漸熟河患方殷而又以陜西巡撫行矣使繼此而馭李世達者又復然臣慮河之患無已時也夫是數者輾轉相尋因循茍安以致今日輒干星象上厪聖衷臣待罪言官何敢一日安哉臣聞惜小費者不足與成大功守拘攣者不足與觀昭曠漢武帝稱雄才大略矣瓠子河決至投璧親祀公卿負薪宋仁宗稱令主矣汴河數決災民棲御廊聚國社憂形於色至輟儒臣司馬光講筵三往勘之即如先朝徐有貞之築張秋朱衡之築夏鎮皆以大臣而成功者假令二三君者與國朝列聖皆茍安故常是使河之患在漢宋者不知何如而張秋徐沛今尚無底止也臣愚反覆思惟以為國家今日河漕計莫如特遣大臣集廷臣推議有才望者或見任户工二部侍郎或常有事于河道熟知水勢地利不鹵莽者會同新任河道都御史李世達見任漕運都御史吳桂芳協力共理重之璽書定之限期河平之日照舊分職管理則庶幾乎目前可以一事權可以定羣策可以審利害可以酌錢糧可以據功罪而俟命於朝廷以行賞罰夫自古成大功幹大業者豈因循掣肘者之所能辦哉今河漕二臣敕書曰便宜部議亦曰便宜而卒不能破格一努力而為之者終為文法所拘而不敢自越也語曰役不大興害不能已又曰不一勞者不久逸臣愚以為誠遣大臣則視河與漕無分彼此視黃與淮無分胡越勢可便漕而不便于河不為也勢可便黃而不便于淮不為也河道之臣齟齬則以漕運之所宜遷就者通之而使不涉于忌嫌漕運之臣抵牾則以河道之所宜委曲者導之而使相忘乎彼己腹心臂指脈理貫通無相滯礙無相阻扼其有徇私害公病人利己者輒得以其理直之而請命於陛下然後可以惟其事之所欲為而能有濟臣故曰可以一事權誠遣大臣則崔鎮口之應否築塞老黃河之應否開復宿邳一帶正河之應否挑濬髙家堰之有無關繫淮泗扄鑰髙寶等隄之能否阻遏橫流淮泗入江果否順水之性而無所礙草灣海口何以成功而無補于目前或疏濬或築塞能否可以並舉而後取效折衷議論舉衆説而量其長短如不出是數者而可以黃淮兼濟則力主其説而在于必行如是數者而皆無益于黃淮久逺之計則博採輿論而務為究竟必得夫事機之肯綮可以措手然後己臣故曰可以一羣策誠遣大臣則必循行河道考察地形往復江淮河南山東直𨽻之間備詳要害何者為支流何者為正道何以遏其狂瀾何以適其本性是非利害皆屬之于一人淮南淮北皆視之如一體郡邑長吏與夫佐二治河之屬皆如四肢手足之率相為用而不相背利在於河者多而漕者少則從其計多者而不以為私圖害在於淮者少而黃者多則從其害少者而不以為嫁禍利一害百毋以害掩利害一利百毋以利冒害不拂於人情不撓於衆口臣故曰可以審利害誠遣大臣則奉命而往以陛下之心為心如陛下之親行耳聞目擊確有可據一手一足一木一石之力所不能辦者皆得以請命於朝而無所窒礙內而視户工之臣相為一體外而視河漕之臣相為一家陛下既擇人而用之亦能以大臣之心為心聽其便宜行事大破故常利必期於大興而不惜小費害必期於盡去而無惑人言其有事在兩可勢不兩全利害相關勞費難度者亦可以詣闕借籌稟授方略而期于共濟永賴臣故曰可以酌錢糧誠遣大臣則請命而行事竣而返功有底績之期事有責成之日河漕二都御史而下以至于百司庶府卑官小吏茍有一毫之豎立效勞國事者皆得以其功而敘録奏議升賞其或因循搪塞茍安目前及浪費不資闒茸罔效者亦得以其罪而奏聞處治一如沿邊重鎮或年終奏報或三年類報使人心鼓舞於奬勸激勵之中而唯吾所聽命然後羣力可協而百工可成臣故曰可以據功罪而俟命於朝廷以行賞罰夫由前觀之而今日河之為患如此由後觀之而異日河之庶幾如此陛下何靳於一官之命而使運道民生日復一日無平成之期哉且陛下御極以來軫念國計每虞運道艱阻嘗議開泇河矣議開膠河矣議復海運矣計亦不下百萬而猶限于勢力之不可能民命之不可保今皆報罷而使河渠復漲塞如故陛下何不以泇河膠河之費而借資于河淮故道猶不失其常策哉説者以擇人為難臣又以為不然夫堯之知人猶必失鯀而後禹若慮諸臣之有負任使而置之不問是因噎廢食之説也借使所遣大臣名位與河漕二臣不相上下才識與河漕二臣不相優劣而朝廷顓使一鼓舞自新之下則河漕諸臣之耳目心志皆為之丕振而思以自奮寧復尋常之茍安已哉昔唐之淮西久不能下李訴諸將非不可以計日成功者乃裴度在廷獨曰臣出而諸將爭功則元濟就擒矣自古成功建業其所鼓舞之機類如此臣誠願上之治淮南北如唐之克復淮西而特遣大臣如裴度之效職也如蒙敇下户工二部擬議上請則庶幾河患可息運道無虞民生國計皆非小補雖有星象之異亦不能為之災矣謹題請旨奉聖旨户工二部知道該户工二部議覆奉聖旨近來河淮為患民不安居朕何嘗一日不以為念先年以運道梗塞不惜重費欲别求一道以利轉漕乃議者謂治河即所以通漕遂降旨專責當事諸臣著一意治河其管河司道等官都著久任不許升轉乃今河患連年如故各官悉已轉遷言者不歸咎曠職怠玩之臣反説朝廷不行拯恤人臣之義謂何且都不追究這所奏姑依擬著吏部便會推有才望實心任事大臣一員前去經理一應事宜著次第奏請施行科道會勘河工疏給事中尹瑾題為恭報兩河工成仰慰聖衷事臣於萬厯七年十月初十日欽奉敕工科給事中尹瑾近該督理河漕右都御史潘季馴侍郎江一麟奏稱南北河工俱完河淮安流復其故道朕心甚慰前有旨候工完差官勘實行賞今特命爾前去會同巡按御史查照節次題奉欽依事理親到各該地方將疏內所開工程逐一查勘要見築完隄堰若干塞過決口若干果否堅固足堪捍禦建完壩閘若干挑濬淤淺若干果否通利有禆轉運於原題事理有無疏漏及用過錢糧有無虛冒備細踏勘明白造册奏報爾為朝廷耳目之臣受兹委任務秉公持慎作速勘明以副朕賞不踰時之意毋得茍且具文含糊塞責致負任使欽哉故敕欽此欽遵又準工部手本亦為前事該本部題都水清吏司案呈奉本部送工科抄出工科都給事中王道成等題稱該總理河漕右都御史潘季馴等題前事奉聖旨工部知道欽此隨該工部尚書李幼滋等覆題奉聖旨著工科給事中一員前去會同巡按御史即便勘來欽此臣等惟黃河為患自昔治之鮮有臻成效者頃又甚而奪淮以致淮揚之間民遭胥溺其仰厪宸衷亦孔殷矣河臣潘季馴等乃能殫智畢力卒使兩河順軌上有濟於運道下有禆於民生誠曠世一殊勛也工已報竣委應差官查勘明白具本回奏等因奉聖旨是著尹瑾上緊去關防有舊的便查與他工部知道欽此續該本部覆題前因會同彼處巡按御史查照原題事理將後開工程逐一查勘果否做完及有無堅實錢糧有無虛冒勘明徑自具奏等因奉聖旨是欽此欽遵備行到臣臣即晝夜兼程於本月二十一日至徐州地方行據各司道府郎中等官佘毅中等各將築過遙隄塞過決口建過閘壩砌過石隄開過河渠濬過淤淺各工程及用過錢糧開報到臣會同巡按直𨽻監察御史李時成夙夜兢惕殫心竭力以圖免瘝曠凡所勘隄壩慮其長短之異數也為長繩以計其丈尺慮其厚薄之異制也為橫竿垂線以計其底面慮其泥沙之異土也試之鋤鐝以驗其純雜慮其堅鬆之異工也試之鏟錐以驗其虛實隄堰以土真杵實為上壩閘以石塊堅厚為工即自淮北地方勘得管理中河工部郎中佘毅中督率府衛州縣同知等官王琰等原分工程自古城起至關王廟止遙隄一道丈量長八千六百八十九丈二尺俱根闊六丈頂闊二丈高一丈至九尺不等築塞崔鎮大決口一處及劉真君廟等決口共三十六處丈量長四百六十一丈五寸古城堰口隄一道丈量長三百六十丈崔鎮減水石壩一座壩身連鴈翅共長三十丈三山頭遙隄一道丈量長二千四百二十八丈三尺五寸俱根闊四丈頂闊一丈六尺髙八九尺不等馬厰坡遙隄一道丈量長七百四十六丈根闊七丈至五丈不等頂闊二丈髙一丈至八尺不等各隄栽過低柳數計一十六萬一千六百株共用過銀四萬八千七百五十九兩九錢七分七釐三毫米一萬四千一百七十六石九斗七升二合又勘得海防兵備兼管河道參政龔大器督率府州縣通判等官宋守中等原分工程自吕梁山麓谷山頭起至直河止遙隄一道丈量長九千四百六十四丈一尺俱根闊六丈至五丈不等頂闊二丈至一丈五六尺不等髙九尺至七八尺不等谷山并匙頭灣涵洞各一座三山遙隄一道丈量長一千三百九十一丈八尺俱根闊四丈頂闊一丈四五尺不等髙八尺各隄栽過低柳數計五萬二千株共用過銀五萬一千一百七十七兩五錢五分六釐六毫八絲米四千三十三石三升又勘得徐州兵備兼管河道參政遊季勳督率府衛州縣同知等官蔡玠等原分工程自竇老榖堆起至象山止遙隄一道丈量長一萬一千七百五十七丈二尺俱根闊六丈頂闊二丈髙九尺徐升鎮減水石壩一座壩身連鴈翅共長三十丈三山遙隄一道丈量長二千六百四十七丈一尺六寸俱根闊四丈頂闊一丈六尺髙九尺并順水壩一道各隄栽過低柳數計一十五萬一千六百株共用過銀五萬九千三百四十五兩八錢一分四毫一絲米二萬一千九百六石一斗二升八合又勘得水利道副使張純督率府州縣同知等官樊克宅等原分工程自桃源縣關王廟起至清河縣護城隄止遙隄一道丈量長九千七百二十一丈俱根闊六丈頂闊二丈髙一丈至八九尺不等塞完張泗沖等決口一十八處丈量共長二百一十一丈季太三義二鎮減水石壩二座各壩身連鴈翅俱長三十丈三山遙隄一道丈量長二千五百四十九丈俱根闊四丈頂闊一丈五尺髙八尺各隄栽過低柳數計五萬三千株共用過銀五萬三千三百一十三兩九錢四分九釐八毫米一萬四千三百一十八石一斗五升又勘得潁州兵備兼管河道僉事朱東光督率府衛州縣通判等官李光前等原分工程自象山起至果字鋪止遙隄一道丈量長六千九百三十六丈七尺俱根闊九丈至六丈六尺不等頂闊二丈一尺髙一丈至八尺不等果字鋪起至李字鋪止遙隄一道丈量長八百四十八丈六尺俱根闊六丈六尺頂闊二丈一尺髙八九尺不等歸仁集遙隄一道丈量長七千六百八十二丈八尺根闊六丈至四丈五尺不等頂闊三丈至一丈不等髙一丈二尺至八九尺不等內填塞決口四十七處丈量長三百四十九丈各隄栽過低柳數計二十萬株共用過銀七萬四百一十三兩一錢五分六釐七毫米二萬五千四百一十八石九斗二升復至淮南地方又勘得管理南河工部郎中張譽督率府衛州縣同知等官鄭國彥等原分工程髙家堰築隄一道丈量長一萬八百七十八丈俱根闊一十五丈至八丈六丈不等頂闊六丈至二丈髙一丈二三尺不等內三千四百丈俱係樁板廂護築塞大澗渌洋湯恩等決口三十三處丈量長一千一百一十八丈築塞朱家決口一處及築月壩一道丈量長八十丈本口直隄一道丈量長一十四丈閉塞天妃閘一座幫築趙家口迤西兩岸隄二道丈量長六百七十四丈俱根闊二丈至一丈頂闊二丈至一丈髙一丈至八尺不等修建禮字壩智字壩各一座天妃壩一座開過出閘河口自甘羅城起至淮河止丈量長二百一十三丈底闊四丈面闊六丈深一丈兩岸築隄二道丈量長四百二十六丈根闊十丈頂闊二丈髙一丈築塞黃浦大決口一處南北攔河壩二道丈量長四十五丈根闊一十三丈頂闊十丈髙二丈填築正口連土隄一道丈量長九十四丈自水底至頂髙三丈八尺根闊一十三丈頂闊四丈三尺改建通濟閘一座并攔河壩一道各隄共栽過低柳數計六萬株共用過銀八萬八千九百七十七兩一錢五分一釐四毫七絲一忽米六千五百一十石一升五合內髙家