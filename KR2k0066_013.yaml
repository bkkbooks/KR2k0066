自兹閭閻有可耕之業而運道無奪河之患矣至於塞天妃閘以拒黃流修復通濟清江福興等閘以嚴啓閉復禮智二壩創建天妃壩以便車盤此皆查復先臣陳瑄之故業遺意若能嵗加修守即久安長治之策也臣躬親遍閲睹記詳確謹繪圖貼説於後科臣進圖疏給事中尹瑾奏為恭進河圖懇乞聖明俯賜睿覽以重國計以禆聖治事竊惟黃淮二河古稱二瀆黃河發源於星宿海經崑崙山歷陜西山西河南出南直𨽻之徐州合山東汶泗諸水以資運道自徐經邳至清河縣東與淮水會淮河發源於河南之桐柏山經鳯陽泗州亦至清河縣東與黃河會二瀆合流俱經安東縣由雲梯關入海其淮河以南則由淮安歷揚州以通江南黃河以北則由會通河歷天津以達京師兩河合抱於鳯泗光嶽鍾祥於祖陵為我國家億萬年根本之地實在於此且嵗輸江南四百萬之糧以給官軍數十萬之用上有關於國計下有繫於民生自隆慶年間黃河從崔鎮等口北決淮水從髙家堰等處東決二瀆之水散漫而無歸故入海之路停滯而不達此非河之淺也水不行而沙自塞耳今惟諸決盡塞兩河復合水行沙刷海口復通且堅築隄堰以防伏秋之漲連建減水壩以泄盈溢之水築歸仁集而泗州陵寢無衝射之虞固黃浦八淺寶應諸隄而興鹽諸邑無昏墊之苦塞天妃閘以拒黃流修復通濟清江福興諸閘以嚴啓閉復禮智二壩創建天妃壩以便車盤則二瀆不至於橫流兩河悉循夫故道閭閻有可耕之業漕運無轉挽之難真平成之偉觀曠世之希覯也該臣奉命會同巡按御史李時成查勘河工遍歷各地方睹記詳確竊念兩河之形勢實為國家之命脈謹繪圖貼説以進夫知其為祖陵之密邇則思培護之當嚴知其為京師之通津則思疏濬之當豫知漕運關乎國用則思河務之當修知壤地切乎民生則思保障之當急知隄堰之綿亘則思上流之當防知壩閘之布列則思下流之當泄觀今日之順軌當思昔日之橫流觀工成之巨艱當思保守之不易擇人以重其寄久任以責其成嵗修以葺其工綜核以稽其實又今日之不容緩者此則臣愚涓埃之微忠進圖之誠悃也伏乞皇上留神覽閲俯察兩河形勢則不出九重之上而坐照數千里之外國計民生胥賴之矣奉聖旨河圖留覽工部知道條陳善後事宜疏給事中尹瑾題為河工告成敷陳善後事宜以圖永利事該臣奉命查勘兩河工程北由徐沛南抵淮揚遡觀蕭碭上流歷涉雲梯海口詳審地勢熟察河流乃知黃河之性宜合而不宜分宜急而不宜緩合則流急急則蕩滌而河深分則流緩緩則停滯而沙淤今隄堰已固黃淮合流淮得黃而力益專黃得淮而流益迅兩河協力同趨中流水不橫決於兩傍則必直刷於河底故河身深濬海口通達真平成之景運無容他議但成功固難而保其成功為尤難臣嘗躬親遍閲廣詢輿情參以衆見之同斷以己見之獨謹條列七欵以為善後之圖敬陳一得之愚少效涓埃之報伏乞敕下工部覆議如果臣言不謬令河臣參酌舉行亦庶幾河漕之一助也謹題請旨計開一重久任以便責成照得事理必閲歷而後熟施為必諳練而後精凡一職一事之寄皆然也况河道之職關係最重議論最多中間地形之險夷水勢之緩急工程之難易經費之盈縮或黎民懼而晏然或薪積安而厝火或在載籍為美談而實乖於至理或在往代為良畫而不宜於今時使非久於其任者當之則作聰明者涉穿鑿暗大較者昧設施蓋涉歷有未諳故臨事多眩瞀耳先年屢經題準久任然非定立章程甄别淑慝則賢且勞者反淹滯而不才者得茍安非所以勸勤勞而懲惰逸也合無今後自司道以至府州縣管河諸臣俱令久任俾得熟知河務諳練機宜修守有方隄防無失如纍嵗賢勞著有成效者遇三六年考滿準與加升職銜令其照舊管事待其資俸最久績效最著然後破格超遷其有遷轉離任者則必就近遴補如管河郎中有缺即以管理泉閘等主事中選補管河守巡有缺即於附近守巡各道中選補一則濡染久而端委相諳一則交承速而職事無曠又必令其新舊交代新者未至舊者不行不惟人存政舉緩急有資且使舊政告新傳受有法其為河道裨益非淺鮮也至於才志庸劣不堪負荷者則聽總理憲臣不時奏請更易不必拘年終考核因循姑息致誤地方庶幾人思任事而規避不生事有責成而巨工可保矣伏乞聖裁一定法制以核嵗修照得築隄以禦水猶築城以禦冦也冦之性避實而擊虛故治兵者必嵗嚴城守水之性避堅而就脆故治河者必嵗嚴隄防其理一也往嵗黃河惟恃縷隄束水隄迫而不能容隄鬆而不能固致水決囓今兩岸遙隄既成俱係真土堅築則範圍寬廣而水不迫隄根水薄而勢不衝縱伏秋泛漲水上崖以鋪淤而崖益髙水落河以刷沙而河益深誠以水治水之策也然兩隄雖固而修守當嚴每嵗雨水之淋漓人畜之蹂踐能無坍且損哉使不嵗加修守則高者將日卑而厚者將日薄是可不預為之防也查得大明會典內一欵令各處河隄每嵗加高一尺加厚一尺年終管河官具數奏聞法至深逺也今宜申明此法稽核舉行但黃河隄夫每里止十名則每名該幫隄一十八丈除下護掃築順壩量幫掃灣縷隄或風雨妨工等項大約一年之中止有半年幫築以方土計方僅能加髙厚各五寸使嵗加此數則將來髙厚亦莫知底止矣合無行令管河司道等官每嵗嚴督各該管河官率領守隄官夫務將各遙隄覔取真淤老土定限加髙五寸加厚五寸柳葦嵗加栽植勿令稀疏閘壩嵗加修葺勿令圯壞年終管河郎中會同該道躬親核驗將某處遙隄原高若干今加若干原厚若干今加若干補栽過柳葦若干伏秋之時遙隄有無衝潰閘壩有無圯壞從實開報呈河漕衙門造册奏聞如各管河官加幫數少及伏秋失事者明白參劾輕則罰治重則黜降仍照閲邊事例每三年遣官一員前去閲視三年之內遙隄加幫果否足數伏秋水發有無失事運道果否通利淮黃果否安流通將各經管司道等官有功者分别敘録失事者悉聽參究則法度森嚴人心警惕而隄防可永保矣伏乞聖裁一甃石堰以固要衝照得髙家堰居阜陵洪澤諸湖之濱淮水伏漲湖河相連西當淮泗衝流東護淮揚沃土自漢陳登建築之後纍世因焉我朝平江伯陳瑄復加修築使淮水不得東注則淮揚之田廬一望膏沃高寶之運道萬艘安流二百年間淮揚藉以耕藝厥功懋矣向因蒞兹土者足迹不履其地終嵗不葺其工鹽徒利其直達盜決侵尋決口漸以成淵狂瀾莫挽淮水不出清河而黃河倒灌全淮盡注髙寶而洪水橫流又何怪淮揚之民又為魚鱉也今已築塞成隄體制髙厚既有樁板以護其外復設官夫以嚴其防堰成之後淮水悉從清口故道會黃入海河深水退隄外皆乾水及堰址者惟大澗口一處僅百餘丈詢之土著皆云必可永恃第恐嵗久月深官更吏易不見其潰而不思其防每遇伏秋泛漲西風激浪又烏知不日漸侵削如昔年之決潰者乎終不若包砌石隄可一勞而永逸也今熟察地形南北各二十里稍亢而中二十里為窪稍亢者可保無虞低窪者尚宜砌石蓋石砌堅固則伏秋不必護掃省費不資一利也鹽徒不能盜決金城永固二利也編氓樂居人自為守三利也但聚鳩採伐用力巨艱未可以嵗月計大工才竣民力方蘇未可以旦夕舉工程浩大夫匠最多未可以一郡辦合無先行採石以萬歷九年為始派行徐潁海防三道均分道里各派所屬為之每道該砌六里六分有奇俱從大澗口最窪處砌起假之以嵗月責之以必成其經費錢糧見有大工用剩銀兩聽其估計應用工完之日河漕衙門奏行該部核實毋至虛冒仍分别勤惰以昭勸懲則力分而事易舉法立而功可成即萬世可永賴矣伏乞聖裁一濬閘河以利運艘照得黃河濁水隨挑而隨淤惟當束水以濬河閘河清水愈挑而愈深必當疏濬以通運今黃河一帶自決塞隄成之後河身深廣本無所庸其濬而亦不必言濬矣惟是黃河一帶原係先臣平江伯陳瑄開鑿成河蓄水漕運猶恐淺阻創立裏河規制每嵗挑濬一次邇年以來清江閘河黃流久注淤沙久填水溢沙上舟因水浮不無淺澀查得南旺運河三年二挑合行該管河郎中亦照南旺事例將興工完工月日及用過錢糧特疏奏聞查考至於揚儀河道雖近經濬深舟行順利然日久不挑泥沙漸積日積月纍必復淤墊且揆之地形揚儀稍亢而高寶最窪每遇伏秋水漲湖隄最稱危險使下流常深則上流無壅是濬渠之中兼得平水之利亦應時常嚴督官夫撈淺或酌定數嵗一挑勿致淺滯庶濬築相成而工無偏廢河隄胥利而漕有常通矣伏乞聖裁一專責成以防衝決照得黃河之性合則力專而流急故沙隨水刷而河日深分則力散而流緩故水滯沙停而河日淺淮河雖係清水而分合緩急之機要與黃河無異近日大工興舉諸決盡塞河水頓深則塞決之功誠不可緩蓋河決久則傍流深傍流深則正河奪故塞之速則費省而工易塞之遲則費浩而工難方其始決以數十人塞之而有餘及其既久以千百人塞之而不足涓涓不塞遂成江湖蓋自古記之矣其間經理區畫固司道職掌而夫役物料則有司存焉有司職掌守土比閭之民皆其撫馭一號召即夫役也帑藏之財皆其典守一措置即物料也呼吸之間事可立辦惟地方有司視河隄之坍齧漫不經心及水勢之漲決略不動念間有循職任事者又執拘攣之見持不敢自用之心即有水勢危迫必待白之司道白之河漕而後行之彼司道所轄廣袤在在皆應經理豈能百十其身而一一坐督之哉文移往返動經旬月江河一決淜湃難支始而蟻穴繼而濫觴終必至於滔天而莫可收拾崔鎮黃浦之覆轍可鑒也崔鎮黃浦當初決之時特數十人捧土之力耳乃崔鎮士民赴訴而縣令付之罔聞黃浦鋪老呈報而縣佐加之笞責且倡為不可塞不必塞之説以亂觀聽迄今地方官民言之無不痛恨近該巡鹽御史薑璧條議凡河道失事掌印及管河官一體參治該工部題覆奉欽依遵行誠宜永為令甲第恐積習難挽立法貴嚴若或假之以姑息則人無畏志然下無專制事輒關白若非假之以便益則彼有他辭合無今後除平時區畫修守之法俱責成於司道管河官萬一水漲暴發事機危迫非司道駐劄地方該掌印官徑自派募人夫動支物料多方防守如夫料不足聽其借支貯庫别項銀兩措辦務保無虞抑或水勢異常委難支持致被衝決一面通詳司道一面便宜處辦夫料築塞不必拘泥關白而後行事大決限十日或半月小決限五日或十日完報之後借用過銀兩司道核實將嵗修錢糧照數抵還其失事之罪即嵗終奏繳亦姑免開列如過限不完司道官即時據實呈河漕衙門參奏輕則罰治重則降黜如司道容隱罪在司道河漕姑息罪在河漕庶法嚴而人知守防密而隄自固河渠可永利矣伏乞聖裁一防徐北以固上流照得運河自徐州而下防黃河之潰而出也故築兩岸遙隄以捍之毋令傍溢以奪河流徐州而上防黃河之潰而入也故築太行縷水二隄以障之毋令北徙以傷運道其為保運計則一耳河決徐州之下則運道猶有可通之路河決徐州之上則運道不免有中斷之虞先年張秋之役可為寒心故論目前轉輸之計則徐邳桃清為急論全河變徙之患則豐沛碭單為尤急徐南黃河工程堅固防守謹嚴可保無事惟徐北黃河舊由蕭縣出小浮橋入運小浮橋河深近洪能刷洪以深河運道之利也且河勢趨南而北徙非所患也嘉靖四十五年河決邵家口出秦溝入運秦溝河淺近閘每積淤以塞河運道之害也且河勢趨北而北徙有可虞也今幸復趨小浮橋矣而小浮橋上流原非故道尚當預防詳觀地勢南岸蕭縣一帶淤墊已高無慮南徙北岸豐沛一帶地勢頗低恐防北遷所恃者行縷二隄為之捍禦也已經河漕衙門會同各省撫按題準大舉修築見今估計興工畫地修守但查沛河淤塞原係華山戚山諸處衝決而縷水隄根近有水掃成河俱當加意修築其邵家壩為秦溝舊口趂今興工之時亦宜倍加修理堅固以絶秦溝上流夫邵家壩築矣行縷二隄修矣而守之存乎人也有隄不守與無隄同守隄不密與無守同河南山東自太行遙隄已成之後無復衝決者亦以夫力多而防守密也今徐北至單縣界止見修隄壩長一百五十餘里而夫役止七百餘名是每里僅四五名耳其何能濟仍應量照徐南事例每里補足十名方能修守但徐淮州縣災疲嵗久難復加派合行河漕衙門通融酌處或將山東河南停役夫銀每嵗量解召募蓋保豐沛所以保全河非止為直𨽻河道也或量攤派於廬鳳揚三府蓋當以江北全力治河不當止以瀕河州縣治河也或於淇夫徭役銀兩仍舊徴給而以徐州稅銀召募夫役蓋止於復舊額而非以額外派民也務俾夫役有餘每嵗亦如徐南加幫之法一體稽核伏秋水漲併力堵築北徙既無可患而秦溝又無可虞則河既不傍決於兩岸必能深刷於中流小浮橋之利可永保也再照新築各隄俱應比照縷隄畫地建鋪安插各夫庶棲息有定所而修守有專功至於近隄居民有願結廬隄上者悉聽久長居住不必起派基稅使人皆樂居庶蜿蜒長隄宛如市井晝則牖户相聯夜間燭火相照久之將視為己業各自修守是萬年不拔之基也伏乞聖裁一備積貯以裕經費照得未雨而徹桑土既濟而謹衣袽古人思患預防非過計也今大工底績二瀆安流非既濟之後而未雨之時乎然必積貯錢糧嵗加修守則桑土衣袽之備也河道錢糧山東河南額派原多頗足應用若南直河道起自豐沛至於淮揚地方延袤千有餘里淮以北則黃河洶湧淮以南則湖水瀰漫非止切乎民生悉皆關乎運道以葺修而工料浩費以防守而用度巨艱及查嵗額樁草銀兩僅二千有奇加以連年災沴每嵗徵收在庫者不滿數百以數百之金而支持千里之河安能有濟故一遇修築束手無措或隄防已圯而不能修或衝決已深而不能塞隱忍坐視浸淫滋蔓遂至於大壞極敝而後請發內帑以圖經理設使才決才塞愈修愈固又何有至於大壞亦何至於大費哉夫與其大費於河防既潰之後孰若省費於河患未然之先此其利害得失固較然明著也今查大工錢糧見剩二十四萬兩有奇已取回一十二萬即今估修徐北隄工又不下數萬使髙堰石隄興舉亦非小費可成則所剩之銀已不足用藉令無此二役亦僅足供數年修守之費耳數年之後又將何以處之故積貯之策誠今日急務也似宜從長計議或河南山東河道銀兩或運司挑河鹽銀或淮徐各處鈔稅或撫按贓罰或多方措處大約每嵗共湊銀三萬兩嵗為定額解貯淮安府庫專備兩河修守之費仍行濱河州縣各於要害處所建設物料厰一座每遇冬春之交支銀買辦樁草及修河器具積貯厰內以備緊急寧備而不用毋寧用而不備也司道官仍置立循環時常查核總理憲臣嵗終將用過錢糧若干剩餘錢糧若干照例奏報臣非不知鹽銀鈔稅關係邊儲但河漕關係京儲較之邊儲似尤緊要况河道通而後鹽船通有河漕而後有鈔稅也日後河道無虞錢糧積至數十萬則以所積之銀解供內帑亦朝三暮四之法若一通融議處俾積貯素預庶錢糧隨取而隨足河工有備而無患矣伏乞聖裁奉聖旨工部知道該工部覆議內重久任欵開移咨吏部凡管河部屬司道及府州縣佐二等官果有熟諳機宜懋著績效者考滿即與升級照舊管事資深即與超遷用勸異勞有缺就近遴補取其濡染習熟臨行新舊交代令其傳告精詳至於待異等者一如待邊臣由道而撫由撫而督由督而本兵不吝焉及咨行河漕衙門年終薦舉預儲可代之才遇缺揭咨必求因才而代徑咨吏部仍咨本部以慿會同遵行等因其餘欵覆相同題奉聖旨隄工嵗修當視其低薄處隨宜加築豈得定以五寸為限河漕當事諸臣能嚴督地方官著實經理視國如家何事不成亦不必數數差官閲視反滋多事其餘依議行條陳河工補益疏御史陳世寶題為恭覩河工垂成尚有可言懇乞聖慈俯賜亟行以少圖補益事恭惟皇上自臨御以來純心任賢勵精圖治國家重務靡不振起去嵗又憫淮揚之水患運渠之敝壞特命大臣以往治之維時中外臣工憂切杞人皆恐艱巨難成徒勞財力惟我皇上獨奮乾剛鋭意舉行然猶寬之以嵗月而未遽責之以速成也今自去年九月十五日興工以計之除中間凍阻其修理實期才三四月耳乃該臣瓜儀催儹以歷乎髙寶淮安清河桃源宿遷下邳之間已見所修諸工十完七八黃河順軌深闊倍常及登岸四顧凡前日之洪濤巨浸沮洳淹沒之處遂多為野而稱可耕可穫之田此皆我皇上拯溺亨屯之仁以上孚於天故其平治水土之速有以下應於地太平有象兹非其一哉但垂成之會而曰隄曰堰尤宜為事制曲防之策曰官曰民尚當用招徠激勸之恩臣緣是不自揣量列為六欵敬為我皇上陳之雖芻蕘愚陋殊無逺識而目擊參酌亦不敢為無稽之言也伏乞敕下該部逐欵詳議如果可用即見之施行則於河工未必無小補也緣係恭覩河工垂成尚有可言懇乞聖慈俯賜亟行以少圖補益事理謹題請旨計開一移建管河官衙舍以重責成照得河之為害無異於冦而防河之計亦準於防冦可也臣嘗聞沿邊要害必設立將營使之咫尺隴荒有警即知或戰或守為計甚便此固傍通事理何獨於治河而疑之今查徐州至清河縣一帶兩岸各築遙隄一道以障泛溢之水中間設減水壩三座以殺衝突之勢自是以往亦可保其無奪河之患矣但是工也成之固難而守之尤難夫固當增而官尤為要况伏秋之時河流瀑漲掃灣迎溜素稱要害之處呼吸變態又有頃刻不可缺官而當率夫以防守之者雖府有管河同知二員州有管河判官縣有管河主簿各一員官可謂備矣然其郡邑之去河縱逺近不一皆不與要害而相值即先該總理河道兵部侍郎萬恭曾以專駐地方題奉欽依而建成衙舍止有一二然亦非要害之區信如此倘其地河決隄破而始往報於官則一線之裂將有瞬息洶湧而緩不及事者矣且髙郵石隄向已築成寶應石隄今亦就緒黃浦八淺近因髙家堰之斷流而亦計日可塞似宜無所事守也尤恐髙寶之二湖一遇西風波浪滔天石亦難恃而八淺黃浦俱係未堅之土又焉敢謂必無他虞是移管河官之衙舍以責成其晝夜防守誠今日之不可少者也如蒙乞敕該部再加覆議轉行總理河漕並漕撫衙門巡按巡鹽御史督同該道查勘淮南淮北各管河官原分地方要害處所建立衙舍使之常川駐劄自河防之外上司不許别項差委躬率各夫行二守四防之法比遇糧船盛行仍責之以催儹防護如雖移建衙舍而晏安偷惰以致少有踈失即住俸以責其成功或盡力修守而三年無虞則破格優處以酬其刻苦之心夫如此則附近要害而修築決不後時督責嚴切而職守自不怠玩矣再照地方災傷而又興作是增一厲階矣合無將建立錢糧俱在河工銀內動支其衙舍規制亦不許過求𢎞厰臣又往來河道見兩岸寺廟多被水淤而吕梁洪有書院三座據兩座已傾如拆毁而充此衙舍之資當又不假於河工之銀也伏乞聖裁一添設新隄堰夫役以便防守照得古今舉事功甫告成而旋致廢墜者何哉亦以狃於目前而不復為長慮却顧之謀耳夫今全河之工幸覩垂成固當思患預防而為守之之計矣但遙縷二隄已逾千里髙家堰之隄凡六十里柳浦灣補舊增新將百餘里而八淺黃浦地雖咫尺反稱要害若非多集夫役則以盜而決者巡邏有所不逮以水而決者修築有所不能夫既集矣而不分截廬棲於其上恐彼此推諉無以收責成之效住居窵逺亦不勝招呼之煩是查增夫額而畫地築居所當亟亟以為之處者也然既用其身當飽其食訪得以前河夫工食年年拖欠今若以新增者而派之於本地州縣亦必以相沿之故徵解不完而逃竄之弊在所不免矣切思大舉河工雖為地方而漕運尤重合無以新增夫餉分派於漕糧之內每畝加增不過毫釐衆輕易舉莫此為便者如蒙乞敕該部再加覆議轉行總理河漕并漕撫衙門督同司道將遙縷二隄高家堰柳浦灣黃浦八淺逐一查勘或舊有夫若干今該加添若干或一向無夫今該創設若干某處至某處共幾里應分布若干即令於其地築室爰居其在遙縷二隄黃浦八淺者悉聽州縣管河官調度在髙家堰柳浦灣者悉聽新設大使官部領而總攝於管河之同知晝夜巡緝以防盜決之姦日操鍤畚用加高厚之工以至應給工食每夫一年約用若干共夫若干該用銀若干灑派漕糧每石應加若干逐一算明注之派單分發各處及糧運北來令與輕齎銀一併解淮按月關支夫如此則隄不缺夫夫不缺食而今日不資之費幸成之功亦可以永恃矣伏乞聖裁一添設管隄官部夫以保新工照得置吏張官固有定額之常數而因事添設實乃濟時之權宜竊念臣往來淮上已三年於兹矣見得髙家堰實淮安之前門柳浦灣乃淮安之後闥故數十年來使淮安城外樓臺煙火之地半為川源桑麻禾稻之區盡成沮蕩皆此二隄傾圯之所貽也今該河臣於高家堰則多集官夫加厚加高密布柵樁中護以板遂使瀰漫泗水盡由清口而出以至柳浦灣則亦因其舊基而修補充拓綿亘百里旦夕告竣夫如此則淮郡亦可保其無衝齧之患矣但此二隄俱在荒僻人不及見而鹽徒私販姦商漏稅又利高堰之直達揚州每行盜決夫以不堅之隄而加之以盜決之衆亦何惑於已往之不治也以臣愚見合無除多集夫役以分布棲住於二隄矣尤當各設精厲大使官一員使之同居隄上專部而防禦焉如蒙乞敕該部再加詳議移咨吏部即將高家堰柳浦灣各銓選年力精鋭大使官一員使之築居隄上督率各夫遇有盜決則擒拿以重治而修築之功尤責其日增而月盛至官職之修否亦照管河官之例以為賞罰夫如此則官有所專夫有所統而新隄誠可以永保矣再照臣伏覩見行事例內一欵凡故決盜決山東南旺湖沛縣昭陽湖蜀山湖安山積水湖各隄岸并阻絶山東泰山等處泉源有干漕河禁例為首之人發附近衛所係軍調發邊衛各充軍其閘官人等用草捲閣閘板盜泄水利串同取財犯該徒罪以上亦照前問發臣敢以為此例不但可施之湖水泉源管閘官役而已矣合無仰厪聖斷併下部議如有盜決高家堰尺寸之口及大使官知而不舉受賄縱容比照前例一體問發著為定例榜示淮安庶人心警惕自不敢犯矣伏乞聖裁一增築宿遷縣遙隄以順民情照得淮黃泛溢梗運殘民臣蓋耳濡目染而怵惕於心者三年矣邇幸朝廷之上明良合德軫念時艱不憚費勞惟求平治此其精神感召誠有格天心而協民志者故修築之工曾未旬月而各處隄防俱完強半該臣自淮而北見近河之民歡若更生皆謂數十年昏墊之苦魚鱉之憂一旦而盡釋之非我皇上體天勤民何以有此凡所以效華封之祝竭嵩呼之誠者蓋萬口而一詞矣顧行抵宿遷縣據鄉民王卓等百有餘人持狀告訴大約謂瀕河州縣有遙縷二隄者自此修完皆可以避水災而興農業獨念宿遷縣縷河雖有隄岸而侍丘諸湖尚未修築遙隄使伏秋河漲各處必無他虞此地應遭水患乞要一視同仁接築遙隄等情具告到臣該臣再三尋思中必有説及詢諸各道則云當時踏勘而於此處未議遙隄者以侍丘諸湖背馬陵山而為壑即黃河溢流以注於其中則必為此山阻回而仍歸於河蓋湖不外泄斯河不為奪是以未為遙隄之議耳况當踏勘之時河水與湖山相連若不能為隄者所以官不為議而民亦弗之告也今河深岸出湖水日縮中段隔絶遂成平陸此災民動耕種之念而生築隄之請也近總河衙門亦以民告者衆欲行補建獨以原議之時無此錢糧斯從而已之矣切照原議固無此端而以支剩河銀為之亦可也今春縱不能舉而以秋後為之亦可也且全河之工所費不資此隄之工所費無幾是又可果於大而特靳於小乎各處之民靡不遂願此地之民獨不蒙惠是不猶之滿堂燕笑而有向隅之泣乎田有一丘一畝尚欲設計開墾矧云此隄一築而可復數萬畝之利乎是增築此隄亦非迂緩而空糜者也如蒙乞敕該部再加覆議轉行總理河漕并漕撫衙門委官踏勘無拘原議如地可為隄而隄可益田即以支剩河銀覔夫修築如無支剩另行派處其修築之舉俟各工完後刻日亟圖如今春不暇期在秋間務使千里長河在在享平成之利一方永賴人人無不獲之憂則我皇上治河之鴻勛允可以參天地而軼古今矣伏乞聖裁一暫寬歸移之錢糧以安地方照得錢糧出於田土耕種本乎民力故欲錢糧之不負惟安集百姓而已慨自黃河決於崔鎮而桃源清河之民強半流移淮河決於髙堰而泗州山陽之民強半流移又決於黃浦而寶應興化鹽城之民強半流移散之四方轉於溝壑蓋已數年於兹矣今幸崔鎮髙堰決口已塞淮黃合流並入於海而髙堰乃黃浦之上流相須以為開閉者兹髙堰既塞黃浦必可計日以斷流矣是以流移之民見水去田出日漸歸復但驚疑傍徨而未敢為必住之計誠恐居處未遑而舊逋即追開墾未熟而新租復徴耳故凡臣所過之地因其催徴見年與以前之折餉也擁衆遮訴哭聲震天俱稱尋復故業求免新舊之稅其投遞詞狀不能盡述切思臣受催徴之寄豈不欲公稅之盡完也顧拖欠之數多係流移之民使因其歸復而拘繫以追併之恐殘喘可斃而錢糧決無所處此風一聞逃移益逺况捐百萬之膏血以治此水患本為民也今水患漸平而獨以些須逋負阻絶歸復之民不識水退之田將付之誰以耕種乎新舊之稅又將責之誰以輸納乎及查臣去年奉都察院劄付準户部洛行令帶徴淮揚等處萬􅔦四年五月拖欠改折之數隨經遵依親歷催比據各處册報亦稍稍補納而見年者亦較之往年分數為多此皆煢煢遺孑因漕餉半徵嵗事可望而勉力以供之者誠再於歸復之衆而推浩蕩之恩不但改折凡一應起存錢糧新者舊者暫行停徴仍比照墾田事例給之以牛種則流移之民歸來日衆新舊之稅將取諸開種而漸完矣如蒙乞敕該部再加覆議轉行總理河漕并撫按等衙門將淮揚二府委官踏勘素有水患今漸平治流移歸復之州縣不拘起存新舊一應錢糧暫行停徵待田地成熟陸續追補仍比照墾田事例給以牛種則已歸者安心耕耨未歸者聞風而來我皇上治河之舉益有實惠逋負公租非無民而終不可完者也再照此時正開耕布種之會民心去留之際嗷嗷待命不啻解懸更乞亟賜舉行不然雖蒙俞允而民亦不能速霑其恩也伏乞聖裁一乞廣賞勞之天恩以鼓人心照得治河臣民服役效勞乃其常分固不可以言賞亦不可以求知也顧維其時衆役之困敝已極尚有待於鼓舞諸臣之辛劬過苦尤當加以慰勞是又可緘默自惜而不披瀝以陳恭惟我皇上愛民之心素洽於閭閻之內而子來之願遂形於佚使之間故該臣沿河催儹隨地查閲見得各夫日夜力作勞苦萬端如遇浮沙則必穵沙取土深既數尺而水且上湧值淤陷則必塗手霑足行方跬步而身半泥中或取土於五六里及七八里間至十餘里日不數回而足熱如火紅腫未消而晨起且赴工矣或築隄於水際及半在水中以至全在水中地無多餘而身危苦墜墊塞未幾而潰折者相尋矣單夾被身已不勝冬雪之苦蓬穴為室更不任風雨之侵穢濕熏漬瘧痢半生凄楚無窮黧羸日甚其顛連可憫誠有工食不足以盡之者况此時服勞既久精力將疲而未完工程猶有賴於修築於此不曲為鼓舞恐解體之念或不能已而一簣之功反覺其難矣以臣愚見合無推浩蕩之恩憫元元之苦動支河工羡銀量行犒賞第見民心易動而感激思奮將有忘已往之勞踴躍以終其事者矣及查羡銀乃河臣題奉欽依而用之以為閲工之費者今皇上如用之以為賞是真不費之惠亦何靳而不為乎且此銀已在正數之外賞功之列即皇上不用河臣亦以閲工而用之矣顧用於河臣則各夫猶視以為常而感之為有限用自皇上則各夫必仰戴如天而歡悅以無疆是賞費雖同而所感逈别又何惜此一令之頒乎此固臣目擊其苦而知鼓舞克終之術必有待於一賞也至於諸臣之在工者臣亦以干預河道而每詣其駐劄之所竊事訪問見得總理河漕都察院右都御史潘季馴委身高堰緝草為居自編於版築之間罔辭乎風日之苦總督漕撫户部右侍郎江一麟同心調度協力經營會計督視昕夕不倦蓋二臣主持全河綱紀衆官憂勤惕厲之念自為之百倍倡率綜核之令不敢少有所懈耳故自司道以及於總委小委等官靡不拱聽約束殫竭心力隨其所委期於速成蓋雖官階有崇卑而其拮據奔走備極艱苦則固一而已矣夫諸臣之效忠若是臣非不欲懇乞皇上而推恤民之恩以為之併賞也顧朝廷之於民每隨時以用愛賞官之定例必事竣而後頒今查河隄雖已垂成而加厚加高猶有未完是可録可賞者諸臣之勞而不敢遽請者則固拘於例耳合無再祈天心憫諸臣之勞而又嘉其績之能速底也特賜綸音用施宣慰待其報完重加賞賚則一字之褒將重於金玉而督夫以完未完之工者殆有孜孜而不敢以或後者矣如蒙乞敕該部再加覆議每夫應量賞銀若干著為定數轉行河漕并漕撫衙門動支河工羡銀查照夫額逐一犒賞如羡銀不足準以河工正銀補之仍於總理河漕都察院右都御史潘季馴總督漕撫户部右侍郎江一麟以及於司道等官頒之以宣慰之綸音許之以功成之重賞則臣民霑恩而大工可完於不日矣或仰厪天仁念此河工乃非常之舉而於潘季馴江一麟亦用羡銀預加一賞此又在我皇上破常格以優體大臣昭寵異以隆重河務竦動羣工之意臣又何勝惓惓顒望之至伏乞聖裁奉聖旨該部看議來説工部覆議除暫寬歸移之錢糧以安地方一事移咨户部議覆無異其餘五欵本部覆俱相同題奉聖旨這河工垂成各官殫忠經理勞績可嘉著候工完之日你部裏奏請差官勘實朝廷自不惜爵賞以勸有功潘季馴江一麟各先賞銀三十兩紵絲二表裏潘季馴還加賜大紅獬豸紵絲衣一襲以示優勞其餘俱依議行其管河官衙舍著用附近毁壞寺廟及遵近旨拆毁書院改建不許增派擾民條陳治安疏御史薑璧題為河工將竣敷陳末議懇乞聖明俯賜採擇以保治安事臣竊聞之古志曰防河如防冦防冦者當以不治治之來則禦去則止而已矣防河者當以無事行之逆則治順則止而已矣而今之防河者有二弊焉好事者謂故轍之必不可循輒為穿鑿之圖以亂其性是挑釁也怠事者謂河流之必不可治每為因循之説以滋其患是玩寇也十餘年間二弊相尋河患極矣上厪宸衷宵旰為慮俯從言官之請遂為破格之謀獨斷聖心羣疑屏息使當事大臣得以殫竭心力故半載之間兩河順軌該臣巡歷於淮安等處親詣各工見得各官之催督其嚴謹也即如家事萬夫之趨事其歡呼也猶若子來水孽潛消河工就績閭里有可耕之地運艘無壅阻之虞據工程雖云繁巨計錢糧尚有贏餘是皆仰賴我皇上純德格天而淮海效靈至誠動物而羣工用命之所致也以此時觀之可謂一治矣然虔其始者不可不慮其終圖其大者不可不矜其細兼理河道亦臣之責也尚有一二可言者臣既得於聞見之真敬為我皇上陳之如蒙不以為謬敕下該部覆議施行臣愚幸甚地方幸甚緣係河工將竣敷陳末議懇乞聖明俯賜採擇以保治安事理謹題請旨計開一曰一事權天下之事多緒則亂多岐則諉查得治河之官自永樂以至𢎞治百五十餘年原無河道都御史之設故有以漕運兼理河渠如景泰之王鋐者有以總兵兼河道如天順之徐恭者成化七年因漕河淺甚糧運稽阻特令刑部侍郎王恕出總其事八年事竣改升自後不復建設凡遇河患事連各省重大者輒命大臣督同各省巡撫官治之事竣還京此祖宗成法也至正德十一年始專設總理河道駐劄濟寧而南北直𨽻河南山東皆為統轄之地地非不廣勢非不尊然延袤五六千里之間足不及遍目不及覩形勢要害東西南北俱若夢寐豈能遙制至於伏秋瀑漲之時呼吸變態猝遇衝激勢若燃眉州縣管河官白之於府府白之道道白之總理總理下之道道下之府府下之州縣往返已一月矣謂必待稟白而後行之事已無及如其不待白也總理焉用為也且既有總理巡撫必難獨斷凡遇申呈輒批仰照總河批詳施行此在避難者固然而在任事者亦不得不然何也畏侵權也及至借支錢糧調派官夫便相齟齬此在私而刻者固然而在無我者亦不得不然何也總河之事不免勞民傷財而巡撫之責則在安百姓節財用也至於意見不同秦越相視者又不待言也臣昔任山東當兩河泛濫之時總河都御史傅希摯力言草灣不可開崔鎮之當塞高堰之當築章疏案牘班班可考而漕撫衙門拒之甚力後至草灣復淤橫流莫遏業已悔之無及矣故今之議者謂傅希摯之説得行或吳桂芳早兼河道之任則平成之績不在今日矣此事權分委之弊彰彰也查得先該吳桂芳節奉聖旨近來當事諸臣意見不同動多掣肘以致日久無功今以此專屬吳桂芳經理河道都御史暫行裁革河道事務著各該巡撫官照地方分管俱屬吳桂芳提督事寧回京請旨再設欽此即今潘季馴接管亦照旨行事夫巡撫照地理河者即王鋐徐恭兼理之制也吳桂芳提督者即特遣侍郎王恕出總其事事竣改升之制也故事權歸一事功易就今日河功之成實原於此蓋天咨我皇上以法祖致治之盛故其明效大驗如此且事權之隆重體統之尊嚴屬寮之承聽人民之信服孰有踰於巡撫者哉天下之事欲其速辦孰有易於巡撫者哉而乃欲益一贅員以滋推諉也但原奉旨內有暫革再設之語而各該巡撫又未見特加敕諭竊以為復設河道則推諉之弊復生未蒙特敕則責成之意未篤終非可久之道合無將前明旨著為令甲而於撫臣特加敕諭一道其各銜內添增兼管河道四字萬一日後河道有事亦照祖制臨時特遣大臣一員督同各該巡撫管理如此則可永杜推諉掣肘之弊而河渠利賴世世無窮矣伏乞聖裁二曰嚴責成夫郡縣之有守令即家之有長也一家之事必取辦於長其子姓之分猷倅理者不過受成算效奔走而已而於河道則獨不然府有管河道同知或通判矣則郡守若罔聞之州縣有管河判官或主簿矣則州守縣令若罔聞之甚至有抵牾其事變亂其是非顛倒其賢否者此何以故蓋因管河為最苦之官而治河為最難之事避難厭苦為人情之常而况奔走河濱悉聽司道官差委不得以時親就以事售知於寮長其勢固宜然也至於上官稍稍責成守令亦不過增一牒文移付管河官而已甚至有束之高閣者竊以為朝廷張官置吏莫要於守令蓋以總括庶務綜核羣寮也而何獨於河道遺之哉今後河工之事似應專責掌印官督同管河官管理各照該地方隄岸冬春踏勘隨地修補伏秋水漲督率防護如有疏虞掌印官與管河官一體參治庶責任有歸而事功易就矣伏乞聖裁三曰議支河查得先因髙堰黃浦之決未塞全淮之水傾注髙寶興鹽之間田廬墳墓一望渺渺當事者不探其原惟尋其委請開興化縣之丁溪白駒二場海口鹽城縣之周祿港至新河廟三十餘里又動支鹽運司銀二萬五千餘兩分貯於興鹽二縣大加疏濬為泄水計該臣巡歷於淮泰各鹽場躬親踏勘看得地勢外髙內窪無從宣泄而潮水灌入填塞甚易及至鹽城據知縣楊瑞雲併士民謝與成等稟稱本縣自黃浦等口決後民田沉於水底者數年今幸築塞民有耕穫之望若又開挑支河引入潮水一為淹沒永不堪種又據兩淮運司判官孫仲科并竈户管席等稟稱自鹽城支河一開將各場運鹽河水盡隨潮泄去運河斷流商不來支鹽日消折竈益困敝等因為照髙堰居黃浦之上遊而黃浦為興鹽水患之門户今髙堰隄成黃浦決塞是上流已斷則地上乾涸已無可泄之水若復開濬海口則地形外髙徒引倒灌之潮且海口既多防禦實難是開私販之門鹹水灌入民田為害不小宜乎官竈士民之告稟者紛紛也臣至淮安即與總河都御史潘季馴會議亦云曾委官踏勘誠不可開臣思鹽場民地皆國課攸關河道鹽務臣職掌所繫今隄堰既成此工可已如蒙乞敕該部再加覆議或將疏濬海口諸工徑行停止或轉行總河都御史逐一再委官勘明將前工程題覆停寢不惟可省重費抑亦可免大患也伏乞聖裁四曰修古隄查得宋臣范仲淹修築長隄一道肇自吕四終於徐瀆接連數百里環繞三十場隄以外俱係鹽場草蕩竈丁居住煎辦鹽課離海逺者百里近者數十里不等隄以內則有運鹽官河一道南抵泰州北抵廟灣西通髙寶興鹽等處各湖港商民船隻往來及田户車戽甚為通便是此隄外以捍海潮內以護鹽河併各民田其計至深而利至溥也至今稱之曰范公隄中間原留泄水大海之路如今之白駒閘口及牛灣河瓦龍諸港皆隨地形潮勢宣泄亦不為害况當時范隄之初築也即有蓄潦之慮及其既築也復有雨雪之變事幾中罷幸而范公之持議甚堅張胡二臣之贊襄更力卒不能惑羣言功成保障貽海濱數百年之安供我國家百萬金之課故三賢有祠民到於今祀之不忘奈從前當事者見髙堰黃浦口決興鹽髙寶受害倡為鑿范隄開海口以泄水徒為一時權宜之術更不思昔人創置之意隄外係竈户煎鹽之地淡水一出則鹽課消薄矣隄內係民竈耕種之田潮水一入則田租減損矣該臣巡歷各鹽場皆由范隄往來見得歷年既久隄漸坍塌有舊址見在半為民竈所居者有海潮淤沙漸成髙阜與隄相平者有被水衝漫卑薄不堪者要皆隄址尚存若肯時加修復永可為捍禦之計是修復古隄誠鹽場之切務也如蒙乞敕該部覆議果屬不謬行令臣轉行運司併通泰淮三分司官照各該管地方將范公隄岸逐一踏勘估計明白量派竈夫督率修理其舊隄髙厚可恃者不必再修惟於坍塌者築之卑薄者補之要害者先之各夫工食就將前項興鹽二縣收貯運司疏濬海口銀兩動支給領每年於春正二月此非旺煎之時量修三分計三年工可全完矣其原泄水口港仍舊存留間修兩岸使不為患如此先臣之澤永垂於不休而國課竈額利賴於無疆矣伏乞聖裁五曰蠲隄租查得自徐至淮新築遙隄五百餘里若以夾岸計之將千里矣南北兩隄蟺蜿若城髙堅足恃誠為治河之一策矣但其所築之隄皆係民間已業而中間挖沙尋土傷損地段尤多夫以不可耕之地而欲小民償計畝之稅除概邑昏墊之苦而使一户陪無産之糧徵之者似為無名而輸之者實為無辜也合無行令巡撫衙門擇委廉能官員逐一踏勘丈量明白要見某户某人隄址若干挖傷地土若干乞敕户部議蠲租額若干如以國課必不可損或以該隄應納之稅均攤一邑或以水退無主地土給照開墾加倍抵補如此則地方無不均之歎而小民無向隅之泣矣伏乞聖裁奉聖旨該部知道工部覆議相同題奉聖旨依議行中州河防為要疏御史王世揚題為中州河防為要巡撫去銜未宜懇乞聖明俯賜查復以便責成事臣惟天下之事不能無利害亦不能無因革然有所革也必其有所害也若無所於害即無貴於革矣况不惟無害而且大有利於地方如河南巡撫管河之銜者恐即因之不暇尚可云革乎臣請為皇上悉陳之蓋黃河自潼關而東迤邐二千餘里始入於海中所經行地方則河南山東兩省南北兩直𨽻也故事各該撫臣雖皆領有管河職銜然疆域既分統轄各異非情有壅閼而不達則事多掣肘而難行故向來陽侯為患固云天數使然而要之人謀不臧亦未必盡無也頃者幸蒙皇上慨允科道諸臣之奏除去撫臣兼管字樣仍設總督大臣經理以數省之地總之一人凡屬河防惟其擘畫若身之使臂臂之使指蓋無復有所為壅閼不達掣肘難行者此誠至計也顧總督大臣可設也撫臣兼銜不可去也保定山東撫臣兼銜可去也河南撫臣兼銜不可去也何者蓋事權不可不專而利害尤不可不審語云千人輿瓢不如一人負而趨也是專責之説也然不曰一手不能舉鴻鼎一臂不能挽大車乎以是知事固貴專而有時乎不專者則求以共濟而非好為多事也故使督臣在上流而撫臣在下流抑或督臣切近而撫臣窵逺則萬一河流不靖督臣先己身任其事矣撫臣即有石畫妙算何濟燃眉徒多牽制之虞無益成敗之數如是而去其兼銜何不可者顧河流雖經數省乃所經於中州者實則居半且撫臣駐劄開封府督臣駐劄濟寧州是撫臣在上流督臣反在下流撫臣去河近而督臣去河反逺矣有如每年水漲之時或有潰決之患則必數日始可報知督臣督臣亦必數日始可走檄築塞况波濤洶湧濟渡為難即馳報亦有未便達者夫以患起於須臾而計圖於持久即有神禹之智將安所施其不舉瀕河之民而胥溺之者幾希矣爭如撫臣駐劄河干未決先防隨決即塞且與管河各官羣聚一城面相可否無煩文檄不費日時之為得哉説者曰督臣之設正以權之不專奈何又令撫臣兼之噫是未嘗引邊事觀之也今國家九邊軍務固嘗以總理責之督臣然亦何嘗不以贊理責之巡撫彼固以為相濟而此可以為相厲哉即今年瀕河州縣凡無管河之官者為增官凡無管河之銜者為增銜豈非以河務為急而官職當備乎夫誠以河務為急而官職當備也臣意撫臣即素無此銜亦宜增入乃素有之而反去之豈以撫臣之要係顧出佐領下哉名除撫臣之銜以重督臣之任而實弛撫臣之擔以貽督臣之憂揆之事理人情臣誠未見其可也説者又曰今年撫臣去銜未見僨事後之視今一也即過計何為臣又以為不然蓋今河患初平人心正惕撫臣既自勞於經度安得不自愛其成功故夫夙夜拮據不敢怠遑者固忠所事也亦愛厥功也倘後安瀾日久玩愒漸生由前觀之事非已作則痛癢不關由後觀之事有專官則功罪不與或安燕雀之愚致罹魚鱉之患於時舉而罪之督臣督臣則諉之逺不及知舉而罪之撫臣撫臣則又諉之曰事難越爼雖云干係地方終難逭責然皇上業去其權矣可復重其罰哉是必有督臣以總數省之綱維亦必有撫臣以專一方之督責然後策有萬全而事無後患也矧原議稱令同心共濟則既與以管河之事矣何必又吝一管河之銜而使他日曠職者藉口乎此臣所以謂撫臣兼銜不可去而河南撫臣兼銜尤不可去者蓋取其去者比之而知其利害有如此也如蒙乞敕該部再加查議如果臣言不謬除保定山東撫臣去河原逺無容别議外將河南巡撫兼管河道職銜照依各邊巡撫贊理軍務事例於新任撫臣敕內仍舊增入凡平日一切隄防之術務令與督臣議定而行惟有事則一面相機築濬一面馳報督臣會議毋得推諉致誤事機庶人有切身之慮事無卒至之虞督臣得撫臣而猷念有資撫臣得督臣而隔越無患則河防庶幾永固而祖陵運道及中土民生亦自可無勞聖主之宵旰矣臣待罪兹土聞見頗真即督臣前題逺地修守疏中亦甚以遙制為不便竊妄以為將來事勢必有出於此者用是輒敢忘其固陋少效欵欵之愚伏惟聖明留意幸甚等因奉聖旨該部知道工部覆前疏題為中州河防為要巡撫去銜未宜懇乞聖明俯賜查復以便責成事該巡按河南監察御史王世揚題前事奉聖旨該部知道欽此欽遵抄出到部送司案呈到部看得河南巡按御史王世揚題稱河南巡撫仍復兼管河道職銜以便治河一節為照黃河之在河南上自潼關下至歸德中經開封奔流二千餘里俱係河南巡撫境內而河南巡撫敕書內原無兼管字樣則以總理河臣專治之也近緣總河罷設遂將兼管分屬各巡撫以致事權不專隄防陵夷馴至上年劉獸醫等口之變上厪宵旰之憂故俯採言官之議復設總理河道衙門除去各巡撫兼管字樣懲前慮後為計甚詳夫總理衙門既設而復分其務將無以專事權兼管敕書甫易而遽增入將無以示法守是殆未可以輕議者但總理固有河道之寄而巡撫實有地方之責今河南巡撫委居黃河上流而最近總理衙門委居黃河下流而最逺若釋其近而切者漫無干涉責之逺而難者旦夕取辦竊恐黃河湍悍無常呼吸便有利害比至踈虞而後圖則在總理已噬臍無及而在巡撫亦得有辭矣所據御史王世揚題議凡黃河之在河南境內者總理總持其綱巡撫兼管其事未決先防隨決即塞不以彼此越爼為嫌惟以同心共濟為務誠為忠謀逺算相應酌議題請合無自萬厯十七年為始除河道照常隄防修築俱聽總河衙門裁處外其遇伏秋水發將有橫決如上年劉獸醫等口之變當責河南管河副使一面申報總河一面申報巡撫其總河未能卒至料理巡撫即便動支河道錢糧起夫督率修築務期未決先防隨決即塞盡如御史所言斯為同心共濟但於事寧之日備將用過錢糧修過工程移咨總河知會以便年終奏繳每年著為定規不許推諉稽遲其有應行未盡事宜容令會議具奏伏乞聖明裁定本部備咨總理河道河南巡撫及咨都察院轉行河南巡按御史備行道府州縣掌印管河官員一體遵奉施行等因奉聖旨境內河道關係水利民生撫臣豈得推諉坐視你部裏既議明白著河南巡撫官凡黃河經行去處就近兼理會同總河官行事還添入敕內不必加銜欽此河防一覽卷十三
