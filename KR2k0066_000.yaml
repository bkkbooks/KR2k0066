body:
  text: 河防一覽地理類四河渠之屬提要臣等謹案河防一覽十四卷明潘季馴撰季馴字時良烏程人嘉靖庚戌進士官至總督河道工部尚書兼右都御史事蹟具明史本傳季馴在嘉靖萬厯間凡四奉治河之命任事二十七年著有成績嘗于萬厯七年工成時彚集前後章奏及諸人贈言纂成一書名塞斷大工録既而以其猶未賅備復加増削輯為是編首勅諭圖説一卷次河議辨惑一卷次河防險要一卷次修守事宜一卷次河源河決考一卷次前人文章之闗係河務及諸臣奏議凡八十餘篇分為九卷明代仰東南轉漕以實京師又泗州祖陵逼近淮泗故治水者必合漕運與陵寢而兼籌之中葉以後潰決時聞議者紛如聚訟季馴獨力主復故道之説塞崔鎮隄歸仁而黄不北築髙家堰黄浦八淺而淮不東創為減水順水壩遥隄縷隄之制而蓄洩有所賴其大㫖謂通漕于河則治河即以治漕㑹河于淮則治淮即以治河合河淮而同入于海則治河淮即以治海故生平規畫總以束水攻沙為第一義考漢書載王莽時徵治河者大司馬史張戎已有水自刮除成空語是借水刷沙古人已露其意特從未有見諸行事者季馴乃斟酌相度神而明之遂永為河渠利賴之䇿後來雖時有變通而言治河者終以是書為凖的閻若璩潜邱劄記有與劉紫函書曰考萬厯六年潘司空季馴河工告成其功近比陳瑄逺比賈魯無可移易矣乃十四年河決范家口又決天妃壩二十三年河淮決溢邳泗髙寳等處皆患水災天啟元年河決王公堤安得云潘司空治後無水患六十年大抵司空成規具在縱有天災縱有小通變治法不出其範圍之外故曰河防一覽為平成之書云云若璩居於山陽於河渠利病得之目睹斯可謂平情之論矣乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:23b99faaf746cf459944ad7dfa00f4d34c42cc94fa820c3c20fc48d4c168ae53
