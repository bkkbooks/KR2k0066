body:
  text: 河防一覽卷五明潘季馴撰河源考夏書禹貢導河積石至于龍門南至于華隂東至于底柱又東至于孟津東過洛汭至于大伾北過洚水至于大陸又北播為九河同為逆河入于海蔡傅曰河自積石三千里而後至龍門經但一書積石不言方向荒逺在所略也龍門而下因其所經記其自北而南則曰南至華隂記其自南而東則曰東至底柱又詳記其東向所經之地則曰孟津曰洛汭曰大伾又記其自東而北則曰北過洚水又詳記其北向所經之地則曰大陸曰九河又記其入海之處則曰逆河自洛汭而上河行于山其地皆可考自大伾而下垠岸高于平地故決齧流移水陸變遷而洚水大陸九河逆河皆難指實然上求大伾下得碣石因其方向辨其蹤迹則猶可考也西漢書西域傳西域中央有河其河有兩源一出蔥嶺山下一出于闐于闐在南山下其河北流與蔥嶺河合東注蒲昌海蒲昌海一名鹽澤者也去玉門陽關三百餘里廣袤三百里其水停居冬夏不增減皆以為濳行地下南出於積石為中國河云山海經崑崙山縱橫萬里高萬一千里去嵩山五萬里有青河白河赤河黑河環其墟其白水出其東北陬屈向東南流為中國河河百里一小曲千里一大曲發源及中國大率常然東流濳行地下至規期山北流分為兩源一出蔥嶺一出于闐其河復合東注蒲昌海復濳行地下南出積石山西南流又東回入塞過燉煌酒泉張掖郡南與洮河合過安定北地郡地流過朔方郡西又南流過五原郡南又東流過雲中西河郡東又南流過上都河東郡西而出龍門汾水從東於北入河東即龍門所在龍門未開河出孟門東大溢是謂洪水禹鑿龍門始南流至華隂潼關與渭水合又東回砥柱砥柱山名河水分流包山而過山見水中若柱然今陜州東河北陜縣三縣界及洛陽孟津所在至鞏縣與洛水合成臯與濟水合濟水出河北至王屋山而南截河渡正對成臯又東北流過武德與沁水合至黎陽信都信都今冀州絳水所在絳水亦曰潰水一曰漳水巨鹿之北遂分為九河巨鹿今邢州大陸所在大陸澤名九河一曰徒駭二太史三馬頰四覆釜五湖蘇六簡七潔八鉤盤九鬲津又合為一河而入海齊桓公塞九河以廣田居故館陶具丘廣川信都東光河間以東城池九河舊迹猶存漢代河決金隄南北多罹其害議者常欲求九河故迹而穿之未知其所是以班固云自兹距漢已亡其八枝河之故瀆自沙丘堰南分而出焉故尚書稱導河積石至于龍門今絳州龍門縣界南至于華隂北至于砥柱東至于孟津在洛北都道所奏古今以為津東過洛汭至于大伾洛汭今鞏縣在河洛合流之所也大伾山今汜水縣即故成臯也山爯成曰伾北過水至於大陸其絳水今冀州信都大陸澤名今邢州巨鹿又北播為九河同為逆河入海是也同合出九河又合為一名為逆河逆行也言海口有潮夕潮以迎河水元史河源記河源古無所見禹貢導河止自積石漢使張騫持節道西域度玉門見二水交流發䓤嶺趨于闐匯鹽澤伏流千里至積石而再出唐薛元鼎使吐蕃訪河源得之於悶磨黎山然皆歷嵗月涉艱難而其所得不過如此世之論河源者又皆推本二家其説怪誕總其實皆非本真意者漢唐之時外夷未盡臣服而道未盡通故其所往不無迂回難阻不能直抵其處而究其極也元有天下薄海內外人迹所及皆置驛傳使驛往來如行國中至元十七年命都爾蘇為招討使佩金虎符往求河源都爾蘇既受命是歲至河州州之東六十里有寧河驛驛西南六十里有山曰殺馬關林麓窮隘舉足浸高行一日至巔西去愈高四閲月始抵河源是冬還報并圖其城傳位置以聞其後翰林學士潘昻霄從都爾蘇之弟庫庫出得其説撰為河源志臨川朱思本又從巴爾濟蘇家得帝師所藏梵字圖書而以華文譯之與昻霄所志互有詳略今取二家之書考定其説有不同者附注于下按河源在吐蕃朵甘思西鄙有泉百餘泓沮洳渙散弗可逼視方可七八十里履高山下瞰燦若列星以故名鄂端諾爾鄂端譯言星宿也思本曰河源在中州西南直四川馬湖蠻部之正西三千餘里雲南麗江宣撫司之西北一千五百餘里帝師薩斯嘉地之西南二千餘里水從地涌出入井其井百餘東北流百餘里匯為大澤曰鄂㙐諾爾羣流奔輳近五七里匯二巨澤名阿拉克諾爾自西而東連屬吞噬行一日迤邐東騖成川號赤賔河又二三日水西南來名亦里出與赤賔河合又三四日水來南名呼喇又水東南來名雅爾楚合流入赤賔其流浸大始名黃河然水猶清人可涉思本曰呼喇河源出自南山其地大山峻嶺綿亘千里水流五百餘里注雅爾齊河雅爾齊河源亦出自南山西北流五百餘里始與黃河合又一二日岐為八九股名伊遜鄂羅木譯言九渡通廣五七里可度馬又四五日水渾濁土人抱革囊騎過之聚若糾木斡象舟傳髦革以濟僅容兩人自是兩山峽束廣可一里二里或半里其深叵測朵甘思東北有大雪山名伊拉瑪博囉其山最髙譯言謄格哩哈達即崑崙也山腹至頂皆雪冬夏不消土人言逺年成氷時六月見之自八九股水至崑崙行二十日思本曰自渾水東北流二百餘里與和囉海圖河合和囉海圖河源自南山西北偏西流爾八百餘里與黃河合又東北流一百餘里過即哈瑪地又正北流一百餘里乃折而西北流二百餘里又折而東北流一百餘里又折西而東流過崑崙山下畨名伊拉瑪博囉其山高峻非常山麓綿亘五百餘崙里河隨山足東流過薩斯嘉即庫濟庫德地河行崑南半日又四五日至地名而庫濟庫德二地相屬又三日地名哈喇博勒齊爾四逹之衝也多寇盜有官兵鎮之近北二日河水過之思本曰河過庫德與伊實巴沁河合伊實巴沁河源自鐡豹嶺之北正北流凡五百餘里而與黃河合崑崙以西人簡少多處山南山皆不穹峻水益散漫獸有髦牛野馬狼狍羊之類其東山益高地亦漸下岸狹隘有狐可一躍而越之處行五六日有水西南來名納琳哈喇譯言細黃河也思本曰哈喇河自白狗嶺之北水西北流五百餘里與黃河合又兩日水南來名恰爾瑪出二水合流入河思本曰自哈喇河與黃河合正北流二百餘里過伯站折而西北流經崑崙之北二州百餘里名竒爾穆蘇河合竒爾穆蘇河源自威茂之西北岷山之北水北流即古當州境正北流四百餘里折而西北流又五百餘里與黃河合河水北行轉西流過崑崙北一向東北流約行半月至貴德州地名博勒齊爾始有州治官府州𨽻吐蕃等處宣慰司司治河州又四五日至積石州即禹貢積石五日至河州安鄉關一日至打羅坑東北行一日洮河水南來入河思本曰自竒爾穆蘇河與黃河合又西北流與鵬拶河合鵬拶河源自鵬拶山之西北水正西流七百餘里過禮塞塔失地與黃河合折而西北流三百餘里又折而東北流過西寧州貴德州馬嶺凡八百餘里與邈水合邈水源自青唐宿軍谷正東流五百餘里過三巴站與黃河合又東北流過土橋站古積石州來羌城廓州搆米站界都城凡五百餘里過河州與野龎河合野龎河源自西傾山之北水東北流凡五百餘里湟水浩亹河合北流一百餘里過城銀川站與湟水源自祁連山下正東流一千餘里注浩亹河浩亹河源自刪丹州之南刪丹山下水東南流七百餘里注湟水然後與黃河合又東北流一百餘里與洮河合洮河之源自羊撒嶺北東北流過臨洮府凡八百餘里與黃河合又一日至蘭州過北卜渡至鳴沙河過應吉里州正東行至寧夏府南東行即東勝州𨽻大同路自發源至漢地南北澗溪細流旁貫莫知紀極山皆草石至積石方林木暢茂世言河九折彼地有二折蓋恰爾瑪出及貴德博勒齊爾也思本曰自洮水與河合北流過逹地凡八百餘里過豐州西受降城折而正東流過逹勒達古天德軍中受降城東受降城凡七百餘里折而正南流過大同路雲內州東勝州與黑河合黑河源自漁陽嶺之南水正西流凡五百餘里與黃河合又正南流過保德州葭州及興州境又過臨州凡一千餘里與吃那河合吃那河源自州東南流過陜西省綏德州凡七百餘里與黃河合又南流三百餘里與延安河合延安河源自陜西蘆子關亂山中南流三百餘里過延安府折而正東流三百里與黃河合又南流三百里與汾河合汾河源自河東朔武州之南亂山中西南流過管州冀寧路汾州霍州晉寧路絳州又西流至龍門凡一千二百餘里始與黃河合又南流二百里過河中府過潼關與太華太山綿亘水勢不可復南乃折而東流大槩河源東北流所歷皆西蕃地至蘭州凡四千五百餘里始入中國又東北流過逹逹地凡二千五百餘里始入河東境內又南流至河中一千八百餘里通計九千餘里歷代河決考周定王五年河徙砱礫晉景公十五年穀梁傳曰梁山崩壅河三日不流晉君召伯尊伯尊遇輦者問焉輦者曰國君素縞帥羣臣哭之既而祠焉斯流矣伯尊至君問之伯尊如其言而河流左傳曰伯宗漢文帝十二年冬十二月河決酸棗東潰金隄武帝建元三年河水溢於平原元光三年春河水徙從頓丘東南流夏復決濮陽瓠子注巨野通淮泗泛郡十六元帝永光五年冬十二月河決初武帝既塞宣房後河復北決館陶分為屯氏河東北入海廣深與大河等故因其自然不堤塞也是嵗河決清河靈鳴犢口而屯氏河絶成帝建始四年夏四月河決東郡金堤灌四郡三十二縣居地十五萬頃壞官亭廬舍且四萬所河平三年秋八月河復決平原流入濟南千乘所壞敗半建始時復遣王延世作治六月乃成鴻嘉四年秋渤海清河信都河水湓溢灌縣邑三十一敗官亭民舍四萬餘所新莽三年河決魏郡泛清河以東數郡先是莽恐河決為元城塜墓害及決東去元城不憂水故遂不堤塞唐玄宗開元十年博州河決十四年魏州河溢十五年冀州河溢昭宗乾寧三年夏四月河漲將毀滑州朱全忠決為二河夾城而東為害滋甚後唐同光二年秋七月唐發兵塞決河先是梁攻楊劉決河水以限晉兵梁所決河連年為曹濮患命將軍婁繼英督汴滑兵塞之未幾復壞晉天福二年河決鄆州四年河決博州六年河決滑州開運三年秋七月河決楊劉西入莘縣廣四十里自朝城北流漢乾祐元年五月河決魚池三年六月河決鄭州周廣順二年十二月河決鄭州滑州周遣使修塞周主以決河為憂王浚請自行視許之周塞決河三月澶州害天福十一年黃河自觀城縣界楚里村隄決東北經臨黃觀城兩縣宋太祖乾德二年赤河決東平之竹村三年秋大雨開封河決陽武又孟州水漲壞中灘橋梁澶鄆亦言河決四年八月滑州河決壞靈河縣大隄開寶四年十一月河決澶淵泛數州太宗太平興國二年秋七月河決孟州之溫縣鄭州之滎澤澶州之頓丘七年河大漲蹙清河凌鄆州城將陷塞其門急奏以聞詔殿前承旨劉吉馳往固之八年五月河大決滑州韓村泛澶濮曹濟東南流至彭城界入于淮九年春滑州復言房村河決淳化四年十月河決澶州陷北城壞廬舍七千餘區真宗咸平三年五月河決鄆州王陵掃浮巨野入淮泗水勢悍激浸迫州城景德元年九月澶州言河決橫壠掃四年又壞王公掃並許詔發兵夫完治之大中祥符三年十月判河中府陳堯叟言白浮圖村河水決溢明年九月棣州河決聶家口五年正月本州請徙城居民重遷命使完塞既成又決于州東南李氏灣環城數十里民舍多壞又請徙商河役興踰年雖扞護完築裁免決溢而湍流益暴壖地益削河勢高民屋殆踰丈矣民苦久役而終憂水患六年乃詔徙州于陽信之八方寺七年八月河決澶州大吳掃天禧三年六月乙未夜滑州河溢城西北天臺山旁俄復潰于城西南岸漫溢州城歷澶濮曹鄆注梁山泊又合清水古汴渠東入于淮州邑罹患者三十二仁宗天聖六年六月河決澶州之王楚掃明道二年徙大名之朝城縣于社婆村廢鄆州之王橋渡淄州之臨河鎮以避水景祐元年七月河決澶州橫壠掃慶厯八年六月癸酉河決商胡掃皇祐元年三月河合永濟渠注乾寧軍二年七月辛酉河復決大名府館陶縣之郭固四年正月乙亥塞郭固而河勢猶壅議者請開六塔以披其勢嘉祐元年夏四月壬子朔塞商胡北流入決此河不能容是夕復決令三司鹽鐵判官沈立往行視神宗熙寧元年六月河溢恩州烏攔提又決冀州棗強掃北注瀛七月又溢瀛州樂夀掃四年七月辛卯北京新堤第四第五掃決漂溺館陶永濟清陽以北八月河溢澶州曹村十月溢衛州王供時新堤凡六掃而決者二下屬恩冀貫御河奔衝為一十年五月滎澤河決急詔判都水監俞光往治之是嵗七月河復溢衛州王供及汲縣上下掃懷州黃沁滑州韓村乙丑遂大決于澶州曹村澶淵北流斷絶河道南徙東滙于梁山張澤濼分為二派一合南清河入于淮一合北清河入于海丘濬大學衍義補曰此黃河入淮之始本年八月又決鄭州滎澤元豐元年四月丙寅決口塞詔改曹村掃曰靈平五月甲戍新堤成閉口斷流河復歸北三年七月澶州孫村陳掃及大吳小吳掃決四年四月小吳掃復大決自澶注入御河五年六月河溢北京內黃掃七月決大吳掃堤以紓靈平下掃危急八月河決鄭州原武掃溢入利津陽武溝刀馬河歸納梁山濼七年七月河溢元城掃決橫堤破八月河流雖北而孫村低下夏秋霖雨漲水往往東出小吳之決十月又決大名之小張口元符三年四月河決蘇村徽宗大觀元年丙申邢州言河決陷巨鹿縣庚寅冀州河溢壞信都南宫兩縣三年六月河溢冀州信都十一月河決清河掃是嵗水壞天成聖功橋元世祖至元九年七月衛輝路新鄉縣廣盈倉南河北岸決二十三年河決衝突河南郡縣凡十五處役民二十餘萬塞之二十五年汴梁路陽武縣諸處河決二十二所漂蕩麥禾房舍委宣慰司督本路差夫修治成宗大德元年秋七月河決杞縣蒲口塞之明年蒲口復決塞河之役無歲無之是後水北入復河故道二年秋七月大雨河決漂歸德屬縣田廬禾稼三年五月河南省言河決蒲口兒等處侵歸德府數郡百姓被災武宗至大二年秋七月河決歸德又決封丘仁宗延祐七年七月汴城路言滎澤縣六月十一日河決塔海莊東隄橫隄兩重又決數處二十三日夜開封縣蘇村及七里寺復決二處泰定帝泰定二年五月河溢汴梁三年河決陽武漂民居萬六千五百餘家尋復壞汴梁樂利隄發丁夫六萬四千人築之文宗至順元年六月曹州濟隂縣河防官言初五日魏家道口黃河舊堤將決不可修築募民修護水月隄復于近北築月堤未竟至二十一日水忽泛溢新舊三堤一時咸決明日外堤復壞有蛇時出沒於中所下樁土一掃無遺順帝至正四年五月大雨二十餘日黃河暴溢平地水深二丈許北決白茅堤六月又北決金隄並河郡邑濟寧軍州虞城碭山金鄉魚臺豐沛定陶楚丘武城以至曹州東明巨野鄆城嘉祥汶上任城等處皆罹水患北侵安山沿入會通運河延袤濟南河間將壞而漕司鹽場五年河決濟隂漂官民廬舍殆盡六年河決二十六年春二月黃河北徙先是河決小疏口逹於清河壞民居傷禾稼至是復北徙自東明曹濮下及濟寧民皆被害國朝洪武元年河決曹州從雙河口入魚臺大將軍徐逹開塌場口入于泗以通運時戴村末壩汶由坎河注海運阻故引河入塌場以濟之二十四年河決原武之黑陽山東經開封城北五里又南行至項城經潁州潁上東至夀州正陽鎮全入于淮而故道遂淤永樂九年以濟寧州同知潘叔正言命尚書宋禮役丁夫一十六萬五千濬會通河乃開新河自汶上縣袁家口左徙二十里至夀張之沙灣接舊河九閲月而成績侍郎金純從卞城金龍口下逹塌場口築隄導河經二洪南入淮漕事定為罷海運至今賴之正統十三年河決滎陽衝張秋尚書石璞侍郎王永和都御史王文相相繼督夫十餘萬塞之弗績天順六年河溢決開封府北門淹毁官民軍舍𢎞治二年河決原武支流為三一決封丘金龍口漫祥符下曹濮衝張秋長堤一出中牟下尉氏一泛濫儀封考城歸德入于宿以布政使徐恪言命侍郎白昻役丁夫二十五萬塞之五年復決金龍口潰黃陵岡再犯張秋侍郎陳政督夫九萬治之弗績六年乃命都御史劉大夏平江伯陳鋭役丁夫十二萬有竒一濬孫家渡口開新河導水南行由中牟至潁川東入于淮一濬四府營淤河由陳留至歸德分為二派一由宿遷小河口入淮一由亳州渦河入淮分土命工始塞張秋二年告成自是河南歲計河夫矣正德四年九月河決曹縣楊家口奔流曹單二縣逹古迹王子河直抵豐沛舟楫通行遂成大河五年二月起工修治至五月中雨漲掃臺衝蕩不克完合八年七月河決曹縣以西娘娘廟口孫家口二處從曹縣城北東行而曹單居民被害益甚是年驟雨漲娘娘廟口以北五里焦家口衝決曹單以北城武以南居民田廬盡被漂沒嘉靖六年河決曹單城武楊家口梁靖口吳士舉莊衝雞鳴臺七年河決淤廟道口三十餘里河道都御史盛應期奏開趙皮寨白河一帶分殺水勢八年飛雲橋之水北徙魚臺谷亭舟行閘面九年河決塌場口衝谷亭水經三年不去十三年又淤廟道口都御史劉天和役夫一十四萬濬之是年河決趙皮寨入淮本年忽自河南夏邑縣大丘回村等集衝數口轉向東北流經蕭縣出徐州小浮橋下濟二洪趙皮寨尋亦塞十九年河決野雞岡由渦河經亳州入淮二洪大涸兵部侍郎王以旗開李景高支河一道引水出徐濟洪役丁夫七萬有竒八月而成尋淤三十六年決曹縣衝谷亭運河不淤三十二年決房村約淤三十里都御史曽鈞役丁夫五萬六千有竒濬之三十七年新集淤七月忽向東北衝成大河而新集河由曹縣循夏邑丁家道司家道出蕭縣薊門由小浮橋入洪七月淤凡二百五十餘里趨東北假家口析為六股曰大溜溝小溜溝秦溝濁河胭脂溝飛雲橋俱由運河至徐洪又分一股由碭山堅城集下郭貫樓又析五小股為龍溝母河梁樓溝楊氏溝胡店溝亦由小浮橋會徐洪河分為十一流遂淤然分多則勢弱勢弱則併淤之機也四十四年七月河果大淤全河南繞沛縣戚山入秦溝北繞豐縣華山漫入秦溝接大小溜溝泛濫入運河至胡陵城口漫散湖坡從沙河至二洪八月工部尚書朱衡乃請開都御史盛應期原議新河自南陽至留城僉都御史臣潘季馴請接濬留城舊河併力挑濬八閲月而成隆慶四年七月黃河決睢寧縣曲頭集王家口馬家淺等處運道沙墊一百餘里俱為平陸淤重儲船九百餘隻臣季馴築塞諸決河水仍歸正道儲船盡出隆慶年間高家堰大潰淮水東趨決黃浦八淺而興鹽高寶諸邑匯為巨浸淮城水困民不聊生黃河亦決崔鎮等處而桃清河塞運道梗阻者數年萬厯六年臣季馴拜命總督河漕築高家堰六十餘里歸仁集隄四十餘里栁浦灣隄東三十餘里西四十餘里塞崔鎮等決一百三十餘處徐睢邳宿桃清兩岸築遙隄共長五萬六千四百三十餘丈馬厰坡隄七百四十餘丈使兩河不得外決築碭山大壩豐縣卲家大壩各一道約水不得北徙築徐沛豐碭縷隄一百四十餘里砌八淺寶應湖石隄共長一千五百七十餘丈建崔鎮徐升等四減水壩修復淮安新舊閘遷通濟閘于淮安甘羅城南以納淮水故道盡復河防一覽卷五
